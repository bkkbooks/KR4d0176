body:
  text: 盧溪文集卷二十二宋王庭圭撰絶句衡嶽銓德觀作并引盧溪老人謫沅湘過此見故人胡明仲留題同司諫遊山之樂悵然有懷其人復過西房聽陳道士彈琴作松風夜雨聲因留二絶他日三君子不忘遊山之樂必再至焉為余出示此詩峯頭烏帽翠雲裘三百年來無此流餘論更容平子否猶勝湛輩峴山遊碧玉峯前雲滿徑赤欄橋畔栁參天長廊靜夜松風起寫得餘聲入響泉清江張氏活人堂二絶句逺系長沙太守孫謂仲景也家傳太守活人言刀圭一缺起人死安得聲名不出門海底龍宫失護防老龍偷得返魂方聞君夜壓春槽響攜扣柴門乞酒漿次韻謝昌國今人不識古人心誰識羲皇太古音如望銀河九天上聊分一勺濯塵襟雙田逢蕭國器話别黃葉西風何處村茅簷立馬問寒溫江東渭北情無限樽酒他時得細論和康晉侯見贈儒生無力荷干戈亂後篇章感慨多但拏筆頭吟白雪莫挑馬箠渡黃河雪中以酒送歐陽廣明袁叔明小槽新壓甕頭春盛欲招呼雪閉門卧對袁郎説周易不妨伸頸飲清樽鄱陽周師禹求清軒霧齋詩月入柴門夜色新坐堅談壘足佳賓誰云老子興不淺政恐元規塵汚人細雨如煙下九垓始聞巖谷隱竒才一朝文彩驚人眼知自南山霧裏來送彭士貴并引士貴好為竒偉倜儻之節今日見訪聞詔下出兵征北即日上馬欲逺遊其志甚壯賦二絶句以贈行詔謂將軍急擊戎連營巳列漢旗紅須君磨盾作露布破陳誰先第一功大將威名震九州毛錐何補劍鎗頭但歌出塞從軍樂莫笑居鄉馬少遊劉天錫之子八歲能作大字今年十三矣筆畫愈進有雄健之氣作二絶句贈之羣兒墨汁翻老鴉爾獨落紙生龍蛇郎罷不須頻掣筆渠今自會畫江沙作戈如挽百鈞弩腕力想能回萬牛江夏當年有童子未聞落筆寫銀鈎郊外留别友人不及匆匆把一巵丹楓黃葉助題詩天教逺謫非無意更上沅湘看九疑寄劉世臣仲美此道陵遲久已亡後生無復立門牆遙知二子心如鐵端為盧溪一瓣香贈無識道人古廟香爐冷似氷向來土木弄精靈如今萬事都不會却笑金剛努眼睛謝張東言忽見蛟蛇繞壁蟠歸時星斗已闌干山童不識回鸞字誤認題門作鳳看惜春亭觀酴醿東皇收拾春歸去獨遣酴醿殿後塵憐我寒窗賦愁寂時看玉面送殘春彭青老好談禪喜作詩有謀身之語借其語激之未省前身是道人莫嗟求仕困無津東風動地泥牛吼簷蔔花開别是春未能投筆取封侯一食聊須為口謀日向晴窗研破硯讀書當讀億那由好詩渾厚如金玉妙質勿令斤斧侵要識筆端三昧力夜深山水自成音漁父詞冥冥江雨濕蓑衣夜上高巖宿翠微夢斷一聲煙草緑遙聞欵乃扣舷歸曦上人頃脫塵網可謂俊哉衲僧也絶句贈之震林獅子非凡獸脫網鯉魚真衲僧宿垢消磨應已盡竿頭海底任橫行盧溪文集卷二十二
