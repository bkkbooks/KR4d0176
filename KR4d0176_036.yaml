body:
  text: 盧溪文集卷三十六宋王庭圭撰序王彥休春秋解序王澤竭於不競之晚周然後春秋作然六經俱焚於秦自漢以來採取古文逸篇往往出於災川濟南齊魯諸生之所掇拾唯春秋出聖人之筆時有斷闕要非後之儒者所能竄一詞也世之為春秋學者其説蜂起解詁論釋至數十百家類以詞氣相擊排黨枯竹護朽骨徒為異論以相訾也孔子曰吾猶及史之闕文也彼去聖人千百年之後取其焚餘殘脫之篇益鑿其説以出新意失其旨矣余崇寧中始遊廬陵郡學是時朝廷方以經術訓士薄海內外悉用三舍法獨春秋不置博士故鼓篋升堂無問春秋者唯王彥休以宿學老儒時能誦説而學者終不暇習彼年復詔天下立學以是經天子之事首尊用之於是彥休之學久湮沒而近乃出焉若彥休者可謂能守其所學窮年而不易特未見有入室操戈而伐之者爾惜其老矣不能以是發策決科編次其書丐余文以冠之任氏二子字序眉山任氏名二子曰渥曰溉而請字於某某告之曰元氣融結為山川其蒸為雲雨其生為百榖草木之秀麗人得之為美俊均是氣也然氣之蒸不為祥風時雨則反而為沴物則有焦枯不遂其性故著造化不到手處使萬物滋長膏其本而末茂者必假灌注於人焉嵗有雪霜土膏含和為豐盈之瑞繼以時若之雨然後秀發而輝光詩曰益之霡霂既瀀既渥故字渥曰益之取江河之水以善利物者謂之溉溉言清也亦及物之義也泂酌之詩其初可以餴饎可以濯罍至其終則可以濯溉説者謂溉則無所不用也故字溉曰用之夫渥與溉皆本於農事火耕而水耨期於有獲而後已學道亦猶是也今君之二子才良而志堅又博之以詩書禮樂六藝之文澆灌其心胸輔之以師友而覺乎薰蒸浸漬之為益也所謂耕道而得道其孰能禦之衡州送行詩軸序往年盜起巴陵羯奴飲馬於湘水最後孔彥周曹成轉劫衡桂之間嵗仍飢饉數百里無炊煙官府搶攘蕩然無復紀綱獄訟賦役皆失其平至於衡陽創殘特甚而又比得不能太守紹興五年上選能治者乃命開封向公以直祕閣佩銅獸符來牧是邦始至之日掀其積蠧湯沐而櫛梳之威驅恩收民獲蘇醒因索巨姦數人流之而宿魁吏董瑜者倚憲臺暴橫前部刺史二千石咸莫能制於是郡中振栗姦夫盜兒縮氣不敢搖羣小人不便造飛語聞於朝公果坐是罷去衡陽之民數萬遮使者自言而相與哭於郡庭者纍日抑不知前史所稱良吏去之日攀蹬卧轍者曽有如此之盛乎豫覽衡州送行詩軸與士大夫自荆湖來者其言皆然今明天子在上二三大臣方揀拔良二千石圖回中興之功輶軒使者項背相望於道必有採此詩以獻於上辨太守之寃以慰衡陽之人於是竊序其事而載之卷首送劉簡之序起蓬藋登桂籍者嵗嘗數百人其不合有司尺度而被黜者尚數千人其選亦艱哉由白屋而升者人慕羡之尤以為榮然吏部槩以格法擬官必注簿尉而簿尉於州縣官為最卑人往往牽於習也槩視而輕之故居是官者嘗鬱鬱不自得也夫起蓬藋登桂籍布衣貧賤之士孰不以為榮尉雖甚卑然進而纍為公卿著勳庸埀聲名於天下者必由此而始况如簡之者生廬陵多士之域未冠時名動場屋弟兄連貢於禮部取第一如拾地上物待闕閭里時從吾遊已能擺脫舉場故步學古人之文章搜竒抉怪自出機杼有以動人之耳目吾聞宜春太守黃公賢而待士子能於尉事不乏而又侈之以文辭之美則主人何不容於子於是洗然忘其尉之卑且賤也可以緩步富貴摩九霄如坦途也送劉君鼎序劉君鼎於余同里閈蓬蒿之徑屋瓦相望少余五十嵗而生丱角喜讀書為文常執經問字於諸老先生先生稱之曰此竒童子未易測也余獨慮其年太少而尚奇未必遵舉場之尺度又數年將冠矣乃告之曰君子之學當明道德通經旨自然學成而名顯於時不必務為雄侈竒怪之文如捕龍蛇搏虎豹之為者他日復取其近所為觀之則盡枿去牙角如騎良馬行平地駸駸無跌蹶之虞矣自此過余書堂無虛日若將卒業焉會余以詩語得罪竄夜郎别余於郊外而泣曰此别無相見之期吾學不進而屢戰不勝將汩汩為庸人矣後八年秦太師薨盡放流人以歸君鼎復迎我於郊外言論志氣與其為文益增勝於前時又學不已遂登髙第授鄂州江夏縣主簿鄂州今為上流劇鎮屯軍數萬負抱吳楚上荆州控川峽下洞庭望九江當藩垣屏翰之任皆國之大臣監統大將必材雄偉能張皇國威應變出竒者然後為之今君去為主簿勿以主簿為卑而不著鞭於其間將見材智之士負其藝於大衆之中一遇識拔遂以頭角自出而嶄然顯名於世者非子耶梁飬源道德篇論序司馬子長欲觀天地山川竒偉秀絶幽深窮怪之域覽其氣狀發為文章事業有以驚世而絶俗者必曰上沅湘觀九疑是知沅湘九疑之間果有竒偉秀絶幽深窮怪造化之所磅礴其氣蒸為雲霓散為祥光五色其産為楩柟巨材丹砂玉石古今幽人釋子神仙得道之士往往相望而出余以罪謫居沅陵聞有梁君者字養源荆楚髙人常登進士第仕至慈利令不樂從事於役年尚強也致其政以歸於書無所不觀又讀黃帝老子釋氏之書而超然自得於言意之表其心泊然無可繫也嘗著老子道德篇論微言奧義深探出老氏之心胸渙如氷解凍釋垢盡鑑明凡夫庸童皆可由是以入聖人之道而探其宗指蓋其道本於清淨恬淡不爭而天下莫能與之爭方今主上興聖統立太平之基正用此道理天下而不以兵強然則篇論之作非有不合於時也蓋天地之平道德之正妙體本然不煩繩削而自合耳公卿大夫有取其書以獻焉必見重於世飬源可以出而仕矣送黃秀才序背衡山南走八九百里有嶺平地突起其髙不知其幾千丈郴之為州倚嶺之北韓退之嘗謂中州清淑之氣於是窮焉蓋天以此嶺限南北而清淑之氣至是而不得過氣之所窮而不得過必蜿蟺扶輿磅礴而鬱積退之意其必有魁竒忠信材德之民生其間而又未見也余宣和庚子秋至郴考試貢士見其山川之美實然又見州之傑士何民師宏文博學今四十三年矣近才為復州守其鬱積之氣尚未發見豈其抱材隱而不出者耶黃子郴人也不逺數千里遊學吾邑民師以書先之道其有志於學夫自郴陽﨑嶇數千里至江西誠有志於學者也况子文行俱美郴人視子巳如沅江九肋鱉當於鬱積窮困中遂奮發而爭竒以出可乎試以此示民師年月日盧溪王某序送劉得升序占驗之術雜出米鹽世之談命者未有不本於五行星辰以推人之壽夭貴賤賣卜長安市者其術一律也安成劉得升初業儒略通易經大衍之數後遇異人教以算法可逆知未來之事其數積至百千萬億無涯涘特凡人鮮能工之惟儒者精專而識其要故能不失萬一於掌握中言事未嘗不效也得升為人純孝今有先儒墳墓之寃欲訴於當途而貧甚若朝夕不能以自活友人劉必大彭清老諸君咸以文字勉之既挾妙術以行吾亦知子必不羇旅憔悴而落莫以歸者也庚寅中元日盧溪王某書盧溪文集卷三十六
