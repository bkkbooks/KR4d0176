body:
  text: 盧溪文集别集類三宋提要臣等謹案盧溪文集五十卷宋王庭圭撰庭圭字民瞻廬陵人政和八年進士第調茶陵丞與上官不合棄官去隱居盧溪胡銓謫嶺南時庭圭以詩送之有癡兒不了公家事男子須為天下竒語後坐是流嶺南至孝宗朝召對賜國子監主簿乾道六年復除直敷文閣年九十三卒卷首載胡銓等序後附録周必大等志狀題跋敘述始末甚詳生平著述頗富有六經論語講義易解語録及滄海遺珠鳳停山叢録等書今多散佚惟此集猶傳庭圭抱經濟才鬱而未發故雄直之氣時流露於詩文間劉澄評其文在廬陵可繼歐陽之後楊萬里嘗從之逰謂其詩出自少陵昌黎大要主於雄剛渾大蓋亦得其近似云此本首載古近體等詩二十五卷次載書序及各種雜文二十五卷其脫稿不全者則附於簡末云乾隆四十四年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀盧溪文集原序昔人以文章比珠玊六經言珠玊多矣然易不過乾鼎之卦詩不過瑱佩六珈衡琚瑀書不過璿璣玊衡蠙珠璆琳琅玕天球而已春秋不過寶玊龍輔剝圭紀瓛玊鬯佩蕊而已唯戴記周官之書言之為詳且悉有以璧為貴者如穀璧蒲璧蒼璧圭璧加璧之類有以圭為貴者如土圭鎮圭桓圭信圭躬圭青圭瑑圭珍圭駔圭琬圭琰圭祼圭穀圭端圭白圭廣圭大圭之類有以玊為貴者如玊敦玊齍玊帛玊爵玊几玊豆玊兆玊笄玊瑱玊簋玊璂玊璅玊瓚玊盞玊斚玊戚玊鎮之類又如服玊佩玊祼玊蒼玊赤玊白玊玄玊瑜玊嘉玊之類有以璋為貴者赤璋瑑璋圭璋牙璋駔璋大璋邊璋中璋之類有以璜為貴者如玄璜琥璜大璜夏后氏之璜之類有以多為貴者如兩敦兩圭四璉四圭六瑞六瑚辨十有二玊璅十有二旒之類有以瓉為貴者如玊瓉璋瓉圭瓉之類有以竒為貴者如山玄水蒼瓀玫衡牙衡笄鬱鬯不琢有邸璧羡渠眉之類有以大為貴者如大圭大璋大璜之類有以長為貴者如信圭躬圭穀圭邊璋七寸瑑璋圭璋八寸桓圭琬圭琰圭璧琮大璋中璋九寸鎮圭祼圭四圭尺有二寸土圭尺有五寸大圭長三尺之類又有五德焉潤澤以溫仁之方也䚡理自外可以和中義之方也其聲舒長知之方也不撓而折勇之方也鋭而不技潔之方也又有十一德焉溫潤而澤仁也縝密以栗知也廉而不劌義也垂之如隊禮也扣之其聲清越以長樂也瑖不掩瑜瑜不掩瑖忠也孚尹旁達信也氣如白虹天也精神見于山川地也圭璋特達德也天下莫不貴者道也嗚呼珠玊之可貴如此而以文章空言配之不已誇乎盧溪先生以明經中科而宦不達落落與時左凡憂悲愈快窘窮喜怒思慕怨恨無聊不平有感於懷必於詩文發之紹興壬戌秋銓坐不肯與金人議和且乞斬主議大臣二人銓削爵竄嶺表先生送行詩有云名高北斗星辰上身落南州瘴癘間人爭傳誦至達權臣耳奏下江西帥司鞫治久之竄辰州時紹興己巳秋七月壬午也先生貶八年會權臣薨得旨自便先生思益苦語益工蓋如杜子美到蘷府後詩韓退之潮陽歸後文也人得其片言隻字寶藏十革雖玊府所謂珠盤玊敷未足為珍由是觀之以文章比珠玊未足過論先生自隆興癸未至乾道辛卯凡兩賜對對必坐免拜玊音諄諄問勞欵欵退則賜茗藥束帛不資書生之榮至矣銓頃於榻前論先生人物云雖老宰相材也蓋用狄梁公薦張柬之語上不以為過然則上之知先生深矣儻未死其見用于時殆未易量也乾道壬辰六月長沙布衣劉君光祖與其弟紹祖寓書安成彭君叔夏走千餘里抵廬陵乞為先生集序固辭弗獲遂書以畀叔夏先生姓王名庭圭字民瞻云敷文閣直學士降授左通直郎提舉江州太平興國宫廬陵縣開國男食邑三百户賜紫金魚袋胡銓序李杜詩多於文韓栁文多於詩世之不知者便謂多者為所長少者為所短此殆拘牽之論而非圜機之士夫賢哲之於世學以為主用之則行其發而為言有所謂不得已者其將激於中而發於外者乎即是而為詩即是而為文文即無韻之詩詩即有韻之文所以三百篇之美刺即十二公之褒貶蓋本一致如此則李杜可名長於文韓栁可名長于詩又奚可以一偏觀耶盧溪先生王公民瞻江鄊大手以詩文馳聲者蓋六七十年其少時志尚已高視功業如拾芥既齟齬則發而見諸紙上皎如日星鏗如金玊芳如芝蘭浩如江河自然有一種竒趣他人之所強勉而公則信手拈來渾然天成公亦非有心於此是乃所謂激于中而發於外者其詩之多於文非此長而彼短也儒林於詩久以厭飫而文乃未廣有友劉江伯深慨然編集詩也文也相與並行於世然後公之所以無窮者不遺矣書銘記序諸篇嚴厲有法而上皇帝書并盜賊兩論其經綸宏傑不減陸贄杜牧豈徒文而已哉伯深欲余為序余喜伯深之識而不可默也書而冠其篇首淳熙丁未臘月甲申朝奉郎試右諫議大夫謝諤書紹興八年故資政殿學士胡公以言事忤時相黜又四年謫嶺表盧溪先生以詩送其行有癡兒不了公家事之句小人飛語告之時相怒除名流夜郎時先生年七十矣於是先生詩名一日滿天下里之士愛先生者謂詩之禍從古昭昭也先生不戒又欣然犯之適以濟權臣之威成小人之名此先生之禍也亦先生之過也或曰先生何過哉先生言直而詩工耳言不直詩不工世無傳也世有傳矣不見媢於明必見媢於幽故庭草隨意之詩空梁燕泥之詩飛燕昭陽之詩不才多病之詩言非直也詩工而已耳詩工而言非直猶且小者逐大者死况先生之詩工而言直耶先生何過哉濟權臣之威亦稔其惡先生成小人之名未若小人成先生之名先生何過哉未幾時相殂先生得歸又未幾上踐阼初召除國子監簿再召除直敷文閣年餘九十耳目聰明賦詩作文不見老人摧頺之氣朝廷想聞其風天下傳誦其詩禍先生者何知其非福先生者乎嗟乎天人之理其紊也或勝之其定也或正之不觀其定而觀其紊則古之聖賢厄於小人者皆過也獨先生之過也乎先生王氏諱庭圭字民瞻登政和八年第調茶陵丞與上官不合棄官去隱居盧溪者五十年自號盧溪真逸少嘗見曹子方得詩法蓋其詩自少陵出其文自昌黎出大要主於雄剛渾大云清江劉清之子澄評先生之文謂廬陵自六一之後惟先生可繼聞者韙焉先生之孫淡及曾孫澄及其門人劉江銓次先生之詩文凡五十卷將刻棗以傳而太守朱公子淵復刻其詩於郡齋淡屬萬里序之萬里嘗侍先生之杖屨聞先生之誨言者欲辭敢哉淳熙戊申九月晦日門人朝奉大夫新知筠州軍州事楊萬里序
