body:
  text: 盧溪文集巻三十宋王庭珪撰書答張欽夫機宜書某疵賤之疾平昔未獲掃相君之門雖天下士大夫誦閣下偉才謙徳獨某無階進謁嘗恐抱終身之恨曩者竄居夜郎七年王彦恭時出所惠書屢䝉記䘏東歸之日道經長沙始獲進拜大丞相於服制中仰辱盻睞之意視如門䦨舊物過於所望既而退瞻履幙且承顧接存撫甚厚一見忘其流落之情以盡釋平生之願此幸豈多得哉伏自拜違以來屢欲脩起居問而身賤跡疎坐是不敢比者忽奉教墨詞謙禮勤奬引不倦顧衰朽何以當此閣下席相門之貴平生講磨道徳佩服仁義凡著於言行之際者皆欲仰希聖賢君子事業而不鄙謂某可以追逐其間此葢閣下好賢喜士出於誠素心追古人而姑從今之人其使某踴躍而不能自已也竊惟丞相龍卧湘波天下企望霖雨久矣一旦父子接武雲衢發舒素志海内䝉福則某亦受賜一人之數猶恨老病不獲日承議論之末惟矯首遐想而已靈夀杖敬拜佳惠輒成古詩一首聊致謝意更兾采覽幸甚與黃子龎書三幅自聞車騎來江西謂可以因縁少際高論以解彌年鬱積之懷窮山無聊尚未能拏扁舟一走府下以見顔色惟是傾嚮之誠望風増歎而已某與子龎雅沗一日之游輒布腹心露於左右拙樸不量事體幸勿以示他客丞相靖康初建大勲於王室至今海内屬望者獨以靖康時事昭若日星耳中間憸人柄朝讒毁百出者亦忌靖康之謀議當時無能出其右耳今日主上赫然排羣議將復大用知丞相決不負國者亦攷靖康之設張耳自大斾來江西州郡初極竦動今尚狃一切故轍豈相公志在天下而不留意一方邪抑度時事有未可為而反以為靖康之設張自疑耶甚為相公惜之方今敝亂極矣試槩舉一二州縣每施行害民之事期於必辦則號於衆曰是大使司指揮愚民無知不可戸曉至於賕賂狼藉請托公行苛虐横歛為國賈怨軍旅所過暴鈔官吏與賊交結若此類者不可枚舉蔵姦宿亂竊恐浸成大禍愚謂以相公之威望略指顧行之頃刻之間莫不震動孰敢不聽某因窮居嘗究當今州縣積弊之根源欲作書獻相公念無路得通又跡最疎賤未嘗獲掃相公之門不識可以進逹此書否然無固必也如度可則續條件江西數事納於二公但使其言得行而生民受福則某亦受賜矣實無邀丐也惟裁報幸甚前有書并劄子獻丞相所陳雖若細事而民心切切有望於丞相者實在乎此不可忽也若李相公鎮一路而猶有此等積蠧尚何敢望於他人哉竊意丞相但未及之耳此非吾儕小人之私意願遣人採聽於外物情輿論付之千萬人口不可私也况丞相平昔舉動未有不合人心此天下之所責望重也竊慮旦夕有以追鋒之召則事不及行亦湏作訪聞行下警動州縣使民間曉然知前此非相公之意其餘見徳裕書中此事惟二公可以議若持禄偷安者見之必不以為然幸痛察之某啟去年曾䝉福州所惠書非風義之高豈尚不忘於寒陋之交感激之餘再三欽重又辱不鄙寄遺盛製體裁不凡俾復觀覽别後日新之功益見天資絶人逺甚不溺於富貴而作此寒苦書生事業其材器宏逺豈易量度渭上見慮賦馳驟有法已見他日平戎手段恨未及多見然嘗一臠已知鼎味矣與鄒徳裕書三幅與埶事多年相别懷抱鬱積初謂贑江咫尺可以走見顔色因循滯留但傾想風度未嘗暫忘夏間人囘辱手書累幅存問之情豈勝感著某愚拙有所見欲作一書投之帥府不敢不以聞縁今州縣弊事有如蝟毛竊意府中之客雖衆非獨不敢言亦不肯言抑又習以為常謂不足言是不過待相公與他帥為一律子龎書中嘗梗槩陳之若二公又不一言則相公終不及聞外事也相公負不世之材特患不知耳知而行之易於反掌願與子龎熱訂之某非借此以邀丐也實欲布腹心於相公惜此事體耳䝉諒斯意幸甚某啟近嘗布腹心䝉不鄙謂今相公門屏間獻書者如雲言事紛紛亦豈無切中時病如某所陳亦類常談但詢察物情今日所患苦而切切所望於相公者不過如此而已其間六七事未敢便以為可行須委忠厚曉事之人詢訪外議使利害粲然今天下之人仰望相公平昔威名如何若江西利不興害不除則四方解體無復敢望太平矣正月中山州危如累卵今賊雖出境而巢穴未破尚賴帥司兵猶屯境上未敢復來耳若所謂召募敢勇則費官錢作兒戲無益也聞初破永豐時半雜永豐土人在其中此皆失於州縣前後不究治姦人劄子中嘗論其弊矣無縁面盡某晦跡之久終未有謁見之便惟是傾思日夕惓惓近又傳丞相移師近藩未得其詳亦恐自此益逺門墻矣向嘗謂徳裕必時時假檄出游歴覽江南佳山水如青原氣象尤勝又住山老子乃平昔故人不惟獲江山之助亦可以周覽風俗究觀利病不為無益不知曾留此念否某所欲言於左右者胸懷切切顧紙筆不能盡耳答黄元授書某傾稔才譽之久比與㕘識遽䝉不鄙傾蓋相懽仍贈雅章顧以辱此獲覩製裁開益良多佩服亡已亦嘗露拙惡不䝉指瑕而惟奬予之過愈重愧恧某與令叔次淵同登政和八年進士科又同官於衡陽亦沗有通家之契元授年少才髙一見知為國器清徳雅量遇事不茍郡府所賴承諭招讒之患蓋行古人之事於今之世豈免讒謗若元授懼讒謗則一歩不可行唯久而不移謗亦自止近日郡政一新千里稍蘇息尤見左右用心異於衆人細民無不受賜矣某再拜答趙季成書自郊外之别俯仰踰半年方劇翹想盛价歸奉台翰喜聞初即治封教條一頒邊氓愛畏忺慕久之某頃在辰陽熟識洞溪利病自蜀連荆湖至廣西其壤地皆接連屬鼎澧辰沅靖者甚㣲弱至武岡漸險逺荒闊而難治昔年黃安俊叛近時楊再興叛皆倚武岡之險國家若不治郡於此則两路皆失控扼觀栁子厚集中武岡銘則自唐以來以為襟帶非特今日也向之請廢此者近類輕狂幾誤邊防大事幸朝廷灼見本末不從其請若郡得賢太守禁邊人不擾之則彼溪氓最易調服想季成亦備察此理固不俟某之區區也盧溪文集巻三十
