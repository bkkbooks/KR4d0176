body:
  text: 盧溪文集卷十一宋王庭珪撰律詩七言寄黃平國正字麟閣岧嶤入紫清官居真是上蓬瀛玉壺風采想如舊金馬文章元有聲近喜邊頭新奏捷獨憐江外正拏兵老夫飽飯無他慮料理敲推怠未成陪周秀實通判遊歐陽炳文園晩過隆慶寺契真亭别駕前驅朱兩輪後車藍縷載窮賓開門叵復見此客㸔竹何須問主人坐久風雲欲回薄雨餘鐘磬忽清新隔牆便是城西寺應有高僧住契真和李巽伯少卿見懐眼高四海意何如敢謂論交到濶疎春草夢池方得句夜霜置酒復懷子初披郇國五雲字何啻劉公一紙書銅鼓遇時思發響蜀椎須待刻桐魚次韻徐漕案部至廬陵見訪節擁朱輪下九霄因從物外訪英豪江南正自賢徐穉天子先應問伏滔試㸔翰林批鳳尾何如大尉飲羊羔諸公拔劍論功業當念蕭侯轉粟勞寄程子山舍人老泉仙翁騎列星文采風流屬此甥鳳閣初傳缺様帝城新有能詩聲青萍出匣蛟兕吼赤手捕蛇狐兎驚願扣洪鐘識音響暮年聊欲聴鏗鍧過劉美中新居亂碧峯頭水拍堤白沙寒竹凈柴扉晨光破霧千山出絶壁盤雲一雁飛牕外烟霞舒錦綺坐中談笑落珠璣江邊野老逢人說待㸔追鋒入翠微陪元勃舍人秀實監丞遊徹見閣薰風拂曉度長堤堤上雙紅捲使旗樓影與天俱在水岸沙經雨不成泥他州半落青山外别浦遥分翠浪低渡口神螺誰復識江空應只月明知登滕王閣二首翼軫南邊第一州滕王高閣枕江流天提日月東南走地闢山川晝夜浮午後朱簾捲斜照更深白水自明樓當時帝子鳴鑾後歌舞重翻又幾秋滕王歌舞今千載髣髴鳴鑾度綺牕尚有殘霞伴孤鶩時聞晩唱下長瀧危欄傑棟臨無地翠嶺層隂落半江欲詠朱簾捲山雨含毫自覺寸心降贈黄伯成痛飲長齋擬八仙醉中談辯亦逃禪吟詩不落正始後作佛定居靈運前富貴逼人應未免文章驚世始堪傳近聞相國頻搜訪應有除書上九天寄賀劉美中舍人直學士院明光清曉玉開關脚踏金鑾近侍班行盡九重天上路正臨方丈海中山紫薇閣對青霄近紅藥花翻白日閒待㸔飛龍催賜馬錦袍蓮燭夜深還出城北由山徑入徹源忽逢荷花彌望不知為何處詢其地名曰長塘又行數里行大路出連嶺作詩記之山根細路遶長塘忽有荷花照水光誤入孤邨㸔青壁却逢千蓋擁紅粧採蓮不見溪中女緩轡徒牽馬上郎行傍綠堤將過盡回鞭小住惜餘香長沙試殿聞傅彦濟永州考試還先寄此詩永叔出試院詩有云入簾蝴蝶報家人歸馬鏘然響轡環道傍春色正斕斑吟登回雁峯頭月覽遍清湘雨後山剰有虹蜺蟠筆下喜聞蝴蝶入簾間花時獨鎖深深院卧聴笙簫夢裏還再次前韻湘水清如碧玉環湘妃淚染竹痕斑此時遊宦非高志何日抱琴歸故山雁塔共題雙闕際馬蹄同下五雲間今朝顦顇荆湖外却望烟霄嘆未還春日山行緩鞚青絲馬不嘶春山草長靜柴扉迸林新笋斑斑出隔水幽禽欵欵飛雨過泉聲鳴嶺背日長花氣撲人衣雲藏逺岫茶烟起知有僧居在翠微正月二十立春觀雪次韻向文剛雪擁東皇下紫虛霓旌鳳馭肅前驅天將平地開銀闕人似春氷在玉壺緑蟻飄香浮翠斚青絲傳菜出行㕑老農慣識豐年兆正欠漁簔入畫圖再次前韻二首馬上吟詩雪滿鬚埀鞭信馬不須驅病餘消渇澆茶枕醉後狂歌打唾壺坐見詞鋒缺武庫還如禁臠出天㕑筆間能作有聲畫似㸔輞川摩詰圖天公剪水落空虛似借東風暖力驅未用春禽催脱袴寧聞沽酒勸提壺歌樓人唱郢中曲野寺烟生香積㕑何必萬錢方辦酒一杯隨分豈難圖避亂深山䝉兄寳君寄牡丹數枝鮮妍不減平日始覺茅簷頓有春色感歎之餘因成拙句鄉井彫殘屋瓦頹東風依舊上池臺别來縱值時方亂春到何曽花不開驟覺茅簷堆錦繡未消翠轂走塵埃勿云去草草無惡今日遮藏要草萊再過東岡物色江寒楓葉凋江邊微雨暮蕭蕭白沙翠竹舊行路碧水朱欄新渡橋盡室當時避征戰十年閒事付漁樵如今傑屋明人眼一笑端能覆酒瓢送元上人遊仰山歸泐潭兩刹崚􅜤隱翠岑却擔拄杖出烟林來時飽喫東禪飯歸去泥添古佛金絶嶺松篁青玉瘦上方漁鼓白雲深是中不可著言句且聴半山鸞鳳音次韻歐陽叔向水中月月從海底轉天心影落長江海共深倒卓玉輪窺白兎平㸔波面擁黄金魄隨秋水流無盡光射寒潭曉未沈此月已曽經照古又觀古月照如今次韻周子發喜雨天邊旱魃凌高秋草木焦卷生百憂正欲焚山泣魑魅忽驚暴雨交田疇牲羞奔走羣祀喜雷公怒叱萬鬼囚何當盡洗炎熱苦坐令清風還九州和胡觀光登酒樓李白夜登孫楚樓樓中翫月苦淹留定知公等非凡客要是人間第一流玉勒穿花回曲徑銀槽㵼酒注深甌遥觀翠幕張燈處小婦鳴箏生上頭和趙叔清書事鐵馬初休淮上兵人心遥望泰階平祥雲宻遶皇居近喜氣先從日下生漢殿風高飛燕雀秋宵星亂落欃槍從今且覔耳邊靜半夜不聞鼙鼓聲和陳相之至日即事二首湖海元龍氣宛然求田問舍語何緣兩京夢斷無消息萬里人歸有歳年嶺外梅花愁欲破雲安江水逺堪憐兹辰不預朝閶闔猶喜山間穩晝眠南雪常時不到地嶺梅今與雪夤緣漸添化國舒長日更卜祥雲大有年萬木寒癡猶自凍一枝疎瘦想堪憐時聴野老談新政坐竦詩肩夜不眠新學缺落成釋奠諸生畢集喜而有作洗盡西江戰伐塵忽開􅓺宇照城闉一時人物風雲㑹千里溪山爼豆新儻使將軍皆遣子定知夷狄却來賓脩文偃武須今日鳴玉鏘金未乏人和歐陽周弼誰念揚雄寂寞居忽逢佳士倒衣裾裁詩秃盡千毫兎岸幘斜欹半幅綀節並松筠霜雪後唾成珠玉笑談餘窮山避寇應愁絶付與騷人萬古吁别葛德裕主簿官冷身閒簿領稀時從物外赴襟期慿君少緩青絲鞚為我聊傾碧玉巵野寺石泉秋煮茗松牕雪屋夜論詩懸知别後東風近先寄寒梅第一枝和葛徳裕别後用舊韻見寄阿吉德裕子也渝川咫尺如千里千里猶堪雞黍期旋滴銀槽將進酒細傾金屈倒埀巵閒為洛下諸生詠突過黄初數子詩阿吉想能騎竹馬鳳雛低映碧梧枝送裴主簿長江歸去又騎驢依舊青山霜葉枯入眼雲山有佳句脫身捶楚亦良圖輕裝但載書千卷後夜相思天一隅乍喜飛鸞離枳棘莫貪為縣落雙鳬和居東邨作山中有西泉寺故基避地東邨深幾許青山窟裏起炊烟敢嫌茅屋絶低小净掃土牀堪醉眠鳥不住啼天更靜花多晩發地應偏遥㸔翠竹娟娟好猶隔西泉數􅀈田送鄒去非去非自清江來求書徃郴陽㑹貢籍明年當赴省試余宣和庚子歳作郴州考試官去非時為牓首今二十一年矣郴陽叨預校羣英二十年來一夢驚往日下帷搜俊異見君落筆已縱横才高固可萬人敵志大欲圖千佛名誰念先生今老矣披簔倚杖㸔岩耕次韻向文剛晁叔易遊青原佛屋深蟠七祖山魯公竒字刻孱顔能來把釣溪臺上安用賦詩戎馬間薄宦不知何處好浮生纔得此時閒夕陽渡口人爭渡又趂城頭暮鼓還安成再逢黄平國憶昨相逢氣益明投書力詆漢公卿一時末俗無高論千古佳名屬後生魏郡初徴狄仁傑汝陽幾縛李元平行當獻納麒麟殿㸔挽天河洗甲兵盧溪文集卷十一
