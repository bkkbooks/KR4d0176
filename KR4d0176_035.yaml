body:
  text: 盧溪文集巻三十五宋王庭珪撰記吉州新修教授㕔記江西學校之盛異時獨三州得置教官而廬陵居其一焉崇寧中始詔天下州郡皆立學官其職專以詩書禮樂漸揉訓導其民之秀者使轉以教其鄉之子弟故民皆興於禮義而其政易以成長吏知為政之本在於是故於教授異於常僚每加禮而賓客之惟數十年以來廨舎徙置不常比來復居城東雄勝樓雜闤闠且迂逺先生晨入泮宫揖諸生而進之執經登堂頌禮甚嚴講罷摳衣而退先生不能終日坐堂上日既昃歸其舎弦誦之聲不接於學官非所以稱勸學興禮崇化厲賢之意學者欲遷而近之有司終以為不急而姑置亦誠有所未暇也紹興戊寅八月鄱陽魏侯來守廬陵物大事叢疑未遑庠序之事下車謁先聖於學首詢學官之舎知其晨昏往來之艱也病之或議毁學旁編氓之居以遷之侯謂不宜有所騷動乃環視學門之外得隙地延袤可築經工度材命廬陵宰朱君寀董其役錢出於官工不病於民閲月而崇成人見其成而莫知其所以成也棟宇明麗門臨通衢泮宫在其左興賢之門出其右嚴嚴翼翼若有神物為之轉徙州人父老見而讙舞知侯之為是舉將以教吾民使興於學也昔文翁為蜀郡守修起學宫於成都市中蜀人大化是時郡國未有學文翁所修起者即學之官舍也魏侯知以學為政豈於其所當急者反徐之耶故先徙學之官舎使學者日近教官親熏而炙之以成就其材時福唐陳君禾典教事秩將滿而魏侯始至見侯之臨事若閒暇而衆務悉舉乃力陳舍宇不便之所以然古之人於其所館雖一日必葺去之如始至則陳君亦可謂賢者也夫魏侯不以始至力未暇而緩其所當急陳君不以將去而怠於其職俟其成而落之以遺後人是皆宜書也魏侯命記之己卯三月朢日盧溪王某記安福縣重修學記紹興十年冬十有一月開封向侯子賁宰安福下車思所以化民成俗之本大懼弗能究宣始謁先聖於學惟王宫四壁無旁屋以備登降宫之外故基甚宏大皆頹垣壞瓦異時師旅暴起有司以軍興責吏事視學校若迂逺而不切於治如是者十餘年侯乃進諸生告之曰郡邑不可一日無學是於國有繫也葢隆平時禮樂教化皆有其具所以遷揉磨礪其民使風俗醇厚孝於親忠於君又因射鄉飲酒而識尊卑長㓜之序所以塞姦爭之竇遏禍亂之源者有此具而已不幸殘滅於兵燼有司又以為不急而遂廢其具教化風俗將入於敗壞人才衰陋可遂廢乎邑丞趙君洪聞而賛之諸生退而喜相與出私錢度外垣地増築其址推擇諸儒有行業者六人董而作之昔韓侯邦光亦欲經畫未及為而去至侯之來其治不米塩首用其力於學懼復失墜越明年學成廟像一新重門繚垣堂房庖廪若經籍祭器之藏若師儒之舎皆嚴麗壯雅冠於一時八月上丁凡邑之士咸集薦獻頌禮甚肅侯知士可與喟然興於學乃屬其邑人王某記之某因得考庠序之廢興以明侯之用心而為之説曰周衰黨遂之教息夫子無大位設立言以持世書成而亂臣賊子懼後世有國有家者由其道則治不由則亂魯不廢周禮君子以為未可動秦燔詩書楚人亦燔其宫漢興公卿起屠販叔孫通於魯諸生作漢禮儀其事至茍簡猶足以奪㧞劍擊柱之氣厥後春秋饗射無聞郡國耆儒以素木瓠葉行禮於私家縣宰反率吏屬而觀之何其陋也終漢之世士雖通經而不本於學至其衰也王氏小兒談笑而竊其國東京進學之盛士三萬人以名節相髙雖姦人崛起横行天下猶竦然畏之何哉又嘗見唐公卿大臣失節於賊而六館之士獨不受汙然則士之漸磨由學校而出者其風如此世之為吏者或不足以知之而侯獨知以為急治縣而刑清訟簡民服其化將見禮義興行而先王之俗成士皆光明秀傑足以有為於世或登朝廷位將相為時偉人有如不試猶當礪名節鼓舞震動有以自列於後世兹侯之所期於士他日至於是者知自教學始也紹興壬戌夏五月癸巳記蕭瀧廟記吉水縣之東南八十里山髙而逺險有水自西北奔注抵山石屈折而出至是匯為奔湍江中多亂石其突怒偃蹇巉然而出者率爭為竒狀水石相擊薄其聲如雷霆如兵車陣馬之行悍怒鬬激觀者怖慄舟上下與石不避則有破碎淪溺之患或謂神之威靈以驚駭斯民古有廟謂之蕭瀧不知其始所以名者考之舊記或云蕭瀧者湘中之二水名按地理此江與湘水無通流之理獨江湘以南凡湍流觸石而奔放洶湧者率謂之瀧唐韓退之貶潮陽先至樂昌作瀧吏詩有險惡不可狀船石相舂撞之語是知所謂瀧者皆奔湍激石而多險者也問故老皆云古宿相傳瀧之神甚靈而姓蕭鄉人嚴奉久矣此説幾是歟古者能禦大災能捍大患則祀之豈蕭氏常有大功於民而能禦菑捍患耶抑瀧之神能變化能興風雷降雨澤使年榖屢豐而遂廟食此土耶今瀧流之上有大穴若破甕側立千尺蓋神物變怪之所潛而不可測者也廟既久梁桷隳壞鄉之進士彭公勉率諸豪出財力易其腐敗而鼎新之一切増壯於前是皆世賴神之庥凡有求必禱於神常有其嚮答之者也宜其祠奉益隆余素知蕭瀧之靈公勉乃求文以記重修之嵗月實紹興辛巳七月壬戌也復為作迎神之詩以繫於後使鄉人歌以祀之瀧神何年此列宫神之來兮雨溟濛雷公擊鼔驅羣龍神之靈兮與天通十日五日一雨風物無疵癘年榖豐瀧民事神甚嚴恭牲羞薦酒羅鼔鐘湍雖洶湧長年工不􅀈船石相撞舂孰知此者神之功宜歌此曲傳無窮鳳林橋記安成古為郡介於呉楚之間雖非通邑而山川城郭壯偉宏大猶有故郡之遺風其西地最逺廣袤數百里崖壁峭絶而水鏘然出於峒穴中江流盖發源於此而匯於鳳林當闤閈之衝水益奔放舊有浮橋嵗久壊弗治兵興以來吏常力屈於饋餉而愛民之政一切不可為盖非不可為而其勢不得為也後十有二年歙溪韓侯邦光始為安福令問民病之所急得其根穴而疏剔之凡利之所宜興而有司簿書之所不責衆人搏手不敢謀者悉以身任之惟恐後明年三月江流暴漲併齧其隄韓侯始欲築石以障湍悍之勢闢隄上路廣倍於橋規模甚偉迺掲畫圖詢於衆咸願出財力率數人造一舟其用民錢數十萬而官不主其出入用民之力百工各以其役來助竹木蔽川而下人見其山積於岸而不知其材之所自出列肆無市者更饋食飲而不告姓名以故舉此大役與大費其凡不可得而計人亦莫知以為勞也橋長三百尺廣十有二尺下為二十舟魚貫而浮橋心為亭其方如橋之廣而益其三分之一簷牙翬飛突出江半名曰跨江亭江之南為屋於隄上以觀浮梁之倒影丹雘飛動若欲凌騖大空者曰彩虹亭韓侯始為是役以濟人又因得以休其餘閒而寓遊觀於此煙消日明百物媚嫵邦人士女脫於兵火之餘拊檻徘徊忘向來奔竄沈溺之憂而樂從邦君以遊至於雲破月出萬籟寂然雌霓連蜷飛出波面水光天色動摇而上下與夫琳宫佛屋出乎青蒼林木之杪層巒疊巘迭髙爭秀於是溪山自然之觀偉麗殊勝因人而發遂為此邦之絶境非朝夕徙倚者莫能窮其狀也橋經始於三月己亥訖於六月甲辰凡六十有六日而畢嗟夫吏權以興事不患於不成獨患於名存實亡不知輕重歛散之所以然而旁縁百出雖成功而民已病矣後之人考韓侯經始以方儻壞而復修則安成之人復出力而歡趨之世享其利也人之所以樂斯橋之成而欲記焉者非特備觀美而已故悉書韓侯之始末以記焉紹興十年六月初十日邑人王某記上成觀三清殿記上成觀在安成之西始建立者與其廢壊之嵗月不可記也故基遺迹里父老人莫能言其處也獨縣圖與尚書職方之籍有其名耳其所以名之意亦莫能詳也道士戴知柔實里中儒家子㓜敏悟讀黃帝老子之書而説之因棄家為清真觀道士以醫聞於世時清真在縣之東而戴氏之鄉疾病者必賴以濟議築室而留之其兄弟欲出貲産知柔一切棄不取獨取其荒頓之田廣袤六畆蒔花藥為堂以居焉堂面白鶴峯有古仙人遺蹤從兄大夫公榜之曰揖仙其後弟子劉若拙亦以醫世其業乃以其醫之所蓄金帛益興造而侈大其居於是其人相與言於府取圖籍故名曰上成觀作字於門而揭之始造三清殿凡三清天中儀像所宜嚴事者飭之皆備煥若化出夫天下之物有廢毁於數十百年之後而復興起者非碌碌不能有材智者所能成就也昔者金碧巍然之觀化為荒煙野草致無頹垣敗址可尋今二道士乃能探取既廢之空名於寂寥不詔之斷版排蒿萊起堂殿使荒煙野草化為金碧之區可謂傑然有材智足以興事起廢而賢其徒者也不可以無記因吾友劉太虚以書求余記其事者凡五年許之而未暇作也其請不已遂為之記殿成之日紹興甲子十一月十九日也足齋記玉牒趙公子亦治一室為燕居之所蓬甕蕭然自名曰足齋余究其説曰自有生物則好勝爭奪相傾侈失其性分莫克返于初於是喬黠卓鷙之行𧺫而相高天下始有不足之患子亦貴公子習見宫室車服之物宜夥今乃甘寒陋以自足是其為心必泊然無所起其於世必淡然無所嗜行住坐卧飲食語黙不求於人無待於外明月清風皆為己有不知天地間復有何物可以滿吾室也昔王懐祖清潔絶倫嘗語人曰足自當止然則懐祖未足時猶有累於世爾馬少游嘗哀其兄援慷慨有大志以謂士生一世取衣食裁足致求贏餘但自苦耳而援後遭光武立功萬里之外取封侯要七郡之使其視少游寧有未足於心耶當其卧浪泊時始念少游平生語若不可得然後知少游逺識翛然塵垢之外非援所能企及也今君以足榜其楹而請余文以為記朝夕逍遥寢味其下無一毫不足人意且非迫困窮而後有得於此又可貴也已盧溪王某記重修東華寺記佛屋徧天下大率費不貲泥金繒示瓌璚務為不可勝者多在夫通都大邑水舟陸車珠璣象犀百貨之所萃商官爭負挈營營然貪眸不瞬浮圖能一語傾之則罄槖勿傿此通都大邑之有刹廟所以視他處所為最雄侈繁麗至於荒僻窮絶之所往往土圯木撑罅漏不苴其徒乞丐不能動人而檀那喜趨闤闠者且不肯出毫力於此亦其勢然也東安在安福不唯去通都大邑為逺而頽垣壞址荒煙野草至於尺椽寸瓦不留鄉人劉氏世家貲惜其湮廢㑹青原幼宗禪師歸故鄉乃相與出財力破麋塲芟棘區築宫而留之經始於政和元年九月落成於五年之十月殿寢堂廡厨廪鐘魚一切視禪林成憲所不可闕者咸置之可枚舉以數也佛像嚴具壁張十八羅漢皆金碧飛動冠絶一時有危欄出於衆屋之上俯羣山睨雲漢而匭經於其間者寺之華嚴閣也挾方丈開户牖塵埃不生神明頓還者宗公之妙眀室也初構木去江水為逺數十百人挽一材夜有大雷電浮而出者衆益隆信之果黙有賛者耶舊基四顧磽确宗公覽其山水為髙其址數十舉步而易置其嚮孤峯疊巘層出雜見竒偉怪麗盤薄於煙雲杳靄之間如有鬼神為之徒掲佳名勝槩自我而作宗公可謂無負於兹寺矣蓋宗公本東華里中人好遊名山後為佛印老禪師弟子方佛印名譽轟轟動四方學者千百為羣至於住大仰金山雲居皆賴宗公垣塹佛事凡有所建輒赫奕紹聖中出世為長老住南康鳳栖山又住廬陵青原山二山皆天下名藍角立相望宗公厭奔走病其徒逐逐然不知歇乃自青原飛錫來東華甘槁薄而不去其趨尚類賢士大夫之有守而知退者余嘗樂與之遊當衆人夸漫突梯肩相摩於世而獨能超然髙蹈放懷嶄巖之巔眎天下之物不一動其心豈學佛而有得者耶劉氏既出財力以與興起數十年泯滅不傳之寺於是而屬余識其復興之年月考其初剙者與其人舊無文字可訂特為掇宗公重見之由與吾鄉人之好善者載之云爾宣和二年十有二月吉日迪功郎衡州茶陵縣丞管勾學事王某記盧溪文集巻三十五
