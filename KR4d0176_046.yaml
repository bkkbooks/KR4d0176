body:
  text: 盧溪文集巻四十六宋王庭珪撰墓誌故保義郎劉君墓誌銘君諱冀字堯京姓劉氏世居吉州之安福其為人倜儻簡易不為小謹喜振人之急於財物無所顧計大抵重信義凡與之遊者久而益親莫不稱其賢曾祖諱泳祖諱昱父諱彦直累世以好善聞於鄉里自曾祖以來始剏書館延師儒教子弟買書至萬巻君㓜孤與叔彦弼皆頴悟同時試入縣學升于頖宫試藝日有聞明年叔升補内舍勢不可已君忽念母與祖母年高遂棄其籍以歸使二老人安於寢膳無戚戚不滿之意叔亦盡以家事委焉由是家産日益豐父殁與叔同居四十年無異殖里人欽慕之紹興丙辰歳大旱米斗千錢君先傾廪下其值不增遠近賴以活者萬計或貸而不能償君絶口不復問父老至今猶能言也君之所居當吉袁之衝徑路也方艱難時東北士大夫奔荆湖交廣者必取道于是忽盜賊並作持白刃突出草間闌官道刼行旅者所在蠭起君柵草屋於山間延北方流落之客贍以芻粟經年賊平乃得行後有去為顯官者君初實不知亦未嘗自言會前靖康宰相吳公來長沙聞北客談君之美使人招置見君貌壯偉欲留君幕中補以官君不願就乃薦其子暕與叔之子庭堅留吳公門下未幾吳公罷去卒以遺表恩澤奏二子豈偶然哉君娶同邑朱氏子男四人長曰文炳早卒次曰暕曰昉曰曄皆業進士暕今為保義郎前撫州臨川金谿縣廵檢君常勉以學問俾換文資暕亦自力獲江西轉運司文解未第上官諸司咸知其才多薦之不槩以武弁遇也女三人適李震亨王諲戴恕行皆進士也孫男三人孫女六人君得疾數年猶健飲紹興辛已正旦日衣冠坐堂上與親族相慶至暮飲酒如常明晨奄忽而化享年八十有七先是紹興二十九年上以東朝壽考霈澤天下君以年踰八十特封保義郎致仕人咸謂君生平為善雖增廣田業未嘗有一毫欺於人與夫近世兼幷之家挾市道乗人之急而賤取之所以驟興驟衰者異宜其天假以耆壽暮年復享官爵以勸鄉閭之為善者歟諸孤以是年十一月十七日葬君於清化鄉忠孝里書院之原異時永新劉楚公嘉祐間賢宰相也永豐董侍御元符間名御史布衣時嘗讀書于此鄉人榮之名其處為書院原每每遊息其間而想見其人今隂陽家以為吉地遂葬焉暕來求銘為之銘曰急於好義良獨難望之魁然偉衣冠無心梯雲登廣寒天予壽考仍賜官佳城鬱鬱山四環前賢讀書山水間石上猶餘屐齒斑埋玉於此萬世安故左奉議郎劉君墓誌銘吾邑鄉貢進士劉承弼書其叔左奉議郎諱庭直字諤卿之行狀世次來請銘曰劉氏故家宜春自七世祖豐城府君徙居安福豐城博學善屬文嘗有文集行於世其後未有顯者君之曾祖璣祖知復皆隱居至父仕先家益富饒始置書舘教書聚書至萬巻日延四方賢士以故諸子交游日廣而學日新紹興初以詞賦取士君與兄禹錫尤勤敏自礪數月之間已嶄然有能賦聲是歳君幾中魁選禹錫亦同貢于禮部明年禹錫登第厥後選舉兼試經義君復以詩學被薦明年亦登第以歸鄉人榮之調鄂州司戸鄂於荆湖號攘劇屯兵數萬司戸掌軍食無一人呌詉者大將頗驕肆以疑似之獄屬州院官使咸欲迎合其意君獨執不從於是人始知君剛而有守轉從事郎為鼎州武陵縣丞舊無丞㕔君始創立前隔永泰渠因建大橋於其上州人皆便之未幾甘露降于後圃海棠之上太守蘇公籍見而喜之移植於新堂之南牓曰瑞露棠㑹教官陳元裕被召君典教事踰年講訓有方禮部侍郎辛公次膺國子祭酒楊公椿列薦于朝改宣教郎知臨江軍新喻縣未赴而君已病轉奉議郎致仕紹與三十年八月一日終于家君負材見知於當途方將顯榮於時而天嗇其壽悲夫君初娶伍氏蚤亡再娶向氏文簡公之後也男三人宏中處中德中女二人家有文集二十巻又作易集傳未成而殁紹興三十有二年十二月甲申葬于清化鄉黄田廟坑之原盧溪王某為之銘曰一門丹桂起于白屋將大其家宜享豐福車行萬里出門折軸萬斛之舟望涯而覆君材亦然未究所蓄誰其尸之理必有復階庭芬馨尚多蘭玉故弟才臣墓誌銘庭璋字才臣安成王庭珪民瞻弟也幼愽敏孝悌發於天性胸次明白尚氣節自宗族閭里及其所嘗與遊之人寄託以事雖蹈白刃不移蓋如古之立名義不侵然諾者也室中空虛而常假貸以赴人之急人見之外多事而中泊然實與事闊也少年在庠序其志亦軒然欲有為於世㑹某登第得官湖南當宣和天下極盛之時見公卿大臣其語偷知其將亂棄官而歸庭璋亦即日裭舉子服芒鞋竹杖相從於寂寞之濵為余藝修竹結茅堂草菴盧溪之上藏書數千卷彈琴賦詩日哦其間自先人捐館三十餘年共甘苦同衣㸑雖倉猝離亂之間相扶挾轉徙未嘗一日失也某不能治生身口所須悉傾給于弟而庭璋每視余意之所欲為雖甚勞窘不輒亂家事無細碎必身臨之曰不以累吾兄由是某益得放志烟霞之外支頥散髮而無朝夕之憂也近世風俗壞士或親在而異殖爭不平僅如毛髮比而訟鬭于庭者於是鄉黨鄰里聚而言曰昔魯俗之衰也洙泗之間齗齗如也蓋聖人惡風俗之漸靡於此之時能以一槩自脩於其鄉者猶可掇而書之唐人或有取於閭巷刺草之民况嘗為諸生而人多識之者哉於是從鄉黨鄰里之言而書之嗚呼天固奪余之助使是子也不克延于上壽歳止五十六以疾終于家紹興十一年五月己未也娶劉氏男二人曰頴曰顗皆力學女一人歸于進士劉翼卜以是年十月甲子葬于安福縣東郊從先夫人之兆也某復繫之以銘而為書之銘曰盧泉之南秀嶺之西各一牛眠馬鬛封之故弟漢臣墓誌庭珍字漢臣先君居安福之連嶺生十日而從先君徙居城南稍長與羣從同學于里中志獨軒然不喜齪齪為章句書生歳升于州益不樂欲假他技以自振立乃益治産趨權變以故貲獨饒交四方賔客飲酒呌呼窮日夜不厭或探挈以去亦無所愛惜退而與閭里賤者遊亦傾身令厭其意士之羇旅困窮不能自託與族姻之不能自贍者傾槖振之不為後日有無計也里人有爭者嘗面折其短人亦不以為忤而卒聽之人愛其如此益附焉為人倜儻好義不事細謹初若豪放不自繩而卒劘理道亦不見其失也晚年始欲棄俗事樂閒曠得唐趙居士東湖近余竹林草堂不數十百歩地最幽勝與西湖安成太守讀書齋相對而峙皆山水佳處蒔花竹建亭宇泛舟湖中日夕上下不唯有以自樂實以待余之往來使忘其老而樂於此也其樂蓋未始有涯而庭珍不幸以紹興十二年臘月一日寢疾終于家壽五十有五娶蕭氏生男一人頎業進士卜明年三月十日葬于縣之翔鸞鄉裏湖之原葬之日里落族姻思之請余誌其事余亦欲記卒葬之年月于墓故為之誌兄王某書故弟德莊墓誌余㓜弟庭瑋字德莊夙敏慧渉獵書傳百家之學試藝不得志從余隱於盧溪之上築室號清隱堂旁建金蘭館聚書延四方儒者其居在窮僻陋巷之中不干預人事開竹徑通草堂從余彷徉未嘗不移日也享年五十有一紹興十一年五月十七日以疾終于清隱子男三人初娶劉氏生頗再娶髙氏生􅨉顥皆業儒女三人長適進士劉可行次適承信郎劉暕季尚㓜庭瑋性孝友工書有楷法風神瓌秀脩眉長髯絶類秦少游死之日畫工貌不能似有以少游像置靈座遂逼真余乃哭其像而誌之明年十二月二十七日葬于安福縣翔鸞鄉裏湖之原盧溪真逸王某書劉氏二婦墓誌銘盧溪居士王某之妻劉氏同縣鄉貢進士諱瑗之女卒於紹興十三年閏四月三日壽六十有六一子名頔一女嫁將仕郎彭飛居士弟庭璋亦娶劉氏同居之女以紹興十四年六月十日卒壽五十有九父諱成制亦嘗貢于禮部二子曰頴曰顗一女嫁承信郎劉庭堅劉故於安成為望姓二父皆髙才碩學名動塲屋故二女幼孤皆習知禮義及筓而歸于我家余兄弟方遊郡學貢于京師幼弟未娶所以奉吾父母恪治閨屏甚肅使吾父母無晨昏憂而余因得優游取官以歸榮其親二婦黙有相焉先君子殁僅四十年余兄弟無異殖亦二婦恭儉和柔職饋㸑於内以佐之耳自為女至於為婦以至舅姑殁數十年飲食笑語相煖熱無一日廢也内外族親異而伺之卒不見纎芥形於色豈釋氏所謂宿因同於彼處没而來生此耶故其終也復相繼而逝余妻先一年死後一年仲婦亦臥疾時家人有夢遊石屋山二婦獨留不返缺日者卜地閱其圖當宻湖石屋之旁豈偶然哉居士乃以紹興甲子十月乙酉舉二柩合葬而銘之曰其生也二女同居及其長而有歸也又相為姒以相其夫故其終也掩為一墟前瞻石屋旁臨宻湖山蒼水清宜卜此乎故李夫人墓誌銘夫人李氏世為吉水著姓曾祖宗舜祖誠之父楙俱為儒生隱居田里夫人幼從父兄學通句讀曉大槩稍長因觀古烈女傳輒能誦說始末謂其父曰今之為士而知名節者尚少古之婦人操履乃如此其節凛凛與秋霜爭嚴可不畏慕之哉廬陵段公承議州里名儒聞而聘之於是夫人年二十有五歸于段氏為承議公之孫婦諱永字偉長之妻夫人性恭慎自髫丱時鄉黨稱其孝其歸於段氏也奉舅姑如事其父母時不少異也舅既亡姑老矣閫内事悉夫人任之凡婦事之所宜職者靡有闕也段氏世以清苦立門戸子弟不務殖財唯心醉舌耕乎六藝之文由塲屋以取世資其效迂而多遲以故段氏未逹者常貧夫人獨能安於貧而樂為勤儉自刻削不以滫瀡之養責其子而縱之使學至鬻笄髮間物買書以延師友此其志大而所蘄不在於歳月之間也可不謂之賢哉紹興二十一年閏四月十七日以疾終享年五十有四後二年四月庚申葬于吉水縣中鵠鄉北坑之原一子曰諤妙齡已預鄉薦夫人幸及見之而恨不及見其成爾諤今才譽益進他日必顯榮以為夫人積善之報二女長適進士李大圭次在室嗟夫余嘗及識諤之大父行又與其羣從諸叔遊故知段氏為詳今偉長以夫人之狀幷其弟世榮之書不遠數千里至夜郎求余銘可不為之銘哉故為銘曰古哲婦節磊砢能慕之自髫鬌身雖不豐後必夥我作如是銘其誰曰不可故劉君徳章墓誌銘君諱璪字德章姓劉氏其上世居金陵唐末五代江南之亂舉族遷于吉州分為三派一居永新之中村劉楚公家是也一居安福之下村一居太和之上村又名九洲君之祖高曾以來自九洲徙居安福今為安福人曾祖迪祖仕先父良軻皆隱居不仕君幼敏悟博學善屬文尤䆳於易往往脫傳註而得經㫖時方興三舍君在州縣學月試常占魁選舍法既罷君不喜為偶儷之文掉鞅舉塲輙見黜自知力與命不諧不復進取㑹故人李君尚義負高才而仕未顯襄漢方用兵大帥解潛知其名招至幕府尚義約君同往潛一見知其有材可用奏碎令監襄陽府中廬陵酒稅以試其材將有以用之也命未下而大帥改移干戈尚擾君亦罷歸不復出日從余林間為杖屨之遊是時敵計稍窮一二大將方勇銳欲奮而擊之秦檜忽自金軍竄歸力主和議權傾天下舉朝鈐口畏而和之今侍讀胡公時為樞宻院編修官上書乞斬檜中外大悅喜聞直言胡公後得罪貶新州余作送行詩有癡兒不了官中事之句蓋指檜也里中有寒乞子妄意炙手權門訐其詩于朝仍以他事掛德章之名于牒中德章無罪有司文致其牘致德章亦貶居臨江軍當年遇赦即歸余初得罪時天子不忍誅止竄居夜郎郡凡八年而獲自便既歸及境而聞訐者病浸劇方欲遣人問無恙未數目而訐死矣德章迎我於郊外握手道平生一笑如舊不復以清江事寘懷人謂德章真高義磊落人也惜乎不見用以顯其所蘊君娶邑中名族歐陽氏子男二人長允懷因軍興補將仕郎次允恊積學業進士孫男六人之洋之澥之洌之洙之溶之湜曾孫一人曰驥君於乾道四年四月二十日終于家享年七十有三將以乾道五年十月二十七日葬于翔鸞鄉思義塘之東前常寜令李誦以余與君雅故而知君之詳作行狀與其孤來乞銘不可辭也銘曰我君平生從我杖屨讀書屬文自幼敏悟我遭讒言莫能辯數一時小人蠭團蟻附君獨不然終始出處日前相逢一笑如故鑱君大節以寘于墓盧溪文集巻四十六
