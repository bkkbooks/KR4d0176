body:
  text: 盧溪文集巻三十三宋王庭珪撰論盜賊論二篇并序盜賊之變不一江西殘孽歴十年而不討始用招安為弭亂之計此養虎狼飬疽根之術也使一日出落鈴鍵必横突潰裂四出而不可禦愚獨憂之故作盜賊論焉上篇天下之患莫甚於大盜起而人主不知侯景嚮闗而梁武帝不知賊徧天下而隋煬帝不知此皆前世已然之事其轍跡可攷也今天下謀臣猛將豪俊之士奮然而爭出者皆髙談禦戎之策侈言誕詐謂盜賊為不足憂不知天下之所以安危治亂常繫於此昔秦既滅六國惟慮匃奴之為患使䝉恬北築長城延袤萬里而不知陳勝吳廣起於閭左之匹夫宣宗收燕趙復河隍威震邊陲而不知龎勛之亂起於銀刀之亡卒然則盜賊之起其始未必能桀大惟郡縣蔽匿以幸須㬰之安養其芽孽䆮以成亂者非一日矣自艱難以來江浙荆廣所在盜起然皆暴興而亟滅惟䖍州倚荒險洞窟林麓盡為賊蹊歴十年而磐牙猶在皇帝嘗下銅獸符發襄漢之師擒馘幾盡州縣不能撫緝厚賦深刑閭閻深苦於是復操鉏鉤為兵嘯㑹逋殘山谷響應二千石既莫能制且惡其鴟張而累已也欲設一竒計而莫知所出則其計維出於招安當時江西大帥亦聽其説而甘心焉盖其説以為不數月可以盡消江西之盜而使百官入賀於朝此直誕漫之術可紓朝夕之患而非為國長慮者也郡縣承其風徃徃縱賊不討悉招其渠率而官爵之賊利其然反跳聚山谷置魁立伍而隂結官吏各稱渠帥以茍一時之賞雖平居未嘗為冦者亦相時生心操戈而崛起不惟能免於死而且歆艷爵祿之榮此豈非誘民以為亂者歟今䖍州城中官兵無幾而招徠倔强之徒帶刀劔執銅撾列刺史庭下者凡數百人羣心凛凛常若刀鋸在頸此豈可以為長久之計者哉所謂數百人者其故時黨伍散居大山長谷之間嘯呼成羣椎埋鼔鑄亦自若也間不得逞時出焚剽則州縣必責招安之官提兵追討往往暗分財物自相脣齒驟雨絶弦莫見其跡州郡既不敢究窮其姦又且賞之以為有平賊之功凡如是踵而起者烽壘相望蓋設法有以啓之盜賊何時而可息也甚者盜賊雖起保伍不敢言縣邑不敢發至於勢張而不可掩則招安之旗四出上下相為匿以避朝廷之知而已嗚呼禍有大於此者乎愚故曰天下之患莫甚於大盜起而人主不知雖然先事而言則罕見從事至而言則無所及自古禍亂未有不如此者今盜賊雖已萌尚可逆為之計顧愚無知不知所以逆消禍亂之計徒能論天下之勢如此惟冀廟堂帷幄之臣博採羣言使聖主知之則天下幸甚下篇庻民所以不安其田里棄鉤鉏而樂為盜者豈非法制壊亂而勢有以驅之使然耶何則天下之亂必先有勢而其勢蓋常生於上之有所憚而不敢為無可觀而不足畏盜賊之初起非有陵突郡邑之心至其久也習知郡邑之吏庸懦不材舉動施設無竒偉可觀然後有輕郡邑之心招安之旗一出則知上之有所憚而不敢為者必難於戰鬬之事邀脇郡邑知其不能應則郡邑人吏愈無足畏而招安之權常制於盜賊矣艱難以來招安之策非不嘗試而屢招屢叛蠭起之衆益多於前漢法逐捕盜賊責部刺史二千石吾丘夀王有言盜賊猶有老吏二千石之過渤海廢亂二千石不能禽制則詔丞相御史選能治者宣帝中興郡守多以盜賊課最蓋有助云今四方未靖而以郡邑付之庸愚怯懦之人徒為盜賊輕侮横兵刼持必取招安得官爵而後已自古及今未聞如此馭盜賊而能圖治者也且盜賊十年之間屠殺官吏膾人之肝焚村落掠金帛怨忿之毒流於骨髓其間有不共戴天之讐呌號無聞忍恥而未敢發也一日伺天時之隙情苦變生其心有所不可復忍則操戈㧞劔以報讐為名叱咤咄嗟横行天下以發其忿怒不洩之氣遂至於大亂此亦必然之理昔人云盜不能亂天下而能召天下之禍者此也近時士大夫習聞茍簡慮不及逺皆謂䖍盜已息可以奠枕此最誤國之大者或謂賊雖未滅姑以寛朝廷之憂未為失也獨不見唐末咸通之盜耶招討宋威妄奏大渠死羣臣皆入賀居三日州縣奏賊故在不十日破八縣攻汝州殺將吏而東都大震則幾為宋威之誤矣若謂爵賞可以收賊心邪是時蘄州刺史裴渥為賊求官約罷兵未幾詔拜王仙芝而黄巢恨賞不及已刼州兵再亂遂入陳蔡攻䧟山東取江州轉攻潭岳西擾宣潤遍天下而勢不可遏則爵賞果不足以收賊心矣若謂盜賊已降便可無事邪是時髙駢崔安潛等提兵鏖擊所嚮披靡賊氣既殱乃詣太平軍乞降詔授右衛將軍巢度藩鎮不一未足制已復叛去轉冦入浙東踰江西破䖍吉饒信刋山開道趨建州䧟桂管進㓂廣州自是勢益横騖有虎噬中原之志然則盜賊來降果可以保其不叛乎若謂賊未破而先言破賊皆近世之常事何足怪耶獨不見唐末諸君屢奏破賊皆不實朝廷信之稍自安由是賊得計整衆度淮破東都䧟京師入春明門升大極殿跡其所以至此之繇特原於諸君奏賊不實其禍遂至如此嗚呼皆前世欺罔誤國之明驗奈何取其轍而復蹈之以為可行也哉古人有言曰殺人者不死傷人者不刑民無所畏亂莫大焉今盜賊殺人如麻而賞之以官蓋自古未有大亂之世刑賞失柄而能有為者也惟賢人君子及其尚可以有為之時而圖之過是則恐災稔禍變天下靡靡日轉潰腐遂至於不可支持然後徐起而圖之則已晩矣盧溪文集巻三十三
