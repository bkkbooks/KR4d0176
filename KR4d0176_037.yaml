body:
  text: 盧溪文集卷三十七宋王庭圭撰序送劉天遊字序古之學者必期至於道學不至道則知人不知天造物者之賦於人也以天不以人而俗學之士繕性於人以亡其天故遁天逐物馳鶩於人間而不知返莊子曰心無天遊則六鑿相攘劉太虛諸孫皆俊秀名九垓者時從余遊方冠時請字於余余字之曰天遊而語之曰昔盧敖遊乎北海至於濛谷之上見一士焉敖自謂能窮觀於六合之外欲友其人若士者笑之曰今子始遊於此乃謂窮觀吾與汗漫期於九垓之外竦其身入雲中敖仰視弗見若有喪也始自歎終日行不離咫尺而自以為逺不亦悲乎天遊志大而心廣漠視九垓之外一舉而千萬里非局局然有封畛者所能至也故善學者必觀古人之不可傳不可知處始識其妙齊威公讀糟粕之書於堂上始知斫輪之妙不可以手傳鴻濛拊髀爵躍掉頭曰吾弗知吾弗知夫弗知者乃真知者歟學至於此以之經世則知有不器之器不用之用無施不可也故併書以示天遊送子野東遊序劉子野秋試不利槖其書欲東遊謀入太學夫太學者賢士之關也髙堂廣厦層簷飛閣矗在天半如清都道山蓬瀛之居四方豪傑充塞其中未易掉鞅而入也子方戰藝不得其志乃勇於是行豈非以方州科舉之弊近嵗主司或蔑公道不若太學之公無私邪其志亦逺矣萬一隨牒一試而入焉執經升堂問道於國子先生其門髦士以千數皆角力傑出有遷揉磨琢之益子能擇而交之行成而名立無患有司之不公况今主上修法度興太平退黜不廉之吏取士之源復清孰敢黷貨而冒禁耶自成均至於四方萬里其選舉之法無異道也霜風動天草木黃落行矣自愛期子早歸以榮其親贈饒子序饒子本書生挾命術遊四方去年秋嘗謂余言大江之西荆湖之南有賢人焉以五行推步得三數人是三數人者皆藴公輔之器瓌磊竒傑名重天下當今接翼而起或指日而知詔除下已而果然雖深於五行者亦駭其言之異蓋不知饒子多學占驗之術兼用相人之法察色而知之故其精如此今通都大邑豈無落魄不遇而從唐舉相者乎他日懷黃金之印結紫綬於腰食肉富貴者宜未忘子之言余亦以是卜子必不羇旅憔悴而終窮困者也贈劉呈才序吾邑僻在一隅山水亦竒絶故人無貧富皆喜教其子弟其父兄甘勞苦日求錐刀以給之間有不肖墮廢不能自振立自後鄉閭不好善者皆目而靳之至今以為諺童子劉呈才與余比鄰七八嵗時能吟詩其父世名醫有隂德在人謂鄉閭之諺不敢求人知挈來示余已十嵗矣指物命篇頃刻成詩間有好句不覺傾倒始驚而譽之鄉閭聞者不惟笑子之父又且笑余之譽子也豈人情見其朴者鄙其成狎其幼者薄其長哉今又日能講千言學作議論已如鴛雛五色回翔近人自加憐愛雖羽翮未成決非蓬艾間物也要當從良師友以成就子之美才某人吾友也於子有鄉里之契其往從之以是文雜束脯以進必為子動容昔金溪方仲永生五嵗已能吟為四句詩至十二三反不如前時又七年泯然衆人荆國公以謂其通悟受於天也卒之為衆人則受之人者不至也子今讀書視前日益有加則可以賢於仲永然後不孤余之譽子矣詹淡字序諸孫姪名皆從言而字之二孫獨幼而未字夫泰山東魯之鎮山其雄大秀傑之氣亘綿數千里奄有龜蒙而夫子洙泗之鄉在焉詩曰泰山巖巖魯邦所詹阿馨名詹字之曰巖魯天下之至美非刻意力行智巧者之所能得而常出於平易恬淡澄清廣漠之中如海焉淡然無涯矣乾端坤倪萬象倒影百川歸之不可為量數彼擅一壑之水以天下之美為盡在已者特未識海之大爾莊子曰無不忘也無不有也淡然無極而衆美從之阿鴻名淡字之曰無極詹也淡也爾其思吾所以命名之意極其所學求萬物於一性之中將有得於心亦不自知其至焉耳送李生序余少年時急於進取欲與四方豪英爭得失惟恐不嶄然以出也是時有日者李生名景嘗為言得失輒中由是賓興州里升辟雍試禮部皆往問焉今棄官築茅屋於盧溪之上將二十年泊然無求自足於塵埃之外無復往時之念李生術益精言事益中雖欲髙張祿位雜死生禍福之變以撼吾關鍵不可入矣雖然世之英偉豪俊有志功名之士與林棲谷隱者異趣以子之術遍求而物色之預以告成他日以驗子之術子其行焉送卜者吳唐佐序建安吳唐佐值鄉閭之亂羇遊江南談五行卜筮之術寖聞于人余邂逅安成僧舍適有疑而叩之初布二十八宿終易卦相出入其言禍福如養由基之射無一不中特與市肆論星禽者軌轍頗異豈吳君本儒生通易象兼以彖繫之辭斷之而然耶今將遍歷江南窮山巨麓有賢士君子隱於其間者假君之術以問之曰厄運將亨明天子在上可以出而仕矣贈尤生相字序尤子以一字言人平生此何術也其説以為書心畫也心正則筆正昔人見顔魯公字知其為忠臣烈士道德君子其剛毅不屈之氣凛凛見於字畫至于庸人腐生胸中無奇靣目可憎其衰陋之氣亦不能脫筆端此其大略也後世占驗之書雜出米鹽尤子得之毫楮之間加占驗之術考災福遂至於微妙自吾觀之必有能辨之者矣贈劉德素序雍門周鼓琴能令孟嘗君歔欷而涕泣者其言有曰先貴而後賤昔富而今貧擯壓窮巷不交四鄰今劉德素可謂昔富今貧而為雍門之所深悲者况火焚其室蕩然悉無所有此尤可悲也然德素昆弟戚屬之富而有餘者豈肯坐視困窮亦恐德素未肯號呼而呌之耳儻或哀呌焉必不待聞琴聲而戚戚也盧溪文集卷三十七
