body:
  text: 盧溪文集卷三十二宋王庭圭撰手簡與胡邦衡四幅某數年前盛價自湖南憲司回道出敝邑嘗奉書爾後即聞被召為樞庭屬官升沈異迹不復相聞去年夏在郡齋守倅相聚無日不談盛德右史公深欲一屈髙軒嘗出示回書見所以存問僕者甚厚是時亦欲作書庶得會晤又念非所以相愛固知左右未必肯來也今春曾法師至忽辱惠教喜不自勝渠約自來取回書久之不至遂失修報甚負愧悚即日夏熱伏惟台候萬福相見未涯千萬為時保重某再拜某自去年聞邦衡以言事貶韶州中外聳瞻嘗約劉校書作送行詩以俟邦衡之南走欲效昔人送唐介為一時盛事既而恨邦衡謫大輕此作遂廢往時陳瑩中鄒志完名震天下號為敢言然當時利害尚未及今日事體之重也國危矣諫官御史不敢言而邦衡以編修官摩天子之逆鱗折宰相而不悔決非所謂偶然者宜天下士大夫無賢不肖皆知稱頌邦衡也斯道未衰公議一出天子喟然思見其人邦衡雖欲散髮巖岫效僕之間致不可得矣某久無衡湘人往來缺奉起居不覺春夏之徂也似聞鼓盆之後頗戚戚情雖我輩之所鍾理非我輩亦不能逹殊方異縣宜自釋也某今夏耒陽僧歸衡陽曽奉狀計徹聽覽即日秋老伏惟燕坐衡湘江山護持台候萬福某久聞青原長句未及見淳上座來惠石本可謂絶妙好詞字復竒崛當與平原山谷之碑爭光於無窮為青原之偉觀欽重欽重廬陵魏守往年同在朝列必識之正宜仲之親也諸郡方事刻剝而此公獨欲寬恤民大慰恱之江西屢傳有召命豈人望如此耶此事終不免惟厚自保持以膺大用與向宣卿某比數見士大夫説直閣議論似不與胡邦衡聞者皆有疑焉故不敢不以告於下藝事此説豈不猶用居安福時所聞乎其源始於曽某戲談歐陽某從而和之復增飾惡言若不熟察豈不誤大君子聽聞某嘗詢考輿言及其鄉里皆謂不然且邦衡進説之時內外方以言為諱心知其非而噤不敢發獨邦衡批逆鱗於萬死一生之中時論以為鳳鳴朝陽於今之時有如此人縉紳先生宜少與之進亦助善之一端也他日公道顯行其偉名直節決不在人下某非敢有欺於左右既聞此論頗繫事體故反復言之尚幸情察與任子嚴某昨見除目知龍旗虎節將漕荆湖竊喜故人榮遷將大顯於時未幾聞有改除猶不失五馬之榮亦何歉也湖南才數月聲績已逺聞他日公議豈可掩洪相既去尚未聞大拜物望所屬者誰歟人皆莫能言興國賊頗侵廬陵境勢稍張而官兵未能禦郴洞亦尚可慮吾丈必能料也便價往清江奉狀草率繼此續上記也答方性夫二幅某頓首性夫年兄相别二十餘年中更時事變故百出莫知存亡近嵗舉子往來釣臺始略聞動靜去年劉克強歸忽領教帖始知已挂冠冬間於遞中又領一書仰荷年契不忘勤勤至此感歎之餘且喜兵亂以來吾二人各未死耳日來春暄伏惟逍遙物外尊候萬福各在一涯何由會見惟冀以道自重某再拜前此既失候問及連辱兩書又適無便修謝失時冀蒙恕亮某自湖南歸見監司黃某等皆被朝廷擢用而營私背公無愛民之意知其將變遂歸耕於盧溪之上不復出仕今三十二年矣不謂性夫負抱利器仕宦亦不震顯至此夫復何言竊聞頥養益壯蓋德厚氣全自應若此僕亦尚健能夜讀書自時寄聲以慰懷想幸甚答周孟覺某奉違之後念欲拜書非宅中專介以往其他更無别置遂為左右所先伏審下車以來台候萬福榮考京秩便理資考選人出火坑輔以甲科才美即日滿任當有異除何所不可入耶奉慶奉慶德安素出異人黃香在漢時未有安州總屬江夏白兆山唐時已著名有李太白蹤迹曾遊否綘帷多暇想訪古思賢之樂無涯矣所諭疵政佛出亦無如之何但其聲籍籍終恐不免耳與楊文明某十五年前識昆仲於丱角時既而被竄流離遐荒親故隔絶今春歸自辰陽乘扁舟下桃源至武陵始見中原衣冠士大夫而昆仲在焉相勞苦纍日清談亹亹又蒙新詩盈軸覽之竦然至今誦歎亡已日伺軒車慰此久懷乃聞東山一宿不蒙見過悵恨而已答劉彥純某昨蒙諭及令叔知縣志銘某實以此來多病道不進而文益衰安能發亡者幽光况令叔久在仕路當今能文而顯名者相知不乏人也乃蒙教劄諄諄赧然汗下然某與令叔既忝平昔雅故敢以荒拙自暌乎續俟竄定當即録去答楊廷秀某去嵗獲見清矩慰十年懷想之誠少年登科未足為左右賀一日相見詞學驟長語有驚人兹可賀也去冬之官再經敝里失於偵伺辱留手墨追見不及家僕回又辱惠字何其勤也尊丈過此匆匆諭及文字適除夕忙迫尋藁未見上元後有客子之永缺專馳納政逺晤言更宜調嗇以副瞻禱不宣某再拜與劉子柬三幅某啓上子柬都巡姪壻自承西歸未獲一面謝丈屢言從者旦夕必出不知得何信也秋熟計侍奉安勝前月胡丈遣人至魏公宅兼過王舜舉家問曽附子方書向丈否報云未曽計今已逹矣臨安近事殊不及聞但聞未拜相耳人行草草不宣某啓承先丈大夫已畢襄事禮意周備甚盛恨以老病不得親去挽紼即日計動履安裕和公取湖北路由鄂渚趨闕下恐向丈朝夕必起聞欲遣人宜趂人文字未到前早發去為佳賀參政落致仕依舊參政此公亦向之所為主其用無疑也方欲作書説伊山事適彭雲翔來門下遂併附之某啓不相見之久承惠問甚慰所懷比辰起居佳勝近報魏公乞致仕不允除少師建節判福州尚辭免未已昨日得周舍人書云與吾親十年前曽半靣篤志科舉所學必過人此公不妄許可亦喜子柬能自力謾恐知之承惠細茗兩種皆竒絶匆匆未有佳物為報不宣答李仲孫某知仲孫之名非一日而少同里閈識眉宇亦舊矣中間隔闊不相見者亦多年故人劉吏部美中數談仲孫之賢抱負所有鬱鬱未得志今年春承訪僕於溪上惠以長箋詞源浩博瓌瑋閎麗動人耳目如天球大圭森然炳然焜耀左右不待數琮璜珩玦之狀然後知其為寶也某於是知仲孫之才氣有終不可掩者若場屋連蹇校得失於一夫之目置之不足道仲孫勉之苦寒為學自重答胡斗南某啓聞斗南之名舊矣雖同州里及緣曽氏姻聨得忝葭莩之好而各在一涯未嘗交際執事方少年遇天子興大學聚四方豪英有補選甚難大江之西才三人中格而執事之名與焉執經登堂才譽浸聞於人當是時某方坐詩語竄夜郎夷荒萬里之外與中原衣冠士大夫隔絶者七年何由一見儀矩今春蒙恩東歸聞執事以憂還里舍未及問訊忽辱長書見惠詞筆殷勤且以先府君銘文見屬竊不敢聞命而英彥道左右之意堅欲得之且先府君之事著矣而僕之鄙陋何能發於文也襄事有日介者在門又慮後時遽中附納臨書不能盡報復之意不宣與楊文黼初春才聞治裝偵伺不審方作送行詩未了遽聞車斾已行悵然遺恨久之未數日忽報令兄主管病不起禍出不測驟聞此信不覺大聲而倒想昆仲聞訃之時痛當奈何文發方履亨途欲摩霄漢忽爾一跌而墮之報忠襄公豈昧昧不可曉耶今一門兄弟子姪頭角嶄然子出其後必大可倚以待也夏漸熱伏審追傷之餘起居萬福某衰邁闕於面慰私懷極不足千萬強飯自愛與劉子方三幅某别去數日竊審起居萬福向丈書悉如前日面聞者言之鮮矣蒙示以所獻書皆究切當時之務必有見之者檢院進文字非書鋪所慣彼處自有一等人專管寫此文兼識體靣只託朱公尋之必不誤也無緣再拜别道中加愛不宣某啓江下相别已逾月道中晴暖十一月九日到家即日苦寒旅食佳否所幹必有美耗或未端的且一歸北堂日夕憂念如文字一事胡丈可憑不必親在彼候今宅中再遣僕夫力已多辦歸亦易莫若且回以慰太夫人之念逼冬節草草餘幸加愛不宣某啓忽聞歸騎喜不自勝不惟慰釋親意况有迎門而笑者喜可量耶承書具審起居萬福文字以下胡丈必不妄言惜乎劉舍人出然仕進有命亦不以一人而通塞也新正圖會見不宣答王允元某去嵗夤緣到郡始識眉宇既蒙寵訪又貺以新丈欽歎妙作愧無以當也承諭沖逺别開書室擁羣書挂琴劔其志豈淺哉蒙索名以進齋榜之可乎期公於九萬里外更進一步未見其止耳慰楊建之某不意凶變遽承先府徽猷中大訃音聞問驚怛為之落淚者纍日遙想左右心肝摧裂何以自處伏惟哀痛切勿過為毁瘠皆無益也某前年領中大丈書云朝夕來宜春私心竊喜將有侍杖屨為遊山之樂去臘又得誨字筆畫語言健爽如舊日望宜春之耗冀得會面不謂紙墨未乾車軸出門而折言之愁人追思往日被竄沅陵平生故人視若不相識惟公父子同舟見訪傾蓋一見撫我如舊交所以愛存之意振拔流俗之外感戢豈可言諭老矣恨不能一至門屏撫棺哭奠而已襄事未畢千萬抑情自重答王彥恭運使某秋間嘗拜狀聞使車在荆南將由歸峽出辰沅想沅陵之人夾道竦觀以為榮一時異事也回日必泛舟由舊路經桃源觀訪壁間題字俯仰陳迹為之憮然僕但如漁人迷路不復見桃花源矣盧溪文集卷三十二
