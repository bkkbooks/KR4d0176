body:
  text: 盧溪文集巻四十一宋王庭珪撰銘遷善齋銘李成叔志大而氣剛年尚少好學唯恐不及精悍之色發於眉目治所學之齋名曰遷善余固異而識之知為章貢先生字先之之子先生以危言直道不容於世江南人師其學而慕之輻湊宜成叔之淵源有自也夫學本於人性恐跳而逐諸物則磨揉刻琢日趨於善使不見異物而遷為惡之心無自入焉推而上之納諸聖賢之域可以師友千載陶冶萬物蓋積成其德神明變化去道不遠非特出幽谷遷喬木而已茍不中道而畫廓之以廣大極之以高明如五星北斗之麗天太山之崇崛海運徙於南溟背負青天九萬里則風斯在下矣信如參辰之不相比也成叔進乎此覺而能遷未見其止其可量哉乃丐銘於盧溪王某為之銘曰擊石出火鼔鐘得聲不鼓不擊寂無聲形人之有善物中最靈揉以學問其識乃明跛鼈千里六驥不行玉不加琢器何由成吾觀成叔挺挺有立學有淵源家聲爀熠深山大澤龍蛇蟠蟄實無所遷假遷而入猶天之升不落階級參辰殊途追莫能及惠端琴銘老端暮年斲琴得不傳之妙其弟子祖麟攜以見遺欲求老師塔名余既許銘其塔復取琴而銘之使數年之後好竒慕古之士破琴而觀者知為老端之斲也大江之西盧水之隂有三昧手斲無量音震動法窟是為老端之琴蓋嘗求師於海中登蓬萊閬風之岑聽海水林木之蕭森採枯桐以寄其妙絶信哉㸃瓦礫而成金琴銘桐生髙岡斧出月窟斵而成器神出鬼没此一物也與寳劍相㩦於盧溪之上二者皆天下之英物惠門寺鐘銘惠門蘭若古吟峯院也院當連嶺吟峯之下治平中改賜古名焉舊有鐘碎於建炎之庚戌於是道塲不鳴鐘者十有七年紹興丙寅歲始鑄是鐘久瘖忽響山中林木震動龍像輝煥召集有縁檀施雲合寺僧先來乞銘盧溪為之銘曰萬動俱寂如大虚空虚空無椎何物為鐘傍震萬壑高聞九穹聲縁何起吾知所從鐘邪椎耶莫尸其功隐如雷霆在大千中寳珠寺鐘銘寳珠寺距安城之北四十里寺僧慧海當干戈之際誘檀越鑄巨鐘張皇佛事以鼔舞山中之民盧溪真逸為之銘曰蠢然𠖇頑孰與覺空中雷電忽磅礴大音希聲本無作回禄奮怒飛㢘惡一鼔成鐘神所託劔蟠蛟螭怒牙角六種震動天雨雹鑄此銘詩呵不若贊仁山五百羅漢贊迦葉天中五百尊目連羅㬋皆駿奔阿難啼哭佛日昏誰為設法沙林園帝釋擁護六鑿根習氣脫盡婆羅門仁山金碧耀人天瞻禮願見前世縁法螺一吹天上聞還報十方羅漢恩圓通贊太山秋毫兩微塵巨細本無不二門四方八靣開户牖是中元有不動尊如大圓鏡萬象入如大海水百谷奔維摩倒用那羅印用證初心豈或淪洪覺範畫贊謂公為佛乃工文章謂公為儒乃是和尚非佛非儒是虚空藏畫雖逼真實非真相作如是見亦未離妄水在瓶中月在天上李伯時畫像贊非佛非仙亦非儒者硉硉矹矹名滿天下孰貌其真非真非假讀東坡詩乃識此畫歐陽公制贊如馬放逸兮不覊如松磥砢兮多節偉榦如謝康樂之眉鬚雄辯如樓君卿之唇舌其高處可以上可以下其妙處不可畫不可說杲和尚畫贊硉硉矹矹如祝融太華高不知其幾千丈軒軒轟轟如驚雷唳鶴聲徹乎九天之上道在真空空即無相以相求之如盲摸象乗機應物河岳震響眼如掣電舌如奔浪轉大法輪說無盡藏當恁麽時有識之者箇是徑山杲和尚鑑逹觀畫像贊鑑大師禪學外以醫聞于時盧溪王某贊之曰寂然其容萬法不起色闕無求不怒不喜人自即之其門如市忽然探囊輒起人死本自無生死亦何理公能起之如月在水應物現形本無作止我復贊之亦遊戲耳路正卿像贊森然如千丈之長松勢若摩穹昻然如野鶴之出籠雞羣遂空使之崛起接翼鵷鴻高冠大劒立于庭中七尺之軀萬夫之雄王修華畫像贊不冠不束真被褐而懐玉眼如曵電光掣巖谷不為燕頷虎頭萬里飛而食肉幅巾飄然如五栁先生寕終身為縣令而無求於世俗揮麈塵埃之外遺物離人而立於獨劉大虚喜神贊畫無老㓜形全神守頰上三毛端逢妙手少年角立試輙不偶不復掉鞅名聞谷口量陂千頃才不論斗今踰八十年其逮耉古人云用之則為公為卿不用則山谷一叟英和尚贊十八年前見老英於花藥山忽於智公房一覩畫像戲為之贊吉州英鐵作觜莫貶眼只這是頌偈戲調義高高峯强賊猖獗長老義高以渠魁之馘獻吴侯盧溪老人戲作二偈調義高少為一笑横擔拄杖入山坐斷高峰境界一吼震動林木忽然草賊大敗了則萬法俱空未了應湏還債本是兩重公案如今一道俱觧答王道之王道之舉雲等三重公案請盧溪下語盧溪豈敢批判不得已答之曰大似昔人注本草某藥味平然有毒能活人亦能殺人居士如不信當聽吾頌雲門至死不惺惺居士仍蹉半月程未省夢中重説夢醉來添酒幾時醒贈姪孫行深余姪孫行深自㓜喜出家度牒禁閣二十年而志願不衰今欲脫巾而緇其衣資用尚闕欲丐諸閭里假衆力隨縁贊助乞言於余為作四句偈題于疏首偈曰頭陀未具山僧像只欠鉢囊挑錫杖我今自是在家僧汝好將錢買和尚贈度門僧度門寺僧道成欲鑄巨鐘張皇佛事于山中來求予銘而冶工不預知一鼓而鐘成遂不及勒道成悵恨不已作二偈贈之眨起眉毛鐘已成不容著手勒鐘銘一鋪嶺上新功德只欠將來㸃眼睛半夜鐘聲殷寺廊吹螺打鼓助錚鏦不妨白日開門睡更遣闍梨飯後撞祖麟作東山藏主以一偈送之海藏龍宫五千巻口角流涎方誦遍不如煩此六丁神一日與君推百轉贈行者悟本行者悟本自㓜出家不食葷酒刺血冩金剛經日誦未嘗退轉可謂有志學佛邊事而能住戒者也盖能住戒則定慧自生今乃入恵門禪院禮拜麟山主吾喜其戒行之㓗又能擇所歸依禮拜不錯矣作偈贈之亦以堅其志也出家未踏曹溪碓且打吟峯寺裏鐘缺有高僧善哮吼莫將一物蘊心胸和耿伯順贈李居士横擔拄杖何許語那箇禪林無佛祖但見闍梨夜不眠衲被䝉頭聽粥鼔李居士再次前韻贈之東山寺裏逢君語問君何謂西來祖鼻孔撩天喚不譍呼童汲水敲茶鼓再次韻呈智禪師禪師花藥老英之弟子向遊花藥山中數與老英夜語時智公在焉今十五年矣偶憶其語因偈載之花藥山中人解語何必江西尋馬祖我亦㑹叅鐵觜師如今不打這破鼓唐興寺上方三入唐興寺裏宿閉門風雨雲垂屋今朝披霧立山椒始識唐興眞靣目震禪師喜談傳燈錄謾以一偈示之僧問靈山一㑹禪不知誰與佛言論靈山㑹裏何曾說只有闍梨獨得聞祭文祭楊徽猷文嗚呼我宋勃興承平百年金人犯順欲吞四川四川沃壤金尤埀涎肉食者鄙幾欲棄捐丞相魏公獨謂不然身自請行遂秉大權公見丞相首被薦延咸謂幕府得知公賢公復知兵所向無前岷峨卭僰貨走中原控扼關陜至今保全魏公再起羣邪所忌隂掣其肘使不得志魏公既黜公亦退避高車大馬日鬨于市爭言知戎以取顯位公不為彼而歸田里今復云亡尚有公議如公竒略纔試一二使得盡用何功不濟我初被竄三危之郊公一見我喜如舊交憐我困厄撫我良勞期我他日一世之豪今則老矣白盡頭毛西望靈輀薄陳奠設舉聲一號魂馳心抑祭向宣卿文惟公負大器識忠耿亮直敢於為義所至有跡褰帷持斧姦邪辟易不敢呼吸折節而取高位退隱湘山而放身自樂于閒寂世之小人猶且望風而忌疾然百鍊之鋼終不可屈雖常以是而得謗亦因是而名聲赫奕比年以來公道仍開累任雄劇天驥呈才始見知於廊廟年未七十遽掛衣冠於神武望松徑而歸來又踰年而捐館士大夫咸歎息悲惋遂埋玉於高岡唯有識者知其不亡所不足悲者謗焰已息讒人已死而公名獨彰吠者犬耳於公何傷公平昔知我最厚憫我流落竄身夜郎平生故舊毁書滅迹公常手札訪生死於沅湘暨余放還公尚康强千里命駕相勞苦於盧水之陽凡此高義古人有之賤子顧何足以當嗚呼奠此一觴淚横臆而浪浪祭劉元弼文嗚呼惟公平生㓜則同學掉鞅舉塲爭此頭角暮年追思成一大錯公既不偶我復飄泊得罪于朝竄居夷落歸來見公皤然一叟迎我西郊一笑如舊禍倚人門柳生其肘忽然云亡不及執手問所以然莫測其咎銘旌戒塗云是公柩有潔其羞有豐其豆哭奠過哀魂兮來否祭劉英臣文嗚呼公之生也當太平極治之時嘗處學校遊塲屋不一遇于有司至於建炎之初值中原之亂離江湖盜起戎馬交馳公嘗與我避亂東西間關轉徙實相扶持忽以病告遂不可支公昔無恙年猶盛壯朱公吳公兩大丞相各奏恩澤名聞于上江淮荆浙使華郡將虎節麟符咸薦以狀嗚呼平生所遇方至於此天奪其年遂至如是我乃秉筆卒記其事刻于金石俾公勿墜公其聽之祭劉世臣文惟公以明道通經為時師儒學者擔簦鼔篋自遠方來者望絳帳而趨隅今者聞公之葬行道之人皆為出涕而况平昔交游之久學問淵源而契義最深者乎公與人交久而不移我被讒謗竄于九夷人莫敢顧公獨率其友人欲出而救之事雖不成高義益彰輀車在道將葬于高峯之岡我率子姪設祭道傍魂兮宜來歆此一觴祭黄子黙文惟靈生于盛世名門大族幼能自奮離羣立獨才足以經世如蚌之藏珠文足以自貴如石之韞玉未及施用如風轉燭所以光明盛大可貴於世者忽沈埋於千仞之谷嗚呼子黙學術瓌竒言論俊偉方摩霄翼雲徙于南溟者何止九萬里而已讌遊累日言猶在耳忽然云亡此實何理平昔交游無以伸哀聊陳薄奠魂其來哉祭舅母雷氏文雷在長安實為名門族甲天下譜牒是論儻非其匹孰敢為婚况如夫人令公之孫唯我老舅謂真吾偶夫人不疑遂執箕帚凡六十年康寧富壽宜我舅家必大其後我視夫人舅家之母喪車臨岐奠此巵酒盧溪文集巻四十一
