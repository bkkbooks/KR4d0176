body:
  text: 盧溪文集卷四十二宋王庭圭撰墓志故資政殿學士同知樞密院事贈觀文殿大學士聶公墓志銘紹興十八年某月某甲子資政殿學士同知樞密院事贈觀文殿大學士聶公葬于撫州臨川縣某鄉某里之原公之子昻以公布衣時有盛名於太學而同時登博士之堂相與摩肩于橋門璧水之上者某尚知公為最舊當時老師宿儒英豪之士與公並時騁聲名相繼登朝廷為顯人今皆無在者乃前期以狀泣授使者曰我先君殁於邊境搶攘之時至今墓銘無詞以刻又因公之壻黃君掞以來請銘乃不敢辭公平生遭遇蒙褒寵眷賚之渥與嘗所建言行事經兵火多失其傳獨其世次官封始終大略可考耳公諱山字賁遠淵聖皇帝改賜名昌世為撫州臨川人自高曾以來不求仕進公雖幼警異父以常兒畜之及稍長自能好學卓犖不羣鄉閭先生欲共奬養成就之謂鄉校不足以發奮乃與筠陽龔端並遊太學而兩人皆極貧包腰負篋徒步來京師羇旅道中諷誦不輟見者以為異人諸公博士閲其程文而驚偉之數與太學上遊並試而常角出其上方天子興辟雍一道德而取士皆出於學校四方英俊之所聚而識與不識一時名士皆爭與之交公亦與人傾倒無不至而公之名聞天下矣補太學上舍與賈安宅等同日釋褐除相州教授又為廣親北宅宗子學正徙編修國朝會要所檢閲文字近臣薦公上殿改宣教郎除祕書省校書郎遷尚書右司員外郎以直龍圖閣為荆湖南路計度轉運副使方天下隳於久安吏不習事事多廢職而公為人精敏徑果於職未嘗茍其在祕書也患羣書散亂不屬取昭文集賢史館之書各歸其庫而標目之會徽宗駕幸省中閲其書如開羣玉之府而見圭璋琮璜之狀各有次第而可數也稱歎久之由是驟擢右司湖南去京師遠而財用狹歲久積逋不復帑公責諸郡補發是歲漕桑萬戶而下天子以公長於理財召為大府卿遂除戶部侍郎為大遼館伴使兼定一司敕令又兼侍講未幾除開封尹兼侍講充神霄玉清萬壽宫判官神州浩繁治常屈於豪右而公遇事果敢無所回憚又嘗以事忤蔡京王黼乃復為戶部侍郎即以徽猷閣待制出知安州已而提舉江西州太平觀又責授崇信軍節度副使衡州安置後二年召赴闕實宣和七年也除顯謨閣直學士知開德府值北邊有警改差親征行營司參謀官又改差隨軍轉運使又除戶部尚書兼領開封尹拜延康殿學士淮南等路發運使復為戶部尚書兼領開封尹遂拜中大夫同知樞密院事方議和好乃以公為大金軍前河東國信使公亦自請行以身試不測之地而一介行李卒不返今上即位之明年除資政殿學士提舉西京崇福宫又二年始知公至絳州及於難靖康丙午䦌十一月十二日也享年四十有九訃聞上震悼贈典有加祿其子孫內外親屬而官之太常諡曰榮愍曾祖諱經太子少保祖諱榮贈太子少保父名用之朝請大夫是時年八十七矣公娶鄒氏封永嘉郡夫人子男二人昂嘗任鴻臚寺丞升前廬陵縣尉孫男五人堯臣舜臣皆某官周臣晉臣唐臣尚幼女三人洞真適修水黃尚書之孫掞安福縣主簿葆真適艾慶嗣玉真適黃旦二君皆用公恩澤補右迪功郎有文集三十卷編次歷代史門類二百卷藏於家嗚呼士患無才或不逢時觀前世有為之士投功名之會者衆矣一離譴逐或終身不復顯公起儒生陟禁近雖非意遇讒值天下多事復起而膺大任人謂以公之才而遭此時必可以任世之重而有功於天下者至是莫不歎其志未極其用而惜其命止於斯也當時議者尚或咎公當本兵之地而以身任河東之役此不猶愈於畏怯回撓而以死生禍福為一身顧計者乎受命以出有死無霣公則有焉於是為之銘曰公幼自奮硉矹瓌竒崛起田里名震京師上方嚮學鋤纇媷茀雲漢昭回下飾萬物公於此時奕然有聲橋門環聽鏗鏗説經由是取進大官大職忽離讒逐謗焰未熄天子念之訪于江湖鋒車星發召登西樞衆方危懼公不退轉勇於徇國遂及于難一心險夷公謀則早處此誠難後世可考故右朝奉郎通判筠州黃公墓志銘維黃氏居邵武軍者世系遠矣代有顯人公諱秠字伯瑞建炎帝相諱潛善子也曾祖諱亨朝散大夫贈太傅祖諱景朝散郎祕閣校理充徐王府侍講贈太師申國公父光祿大夫守尚書左僕射兼門下侍郎御營使母徐氏吳國夫人建炎初敵犯東京僕射自河北領兵入覲總御營使大䇿祕畫多更其才不淹旬國步再安可謂有勳力于再造未幾敵復飲馬於淮泗言者歸罪於僕射貶嶺南以疾薨于某州僕射唯公一子護其柩以歸冒兵盜間關梗澀至吉州遂留以葬因家焉公自幼爽悟不羣有志節自喜讀書業文舉進士未就以父蔭補將仕郎為御營副使下書寫機宜文字丁父憂服闋權虔州會昌縣丞調南安軍司戶改差吉州判官轉通直郎知南康軍建昌縣任滿通判南雄州轉朝奉郎通判筠州待闕五年貧甚以疾終于家實紹興二十六年六月二十四日也享年四十有九視其居如寒士窶人之家太守黃公某通判趙公某為棺殮乃辦公生相家宜挾貴胄氣以臨人而乃詳練州縣簿書米鹽劇務疑獄滯訟剖決如神至於倉猝遇變無所回撓如孫吳之用兵乘機必行無不勝者在會昌其年甚少知縣吳兢為強冦所執公單車造其壘動以禍福令持田器為農民羣冦悔悟悉解甲聽命公與吳兢聨轡而歸觀者駭歎其在吉州也一日戍兵謀殺主將燒營以為亂太守陶公愷素知公問計安出公語其衆推首亂者數人戮之餘釋不問明年駐泊統制官湯尚之軍中有唱言欲為變者公時攝郡事往謁主將收為首者數人繫于獄密以聞于朝尚之既更戌乃取繫獄者誅之州人初不之驚公之設施大率如此方少年時自負其材欲由場屋以自奮會其父當國不令子弟取應慮塞天下英俊之路當時議者未以為然厥後有持權勢熏轢天下者盜取名器以紈袴小兒置高等壓四方髦士重官纍印窮極貴侈然後乃知公家僕射真賢宰相之所為方盛時以公書寫機宜文字扈從之勞循資而已僕射身後未敘復公又弗克享于壽宜其豐爵厚祿不及其身然安知其後世不蕃衍而不卒享也哉公娶朝散大夫兖彥章之女先公十二年而卒男三人曰畟始受公致仕恩澤曰夏曰夔應進士舉女二人長嫁右迪功郎尉遲孝友次在室孫男一人恞孫女二人卜以二十七年某月日葬于廬陵縣儒林鄉鳯凰洲劉家嶺僕射墳之次銘曰士惟才兮幸而出乎名胄視爵祿兮若取諸其左右公獨不然兮恥以閥閲抑寒士而爭進取有此一段兮可以監權臣垂百世而不朽爵不耀厥躬兮天復奪之以壽又孰知其天兮不卒大於其後故令人劉氏墓志銘前兵部侍郎兼侍讀廬陵胡公名銓之夫人劉氏世為贛人故中散大夫提點荆湖南路廣南東路刑獄諱敏才之女故吏部侍郎諱景之孫贈金紫光祿大夫諱揆之曾孫夫人幼令淑中散賢之在荆廣時欲擇對閲士無可許者是時侍郎方為進士才譽傑出名震場屋中散聞而説之唯恐不得當也夫人名德靚年二十三歸于胡氏不以其祖父嘗貴顯而事舅姑與祖母太孺人唯謹視兄嫂如舅姑又能協于上下內外春秋祀事奠饋必遵胡氏家法尤肅凡閨閫職之所宜執者無一事廢墜繇是侍讀始不以家事拂其心而得盡力于學少年登甲科以榮其親夫人之力也既入朝為樞密院編修官天子將擢用之會秦氏當國固寵怙勢一時權力熏轢天下中外憤嫉莫敢逆其鋒侍讀上書力折其姦至乞斬檜或諷夫人止之恐禍不測夫人曰彼方為國言事且不謀於婦人止之非吾事也特安之而已侍讀坐是貶新州又貶朱崖逾嶺海行萬里猝遭驚濤駭浪之恐而蛟鰐黿鼉之怪出沒左右夫人不為動色家屬恃以為安幸而登平陸則島夷雜處於荒陋區區窮絶之鄉亦未嘗一日不自得使侍讀飄泊海嶠十八年全家北歸如不曾蠻風蜒雨也於是禍患不能動其心而甘窮困間關萬里之外以全其節志節愈高名與嵩岱等豈非夫人善自守而以相其夫子之力哉嗟夫不以貧賤富貴纍其心今學士大夫之所難而以女子能安而行其賢於人也遠矣秦氏既亡侍讀內徙衡州夫人歸廬陵治家事以戊寅九月十有四日終于家享年五十有四男四人泳澥浹瀳女五人長適太和縣鄉貢進士嚴萬全次適福唐葉昌嗣次適上饒方自厚餘在室孫女一人相孫蚤夭孫男二人侍孫嘉孫夫人自紹興丁巳以冬賜恩封孺人滯留海南今侍讀始湔除罪籍進用于時贈典煌煌蓋未已也己卯七月乙酉葬夫人于廬陵縣中鵠鄉於山之原隆興甲申上初郊加贈令人泳亦以恩授右承務郎盧溪王某為序而銘之銘曰男兒為國奮不顧女子知義良自許出門萬里忘憂苦欲助髙名振寰宇空山埋玉知何處松楸參天神所護樵兒牧子不可度上有華表千年柱白鶴飛來解人語大宋忠臣夫人墓故王夢授墓志銘君諱鴻志字夢授其先為東平王氏有名朴者佐周世宗為樞密使五季之亂子孫散徙君自髙祖以來為吉州廬陵人祖諱九疇贈右奉議郎父諱廷俊隱於鄉閭方熙寧元豐間太平文物之盛廬陵號多士戰藝之徒推王氏為先登君之叔諱廷彥弱冠登第仕至江東西部使者次叔廷老博究羣書名擅場屋尤邃於禮學暮年官於嶺南會天子修辟雍造大成殿議先聖冕服羣言枘鑿大臣言廷老曾進説登聞匭中自賔州驛召至京師為禮制局檢討冕服制度卒用其議由是言禮者皆尊王氏為宗師君幼與羣從兄弟學禮於檢討公檢討公嘗語余曰諸子弟皆善學而鴻志尤敏悟他日必有聞時王宫教授鄭公元輿太學名儒閲君試卷而稱賞之大丞相劉楚公猶子巘出使七閩為孫女擇對於庠序中鄭公獨以君為可遂娶劉氏焉會舍法興以職事掌永豐龍泉縣學士嚮慕之靖康以來科舉兼用詩賦君素不喜工雕篆之文杜門不復進取築林館於喧囂之外以延士大夫待制劉公僴以沖遠名其堂侍郎劉公才邵伯以詩美其高蹈之迹則其人可知也君之室劉氏毛氏皆蚤亡會成都運使馬公居中北方缺僑寓境上以賢謂公而以季女歸之子男二人曰仲約仲恂皆傳家學誦説有法度女二人孫男一人君以紹興丙子正月晦終于家享年七十有六卜以是年十月戊寅葬于廬陵儒行鄉廬陂之原其孤以余雅與檢討公舊遊又熟識其先君扶服來乞銘盧溪王某為之銘曰議禮或失其説星分諸儒蜂起簧鼓淺聞詔君叔父詣金馬門一時大册卒聽討論君守家學益造淵源升堂誦説厥聞益喧不耀其章老于邱園風流未泯有考斯文盧溪文集卷四十二
