body:
  text: 盧溪文集巻三十四宋王庭珪撰記遊廬山記江出蜀東㑹於潯陽雲濤雪浪相撞擊而下是為九江九江之上有巨山崛起名甲天下目望之巍然髙而大與他山未有以異也環視其中磅礴鬱積巖壁怪偉琳宫佛屋鉤綿秀絶愈入愈竒而不可窮乃實有以甲天下者也予往年偕計吏數取道山趾望其巔欲躋焉探天地觀造化擘出怪譎及其至也不遇霜飊雨雹炎熇赤日則隂霾宿祲滃然出於洞穴之中欲冲射人與夫虺蜴蛇虎之羣磨牙澤吻而埀涎鳥道苔境之所顛墜頹崖斷石之所覆壓有足以褫魄而奪氣凡遇是數者不可人意雖好遊者不果力躋而寄目以償所願焉政和七年十月七日道遇武陽聶名世自圓通同宿東林觀虎溪蓮池明日登羅漢閣上白公草堂至上方五杉閣馮髙而望九十六峯隱見天末不可名狀而香爐一峯尤勝絶草堂正坐其下宜昔時隱者之所喜盤旋於此也過西林履平地五里許至資聖菴資聖而上漸峻㧞非數十步輒一休不可疾至歴三茅亭乃至錦繡谷聞春時異葩怪卉層出雜見相錯如錦繡然自錦繡谷不半里至天池妙吉祥寺去平地二十里矣是夜禮文殊於瑞光亭拜未起而燈光璨發於欄楯之外大小幾百餘燈明滅合散不常僧指示曰此聖燈也予不能致詰竊意名山藴靈必有神物欲示其異以驚衆而然耶抑草木竹石之自有光怪而為此耶或謂唐㑹昌中二僧蔵金像於錦繡谷恐其􅖤光騰溢而出此説幾近歟寺有貯雲菴又在絶危巒頂峭發壁立數百千仭吐雲氣而薄星辰者皆出乎袵席之近明日離菴中由山北下三里至佛手巖巖下清涼瑩徹可丈餘水濺濺鳴其中有石龍首浮於泉上詭狀若欲奔動視之毛髪為寒巖西半里登相光亭觀擲筆峯坐禪臺竹林遺趾山中人傳數有僧見竹林寳刹於此轉眄失之故今號竹林化寺復從巖東北下三里至寳林即唐大林寺白樂天嘗序此地實羌廬間第一境人迹罕至古今識遊者鑱刻未泯也寺三里道傍有飲牛池池一里至峰頂菴視香爐峰反在其下東有文殊四望二臺老松一株極醜怪偃於四望臺之上若張蓋然坐其下以觀浮圖之屋穹堂奥殿負崖架空矗在天半紺碧照耀環山而四出九江波濤雪色砰擺振撼合而東去者皆在乎履舄之下彷徉注視目不得瞬而千萬狀之變態亦不可得而窮也於是下峯頂十里至普照寺而寳興石盆䕶國三菴居峯頂普照之間又下至廣嚴寺遊連枝亭復投宿東林觀壁間記遊者甚衆不過徑上天池佛手巖而止吾二人自謂幾覽徧山北好處因囘視江南地雄富内坦夷數千里氣狀清淑而兹山巉突於江濱若造物者喜設宏壯屏扞於此土使江南清淑之氣蜿蟺儲育至是礙而不得西嘗産而為幽蘭瑞香芝英竹箭之美與夫三脊之茅千尋之名材希世異物為瑞太平之時未能獨當竒也尚有魁豪不世出之士埋光鏟采於其間而求之復無有豈明天子在上皆已出而仕者也彼陶令與十八賢者一溺於此遂終身不出蓋當時挈治世具不得設張即思自放於山谷之間而進退卒以不汚後世不敢少訾焉白樂天貶潯陽慕淵明之為人樂之而不去是皆人與山相得於一時者也厥後當宗閔權勢震赫時終不附離為進取計氣節自髙豈無待而然耶予與名世冐風埃走數千里忘其悲憂感慨覉旅戚戚不已之懐而驟得天地怪竒偉麗之觀則兹遊所得時人亦叵測云既遊遂錄以記之靖共堂記安福縣西南地最廣髙山大谷荒翳險絶往往通宜春長沙郡界宿蠧藏姦為縣者病之紹興十四年四月南嶺潘家峒賊突出犯永新殺巡檢勢遂張朝廷下銅獸符命御前統制吳侯錫討之亂人大恐詭謀乞降時吳興錢侯傑之治縣之明年也政寛人和理甚無事方治燕居之堂見士民問人之疾憂盡得賊之株柢蹊隧蓋弄兵不討者十有六年袁衡湘湖皆被其毒異時遣偏裨提孤軍鼓而入他州勢不相援彼不西走山南走湖則隂連大姓土豪張聲焰脇官兵令解去郡縣幸其無事如豢虎狼不敢拂其心吳侯得其情悉破壊其機牙檄諸郡兵乗障扼其奔衝親率勁卒𢷬之賊遑急氣殱不能鬬未陣而衂大姓土豪縮頸畏罪各縛其徒以來㑹錢侯與縣尉任君詔從間道餽軍亦擒馘有差於是賊無噍類矣得其渠酋左證具乃磔之脇汙者置保伍使持田器為良民無一人呌詉者夫以吳侯之智勇聞於世遇大㓂輒克而平此草間倔强之㓂宜不足書蓋鏖兵萬里從枕席上過師此必勝之術至於深林阻險欲戰不得非善用兵者出竒以奪之未可驅而奮也不然何蟠拏峒窟十有六年出沒數郡之間而官軍不能取哉數郡之民得免於亂功大事特實始我邦班師之日堂適告成可以閲軍實可以陳燕豆於是饗吳侯於堂侯不自有其功而美縣令能脩其職使不淹日而破賊錢侯不鄙陋其邑盡力於其職之所當任軍無乏事財不橫歛而去此大慝民實徳之客有吉文李君尚義題其楹曰靖共蓋取詩云靖共爾位好是正直坐客咸欲志其事而以文屬盧溪王某因饗士之日落堂之成故叙賊之所以起滅鑱諸堂上俾繼此而理者咸得安其位而桀黠不敢復芽蘖云紹興十四年仲秋日記西峯寺重修三秀亭記亭始作於元豐六年豫章黄魯直為前大守夀春魏侯記一時之事名之曰三秀亭識瑞物也建炎間官兵更戍於此而亭遂堙廢厥後二千石孰不欲復前賢之故迹率歎息遺恨而去亦誠有所未遑耳後元豐七十有六載當紹興二十八年秋天子以銅獸符授鄱陽魏侯安行來守廬陵下車興弊補廢修起學官増養弟子員彬彬文學之士盛於一時積獄滯訟迎刄輒剖耘鋤强梗化為善類窮山長谷宿盜積數十年不討者悉縛致麾下境内遂寧時方憂旱甘雨連霔郡人大悦謂此數物者非太平之嘉瑞耶芝草不得専美於前矣政既多暇明年春始攜客遊西峯尋三秀遺址在蒼松篁竹之間林麓幽逺復得舊碑於隤垣之下字畫尚新魏侯讀之喜曰吾家譜鄱陽夀春同出於婺源乃知前三秀主人吾宗人也可不因其舊而新之乎蓋物之當興必有所遇決非偶然者若峴山亭不遭羊叔子蘭亭無王逸少則襄陽風景與從事中郎俱湮滅而無聞清湍茂林不著見於山隂矣亭既成遊觀者輻湊兩魏侯之名當與此山俱傳不可不記復興之嵗月紹興二十九年五月十八日也盧溪王某記龍須山轉輪經藏記佛在西域時逺中國僅二萬里華人未始聞其言彼方之人聞有震旦之國負其書重譯而至者槖駝相屬也其説使人見性成佛謂法界寳藏吾所自有是以華人説而奉之積其書至五千四十八巻於是其徒作華藏之居建大軸兩輪以藏此五千四十八巻於輪間者徃往遍九州也吉州龍須山昔有異僧法登禪師自曹溪得法來遇長者龍須於此地築菴而留之遂為登禪師道塲後人因以龍須名其山舊無大藏經紹興甲寅長老秉雍領衆始募置滿五百函欲建法輪而屋之㑹移錫隆慶而以懐宗踵其席始謀建藏室於寺之西隅度其費莫知所出有居士劉存正胡瑾張孝友聞而樂趨之各出錢百萬以上由是施者摩肩而至以故功易成藏之前後神物瑰偉其像設規置於他處不類觀者歎其異未嘗覩也工將畢而懐宗示滅厥後繼住者數易卒無以紀其成郡侯以藏經實始作於秉雍而雍前住江西湖南所至必莊嚴佛土復俾住龍須雍即以書來求論輪藏之雄麗求文以記藏經之嵗時問其日則紹興甲子四月八日也於是乃為之記而究其説之所以然夫掇拾西方貝葉之文為一大藏用法輪以轉之遂始於傅大士然所謂法界寳藏從無始來固存不可以色相求使凡夫忽然見道於一念項遍十方界則虚空中法輪常自轉也昔人有念經一萬部而祖師不以為勝有老宿下禪牀遶一匝而轉藏了或有見於此則道之廢興不繫乎藏之建與不建也蓋此寳藏凡夫皆具足而莫能自證如衣中寳珠必因人指示而不到曹溪安知不失今之所以聚佛書轉大法輪以張皇其説者蓋不為諸佛説法為凡夫説法爾此藏之所以宜建也盧溪王某記寄軒記武陽鄧晉卿學有本源而於黄帝老子方外貝葉之書無所不觀軒其屋於所居之偏名之曰寄屬盧溪王某求文以記之某因謂晉卿曰吾所以有大患為吾有身不有其身則無患而可以有為今夫所謂身者其初未始有物而偉哉造化特範君之形而寄之也所謂軒者君又以造化之所寄者而寄之也身與軒且非我有則向之所謂寄者實無所寄若無所寄安得有名此之為物非言之所能了而欲强以言記之是屋下架屋求馬於唐肆而夢之中又占其夢者也試為君言其崖略藏舟於壑藏山於澤夜半失之雖壑澤不得有而人一受其成形遂有而哀樂之以故累於有物域於宇宙之内而不能自出也有能出乎百物之表雖死生無變於己况得喪禍福之所介乎莊周以軒冕為物之儻來寄故其言曰寄之其來不可禦其去不可止然則窮逹貴賤適然相遭於一世之中直為物逆旅耳蜩甲蛇蛻似之而非晉卿本以文學起畎畆陟進士科方將脫簿書登金閨玉堂摩赤霄取富貴又何暇寄其身於窮陋一軒之中蓋士生於世使其中不自得將何適而非累使其中泊然無所繫何往而不自得所以名其軒者豈特在於窮閻陋屋之中雖金閨玉堂亦若是而已惟磅礴萬物翛然塵垢之外者不以廟堂江海置冰炭於胷中隨所寓而安惟一累於進退則均為物役不知二者皆蘧廬而不可久處蓋遊於物之内而不知遊於物之外彼遊乎物之外者視百千萬億世界同為一蘧廬在一㣲塵中吾將擇何地而寄耶晉卿未能絶迹於世坐進此道以聽浮雲之去來作人如此自可不富貴倘富貴逼君亦直寄焉耳若夫假道於仁託宿於義以遊逍遥之墟食於茍簡之田立於不貸之圃過是而往余不能言之矣隆慶禪寺五百羅漢堂記廣陵浮圖氏之宫環峙於州城之西而仁山獨宏麗而甲出寺有五百羅漢堂元符中州民孟華之所建也華賈江湖間積竹為巨纜浮大舸絶淮汴之於河河防用其纜嵗一入獲官錢數百萬轉鬻吳楚之間以歸華既豐財愈於􅏽嗇而樂布施故能求得天下妙工造五百大阿羅漢建兩楹而屋之東坡先生南遷過其下持勺水供飬作八大字牓而揭之於是此堂亦為十方道俗動心駭目之觀而與山中穹堂奥殿爭光輝矣正和末年寺廢為道士之居東坡之字亦坐禁錮有僧竊而藏之及寺復興羅漢散落民間寺僧物色得其七八像既漫剝不治堂之梁楹亦隳紹興十三年嵗在大淵獻通守孫公霖欲補其壞而新之初未遑也夜夢羣僧謁於庭若有所訴覺而異之謂住侍僧秉雍軒然有才力能任斯事故雍倡具説傾數邑檀施不三月而閲成自輪藏之隂徙置佛殿之西廊敞七間為堂視舊所建益夥東坡璇題宛然如有靈光異氣照應屋壁是皆可記也雍於隆慶扶傾起廢有功於佛事昔嘗求佛殿記而余未暇許者也今復以孫公之命來乞文以記羅漢重修之嵗月問其落成之日則五月壬戌也予聞古之得羅漢道者由禪定見宿因無復愁苦故此大士應物現形至於五百各發慈祥之相以接物護世多靈顯云七月庚缺盧溪王某記西山記出縣南十五里折而西行又十里許林壑絶險有溪水出孤源峒中所從來逺矣西山當峒口水抱山麓其停蓄而深者為潭溪中多亂石突怒而出水行石間汹湧有聲溪上古木合抱而巨藤蒼然若龍蛇起立狀極怪醜干霄而屈蟠皆數百年物也每風雨至林木震動水石相摶觀者毛髪盡寒震掉不能久立相傳以為龍神之所窟宅故水旱疾疫凡有求必禱之常若有答焉紹興十一年夏五月至六月不雨苖將槁矣徧禱羣祀弗獲縣宰向公子賁披地圖訪耆老咸言西山之靈乃率僚佐潔誠以往視神所居蟠藤之上三峯峻峙鄉落所謂三峯蟠藤之神氣象隂森崖壁怪偉使人凛然既祗飭祀事有雲出於峯頂須㬰蔽日隨軒而歸衆咸異焉日暮大雨明日又雨周被四境是嵗大穰繄神之力向公具其事乞封爵於朝且用耆老言數十百年以來目覩靈異殆不可悉數中更變亂潰卒四出巨盜在境神示風霆雨電之變又出蜂蠆百怪之物卒退走之其事詭異或者疑焉然皆近時事耆老目覩人能詳言也夫山川皆有神司之而能出變怪興雲雨澤及萬物此固宜在祀典䝉休顯而力請未獲若乃神之威徳實不繫封爵之有無論神而問封爵猶論人物而問官職今之大官大職豈盡能惠澤斯民神亦猶是也後之人必欲昭掲神之靈貺宜有考於斯文謹書向公一時之蹟以附安成故事俾不墜紹興壬戌冬十月一日盧溪王某記盧溪文集巻三十四
