body:
  text: 盧溪文集卷十五宋王庭珪撰律詩七言和歐陽炳文汝舟酴醿唐降真臺有檻玉砌焚龍火香薦無憂酒兩翁爛醉酴醿下擊鉢成詩豈易酬藉地想攜千日酒尋香爭跨九花虯晩風吹雪空中落急水漂香何處流夢覺清芬猶撲鼻如登銀檻薦無憂次韻胡次魚送歐陽景蘇鎮州教授徃昔逢君最妙年朱霞天半已軒軒論文豈是無張說取友何期得邴原談笑坐輕千疊嶂吹嘘誰送九重閽不應海嶠能留滯早晩公車採至言别黄伯成常恐微言將遂絶江南耆舊復知名身從妙喜國中出脚踏毗盧頂上行覺我向來聞道晩識公真處大僧生相思莫謂山川阻千里同遊聊缺送同年趙季成赴行在繫船楊栁曉鸎邊冠蓋如雲欲塞川聞道今開丞相府沈相同年昔年同是廣寒仙不須左右為公地便恐吹嘘送上天千載一時真慶遇㑹㸔鈞力轉陶甄送劉子柬赴省快鎖荆州從事㕔薦書飛入九重城試觀文陣英雄氣定勝弓弦霹靂聲霜踏板橋天欲曉酒醒漁浦雁初鳴春風漢殿臚傳近換取青袍出帝京趙逢源家有姝麗每造謁必見拒今侍令兄府判東遊作詩為别兼以見意高門日日掩朱扉未許傾城捲翠帷客子眼寒空過市雪兒歌妙欠新詞華裾將曳銅駝陌破帽敢隨金馬羈悵望碧天鴻雁影黄花應不負歸期次韻趙文卿因以送行堤栁迎人自作隂江流仍漲綠醅深行人獨唱陽春曲此日重聞正始音騶馭已如仙褭褭騎驢徒欲度駸駸㸔君濶步青雲上莫學書生擁鼻吟和施通判以詩惠茶綵筆題誇北苑春南來草木始稱珍江湖風味極不淺翰墨篇章老更新落日清吟招惡客此時佳境屬閒人慙無好語酬高詠東望雲山意莫陳再和與客觀詩碾茶因話時事再作此呼童急碾建溪春麗句兼收掌握珍陸納家風元冷澹庾郎詩句自清新推之不去真何物試與偕來端可人當面輸心多背笑愛君高義似雷陳宻雲初識雨前春未羨官㕑送八珍正苦睡魔須料理愧無妙語敵甘新兵分刺史千餘騎系出洪崖幾世人麗句新詞隣大雅豈將文體效梁陳重陽日劉元弼亭席上時坐上聽端禮舉省程文不見龍山老孟嘉風流誰更落烏紗松槽旋壓初浮酒籬菊爭開無數花清論揮犀傾玉雪高文射策走龍蛇小兒拍手攔歸路笑挿茱萸待辟邪周德祖自衡陽相别三十餘年㑹余竄夜郎德祖知南江寨相遇甚欵道舊興懷輒成長句回雁峯前水拍天峯頭一笑尚依然休論華屋生前美同在邯鄲枕上眠騎馬忽來臨紫寨傳家故自有青氈時平柵壘無烽火灑墨成詩有幾篇九日以菊花酒寄施醇翁通判每逢佳節憶淵明自採籬邉細菊英坐見南山横紫翠遥聞北地落欃槍澆胷止賴杯中物快意豈圖身後名幸有酒兵堪一舉請公談笑下愁城盛暑中黄子餘主簿攜雙井茶見訪痛飲元非避暑方又無金盌汲寒漿忽逢佳客攜新茗來坐竹隂移晩凉幽處小牕花木好吟餘清論齒牙香君家句法誰能似煎出車聲遶九腸次韻鍾令君自言借隣僧衣著閒舉酒兵挑一戰愁城欲下戰方酣且烹北苑龍香茗暫脫東禪鶻臭衫有志干時君自許無錢使鬼我何堪江湖寂寞生涯盡對客不應容易談感雨癸丑天久不雨羣情焦熬郡府方索民築郛縣内惴恐既而禱雨石屋山連日大澍喜而作是詩呈縣令黄平國拜起爐烟繞碧虚卧龍隨雨躍天衢道邊草木已焦卷巖下風雷若指呼河隴豈無寃繫獄海汙防有浴川夫君王屢詔寛徭役亦念凋氓苦未蘇和李彦文春雪聞道江城雪似沙東風吹動曉寒加輕飄瓦屋鱗鱗宻亂颭檣竿櫛櫛斜著地正憐新種竹漫天故壓未開花君應對此方乗興飲似長虹吸海涯縣僚禱雨盤藤廟連日大澍次韻黄超然缺上林抄半空雲走挾雷聲旱妖作魃乘時起天意為霖轉眄成莫問田疇水深淺縣前江已拍堤平再和前韻江夏無雙望久傾高文猶帶玉堂清子雲識字終投閣侯喜能詩新有聲偶㑹風雲蘇大旱戲將筆札慶埀成年豐但使無公事勿慮潢池賊未平喜劉世臣仲美及第同上青雲踏玉梯仍穿月脇取蟾枝江南魁薦星文動蘭省名高天下知共喜秀光前日㑹爭傳真逸老人詩萬牛回首扶梁棟可笑蚍蜉欲撼時送歐陽廣明遊仰山兼簡慈書記二首閣中有小釋迦金幱袈裟士窮不作儒生酸嵗晩聊為物外觀行脚僧從幽徑出集雲峯倚半天寒且攜幾緉登山屐勝走高門坐馬鞍君見堂西舊書記試求開閣㸔金幱不畏霜風射眼酸要登峯頂作竒觀連天野水微生綠隔岸官梅已破寒試共嵇康尋石髓要隨杜老逐金鞍歸來山鳥迎人閙應是怪君猶布幱次韻送别曽英發士元來訪潁川公桑下清談有素風不扣洪鐘安識響更聞妙句豈宜䝉如君晩節猶堪奮期我高名莫大穹此别應難問消息寄書無惜到山中和劉元弼歳除書事吟詩輒莫歎年終歲歳年年事不同藍尾旋傾人半醉樓頭猶聽鼓三通漸㸔暖律回春檻且任狂風掲釣篷管有明朝好天色澹雲微雨翠烟中題譚微仲一經堂漢儒重道獨專經唐室初増博士名韋氏起家仍相國稚圭能說亦公卿司空城旦汚潢潦古壁遺文粲日星異日諸郎拾青紫傳家何用滿筲籝盧溪文集卷十五
