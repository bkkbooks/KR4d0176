body:
  text: 盧溪文集卷二宋王庭圭撰古詩和劉美中尚書聽寶月彈桃源春曉何年鑿源開混茫桃花兩片吹紅香煙消逺浦生微陽漁舟誤行溪水長溪回岸轉山隙光疑有綘闕仙人房居民爭出羅酒漿花間笑語音琅琅抱琴釋子眉髮蒼響泉韻磬鳴長廊能談往事悲孟嘗昔時臺沼今耕桑又如勇士赴敵場坐令逰子思故鄊清猿抱木號鴻荒孤吟劃見丹鳯翔曲終待月西南廂重調十指初不忙如見古畫秦衣裳春天百鳥爭頡頏桃源歸來今已忘彈到落花空斷腸和李巽伯少卿見懷巽伯靖康中以少卿使金騎鯨仙人本仙胄不應暴落飢蛟口長庚却復下人間島瘦郊寒皆縮手篇章邁往無古初不共曹劉轍俱蹂此邦雖陋江山雄異時間出歐陽九公今詩句滿江山似覺衰容得春酒筆端獵獵生風雷胸次煌煌煥星斗生兒了事正作癡亦恐癡兒未能了頃年敵騎獵夷門兵拏不解誰當剖大臣薦公來洛陽舌翻波濤驚朝堂飛龍借馬出建康北兵夜走塵沙黃是時帝坐八綺忩擬歌風起雲飛揚寅陂行安成西有寅陂溉田萬二千畝歲既久官失其籍大姓専之陂旁之田歲比不登邑丞趙君搜訪耆老盡得古迹乃浚溪港起堤閼躬視阡陌灌注先後各有繩約俾不可亂是歲紹興十三年適大旱而寅陂溉萬二千畝苗獨不稿民賴其利咸頌歌之國家方下勸農之詔法有農田水利實丞職也然緣是而偽自增飾以蒙褒顯者世不為怪由是水利為虛名今寅陂功績崇崛丞不肯自言部使者終不及省察某出城别君東門外逄寅陂之民寒路涕泣言此為敘其事作寅陂行不復緣飾皆老農語也冀當世有採之者紹興癸亥十月望日書安成城頭烏夜宿啼烏未起雞登木傾村入城來送君馬首摩肩袂相屬但有龎眉不識名何物老翁出山谷老翁持酒前致詞家住西村大江曲大江兩岸皆腴田古有寅陂置官屬自從陂廢田亦荒官中無人開舊瀆公沿故道堰橫流陂傍粳稻年年熟今年雖旱翁不憂田頭已打新舂穀誰云此陂會當復老父曽聞兩黃鵠嗟哉如君不負丞躬行阡陌勸農耕監司項背只相望風謡滿路胡不聽胡不聽寅陂行為扣天閽呌一聲廬陵行并序廬陵别駕謝公前年初下車適蕭富二盜作亂州人震恐别駕提兵不閲月兩巨冦縛致麾下境內遂安今當還朝州人懷之盧溪王某為作廬陵行以慰其懷思之意録以為别廬陵地控虔與洪孤城斗絶吳楚東連年賊兵塞官路烽火照夜旌旗紅治中來時正逢此自請按行山谷中禾州吉水方震動縛取兩渠來釁鐘凶徒披靡拜麾下願持田器為良農凱歌歸陳破賊狀捷書飛入甘泉宫甘泉侍臣知姓氏天子往往聞其風謂當到闕問邊事邊上如今塵不起但把長箋造鳯棲莫説渡河挑馬捶此公淹久佐一州安用州民遮道留州中老人錯料事此公行立螭坳頭和程子山舍人贈高虞卿南宫四海英俊場閲人雖多無此郎御史傳呼主司出遙瞻紫案金爐香簾垂咫尺斷還送閉户設棘圍髙墻卷堆封彌充棟宇筆浸滄溟開混茫麟臺學士喜得子時子山為館閣如獲寶鼎聨芝房明日都城始傳榜聲名烜赫無三張平生知巳萬不一世有若人安可失方調鼎味薦鹽梅桃李何心並滿浪反佳實論經射䇿未足論挽取功名看他日同門笑語夜相過起看北斗插天河凌晨鳯閣拜座主門生來賀爭肩摩一時人物盡豪傑太平為寶非嘉禾題羅疇老家明妃辭漢圖李伯時作明妃豐容靚飾欲去不忍之狀明妃辭漢出宫門豐容靚飾朝至尊至尊左右皆動色明妃欲語咽復吞三千蛾睂塞天閽帝獨不識王昭君顧影徘徊復良久尚冀君王一回首當時自倚絶世姿不將賂結毛延夀可憐朱網畫香車却來逺嫁呼韓邪不如歸州舊村女三幅羅裙兩髻了陌上花開大隄暖細雨春風歸緩緩寧從禁籞落胡沙長路漫漫碧雲斷忽看漢月照氊裘淚濕彈絲錦臂韝龍眠會作無聲句寫得當時一段愁送向宣卿往衡山兼寄胡康侯侍講朱陵衡嶽仙人所居公是行緣胡文招隱公有雪寃録歷詆諸監司海內甲馬未盡休豪英為時當出謀天生竒才必有用何乃相率居岩幽胡公人品今第一汗漫久作朱陵遊朱陵窟宅倚蒼翠此公招隱安可留九廟今誰起頺壓四方正爾煩誅求我聞昔時元刺史舂陵地分天子憂少陵作詩頌其事至今人傳元道州公為道州績尤偉誰為再作舂陵謳孤城疲卒捍狂賊高論力詆庸兒羞安得如公數十輩參錯天下為邦侯京洛腥羶不難掃潢池冦孽不難收願公早請尚方劔先斬佞臣張禹頭贈齊軒仲素老并序齊軒仲素老自安成至京師遊螺川凡十餘年暇日偶過其居齊軒面東一山峰曰秀嶺煙雲草木翠色依然真逸老人戲作詩招之以代東山移文云秀嶺明東城飛翠橫空斷煙霞互滅沒爽氣浮清旦旁連仙人居樓殿出天半金龍蟠繡柱銀榜開琳館齊軒面青蔥下瞰緑篠岸我嘗醉其上謳吟雜悲歎一時賢士夫車馬共遊欵當年二學士落筆㵼銀漢曽賦齊軒詩字字星斗爛事逐雲雨空鬼録尚可按重來兵火餘觸目自悽惋唯有軒前山秀色還舊觀曉猿驚未已歸袂何必挽胡為走塵埃廢此竒一段山靈亦可畏移文定嘲玩二學士乃伍醇父劉偉明立名賦詩寄黃子龎兼簡鄒德裕天狼窺太虗戎馬斷行路一别常萬里寄書何由數識君英妙時亹亹見佳處當年松柏姿已有廟廊具比常覓新作險絶聞竒句探珠滄海底秀色不受汚筆端百斛鼎胸中九經庫高文動場屋仍傳渭上賦豈但凌三都自使強敵怖鄒郎挺忠烈英英起門户同逰氣槩中風雲生指顧獨念蓬室士無因陪杖屨相望隔章水欲往不敢渡拏舟㺯明月正恐蛟龍怒贈康元章并序西昌康元章自言頃從防禦使劉紹先軍屯廬陵日楊勍凶熖方熾間道走九江謁大丞相朱公陳誅討之計蓋勍本猾賊藏姦宿亂日欲奮獨憚紹先縮頸不敢搖賴丞相果發兵捕勍盡擒馘之未幾丞相與紹先皆罷去元章亦歸耕隴上今欲裹糧奔行在而有羇旅窮餓之厄為作詩以壯其氣亦庶幾故人有哀之者康郎讀書本勃窣羞作儒生酸到骨偶逢四海未解兵氣如秋鷹眼如鶻布衣杖䇿丞相前官軍盡掃長蛇窟燋頭爛額已論功况子當年陳調曲送葛德裕并引德裕沿檄之豫章兼聞當督戰船往池陽因書寄别捧檄困米鹽戴星入州府官卑強趨走出語不媚嫵坐此觸駭機三人忽成虎况聞郡公曹士論極患苦禍福在牙頰驕氣溢睂宇念君鸞鳯栖孰若黃鵠舉負材淹簿領擺脫即騫翥髙興動長川插旗催轉櫓帆經一柱觀清風九江渚蛟龍蹙橫波樓船照秋浦兹遊定有得因之壯心膂丞相新開藩門闌壓吳楚豪英氣槩中人物粲可數相逢一笑樂細與論今古若問山間人披蓑釣煙雨題秀光亭壁餞劉世臣劉仲美并序余遭小人之謗諸友嘗憤惋切齒欲起而攻之會劉世臣劉仲美當赴省試諸生設祖道于秀光亭酒既行忽報小人敗績於是滿坐歡呌獻酬紛錯終夕酣暢以為樂蓋小人既衰吾道必盛且以卜二君明春光大之兆歐陽巨明作序以紀餞筵之盛盧溪老人賦詩以贈行飛雨灑簷角車騎散巖隈臨池張翠幕衆賢會高臺坐中蟾宫客再占北斗魁北斗第一至第四為魁世臣前舉郡魁今第四名復有南巷阮謂仲美也少年負英才兩公俱博雅胸臆天所開明春試殿陛筆力翻風雷臚傳姓名出聲聞落九垓今宵且盡醉須覆掌中杯朝來得好語仍聞小人災請觀盧溪老談笑消姦回見敵未嘗却坐令敵傾摧庸兒不量力自倒非人推舉此卜二友否極終泰來送李亨仲赴荆南辟少年膽氣橫秋煙腰間櫑具森龍泉出門萬里探虎穴錦帶雕鞍明積雪洞庭木葉飛霜風將軍秉旄西擊戎旌旗戈甲照湖海欃槍欲滅胡天空須君磨盾作露布插羽來奏明光宫麗人行讀大業拾遺作桃葉山前宫漏遲宫人傍輦持花枝君王喜慿絳仙立殿腳爭畫雙長眉欲把琵琶彈出塞結綺臨春時事改井邊忽見張麗華忍聽後庭歌一再早行羣雞鼓翼天欲光井上梧桐生微涼殘星爛爛或出沒初日淡淡開青蒼楚妃臺邊曉雲碧伏波廟前秋草黃騷人辛苦拾何物沅有芷兮今已香盧溪文集卷二
