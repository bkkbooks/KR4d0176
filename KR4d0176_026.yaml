body:
  text: 盧溪文集巻二十六宋王庭珪撰書上皇帝書年月日臣某謹昩死再拜上書皇帝陛下臣愚無適時之才自少讀書好言治亂將以有為於世而官卑人㣲大吏惡其異已每摧辱之自宣和五年罷茶陵丞隱居江西盧溪之上窮苦困厄四十餘年未嘗一出仕今已老矣惟遇陛下龍飛以聖徳臨御天下屈體求士埀寛容之聽開忠直之路又詔舉山林遺逸令深者不隱逺者不塞臣於是獲登文石之陛對天顔吐胸臆竊伏自惟國家大事似非疎淺小臣所當言若泛論一二常事迂闊熟爛而不切以汙陛下之聦明則終無補於世臣是以敢不避斧鉞之誅冐進其愚忠竊以天下之事於今為最大而不可緩者惟邊鄙未寧境土未復而已此聖主焦心勞思坐不安席求所以經畫之術而左右大臣共以為憂者也臣愚以謂此未足為憂而臣之所憂者在陛下立志定謀何如耳臣嘗謂自古帝王肇造區夏興復大業者皆有聽言之明察力行之果斷雖量時審勢事有不同至其策畫之一定卓然有守而不變故能信用忠謀斥去異議卒收成功國家自遭夷狄之禍今四十年異時竭民膏血以充其賂遺割要害形勝之地以塞其姦貪葢出於事勢之不得已而非謂其可久用也陛下曩居潜藩負剛明之徳有奮發果毅之志海内實徧知之今者奉慈訓登至尊適當夷狄背叛之秋中外臣庻仰徳如天日畏威如雷霆莫不延首傾目願聽所為誠宜赫然奮厲威權震動天下委任賢相良將以掃除宿憤恢復中原此不可復緩之時也臣近奉詔命來趨闕庭聞諸道途採之縉紳咸謂國家長計今已紛紛漸無成説臣竊惑之請為陛下試陳其大略自靖康之初迄於今日敵人多以一和字誤中國何為循而用之猶未已也士大夫有執講和之議者非獨愚無識其處心積慮止欲固爵位保名寵茍安目前無事而已非有竒謀逺慮為宗廟社稷萬世計也且向來何嘗不與之和哉我之禮日加而彼之姦日肆我之金幣日遺而彼乃求索愈無窮一旦無隙而舉兵怙恃暴强摇蕩邊鄙以致天下騷動今若再與之盟彼將復背盟如反手何則金人之性本反覆無定非可以禮義馴服而我國家以天子之尊謹守信誓不敢先動坐受其弊而已如近嵗遣使嫚言驁侮朝廷太上皇帝薄其禮而遣歸中外莫不忻悦使其勢果能羊驅豕突可以奮然而深入則長驅而來亦已久矣故臣嘗謂夷狄不足深憂葢其貪殘暴虐骨肉相賊逆天違人必不能久㨿中原滅亡可待也第恐河洛韓魏之郊習見金人屢叛盟約本朝惟守和議無復境土之意猝然有一夫奮起殄滅彼國僣據中原則其患愈大其敵愈堅未易測矣今之言和議者止於茍安往往不加慮於此臣願陛下以此深思之與其輕信詭謀移於偏聽寧博採羣議登能庸賢以張吾已振之威與其幸嵗月之安憚勞費罷防秋寧謹修邊備練兵選將以俟其可乗之隙和議斷不可用也近聞官軍既下宿州而將吏復失律此亦兵家常勢竊慮偷惰寡謀異慮之人幸其失而喜攻之以取效於平日而不為國家長慮後顧之計此又為危疑之機以陛下之勇智當可以有為之勢於此亦或蹉跌則他時變故日深一日嵗復一嵗終無如之何也况今敵勢已斃其國未必帖定特籍其餘虐行其詭計大則恐吾乗其勢之未固以申其掃滅之威次則恐吾削絶其重幣以潜圖其後此正陛下經營恢復之時而非遲疑寛緩之日伏惟聖策先定於中益務收選人材講求碩畫力圖而謹守之然後振舉大義以掃滅冦讐仰慰祖宗在天之靈天下之大事無過此也臣愚不識忌諱願陛下恕其狂愚而鑒其惓惓之忠實天下幸甚臣誠惶誠恐昩死再拜上李丞相書年月日具位姓某謹齋沐裁書獻於某官閣下某聞天下大亂必有英偉豪傑之士出於其時以任一世大事當危疑顛覆之變衆人倉猝惶急鮮有不失其守而獨能顧視若閒暇舉萬物無足以動其心者此人不特有超世之才而其氣有以勝天下故能整齊乾坤洗光日月成就大事無一蹉跌者皆其氣有餘於中而規畫處置不摇於外也古之建大勲者未有不先定其謀而措之於事伊尹相湯使君為堯舜之君使民為堯舜之民其説已兆於畎畆之中管仲相齊欲合諸侯攘夷狄雖霸者之業亦決於初見齊侯之日漢髙祖兵衂於楚下馬踞鞍而問張子房謂英布黥布姓英氏彭越兩人可急使而韓信可屬大事當一面卒破楚興漢用此三人之力諸葛孔明髙卧隆中一見先主與之論曹操孫權人物先取劉璋資巴蜀之饒以爭天下終其身無一言不驗厯觀前世君子遭風雲之變支傾危整奔潰氣為主而謀輔之是以臨大事而不亂否則遇事倉惶鮮不至於敗者國家曩時承平久武備㣲朝廷狃於宴安宣和之末變生倉猝敵騎臨東都城門公卿大臣搏手無他策進不能戰退不能守其計止於求和惟相公力陳攻戰之策出身為社稷犯不測之險幾成大功是時京師甲馬勁卒尚可以戰若席巻以出可一鼓而俘也至今忠臣義士憤惋嘆息以謂當時若用相公之謀豈復有後來之禍其事昭若日星今皆可覆不惟當時可用而至今猶可用也豈非氣有以葢天下之人而謀慮有以審天下之勢耶自憸人柄朝十年之間宰相更用事率不過一二嵗罷黜大抵規摹一律皆出於卑陋淺近不足以興起天下之大事由此宗廟社稷之靈啟寤聖主赫然排羣議起相公於寂寞之濵方淮甸用師控扼上流豈特當一面而已實安危之機也然相公之志氣已見於靖康之初其闗天下所以治亂存亡者固非一介愚儒所能窺測今尚有可言者皆相公之細事而猶未獲見也豈經營軍旅之急而未暇耶葢天下之事有若甚㣲而其勢甚大治亂之萌莫不有勢言治者必審其勢於未形之中無使至於亂若坐觀其變而安於所忽則恐至於不可救且今日大勢所可憂者人心最為可畏而夷狄不與焉人心或摇何事不生其禍有甚於夷狄人心寧而天意得則叛臣逆賊可搴旗而下夫與强敵對壘而我之國與民不可使先困若一戰而得京師再戰而下河北此亦用兵必然之勢也然以先困之力供此必然之勢而欲措其國於久安有道於此惟使吾不先困而已今諸軍大將氣色精明張五石之弩彎二石之弓者數十萬所嚮無前可以大舉然兵久則變生事苦則慮易大舉之後其勢不一用事者固嘗歴算周思審其勢而逆為之計矣不然恐事至而惑忽有蜂蠆起懷之變度其力不能任則辭而去之使他人任其責於斯時也相公其當之乎葢慮不先定不可以應猝惟沈識逺慮髙視世表者能經畫大勢於無形之中天其意者亦俾相公究知天下疾苦稔熟具瞻然後當國葢此亦大事存亡之所從出決非近日數君子之所能辦何哉其規模狹陋不知變更所以治具卒不張闡相公即日任其責其監數子之失亦思有以易其轍乎昔裴度之討淮西切於餽餉皇甫鏄以聚歛勾剥為宰相而度極論鎛姦邪苛刻天下怨之將食其肉且言天下安否繫朝廷朝廷輕重在輔相時帝方倚度破賊而度之言如此卒成伐蔡之功近世有王朴者為周世宗獻平邊之策鑑唐晉之失其説曰觀所以失之之由知所以平之之術彼民與此民之心同是與天意同與天意同則無不成之功朴當五代衰亂之時而知出此使遭明主其所就當如何暨我藝祖平定四方攻取之略皆如朴言然則自古賢人君子之舉事雖行師調度之急未有不以人心為本也不然徳宗之討李希烈宰相非其人而陳京趙賛請稅屋架貸賈緡内怨外忿卒至於亂其效亦可見矣今國家軍旅方興供億無涯而某乃於此時區區言人心可畏葢畏人心則暴歛豪奪之法不得施於今日然而兵食不足豈無説乎嘗試以江西考之財用自有本源未嘗竭也毎有軍需轉運司飛符急於星火止曰於諸司封樁内要若干而已至於本末盈虚之數封樁之所從出轉運司葢懵然不知也州縣乘其急縁之為姦無所不至不獨於此時獲免貪惏之罪而轉運司復稱揚其才以為能辦事此風一煽人争為之委官剗刷絡繹在道惟取空文視厯尾見在憑供帳狀而已至於盗隱乾沒則納賂胥吏而不究剗刷之官雖欲加意而本無才術漫而不能省也如此則雖山海之物椎肌斵髓以供終莫能贍葢財用之失其源非特諸路也上自朝廷主計之臣一切出於無術唯聞賣官爵降度牒甚者至於歛僧道賣户帖此雖不得已而行官司如能盡收其錢以濟軍興猶有所補今則徒知賣且歛而不復檢校其虧盈則所失亦多矣厥今天下所以大弊皆原於小人先壊其法制然後得肆其姦由是廉恥道喪守宰狼藉獄以賄成民氣寃塞枉不獲伸則掲梃報讐白晝殺人因以亡命遂成兇盗且天子以生人付守宰治之使其不能自辯於刺史縣令之庭而白刅相讐於閭里之中官司坐視而不能討天下之亂有大於此者乎今江西盗賊所以未盪平者其釁皆如此夫非官吏刻剥驅迫以成則不平而報讐以起也近有官司尚不究其源常抑壓被害之家使不得訴而反為好語以自媚於賊以此為消盜賊之術無乃闊疎而不當於人心恐銜寃之民不逞亦操戈而起則寃愈煩而盜賊不勝其多矣去年相公初來鎮南諸州盜賊震恐縮頸不敢摇厥後聞有小人妄言利害獻招安之策於是羣兇復跳聚山林而隂結州縣以求招安大抵近時盜賊剽掠金帛皆以㗖州縣之吏及士大夫之不亷而能遊者遇官兵捕迹急則議請招安以緩誅討且今日所謂盜賊者非有姦雄才智之人徒操鉏耰棘矜依險阻刼財幣耳所至聚落復有豪民為之囊槖其根株窟穴姓名皆可識也官司若先究治州縣之吏而責囊槖之家則一保伍之力可按圖而縛也此小盜而官不能治恐養成異日背脇疽根忽然潰裂四出而不可救則豈止數倍今日之力哉伏願相公視今日之弊須痛掃除葢因循苟簡之習慮不及逺自以禍災可以無及其身考之於古曠日持久未有能免於禍災者也雖然賢人君子尚有可以有為之時莫急於今日過今日則恐災稔禍變而悔之無及相公即日入覲天子秉鈞軸議論大事自有素定之謀其計秘世莫得聞也某江西書生天禀介拙宣和初得官湖南見上下怠玩無益於時歸卧山間十五年矣未嘗識中朝士大夫唯是仰服相公之勲徳赫然驚人平昔無因進望履舄今兹伏遇相公開藩作鎮一方招納天下之士不問疎賤則採取風俗利病閭閻所患苦者數事别為劄目隨書以獻直率愚𠂻惟相公察之不宣某再拜盧溪文集巻二十六
