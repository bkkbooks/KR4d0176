body:
  text: 盧溪文集卷三十九宋王庭圭撰啓賀劉舍人啓才邵伏審榮膺鳯檢進立螭坳竦觀左右之班喜用文章之士縉紳共慶黨友增華恭惟某官連中異科早升華館石渠蘭省遍更唐清要之官玉輅鸞旗新造漢官儀之盛由是擢登近職得親日月之光益簡上心即正絲綸之命珥筆赤墀之下授詞清禁之中豈惟論思注記以盡其忠要令潤色詔誥以觀其效故得奉孔甲盤盂之學紬太史金匱之書用記中興焜耀升平之典協成大議潛資翰墨之功竚陟台衡副瞻朝野某臥疾江海阻慶門牆闕回周舍人啓必大伏念政和造士同上丹梯者七百人璧水狀元並試赤墀已五十載仰先賢之盛德又再世而登科望高門如崛起於層霄故尺牘無階逹於記室以茅簷甕牖之士希金馬玉堂之英宜其仰慕之勤常恨趍承之晚敢圖高義先損誨函曲加奬引之詞俾獲攀附之托追講昔年之好獨高前輩之風恭惟某官連中異科亟升華館聲彩動傾於四海詞章突過於三都丹青一代之言鼓吹六經之㫖暫丐閒於琳館恐追急於鋒車久慕高風便欲曵裾於門廡縱聞急詔猶當傾蓋於路傍竦企之誠敷陳莫既賀向提刑啓伏審光奉宸恩肅將使指升麟閣藏書之府耀繡衣持斧之權公道遂行貴名愈白某官堂堂漢相之後挺挺祖風之英秉直節而不回銜久寃之莫訴羣犬吠月方虞口吻之譁多士呌閽忽動冕旒之聽朝綱復振輿論亦伸一方斗絶之荆蠻纍歲蟠拏之冦盜人猶愁瘁獄有寃聲宜得恢博之才領此澄清之任羌夷雜處常憂役死於兵戈老稚相攜復見太平之官府想聞謄報已聳歡聲某臥病江干心搖雲表莫陪賀列徒切欣悰回路知縣啓植伏審光膺綸命出宰花封境內衣冠企聽風聲之美山中父老喜聞車馬之音某官國器宏深德名高遠門地東京之望族風流南土之翹材尚虧九仞之山聊試一雷之士漢庭下詔先崇師帥之官言偃操刀必扳弦歌之譽某養疴林野占籍侯邦老景侵尋餘生濩落竊有隂雲之幸宜深賀厦之誠賴高賢之可依略病夫之苛禮飛藤緘而先及落蓬甕以增輝感悚之誠敷陳莫罄賀趙參政啓伏審初被鋒車之召即日戒嚴入參鈞席之榮羣情久協華夷聳聽廟社增歡竊以自國步艱難以來居朝廷輔弼之任欲恢復者屢矣而罷去者紛然要必有非常之人乃能任中興之事恭惟某力扶宗祐忠結主知常係天下之安危蚤冠樞庭之宥密上前議論人驚臺諫之風霜閫外藩宣威振江南之草木遂躋柄近必致時康望南山之維石巖巖允符輿頌瞻北斗之台星兩兩焜耀階符定支大厦於將傾要觀王室之再造永懷盛事敻異常情代上万俟參政啓仰高千仞敢陳湖海之私承乏一涯彌闊門闌之望人在風塵之表位如霄壤之殊既闕掃相君之門豈敢問記書之室伏念某智不周物才無過人𨽻於仕版者幾二十年書於課最者亦六七考徒知小謹畏縣官之簡書豈有長才動衆人之耳目向者飄蓬湘漢祗役荆蠻嘗從事於車塵馬足之間復摩肩於故吏門生之後豈徒應奉記半面於開扇之時尚有孝基識此郎為昻霄之士吹律或加於寒谷逢春决望於噓枯某官柱石擎天忠精貫曰交歡鄰國措天下於泰山之安委質本朝任王室如九鼎之重遽抗章而解政實辭寵以便安人望還朝泥方在冶孤根荏苒尚資披拂之榮鎩翮摧殘更動翻飛之念方炎暉之在候仰福履之攸寧願觀晉馬之來庭重整乾綱而作輔四方所屬萬口同音賀廣東向經略啓伏審光被恩綸還升祕職番禺聨帥蓋自古之雄藩旄節宣風實當今之重寄除目一下公道始行恭惟某器博而用無不周名髙而實亦自稱非獨能紹相門之大業常自任以天下之奇材稽之羣言久當大用屬以癡兒秉政哥奴弄權五百載遇時之休明小人何其未靖二十年置公於閒散君子為之不平忽起江湖驟持斧鉞南商北宦㑹五嶺之舟車大纛髙牙控百蠻之襟帶宜須傑士殿此大邦儻非聖主之搜才豈復賢臣之得路聊偃息於藩翰行入侍於巖廊力蘇疲療之民協贊升平之治某恨登龍之路遠顧賀燕之誠深其為欣愈未易敷罄與陳朝散啓連甍萬室悉瞻刺史之天積粟千箱實富揚州之地當交廣椎埋之出入係舳艫轉漕之盈虛故兹巨人展此劇郡恭惟某斗間異氣天下奇材忠孝萃一門之弟兄議論作諸儒之口舌宏文大䇿聳臺閣以風生姦夫盜兒聞姓名而膽落今者盤錯已割匕箸自驚吏跡不到於閭閻貪夫自投其印綬里無喧雀耳絶鳴枹喜聞桑梓之邦覩此神明之政蓋何武之為二千石好奬稱進士之賢而李白不用萬戶侯但願識荆州之面官針有守牆仞益髙拜伏末由企瞻徒切回陳主簿啓謨伏審榮登桂籍暫佐花封上馬綴行方看英雄之入彀跨驢入境聊為鸞鳯之卑棲遙聞風聲即瞻履幕某官書讀萬卷筆掃千軍早得雋於詞場久欽名於江表茍非有馳騁詞章之氣當萬人之勍敵則何以飛騰霄漢之上取一枝于桂林跂仰聲猷未遑緘問敢期謙德先損華箋重以好詞飾其朽質光生蓬蓽兼收照乘之珠氣射斗牛復識豐城之劒敢不因而下拜又當藏以為榮雖銜存記之誠實重疏頑之過寧無愧惕尚賴庥光回孫縣尉啓楙生同翼軫之野久服高名夜見斗牛之光知為異氣未遂參承之願闕馳欵啓之音某官學探本源聲高藝苑鵬飛萬里初乘南海之風筆掃千軍早折東堂之桂暫迂黃綬來靖緑林寧懷小祿之私更試大儒之效精通博雅每窺錦繡之文深切著明願見經綸之業某侵尋暮景濩落餘生徒懷共月之明尚阻披雲之覩奉誨函之先辱覺蓬室之增輝感竦交懷頌言莫究回劉主簿謝及第啓伏審造廷待問發䇿决科豈惟黨友之華蓋亦鄉閭之盛某官久籍時譽得雋詞場不有孤峯絶岸之文豈預千佛名經之選鴻都造榜收一時羇旅之遺材萬乘臨軒喜天下英雄之入彀竚觀賢業以濟中興敢辱華箋尚及衰朽回劉解元啓亮采伏承寵訪兼惠長箋竊審校藝棘圍爭鋒筆陳破石取玉難逢至妙之工披沙揀金果見非常之寶里閭共慶黨友增華某人先輩秀出儒林聲騰學海會四方英豪而角試當一路賢能之選鋒士皆焚硯以驚降俗亦望風而竦聽豈但讀五千卷而入此室固嘗歎二百年之無此詩覽黃絹幼婦之好詞真干將鏌鎁之利器非精深律切何以至此亦氣質渾厚乃能為之蓋緣設聲律詞賦之科于以取卓犖魁梧之士公等自奮吾儕預榮幸無凡鳥以題門仍獲靈蛇之在握正乏雙金之報徒為什襲之藏尚喜占星久識衝天之意粗能别寶請無按劒之虞敢不共推月旦之評以慶得人之盛回李祖文謝解啓竊伏一鄉之評久淹賢業始預廣場之選列貢天朝恭惟某人才過千人辨雕萬物學有師法識造淵源吮嗽百氏之精華言論六經之鼓吹孰不驚降而焚硯士皆竦企以瞻風筆掃千軍復見少陵之詠壁立萬仞可畏嘉謨之文是宜梯身拔腳於雲霄指日揮毫於殿陛豈期陋巷過辱高軒粲然贈我以金刀何以報君之玉案箋縢厚禮蓬甕生輝感愧良多敷陳罔既回蕭解元啓竊鄰里閈每欽聞譽之髙坐隔溪山阻奉笑談之樂偶以臨流送客假道仙鄉逆旅披風髙情傾蓋繼辱緘縢之墜獲披錦繡之文仰厚德以增慚出奇書而命跋顧無雄筆敢忘雌黃某人夙藴英才晚成大器久著士林之望屢隨鄉老之書指取巍科行觀射䇿即日炎薰在候德履彌新頔子定婚啓名髙異姓初非秦晉之侔再世為姻實並王劉之系事當修好禮屬問名伏承某人小娘子淑德幼成令儀秀出某男某教雖以義人未之奇謂王郎子生天壤之中才容莫稱而王夫人有林下之氣風韻素髙宜從坦腹之言豈假駐車而語不忘雅契觖靡異詞詹孫定婚啓不揆寒微之族素欽髙大之門宿有契緣敢求婚對某長孫某學初聞禮志欲昻霄伏承某人小娘子幼有令儀早勤保訓願締絲蘿之契宜埀金玉之音察其坦腹之在牀許以齊眉而舉案勿謂非吾偶也輒渝秦晉之新盟毋煩更物色之自是潘楊之舊好期於德請靡有不從淡孫定婚啓聞公選壻謂東牀有坦腹之兒屬我問名得青桂近嫦娥之女不揆蓬蒿之室素欽忠義之門久接英遊敢求婚對伏承某人小娘子早從姆傅秀出閨門而某孫某學始趍庭室無舉案方卜蘋蘩之助用為禰祀之光默符設席之求不待駐車而語謹因媒氏恭聽佳音盧溪文集卷三十九
