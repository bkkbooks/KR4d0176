body:
  text: 盧溪文集卷四十七宋王庭圭撰行狀故校書郎曹公行狀君諱崇之字唐老姓曹氏曹本出於黃帝之苗裔其後封於曹又封於邾皆以曹為姓君之高祖諱霸隆以勇略從太宗平河東有功官至瀛州團練使因家于東京至君之考司勳始遷于鄭今為鄭州管城縣人纍世皆右職而仕不大顯司勳諱輔字子方幼警悟歎先世嘗有功於用武之時雖祿世於家仕於朝者不絶而天下承平久謀臣猛將無所用其武獨感激讀書欲以文儒起身既登進士第復以文章名譽顯于一時唐老在髫齔時見其父以文章從東坡山谷遊名聲籍甚亦感悟讀書不數年學問益進余崇寧初以里選貢于辟雍補上舍升入太學遇唐老太學舊人共窗席為筆硯之友二年時三舍法初行宰相欲變文章禁錮元祐之學專用莊老字說談性命說虛無習為骫骳之文而唐老缺放不鏤目雕無所顧忌其淵源家學不缺氣骨以故試輒不偶諸公博士見而惜之呼而語之曰子之文博辨雄偉非不美也奈不合今之法度今之程文出入諸史或誤用東坡公一句即謂之不純正有司雖愛其文而棄不敢取子急於奉親宜少變其體以就今之繩尺則有司何敢棄也唐老曰此文不難作也因勉為之果頻中優等大觀三年遂登進士第調延安府司理參軍循從事郎秦州司工曹事改差寧州司工曹事又改環慶路安撫使司管幹公事為耀州美原縣令用舉主改宣教郎知耀州白水縣轉奉議郎知真定府元氏縣宣和三年知西京永安軍使轉承議郎通判湖州改差之火山軍又除校書郎宣和七年七月十九日感疾而終享年四十有四是歲敵犯京洛􅓖其柩於鄭州開元寺泗州院君娶李氏封孺人男四人長曰承祖武功郎曰光祖保義郎曰德祖義祖未仕女二人長適進士魏仕宗次在室孫男七人君平生喜為歌詩清詞秀句類其父方除館職駸駸將履亨途不幸壽止於此不獲顯用於時在延安時兼管防城修戰具知美原自進築鎮安城等朝廷嘉之已議推賞適兵戈猝起其子光祖等皆奔竄不能叙理其平生所為文亦多散失惟東西晉䝉求宣和間嘗刋行於世某與君有同舍之舊而契相好略知其大槩偶遇光祖於江西能言其家世及歷官始末慮愈久而遂失其傳請余狀其事故略叙其所知者如此故左奉直大夫直祕閣向公行狀公諱子㦛字宣卿世為開封人自四世祖文簡公相章聖皇帝其後蕃衍浸以盛大世有聞人曾祖傳正故任國子博士贈開封府儀同三司太尉祖綬故任西京左藏庫副使父宗琦故任大中大夫致仕贈少師妣夏侯氏贈魏國夫人所生母王氏贈恭人公自幼慷慨有大志見諸老先生輒抵掌論世事劇談雄辨常欲折其坐人而諸老先生亦莫能與之爭也蓋其剛毅之氣出於天性以故與世多不諧雖屢抑退而終不自悔也初入國子學遇三舍法興纍試入等已校定當升補政和六年再從伯永嘉郡王宗良遇郊祀恩任公為登仕郎七年為華州司兵曹事宣和初朝廷新復幽燕其地經契丹之亂饋餉不繼自涿至雄霸以縣令丞部農夫挽中州之粟實不毛之地挽不如期者以誤軍期論先是涿縣纍政以運夫亡逸失期委印紱而去時大漕陳公亨伯吕公頥浩皆知公之材以為涿縣丞既至究知前弊調役不均乃以戶口高下均定所役之數衆服其平允使部伍相為保無一人逸者以餽運不乏循從事郎又以新遷到任循儒林郎少師以公在極邊為憂令丐罷涿以武臣為州類出童貫門恃勢不法公每以職事靣爭不少屈頗恚恨逮公解去沮格邊賞不為批書公委之而去㑹部使者適至函令書印馳介送公宣和六年轉宣教郎為中山司録事七年冬金人犯東京朝廷以种師道宣撫京畿河北河束路辟公為幹辦靖康元年淵聖皇帝覃恩轉通直郎六月丁少師憂少師晚年不樂處京師市第于宛邱未及徙居而少師捐館是歲金再犯京師明年大亂公乃歸陳建炎二年敵侵陳蔡公之兄忠毅公先有德於蔡蔡人借留于朝而朝廷已别除人就起復知陳州至是金人圍陳忠毅公誓以死守先遣公走京師求援于留守宗澤公見澤無出師意急歸而城已破忠毅公罵賊不屈與諸弟三人皆死之公亦喪其外姑與一男一女乃徒步間關收斂兄弟遺骸而葬之訪尋骨肉之存者攜挾南渡流寓江淮間大帥復除通判均州道梗不能赴建炎三年江淮兩浙制置使吕公素知其材適真州經殘破官吏皆逃亡召公語之曰此州非公莫能辦即以便宜委公攝真州事有范瓊潰將郭吉屯駐為姦利屢欲叛去公方之任艤舟城下人無知者公遣人呼皂吏問州治所吏對以吉暴橫必為亂乞且寄治舟中為緩急計公叱之馳馬徑造州宅官吏稍集然百事廢弛財用乏絶卒伍縱逸不復歸營公揭榜招之得數百輩有司以無供給為憂公謂真州平時富商大賈所聚酒貨最為繁夥意務場瓦礫之下必有宿藏令人斸之人或竊笑果得酒百餘斛一郡以為神公乃張席為屋高其直以沽郡人纍月不知酒味來飲者如市路傍始有醉人公又遣吏市麴米於他郡益醞釀課利益爭羡而發運轉運猶謂公弗戢私醞公乃先治㳂江二漕兵梢列肆私沽者二漕雖愧恨而不敢復言公所至多忤監司者皆此類也視事才幾月而財用沛然收貯官錢以千計至七十萬不以一毫取於民諸邑向之郭吉者初畏公威而不敢逞至是見府藏充盈輒萌異意郡人咸知之竄入他邑忽一日吉與其二屬擐甲胄張弓露刃直趨庭公危坐㕔事敕候兵持劒立屏後戒之曰聞呼即出吉既至公厲聲逆謂之曰爾欲殺我匹夫力耳何用衆為此頸吾自斷之呼候兵出授劒吉氣沮錯愕急抱持劒者曰初無是心特耀兵以娛公耳公曰一州人皆知爾欲殺太守今獨有持吾檄以耀兵為解招回散亡百姓不然恐爾頭顱亦不能保矣吉遜謝即用公言乞檄以去事定朝論偉之㑹駕幸鎮江公以鄰郡守臣當赴在所奏事吕公因薦公賜對勞問甚久將欲大用未果寵以直祕閣還郡且令郭吉𨽻杜充命公帶淮南東路兵馬都監管內安撫冬十一月金復南侵建康失守公退保沙南以僞檄繳奏召令赴在所奏事未到有㫖謂公與其餘守臣棄城事體不同降一官與知州軍差遣建炎四年三月也即以公知江隂軍專一主管水軍防託事公從駕還過明州金人初退郡方闕守即改知州明年兼管內安撫使公自遭宛邱家禍忠毅公有子沈為給事胡公安國壻從寓湖南不知存亡丐守道州從之兼湖東兵馬都監節制管內軍馬公從兄子諲方帥潭待次間欲往依焉聞曹友孔彥周相繼以長沙叛李成羣盜跨江西數郡為亂紹興元年春丞相朱公以都督恭行天討檄公權督府參議官時洪久闕帥丞相以公兼攝之張俊以招討使聽吕丞相節制戍鄱陽至是輒擅徙豫章豫章新遭金人蹂踐倉庾府庫一空而俊軍號數十萬支用不資漕司皆被事委去悉以屬公公㑹僚屬議所以應辦皆欲下諸邑科斂於民公曰大軍壓境張喙待食諸邑能指期集耶因訪得負郭大姓平時兼並積而不散者呼而諭之曰汝家所蓄賊至能保乎今官軍至賊不能犯公私皆賴焉汝能輟不可守之財以貸于官期兩月執劵取償一毫不汝欺也大姓欣然從之又有巨商為金人所害其妻失所昔時駔儈受其貨者咸諱匿之公究得其實悉以歸媼媼拜謝願分助縣官旬日間不擾其民而軍須頓足俊既至公告之曰吾州井邑邱墟戍兵朝入則居民夕避無市肆則卒伍亦無聊城東有浮屠屋數處兼廢屋數百區可以駐師公能戢士伍我當招集市區與相交易軍民兩便俊大怒剡牘于朝以公沮軍不能入城亦不用公言而徑自入城矣朝廷察知俊之言不然而公敢抗之兩置勿問未幾軍士所處不便卒如公言徙于城東丞相奏公即真適朝廷已除授不報以賞轉奉議郎冬十月公之道州湖東自經李成孔彥周焚劫獨道界於二廣偶得免一時號為全盛兩轉運刑獄鹽香使皆聚此州道實小州不能堪公始革去倉廪受納積弊罷麴引醋息牛稅等錢以寬民力盡收禁軍之遣令在諸司當直者提刑周隨亨占江華縣治别募兵四百所支給一取足於江華公以狀乞移按他郡罷募兵撥還侵用諸司鏹榖提刑頗怨憾提鹽薛公度先欲於本州置司公力陳其不便爭止之公罷博易場監官以冗費擾民而公度堅俾復之不從故部使者皆切齒惡其與己敵既而成兵至安仁劫帥入其營縱兵四掠勢逼道州衆咸欲遠避公曰守臣出境則境內先自亂不如申朝廷宣撫司移治錦田寨百姓從之皆獲免成兵至卒無所得賊雖以偏裨之禮奉帥于道州而實不遜也㑹朝廷有㫖令成赴行在所久之乃解去帥亦得自便提刑提舉挾前憾共劾公逼逐監司又誣奏公激李成軍變降一官落職放罷是時胡公安國自湖東赴西掖講筵之召目覩其事以書抵時宰訟公之寃反覆甚明終不能用公知道之不可行也胡公亦自瑣闈出乃相從隱居衡嶽山中讀書授左氏春秋學貧甚始丐奉祠主管台州崇道觀四年叙轉右承議郎五年以祀明堂恩復直祕閣右相張公浚以都督平湖冦薦公守衡州是歲大旱米斛萬五千錢公分遣使臣齎金糴於鄰州之豐稔者計本直與道路之費量其價列糶于通衢每升為錢二十饑民驟得賤米所活不可勝計提刑司姦吏董璋湖南大蠧人莫能訐公捕鞫得其贓流之嶺南湘人欣快以故諸司皆不悅謀欲去之公亦自知不得行其志丐罷而報未下諸司與帥臣共劾公數事皆出于誣也六年正月復拜宫祠士民相與羣聚擊鼓于提刑司願舉留鼓為之裂提刑惶懼夜半登舟出巡以避之逮公戒塗日闔城遮擁哭泣聲聞數里非若近世風俗為文具備禮而已始知古之良吏所謂攀轅臥轍者不然亦近世所未有也公既行得報落職罷宫觀用諸司誣奏也是年轉右朝奉郎八年轉右朝散郎公銜寃自訟久不獲伸至於始被㫖差官體究元按發五事並無一實御史亦上章極論公剛直明敏不畏强禦奉法守正不容於監司內外朋比而攻之奉聖㫖與改正尋復直祕閣提㸃荆湖北路刑獄衡人思之繪公像建祠于東城青草寺侍郎胡公寅為記鐫石于傍并刻御史章於碑隂至今存焉皆公出後所立非有使之者十年春赴湖北先聲入境時姦吏望風解印綬者數十人湖北營田舊以抑配百姓人不聊生有破産不能償者日號訴于馬前公為詢究其便利可行者使遵守之罷一切抑配者遠近鼓舞時嶽飛以兩鎮節度使兼營田大使無敢忤其意者至是飛亦喜以為當然公按部所至立大榜於前云久負抑屈州縣不理者立其下於是積年無告之寃咸得伸雪㑹總領曾慥與薛弼素不悅於公慥以職事誣奏而弼方為左司表裏附會公遂放罷乃具奏陳而都司再行批擬又特落職復歸衡嶽之下與侍郎胡公寅諫院韓公璜為方外之遊不復有仕進意十一年以貧甚請祠祿自是十九年間四領宫祠十二年轉右奉朝大夫十四年劉昉帥潭秦檜方用事昉欲羅織士夫之之不附檜者以進身偶富人訴公弟子率由事昉遂曲致其詞并及於公坐此貶三官遷居衡陽之伊山乃晉桓伊書堂故基結茅以處手抄諸書尤喜觀魯論取諸家之善為集義以己見繫于後今行于世胡公明仲嘗過伊山名其所居曰有裕堂仍為之記十七年叙復右朝奉大夫十九年轉右朝散大夫二十三年轉右朝請大夫秦氏久專國柄放逐善類無復還期暨檜死公方辨湖北之罷潭州之劾久抑不伸朝廷知其寃悉從改正二十八年冬復起知道州父老兒童走迎境上咸喜曰我舊使君也到任半年復舊職改知廣州兼主管廣南東路經略安撫司公事馬步軍都總管未抵治所而御史復彈公乞落所復職罷免公歸舊隱始築第于衡陽之湖東三十里徙居焉三十一年再請祠三十二年轉右奉直大夫除江南東路轉運副使時淮上方用兵隆興元年以饋餉功復職名繼兼江淮都督府隨軍轉運副使夏四月都督張魏公出師破靈璧虹縣下符離勢如破竹㑹大將失律不能深入魏公駐維揚公乞還司因得病丐解職言者以為避事二年春復奉祠病再作戒子姪函上納祿之請無與小人藉口乾道元年守本官致仕八月朔丁丑命道士建醮公精爽不亂醮罷熟寐如平常旦遂不起實初二日也享年六十有九公娶畢氏儒林郎瑗之女先公三十五年卒纍贈恭人男二人浣見任右奉議郎前知潭州安化縣以公病乞侍養㶅方五歲女三人長適右奉議郎新廣南西路轉運司主管文字范揆辰次適右奉議郎荆湖南路安撫司主管機宜文字黃談幼適將仕郎新定擬柳州司理參軍侯宦孫男五人士克士允士充士光士元皆未仕孫女四人長適左迪功郎新臨江軍司戶參軍宋剛仲餘尚幼自宛邱之禍宗緒飄零公招集兄弟之子與同席飲食教撫如己出而無擇焉公買田業分給之推其子已授官與其猶子澐請於朝特㫖從之立其兄儒林公之後而官其子濯忠毅洎武功有子曰法曰沈皆不樂從宦乃各官其一孫曰士永士行其篤於宗族出於誠心世所稀有也捐館之日一子五孫皆白丁人謂公其必有大於後乎平生好論人物無所忌諱聞者頗駭而後卒如其言嘗與胡文定公談當世士文定頗稱秦檜靖康時事公曰與檜同時被執軍前鮮有生也獨檜數年之後盡室航海以歸非大姦能若是乎文定既殁檜姦邪日著文定之子明仲與公追復前說曰昔侍先君子能預察姦邪如公言者才一二人耳深服公逺識公初以直道不容於是晚年公議方出聖恩盡與改正將漕江右從張魏公轉餉北征幾時趨功名之㑹不幸魏公遭讒而公亦以病去豈非命歟其孤以乾道元年十月甲寅葬公於衡陽縣政義鄉高塘之原自洪州西山遷恭人畢氏之柩而合葬焉某從公遊僅四十年所得皆事實故録以為行狀以候世之君子鴻文大筆叙而銘之盧溪文集卷四十七
