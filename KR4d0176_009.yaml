body:
  text: 盧溪文集卷九宋王庭珪撰律詩五言秋郊曉興玉露三秋夜銀河八月凉山虛響相荅江靜練浮光雨足園蔬茂年豐稻穟長不憂羣雀噪鳴鳳在朝陽送謝夢叟昆仲之湘江蠟屐訪窮巷脂車戴曉星哦詩添些語望岳挿清冥烽火連蠻徼樓船壯洞庭瀟湘多夜雨羡爾對牀聴秋夜周子康登辰州城樓殘夜不能寐起登城上樓山銜半江月風撼九天秋鵲已棲高栁人猶棹小舟誰云羣動息漁子正埀鈎清江留别任子嚴正月過此甚遽不果尋訪及歸又以鄉人相迓者衆不肯泊舟輙留數字寄别庶子嚴知我過此耳正月下南昌扁舟過玉梁逢人問任子迷路失仙鄉吾道今如此斯文恐未亡烏臺千載話他日自輝光送客東門楊栁陌車騎散林坰草綠古今道馬嘶長短亭人歸天北闕光動斗南星送客何年了春蘋又滿汀次韻方性夫同年見寄缺先朝始賜官同登進士第半著缺倦飛鳥詞源倒急灘平生事何限話著齒牙寒用朱希真韻寄葛主簿時權永新縣丞聞道石壕吏今猶夜捉人徒煩移簿領何計靜烟塵痛哭聲連野椎敲瘡滿身催科君正拙寧不動悲辛再和一篇兼寄朱希真主簿四海士先生千載人羈遊厭旗鼓談笑出風塵高卧屢違㫖希真累徵不赴榮名忽中身清詩何絶妙韲臼識餘辛溪上春日遲日千花艷開簾雙燕飛好山晴缺逺水靜含暉細草爭青出佳人薄暮歸此時春思亂未覺向來非送樂秀才歸新淦夜雨漲新碧曉舟揺古堤㠶從金水落家在日梁西萬竹遶茅屋千峯隔釣谿探囊能起死門外想成蹊樂善醫春日遊鴿湖山風起羣木末花開兩壁香山溪雲影變人靜鳥聲長紺殿横崖起飛泉噴玉光扣門僧出定彈指下禪牀鳳停館中秋山高月未吐吟上嶺頭看萬里雲霄靜一天星斗寒蝦蟆出金背玉兎動銀盤唯有南飛鵲遶枝終不安和葛德濟見懷憤氣蟠胷久開談音吐鴻雲山初濶别罇酒憶相逢暮草黏僧屐晴江理釣篷閒居詩句僻祗自詠家風送妙空大師往郴陽省兄逺水縈環碧秋山作劍攅取經行嶺徼飛錫下雲端風捲湖烟靜天高雁影寒何時却回首即為掃蒲團宿唐興寺夜雨木落羣烏起孤眠枕未安客愁金槖盡酒病玉壺乾雁過風傳響雞鳴雨送寒平生萬感集咄咄出毫端和周監丞聞京洛關中收復四首扈聖尊皇極真人握赤符梯船初入貢輿地夜披圖力戰非天意賡歌奉睿謨花卿雖猛將絶世可能無又戰壘初休馬邊烽不舉狼山河秦地壯日月漢天長劍㦸將銷盡鈎鋤始破荒欲觀調鼎手一臠已堪嘗又喜有官中信衣冠返舊京交馳節旄使悉罷羽林兵丹詔從天落羣心仰首迎蕭條萬里道今日有人行又河南新郡縣吾宋舊山川喬木應猶在遺民不記年行人將漢月持節照胡天屬國今無恙遥知免齧氊送劉禹錫之官五羊南海千山外東風幾驛催嶺頭梅雨歇旗尾瘴烟開蠻徼無塵起中原有使來時應問消息㑹向日邊回秋夜山色釀空碧砧聲鳴翠㣲自憐為逐客誰為擣寒衣居士本無病叅軍胡不歸扁舟在吾手爾莫用危機曉行唐興寺道中寄劉美中雨洗穹色靜雲間曉碧初峯巒爭峭拔臺殿已清虛邨落孤煙起人家半嶺居回看巖際寺幾欲倒騎驢清軒竹逕有佳色耳根無市聲山如畫屏立水作縠文生牕户松風響園蔬杞菊馨夜深天更靜待㸔玉蟾明亂後過東山寺煙塵苦未盡紺殿倚巖阿雲䕶佛世界山栖老禪和斯人具眼目法力辟兵戈欹枕聴粥鼔誰能柰爾何和黄子餘湖南道中寄弟子黙二首花落黄陵廟禽聲隔岸聞山川湖外逺牛斗地形分回趂峯頭雁遥瞻嶺上雲惠連詩更好夢裏亦思君又卷裏詩新出關中記舊聞乾坤今轉大呉楚昔嘗分霧失朱陵峒晴開紫蓋雲仍傳九疑尉竒策動明君時方傳鄉人營道尉董體仁作殿魁又和酬子餘句法出脩水家聲誰不聞微言雖甚秘殘馥可能分筆掃堂堂陣詞飛藹藹雲馬卿才思逸傾動卓文君又和酬子默牛渚西江夜新聲月下聞定知終夕詠不覺曉光分儻有罇中酒重論日暮雲山林正憔悴抵掌忽逢君頗姪明碧軒不可居無竹開軒眼界新風摇碧玉玦雨解籜龍鱗晩色侵書帙疎枝掛月輪客來從逕造莫問打門人和李巽伯送劉德基赴縣齋令君湖海士置榻謂公賢綠野千峯翠朱甍萬室連客依彭澤栁人問孝亷船他日功名逼金魚未免懸郡燕新進士胡文侍讀即席賦詩因次其韻雁塔題名處蟾宫折桂新英雄綴行列材業濟生民榮耀初開宴招呼如此賓鵬飛上霄漢横海脫凡鱗郭教授南牕置酒觀競渡次坐客劉時舉韻一飲徑一石此風誰敢陪謂劉也日移林影轉船劈浪紋開銀燭自相映玉山何用推廣文官獨冷賴有酒盈杯再次前韻殊方作異客勝日喜遊陪鼓譟風雷動㠶爭錦繡開詩元無格律誰與定敲推折得新荷葉聊將當酒杯送郭教授代人蠻域經年住飄然見古風新編文似錦高論氣如虹杖屨容追步箴規有發䝉方期親謦欬吾道又將東盧溪文集卷九
