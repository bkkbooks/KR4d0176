body:
  text: 盧溪文集卷二十五宋王庭圭撰挽詞挽劉美中尚書公方持槖我休官握手平生出肺肝豈是尚書先著履須知處士不彈冠文章進直金鑾殿槽櫪空餘寶馬鞍忍看銘旌下螺浦再攜斗酒餞江干挽彭子從郎中嶺北嶺南持使節湖西兼總大農錢廟堂正賴持國計蓬島祗為蛻骨仙郎省尚虛丹禁地銘旌忽上洞庭船衣冠不許挂神武端謂猶堪濟巨川挽王自然二首耆舊風流絶後塵尚容晚歲接冠巾英豪取友半天下論議常傾一座人橫槊陳前工草檄結廬江上老埀綸只今遺像髯如戟猶足堂堂聳縉紳衣冠南渡塞螺川始識蓬萊王自然舌捲風雷翻海嶽學窮精䘲出人天歸來元亮荒三徑老去揚雄有一壥斗酒隻雞思欲致無因下馬拜新阡挽王夫人周子充舍人母憶昔諸郎從板輿當時人物渡江初蓬萊闕外雙飛鶴葬會漳南數郡車魄已成仙歸閬苑兒方著足上雲衢紫微即日趨嚴召八座無因問起居挽盧宜人二首陳晦叔夫人崔盧唐舊族譜系自名門子舍三珠樹思劉七耳孫是行將貴顯不及問平反坐脫無凡語人傳有至言又髙風林下閨門裏幾嵗長齋繡佛前夫子雄才尹大邑清魂獨樂上蓬仙化為雙鶴何方客來置束芻南郡賢會致送車填廣陌他時彤史亦須編挽黃忠臣二首憶昔相逢子少年詩書從我日磨研平生極力欲推挽世事驚人忽變遷未便噓枯送天上忍收遺骨葬江邊雙親白髮終身恨不見青衫落眼前書報登科墨未乾已聞弔客在門闌只傳金榜升華省不得丹梯上廣寒賦就兩畨隨計吏花開一日遍長安誰知鬼録南宫籍却作修文地下官挽戴彥成通判早嵗同充上國賔與君先占廣寒春青雲尚記當時事黃土今埋如此人别駕朱幡泥飾屏縈紆茜綬帶銅銀生前富貴無餘恨痛念堂遺白髮親挽劉公弼弟兄詞賦喧場屋晚嵗鄉閭譽益譁窗下殘編雕草木壁間遺翰走龍蛇蠟餘幾緉遊山屐書滿千篇載鹿車痛惜蒲輪迎未果寢門來哭淚橫斜挽王修華督賦寧居中上科治身從此得名多不聞老父踰垣走且聽兒童載道歌吏不捉人真快樂庭無留事足中和邦民盡作嬰兒泣忍送輀車返爛柯挽劉英臣纍世以資雄里閭惟公挾策似寒儒欲將那律九經庫定勝江陵千木奴玉樹諸郎新命貴錦囊丹誥寵光殊當時籍甚吳丞相恩澤今歸兩鳳雛挽徐子平子平臨終神色不亂遣人告別且求挽詩為賦兩篇數椽破屋臨溪水日日讀書喧四鄰白首傳經窮到骨清風入座靜無塵堆窗史傳千張紙過隙光隂一轉輪富貴掀天亦埃滅今時何必歎斯人季子過徐因挂劔吾詩似劔敢欺徐才華本自輕場屋詁訓猶堪授里閭踏雪打門人問字載殽從學酒盈車兒童誦得平生賦不是兔園遺下書挽羅荆老初挾儒書戰舉場弟兄旗鼓亦相當探囊聊復起人死繫肘空餘濟世方漢苑舊嘗知姓字壺天今别有仙鄉老龍猶抱玉函訣夜扣柴門乞酒漿挽鄭教授仰高雖未接華裾清論時容著野夫挂劔未能臨死穴隔江何處奠生芻淒涼陶令松三徑寂寞揚雄宅一區插架尚餘三萬軸傳家宜有鳳凰雛挽曽氏安人令儀早出閨中秀少日來歸丞相家能以功名勉夫子忍看旌旐起悲笳錦囊篆字金裝軸玉珮鳴裾帔有霞贈典有加兒亦貴誥黃新墨字如鴉挽范孺人少日來歸奉藻蘋一門冠蓋擁朱輪平生未識德公嫂比嵗才依孟母鄰魂返蓬萊三萬里鶴歸華表幾千春南州高士應匍匐忍看靈車下北津挽瞿氏徒身諸福夀尤豐魄返仙曹第幾宫西土夢星生太白東牀選壻得梁鴻豈無名士當時論自有夫人林下風來弔不知何處客化為雙鶴却飛空挽易氏媪有才子鄰我居父老欲起髙門閭此媪不知家有無但典髻鬟供買書今朝慟哭城南道忍送喪車入秋草預愁來嵗寒食時不見襄陽德公嫂挽劉子儀鬼伯歌朝露歸魂掩夜泉起家詩禮盛折桂弟兄賢箭落雙雕日是嵗二弟預薦名君當化鶴年阿鴻今已貴飛去欲摩天挽歐陽仁叟郡從簮纓貴騶僮意氣華呼盧晉公子大俠魯朱家錦臂誇豪放銀鞍走狹斜忍尋桃徑裏無主亦開花挽張氏安人夫人經亂離音信隔絶其孤趙逢源號哭走萬里至西蜀迎歸榮奉二十年以夀終於其葬也挽之以詩母子未相識哀號徹九穹一生何敢望萬里忽相逢綵服舊兒戲錦囊新誥封悲歌滿行路千載想遺風挽歐陽宜人渤海家聲赫先朝御史孫霞冠宜象服腰笏擁魚軒五福夀尤貴兩兒名更喧惟嗟漢陽逺不及問平反挽王氏夫人劉英臣母嵗歉傾禾粟賔來剪髮鬟其人今已朽此事古尤難斜日銜峯頂秋風想珮環出門驚弔客雙鶴下雲間挽王氏孺人賜爵逢千載皇恩下九關誥詞金篆字珩珮玉連環陶母今有後萊衣不復斑哀歌堪挽紼徒有淚澘澘挽郭氏孺人擇對真佳壻傳家好弟兄魂飛瑶海岸風斷玉簫聲舉案人何在埋文誰作銘潘郎今未老他日看褒榮挽聶氏孺人隴上龎公女相家裴十娘空門參白足佳壻得黃香木馬風前響蓮花火裏芳彌陀真樂土環珮響鏘鏘挽露氏恭人華胄東京舊青樓大道邊渡江離險阻舉族得安全追賞榮身後褒封及眼前清魂在蓬島髣佛綴羣仙挽丁陶明縣尉東南作尉夲神仙化鶴家聲亦宛然臨欲騎魚歸海島猶能躍馬拓弓絃花間載酒經旬日陌上悲歌隔九泉尚有讀書臺下月夜深還照碧池邊挽劉宗望何年來卧北山霞猶指海邊團練家手把方書妙耕種門髙閭巷獨清華兩兒駒齒日千里萬卷牙籖架五車風動松篁起蕭瑟不堪回首聽悲笳盧溪文集卷二十五
