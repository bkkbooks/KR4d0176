body:
  text: 盧溪文集卷七宋王庭珪撰古詩遊貢㳺洞竄身楚西極幽竒頗窮厯况此古道傍横天竦蒼璧何年始開鑿工如鬼鑱刻飛空數百丈突出清鯨額那知風雨時雲雷非窟宅事跡墮渺茫探討失圖籍豈無高世士於此煉金液不能久徘徊上馬空歎息次韻折樞宻題向萍鄉莞爾堂器逺無近用弦歌只暫娯從來趙魏老或為滕大夫昔時武城宰其人骨已徂牛刀發新硎夫子輒驚吁向侯本學道與世疑濶疎擁紬聴衙鼓庭下一事無不為赫赫名詭衆以自殊催科雖云拙於今乃賢歟夫子儻無言黒白共一區家有治縣譜不飲常晏如棠隂决民訟松間讀我書飛蝗避境土野鶴馴階除堂上盛賓客不減陳趙予新詩播京邑異世乃同途振轡若登仙身輕衣六銖雲間候飛馭君駕何時迂寄賀魏彦成郎中扶桑日出天開關江南太守初賜環鴛行舊班三尺脚踏他龍尾回天顔是日奏對驚衆目措國不動安如山為郎畫省非常調民曹金榖徒煩要江淮久鬱鸞鳳姿一飛宜上青雲表政使埀紳坐廟堂南北封疆談笑了君不見河南魏弱翁治行聲聞九天上漢室中興拜丞相謝魏彦成知郡寄惠漂布江南渡頭浣紗女年年舟上織白苧織成還自漂江沙女手纎纎白於布水邊時有釣漁人何異淮隂漂輕絮一飯能識韓將軍不負平生名漂母州西寒士衣百結太守憐渠茅缺作綀衣倒接䍦炎官火傘方張設恨無青絲白玉鞭醉騎白馬踏江月誰知南國任公子留待深冬禦霜雪昔徐伸車為山陽教官太守程公見其衣敝以新衣易之仲車因思南齊任昉之子冬衣絺綌遂用其事作詩以謝漂布亦暑服比絺綌尤精竒故復用之題向宣卿伊山有裕堂伊山連屬朱陵邨公來力掃衡山雲便令築堂隱其下萬竹遶堂松作門此公文簡四葉孫竒謀逺畧世所聞胷中磊砢著千古雲夢豈止八九吞憶昔荆湖盜初起乞得兩郡西南奔至今衡陽道州政父老出涕猶能言負材傑異衆所忌使者不便仍謗諠宗閔羞作南山虎李斯却憶東門兎壁後置人誰不知傾身障簏情已具何曽日食一萬錢猶言舉案無下箸貪嗔俱是可憐人百憂纒身誰得汝請君聴我伊山行九疑洞庭皆可耕清風不用一錢買時有明月窺簷楹其中廣莫幾萬里寵辱微物安能驚自非胷懷有本趣其氣激烈何由平安得中郎捋鬚手喚起桓伊來撫箏桓伊嘗居此山亦嘗與謝安有功而遭謗故用撫箏事題劉知縣後隆堂五季列壤爭未休庸兒崛起操鉏耰朝為呉臣暮歸楚黥髠盜販更據州君家大傅出竒策氣壓百萬姦夫謀一朝談笑解紛亂辭爵却歸東海頭自言其後必隆盛慶源逺與江河流昔時楊寳所活一黄雀猶能四葉清德傳至彪又聞何敞隂功唯治獄天遣使者賜策何其優有如大傅安堵十萬户宜令後世衮衮生公侯贈别劉文卿楚公之孫丞相諸孫早相見子獨羈遊未識面忽騎瘦馬夜敲門始得此郎如小阮通都大邑多豪英乃走窮山訪微賤怱怱未暇世論文㑹看落筆知關鍵題王主簿逸老堂人生異趣各有托年少何如老人樂老來萬事不掛懐樂處勿憂兒輩覺疾雷破山吾不驚亦賴天教閒處著兩部池蛙當鼓吹萬疊雲山作屏幕此時真似地行仙拍酒何須萬斛船不愛白日昇青天不愛腰纒十萬錢但愛百年三萬六千日日對芳樽聊自逸明日花開花更好定知不向愁中老題羅氏餘慶堂蒼崖翠壁前人居猶識當時屋上烏應念前人餘澤在飛閣突出青山隅山前老父相呌呼為起里門高著櫨葱葱瑞氣已充閭他日要容高蓋車送劉熙載赴省試江南山欲窮地與荆楚錯君生於其間秀氣鬱磅礴文章變骫骳聲名久渹硞至於吐言談風味亦不惡如何生寒窘詩書對藜藿天網羅英材搜獵徧叢薄君材萬人敵百鳥避一鶚忽從布袖中盈編出新作竒怪驚我前雷電雜風雹行當試殿陛宏文要追琢同遊三數公詞藝俱贍博上方集多士謀欲取京洛徑須陳治安端不談冗齪致身青雲上去天纔一握早寄山中人庶以慰寂寞贈劉亞稷君家大父當元祐賦壓鄉閭在人口子今二十能綴文已觀落筆蛟蛇走藍田出玉果不非豈知剖蚌得珠璣乃翁高材卧林壑眼中有此光陸離炯然見子侍公側鵷雛翠倚碧梧枝嘗聞鵷雛之生破卯出五色即欲摩天飛陸機少年作文賦河東小鳳才亦竒自古有英物秀發皆如斯我謂鵷雛排風整毛質翦拂始光輝尚須硺琅玕之實飲瑶海之池然後巢阿閣集赤墀赤墀阿閣無凡棲期子當呼鳳來歸謁王宣子舍人埀旒畫衮雲繡裳天子擇日開明光臨軒策士必親覽鴻文獨高翰墨場都人爭看狀元出九衢車馬何煌煌貴名一日動天地破卵挿翼飛鸞凰螭頭獻納近日月謂公逺器宜廟堂麟符虎節下霄漢雙旗忽開南斗傍朝廷已知弱翁治行且大用歸巖廊江邊野老病初起始欲杖策窺門牆張元暉生日三月十六日春風吹月昨夜圓門對新生洲渚邊紫文鸑鷟初入夢燕公手筆大如椽赤松黄石俱長年金鈎鵲印仍家傳劔池霹靂蛟龍吼寳氣飛精射牛斗人呼張鎬帝王師相公元是山中叟和王宰早梅雪裏花開氷未折如見瑶姬侍君側瑶姬國艷欲傾人嫣然一笑頰齒白疎影横斜語最竒桃李凡姿無此格瀛上休觀倒暈眉且看嬌黄塗半額贈歐陽伯威歐子扶親喪﨑嶇度湘巘豈無當塗人孰肯為封傳跣足行萬里僅能及鄉縣埋玉謀荒山此計墮瀰漫世無郭元振一舉四十萬積微㑹衆力庶可咄嗟辦送頗姪郡學讀書郡侯勤勸駕英聲播江濆學官得鴻儒筆頭弩千鈞金蘭二二友執經造其門歐陽子劉子試藝咸有聞吾姪奮袂起去若渇驥奔妙推天地假高談帝王尊入室得妙語錄寄青溪邨還劉秀才文卷君家邇來妙人物叔父風流更超絶中興天子搜羣材龍虎同年收羯末我識君家鐵面公當年作賦聲摩空君今祖襲乃復爾自出機杼成家風惠我新編盈大軸武庫五兵森在目縱横璀璨不知名𤣥圃崑山皆積玉文章磨治欲無瑕要如春風開百花筆端著力覷天巧自我缺發成嘉葩和通判周監丞見贈大厦久撞壞撑拄非一支安得好柱石壯麗如昔時向來榮盛處草木今紛㽔羣材未盡出去若馬脫羈豈期朝無人過之輒欲私骨相不媚嫵因歸結茅茨忽逢高軒過飄然鸞鳳姿宜在帝左右珥筆班龍墀少年厯清貫高名誰不知胡為至下邑撫俗問民疵題詩滿巖谷妙處有餘師盧溪文集卷七
