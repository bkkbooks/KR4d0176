body:
  text: 盧溪文集卷六宋王庭圭撰古詩送趙敏卿翩翩公子天麒麟目光點漆傾坐人萬里肯來尋逐客夜夜讀書喧四鄰君今先渡瀟湘水我亦東歸聊復爾明朝勑放巫山陽拄杖行穿赤泥尾題洪覺範方丈曲徑通禪房闢户得佳境適從闤闠至頓覺耳根靜古木含蕭森寒梢發光景墻圍數竿竹中藏大千境月從天上來入林散清影爐焚薰佛香碗注浮雪茗客散羣動息兹焉發深省次題周公豫趙逢源過瑤林洞中探酴醿桃花落盡春風顛兩翁並轡來翩然入門下馬看花發仰攀緑葉窺青天倚檻謳吟發清唱終夕擁鼻鳴寒蟬唐昌仙人識玊蕊借月下看乘飛煙明朝地上拾落粉草間點綴如遺妍狂思玊爪搔背癢不可妄得麻姑鞭歸來缺應拍手笑君騎馬似乘船醉後猶能作長句半夜打門驚我眠送葉通判赴闕乃翁共試蓬萊殿筆力翻瀾㵼河漢聯鑣並出日華門燕罷綴行風雨散家聲烜赫今益昌高車大馬何煌煌江頭相遇初識面握手一笑仍悲傷獨把窮愁老巖谷喜見高年有此郎如今又作摩霄去行看鏘玊侍明光送僧祖麟遊龍會大仰古禪窟秀色摩穹蒼蜿蜒屬龍會半壁開寶坊中有寂寞人宴坐花雨傍杜門不説法碧眼照胡床子昔喜行腳拄杖走四方所至螺鼓閙正作佛事忙是中不可住令人心發狂却尋龍會山夜深聞妙香起望山上月千山同一光從來逺行客終必還故鄊便當隨月歸急掃松下房芒屩儻已具留錢辦茶湯避亂東村逢南嶽簡上人一别湘山今幾載盜賊縱橫爾猶在北來鐡馬獵夷門金錯旗竿繞湖海憐我避亂荒村中杖錫穿雲窮􅐑嵬茅簷瀹茗清風生月隱霄間星磊磊高談微及古興亡為言致禍由時宰著屐包腰却下山恐觸危機吁莫采送劉宏夫昆仲赴省試我聞君家書滿房騎馬夜過叢桂坊乃翁危坐具燈燭諸子讀書喧兩廊問君讀書一何苦要取高官起門戶仰天大笑幾時歸明年雙鵠刺雲飛次韻韓朝美惠硯詩如春風入花骨暖日晴雲入竹石退之筆力千古豪世有文章擅東壁松忩結鄰翁乃惜坐中頗復有此客人怪窮兒得寶歸布袖淋漓手黧黑次前韻酬羅思義君章夢吞五色翼未羡充宗得文石逺孫詞采亦班班復見光芒動奎壁我住江南君住北北人今作江南客論詩爭勝類摴蒱一喝成盧子俱黑次前韻酬周公豫年家君家大阮聲輝赫當年並試龍墀石小阮風流不減人一家頓有雙聨璧共題鴈塔多名卿溪頭獨作漁竿客身經離亂偶相逢怪我婆娑鬢猶黑次前韻酬劉大虛惠端硯端溪之水深莫測千夫挽綆下取石溪翁採得歸不眠夜劚鵠卵出蒼璧君從何處得此寶贈我慚非玊堂客况無健筆寫銀鈎墨汁徒翻老鴉黑王舍人生辰作道書有金房四年之訣皆鑄金為簡刻白銀編之紫筆書文也己巳四月二十四甲子夜半天門開是時羣星環北斗一星謫墮人間來星精為人不易得千年孕秀方呈才筆扛龍門百斛鼎家傳鳯閣通銀臺螭頭獻納近日月論事力取天顔回中興文武收髦俊願公急起乘風雷野人指山祝公夀事業亦與山崔嵬金房難老自有訣銀編紫筆磨松煤贈彭時卿秀才時卿昔年上書言得失不報今以親喪旅于江上有窮愁之厄恐墮其志故作此詩遺之昔年待詔隨公車袖中獨有平戎書當年肉食無上䇿竒才劔客何時無從來謀國忌迂儒遂令此賊稽天誅君能再陳治安䇿親喪未舉冝何如休論忠孝不兩立一抔之土非難圖莫但扣門來夜話長纓終請羈單于六月上浣陪王元勃舍人攜客遊青原山周秀實通判作韻語紀一時勝集奉次元韻使君從千騎伐鼓驚羣偷前驅嚴虎節夾道森蛇矛别駕工五言句刮造化美筆法蟠高軒銀鈎照忩几冠蓋一時盛秋旻羅衆星尋思問祖意米價作麼生欲扣山中人何由知彼岸殘陽下峰頂暮色藹餘蒨鳴珂出修竹驅車轉平原登臨悲往昔豈不多名賢獨餘薑與顔人品亦自勝溪流水濺濺中堪理漁艇賔客隨太守風流幾百年山間留絶唱巨石枕橫川送劉義夫宰祁陽浯溪寒翠拖碧玊石崖硉矹凌蒼霞次山竒文走霹靂顔老健筆蟠蛟蛇凛如誚杞叱希烈至今傑立天之涯公於其間宰民社切勿但取文辭誇當用忠壯出竒節縣妖破膽莫敢譁官舟連檣泊溪口符移星火如撒沙舊聞俗苦吏囂惡端能病政使不嘉先聲入境若元氣顧見槎枿皆萌芽溪中古月溪上石照公清德無纎瑕溪流不盡石不老佳名萬古磨不窊次韻羅伯固聽琴焦桐初不受文理弦以朱絲竒乃爾坐中忽聞太古音寵辱頓忘那有恥官廳曽有一日間奏刀未覺肯綮難抱牘兩衙鳬鴈退目送飛鴻聊一彈爽氣朝來如有約幽林鳥語山間樂琴罷揮毫各賦詩滿袖珠璣何璀錯晚風歸袂失炎蒸却憶氷壺此段清酒醒月白重開匣更作松風夜雨聲彭青老往禾山讀書所寓之室曰蟄菴為賦蟄菴詩一篇送之兼簡白雲元老彭子擔簦行有日拄杖穿雲風雨疾主人好事家有書卷埓石渠吞藏室兹遊逺去栖碧山頭角未欲嶄嶄出泥蟠谷底茅屋深丹崖青壁幾千尋白雲老元坐禪窟笑汝猶作書生吟峰頭别打禾山鼓喚起蛟龍趂雲雨題向巨源南昌樓詩後并序昔年過豫章望南昌樓知其必有勝處欲一登而不果今觀向巨源四詠果與滕王閣爭江南臨觀之美始恨昔年匆匆不獲一寄目以償所願輒作數語題其後南昌高樓在何許亦面西山望南浦壁間有客舊題詩傾倒湖山入毫楮此公平生妙言語突過前人落霞句簾開月出大江橫定勝滕閣捲山雨贈蜀僧妙高并引蜀僧妙髙自峨眉出三峽為南嶽幹佛事至辰陽適余竄居是邦髙數相過又將去遊江湖吳越之間索詩為别峨眉山頭古時月浮雲捲盡塵埃滅曽隨僧宴入中京光照九天開玊闕山月如今亦送君影落洞庭波底徹此時看月憶峨眉山色湖光兩竒絶明月隨君却復東千里相思共吳越問言古月與今月水鳥風林盡能説溪邊惜别重吟哦顧我無才奈若何他日長安逢李白再乞峨眉山月歌戴國和得潘衡墨法於意言之外今攜之湖湘必有識之者作詩以送之老潘膠法祕不傳君獨得之乃其天此法髣佛如參禪忽然有省夜不眠又如神仙換骨法應手不自知其然湖東大帥天下賢詞源如海筆如椽本是玊堂揮翰手正要此物供磨研醉題李白三百首掃盡將軍九萬箋老缺殁來知幾年聲名始落瀟湘川君不見吕洞賔竹絲籃子烏紗巾長安市上無人識喚作湖西賣墨人送彭秀才赴國學試君厭江南卑薄鄊擔簦萬里趨虞庠虞庠黌舍中天起上遊英俊如堵墻子欲戰藝於其場亦須旗鼓能相當但得同升博士堂看取官職如驅羊盧溪文集卷六
