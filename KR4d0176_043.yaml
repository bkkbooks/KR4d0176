body:
  text: 盧溪文集巻四十三宋王庭珪撰墓誌故右武大夫江南西路兵馬都監西河縣開國伯許公墓誌銘公諱仲字彦時世為汾州西河人曾祖源祖士宗皆業儒父建贈武節郎妣翟氏贈太恭人公為人鷙勇有大略見先世業儒不效棄去學兵法騎射絶人思立功萬里之外紹興之初金尚雲擾河洛間大將張俊聞其材招置麾下數有戰功授武節郎復以捍扼大江之勞轉武德郎劉豫兵犯淮南公從都統劉寶破豫大安寨臨陣斬其驍將司貴由是轉武功郎又轉武經大夫用淮西出等功特轉右武大夫誥詞褒異從都統王進屯池陽軍中機務悉以委之又統江南西路准備將領又為都統王陞軍中訓練軍馬改差東南第七副將又為王陞軍中第三副將改差東南第六將又改差荆湖南路兵馬副都監復為王陞軍中第二將本軍錄其摧敵搴旗之勞奏乞特與外任改差江南西路兵馬都監吉州駐劄凡四遇郊禮累封至開國伯加食邑至九百户紹興二十七年五月己巳以疾卒于官舍壽六十有一公初補官適大丞相張公都督大軍咸集欲以觀射公挽强弓連破的由是知名軍中叅政魏公良臣尚書張公澄一時要人咸稱薦之公亦欲自奮以顯於時㑹敵人請和天子亦欲養息生靈休兵革脩太平而智謀英勇之士無所用其勇故公官爵止於此而惜乎用未極其材也於時士大夫爭以文儒進而公晚年亦好觀書延師儒以教子公娶張氏封恭人生一子曰汝楫以䕃補忠訓郎㓜警悟雍容雅度不類將家子折節讀書弱冠遊塲屋已兩與漕臺薦舉嶄嶄然視科名可掇取公之後復以儒起家可謂榮已女二人長適忠訓郎劉允中今亡次適成忠郎張炳孫一人曰紹祖尚幼其孤卜以某年某月日奉公之柩葬于某所廬陵段允狀公之始末與其孤汝楫偕來乞銘允同郡名儒而汝楫嘗執經從之遊者也知公之詳而其言可信盧溪王某為序而銘之曰公初執戈敵渡湟水詔大將軍中征不軌將軍謂公材質之美持半段槍排折馬箠嘗為軍鋒先登摩壘手斬桀賊功不旋跬敵人退驚飯反箸已遭時罷兵英雄老矣百有一試所出糠粃儻盡其材業胡止此今公有子乃舉進士感發自㓜雍容閑靡兩貢南宫幾掇髙第由是以顯夫豈不偉故歐陽縣丞墓誌銘歐陽氏得姓遠矣文忠公譜有曰通者仕唐尤顯名通三世生琮為吉州刺史琮八世生萬為安福縣令自萬至鄠始居安福至公曾祖諱載祖諱瑜皆隠居父諱安稷淹貫羣書兩與賢能之薦四試禮部將辯論而官人以疾卒於京師公自太學跣足護其柩以歸公諱皤然字達可天資夙悟尤䆳於經方三舎法行於郡國達可攜諸弟入泮宫皆有聲每試輙出頭角宣和元年以上等校定試入上等與弟廷光聨貢于辟廱明年逹可升補太學内舍未及再試而舍法亦罷父母既没遭兵火里巷無尺椽惟先府君所建精道堂獨存兄弟四人同居其中衣食無異鄉人欽慕之紹興十二年該廷試授右迪功郎潭州牧縣再闕以潔廉介特為上官所知凡一路疑獄及滯訟屈於權勢而不敢决者悉以委公由是人爭薦之凡得七章以考未足止關陞右從事郎在武岡時溪洞楊再興阻兵摇亂朝廷下銅獸符發武昌兵躬討軍無宿儲守令摶手無他謀適樞宻院刪定官方公疇為通判方公有異材宻使餽糧不數日而賊破當是時羣蠻視方公號令如風雷邊氓感方公恩德如再生獨太守不察機事有不可旋踵乃以方公為侵權起大獄聞于朝羣情恼恼逹可率同僚欲白太守辯其事之所以然郡僚有平昔遊方公門者反背誹助成其獄此正韓退之所謂平居强笑語至落陷穽不一引手救反擠之又下石焉者皆是也小人之態自昔如此厥後太守卒以言罷而方公亦湔洗功狀粲然皆如逹可之言武岡縣令素遲緩不集事而軍須皆逹可出力及奏功則推美於令而令受其賞此尤人所難者嗚呼事難乃見君子逹可行已臨政皆有過人不可以毛舉故取其大槩誌之則其平生操履節義皆可見矣余嘗見方公手書與逹可有高義絶識追配古人之語乃知其事之信然追配古人非虚語也秩滿就移攸縣丞忽一日聚羣子弟姪語平生若將之官而相别者是夕得疾終于家實紹興二十有九年六月五日也享年六十有九初娶彭氏再娶左氏男四人長不及名次如圭如熏皆力學季尚㓜女一人適進士劉大亮孫男一人明年十一月甲申葬于邑之北鄉南嶺之原如圭攜其先友左君時彦所撰行狀來乞銘為之銘曰天馬汗血一噴千里自負其良深藏不市力方盛時誰或縶之至於老矣骨猶駿奇如君盛年頭角軒軒使之得路如驥騰騫邅囘晩節其氣猶全萬不一試而止於斯其平生氣節行藝猶可託銘詩以槩見於後世而傳焉故王氏墓誌銘夫人王氏其先蜀人五代之亂徙居江南因為吉州安福人有諱繪者仕南唐官為承㫖繪生謨皇朝賜本州文學調袁州宜春主簿夫人蓋謨之曾孫而父祖皆晦跡不顯十九歳歸于同邑劉氏諱昱字明叔方是時王劉俱以財雄鄉里而夫人天性儉簡屏内静嚴服玩無纎靡之飾姑窮居二十有八年病風瘍凡飲食臥起必須人而夫人朝夕候伺靡不順適其意建炎末米斗千錢諸豪方閉貯夫人獨語其子曰歳饑盜賊蠭起廥積盈腐非福也乃盡發宿偫平直唯取十之一鄉閭多頼以活明年劉大任據郭江作亂所過焚掠殆盡獨留夫人之居滅炬弗焚厥後雖火于他盜亦有以見夫人智慮之高而賊亦初有所激也夫人以紹興四年二月丙戌終于家卜以十一月庚申𦵏于清化鄉洛陽山之上澤岡其子彦弼泣語余曰吾母生平嚮重儒士而使子孫皆從君遊非一日也若得君文銘其墓亦庻為慰先魂於土中於是赴其𦵏而許以銘焉盖余初舉進士時至其家夫人喜甚即具飲食令其子相欵締逮余隐居鳳停山諸孫亦鼓箧相從於巖穴之間既而中原擾亂衣冠避地來江南者踵相屬夫人悉能言其若某人者當是知名士也使其子厚交之自是交逰日廣名譽䆮聞于人嗚呼婦人女子生僻陋之邦而識量高逺如此死之日神色不亂出匳中物區處後事皆宿有籖識無毫髪遺恨言訖儼然而逝夫人享年七十有九後其夫之死二十有二年子男二人彦直少年克家先亡彦弼㓜負材能紹興元年大丞相朱公安撫江南日因軍興補廸功郎辟臨江軍新淦縣尉女三人長適同邑許特立次適武進士校尉彭安衡次適王庭瑋孫二人曰冀曰翼皆業進士銘曰豪宗侈家鮮不覆墜亦有能傳至于累世孰知其天示而弗閟婦人得之茲尤可貴蓄厚報遅必在其裔攷此銘詩庶㡬無愧故劉元弼墓誌銘居士姓劉氏元弼其字也諱茂實世居吉州安福祖父時家富饒子孫悉遣就學余自㓜時與元弼聨茵席共燈燭從師授業崇寧初三舍法遍行郡邑元弼與羣從昆弟紆侈袂曵方履鼓篋升堂有聲于庠序間既而羣從昆弟多貢于京師獨元弼偶試一不中即棄去不復進取藝圃種竹結茅屋秀峰之下曰遠菴筠亭藏書萬巻日哦其間性獨嗜酒酷好吟咏其為詩非若羇旅失志雕刻肝腎憂愁哀怨者之所為其詞澹然適意而已其嗜酒非若狂夫使酒罵坐與夫露頭狗竇中呌呶以驚人者引壺觴以樂賔客而已終日寓此二物而細故不入其達生知足者耶紹興二十六年四月十八日過從弟家飲酒至醉而歸笑語如平時神氣不亂是夜終于所寢之室壽七十有八娶王氏盧溪之姊也有子一人曰飛鵬今為材進士女一人嫁王顗卜以是年十一月甲申葬于秀峯之西古茶園銘曰酒有何好中藏妙理詩非窮人窮乃工爾二者皆樂卒以樂死便為勝士古亦如此故段夫人墓誌銘故廬陵秀才李愷字彦强之夫人曰段氏其先臨淄人至唐段成式為吉州刺史因家焉今為吉州廬陵人父諱蕡字仲實官至承議郎方布衣時以文行知名縉紳間南昌黄魯直有盛名於文章不妄器許嘗過其友硤江蕭公餉家見其文拊髀驚歎後為太和令始相與深交而力延譽之承議公既登第調筠州高安縣主簿時蘇太史謫監高安酒稅一見異其材日與論說古人製作關鍵手為校正國語等書承議公由是文章益進夫蘇黄以文章擅天下而承議公乃得俎豆兩公門下賔客之列其風流人物可想而知也夫人自幼習見其父出入蘇黄之門言論俊偉遂能誦蘇黄之文皆略上口而通其大意至於六經國語等書皆渉獵焉承議公愛之選壻得李愷而歸焉其姑永壽縣太君婺矛牙居治家嚴肅唯喜教子坐堂上日聞弦誦聲故其子沈博學登乙科仕至陞朝有聞于時愷不幸學成而壽嗇夫人傾匳具益買書縱諸子交四方賢豪以卒其業於是乃令其子㦛負其藝於廬陵糊名數千人之中四取鄉舉㓜子恕嘗為都魁再舉登第調贛州司戸叅軍二子皆名震塲屋而恕先决科鄉人榮之者繄其母之賢也夫人初以孝謹事其姑稱賢婦以賔禮遇其夫為賢妻以詩書自教其子而識其子之所與遊者皆偉人可謂賢母婦人之德莫隆於此故略其細行而誌之夫人後其夫二十一年以疾終于家實紹興二十五年十二月庚寅也壽八十有四子女十有二人男四人長曰㦂次曰悠先夫人卒次即㦛恕也女八人適進士蕭憲曾韶蕭繼祖劉拱辰彭椿年劉彦京曾彦謨段允孫男六人黯㸃符熈篆簡孫女八人曾孫男二人女一人卜以二十七年正月丙申葬于延福鄉榮岡之原夫人之姪段允字世榮少有令名與其孤㦛恕皆嘗從余遊謂非余孰宜銘允乃狀夫人之平生偕來以請盧溪王庭珪為銘而書之銘曰夫人之先以文鳴歸逢其良以儒稱遂能漸揉談六經傾匳買書充屋楹坐令諸子拾紫青女子之事斯為榮又能遣子交豪英試與俱來端可驚厥德既侈法宜銘盧溪文集巻四十三
