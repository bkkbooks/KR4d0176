body:
  text: 盧溪文集卷一宋王庭圭撰古詩題宣和御畫王鎖宫扉三十六誰識連昌滿宫竹內苑寒梅欲放春龍池水暖鴛鴦浴宣和殿後新雨晴兩鵲飛來向東鳴當時妙手貌不成君王筆下春風生長安老人眼曾見萬歲山頭翠華轉恨臣不及宣政初痛哭天涯觀畫圖徽宗皇帝臨御日久海內無事唯不忘翰墨之娛見者知其為御畫也臣既獲仰觀撫卷太息思宣政間當國家太平極治之時景物宛然不覺流涕乃再拜稽首而賦是詩紹興丙寅三月望日小臣王庭圭謹題仙人春宴曲高樓玊珮搖春風銀槽壓雨珍珠紅天留曉月十分魄飛光下照仙人宫瑶姬半醉撾鼉鼓綵鳯吹笙黃鶴舞雙成翠袖織藕絲麻姑行厨劈麟脯金盤燒蠟夜未央從妃進果蟠桃香坐上花開人未老他日重來花更好三千年後忽相逢再約羣仙醉蓬島觀駱元直經進江南形勢圖異時漢網疏天討邉馬來囓江南草石頭重戍豈無兵將軍不識丹陽道至今戰骨埋秋霜傷心不忍問耆老龍蟠虎踞昔何雄赤壁濡須在眼中潯陽江水射蛟處旌旗拂天來向東艨艟塞川不敢下昔人曾此破曹公橫江九道波翻屋試請輕兵渡淮曲夜入長安人不知應見畫圖心已熟他日將軍按此圖鼓行而西如破竹長沙北禪覽古寺有吳王女墳明湖漲天光春雲如粉碎吳王宫女罷吹簫象牀玊碗今安在桃李初開映緑池緑池水暖搖花枝聞道只今池上月照見吳王繁盛時當時粉色艷月彩今日古墳烟草衰草衰不見吳宫事唯有月下孤猿啼猿聲哀苦聞不得又恐清曉催黃鸝方外菴聽惠端彈琴明日赴李似矩尚書招浮雲捲盡天無風青山銜日猶半紅誰彈烏啼夜鶴怨平明結客長安中大顛初識韓吏部清檗亦參裴相公尚書意欲清邉圉手挽天河作霖雨響泉韻磬應自攜昵昵莫為兒女語為陳古操有平戎此曲聊堪佐旗鼓遊青原呈王元勃舍人周秀實監丞異時黃魯直嘗賦青原詩至今青原山名與星斗埀自從有宇宙孰能磨滅之昨日從大斾上讀前人碑欲學下一語自覺落筆遲我等如淇輩後世誰復知治君千載人治中同一時兩公俱大手妙語仍崛竒得句未肯吐神物懢護持光艷出月脅當留照巖扉舟次白沙朝發螺浦湄暮宿白沙口初為夜行計有物應掣肘山雲四面起風濤半江吼落帆危石磯就枕不敢久林深鳴鶴鵲村逺聞雞狗夢覺知月明破篷見牛斗起視天色清解纜欲放溜浪頭聒天響掀簸入我牖蒲帆未及張篙師復回首渡頭有古祠壁畫雜怪醜舟人相與言勸我酬神酒出處本細事隂晴亦常有我固不問天豈問土木偶寄胡邦衡兼簡陳僉判黃書記斯文久寂寞誰應擅雕龍萬事問伯始今復得此公濤瀾翻筆舌錦繡蟠心胸平時吐佳句逸氣如長虹制䇿收俊異行當推選鋒元龍湖海士江夏無雙童詞彩俱秀出春葩發青紅鏗鏘排律吕純音玊琤琮草木吾臭味坐隔神螺峰遙聞玊荆産長松想清風安得賈餘勇提戈譟其中且願試音響徑須撞巨鐘向衡州生日今右相與公同生日嵯峨閶闔西風回赤霄夜半天門開昴星麒麟下穹昊兩家同日生公台兩公為誰張與向人物堂堂真漢相願公接武未央庭禁直金鑾對方丈張持操攜徐獻之侍郎書見訪兼出示著述中興論諸雜文為賦詩一篇以文軸還之他日亦録寄獻之也君不能徒步上書獻天子又不能移書帝城結王公欲將筆力扛九鼎紙上有說能平戎宣和治極久忘戰北來邉馬嘶淮甸是時猶屯百萬師無人北向放一箭大臣搏手知何為草間公卿兒女啼至今謀國無上䇿讀君斷藁令人悲君家人物照青汗曲江猶識胡雛亂他年論事要回天應向荆州尋好漢過蕭瀧廟瀧江欲度虹為橋瀧濤舂擊蛟魚跳瀧頭有廟非一朝瀧民猶傳神姓蕭殿腳插入白鷺腰青原舞翠挹岧嶤朱甍日出煙霧消碧瓦不動磨青瑤忽然飛電掣紫霄天為借怒生竒飈遊龍揮雨洗泬寥桂花墮落香雲飄百年古木號䕫魈鼉能擊鼓鸞吹簫官船賈舶膽欲焦廟前泊櫓不敢搖楚詞跪奠設漿椒瀧之靈兮或可招送陳邦直知縣道邊車馬來不休傾城出送陳太丘太丘愛民如父母故令民作嬰兒愁各持杯酒塞行路衆人欲挽我獨不我記殿前初射䇿臚傳高名落九州同年衮衮上臺省公獨執板拜督郵况兹小縣天一陬不煩細民遮道留繡衣飛章動冕旒行必召對螭坳頭君王端問活國計大略要洗儒生羞贈别黃超然我生不識黃太史猶及諸老談遺事藍田生玊海生珠謂君眉目無乃似誰作江西宗𣲖詩如今傳法不傳衣句中有眼出月脅密付嫡孫人未知宗風後必喧人口雲夢更須吞八九他年拈此一瓣香獅子窟中獅子吼寓郡齊過清閟軒與高虞卿夜話户牖鄰清閟深夜客扣關開門見修竹人與竹俱閒雨竹忩外響風從屋頭還羡君屛百事讀書蒼翠間刺口談治亂筆挾風霜寒更覽珠玊文洗我氷雪顔歸來興未盡危坐聽珊珊趙逢源今春當赴省試以事失期乃督錢綱往行在且欲觀母后回鑾之慶作詩速其行去年秣馬望行宫飄然氣若摩霄鴻不學提攜百金劔不倚能彎兩石弓徒誇讀書飽藜莧筆陳欲敵千人鋒要登月窟取官職不使官出兜鍪中丈夫功名自有日春闈已過落花風今當獻計隨羣吏到時萬井歡聲沸慈寧殿前催趂班看君入賀鳴靴鼻送向宣卿赴朱相公參議旄頭彗天天狗墮一日中原作竒禍金竿突繞都城光鐡馬橫嘶御街過邇來十年不解兵盜賊軍書急星火將軍藩身養脅疽帝命相公期必破指揮貔虎下天來奮臂一呼皆袒左相公元是帝股肱提師辟士收豪英君才纍試當劇郡羣凶落膽知威名麾下傳聞有飛將一箭曾射欃槍星公謀豈止當十萬要挽天河洗甲兵君不見河陽軍烏重𦙍參謀初拔溫處士遂令冀北馬羣空石洪亦自河南至又不見裴晉公取淮西幕下正用韓退之乃能夜縳吳元濟至今留得平淮碑如今相公開幕府豈减烏公與裴度席卷江湖波浪清貂鼎勳庸歸自取送吳叔舉主簿往清江受納秋苗田頭作穀催入場一半白著輸官倉廬江主簿喜懷檄放船椎鼓開帆檣蕭灘老農公事畢夾道歡呼羅酒漿笑言歸去喚妻子今年租米兩平量秋夜西園獨步清夜遊西園竹影亂秋月穹色湛虛明林光益竒絶人間睡正著那知此時節坐觀衡陽移頃刻風烟别沆瀣洗天宇一飲醒毛髮氣與南山高青蒼助施設池塘收緑净星斗轉空闊微雲㸃太清須臾亦自滅明朝問此境勝處不可說却恐雞三號開門走車轍劉晞揚貧甚㸑烟不屬而讀書不輟作詩遺之以激其志因叙其貧之所以然冀當塗有聞之者荷鋤初讀書中原已鼎沸輟耕仰太息衣食尚卒歲喧呼傳㸃丁田廬忽湮替産盡猶索租從何出租稅乃知天寶後信如石壕吏君門九重深旗㦸森兵衛朱轓背相望莫肯察凋弊賴子天資高追琢自成器時能從諸生扣門來問字長篇爛溢目春葩吐竒麗饑雖不堪煮要自飽風味乃翁昔好事賔客常滿位小兒聽客語炊甑忘著箅豈慮飯成糜邇來糜亦廢時能饋升斗與子黔突喙送王舍人超武王郎逺器冝廟堂胡為奔走天一方吳越相望峙雄壘雙旌再開南斗傍手攜仙人緑玊杖坐褰刺史赤帷裳平生廣莫意萬里眼高四海無相當舍人舊班紫宸陛天馬豈受青絲韁騎驢到部正閲歲飄然鵠舉摩天翔嬰兒十萬啼塞路各遮馬首持杯觴忽聞半夜發輕舸追走不及徒悲傷繡衣飛章有巨力不須州民投皂囊正恐君王知治狀便向劔履趨明光鰲頭蓬萊在平地日邊除書細作行盧溪文集卷一
