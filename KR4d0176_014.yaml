body:
  text: 盧溪文集卷十四宋王庭圭撰律詩七言題曹子方詩集後靜常先生初以詩得名於兩蘇公每恨不能多見偶於公之孫仲實大夫家見其家集輒題數語于後橫槊當年知阿瞞後來誰復識波瀾兩蘇門地陪高詠千古文章得細論耆舊只今無此語風流端要善清言想當巧匠傍觀處洗盡人間斧鑿䀶次韻劉升卿惠焦坑寺茶用東坡韻焦坑因東坡始見重於時日出城門啼早鴉杖藜投足野僧家非關西寺鐘前飯要看南枝雪裏花玉局偶然留妙語焦坑從此貴新茶劉郎寄我兼長句落筆更如錐畫沙嚴子陵釣臺巨石崔嵬枕碧流何人曽此坐埀鈎足加帝腹動星象手把漁竿還故邱固異山靈回俗駕不因鱸鱠憶吳洲當時冠劍今何在獨有高臺萬古留送劉美中舍人赴漳州二首一麾初出銀臺路手把漳南玉獸符閭里高門容駟馬旗旄夾道擁前驅兩科名姓驚天地西掖文章似典謨詩卷從教傳海賈釣竿未肯拂珊瑚漳浦城高南斗邊朱旗遙拂紫薇躔逺民初識玉皇吏屬邑行瞻刺史天此日分攜雲際寺老僧留酌石間泉祝公名宦何時了了却歸來作地仙次韻羅世英世英昔年從學蒙嶺書齋相别三十餘年紹興丁卯重陽日復相會於盧溪草堂世英即席賦詩次韻酬之是日坐客皆預免解唯劉世臣得失未定須臾解榜至巍然在選蒙山三十年前話聳壑昻霄見此郎雲子新粳抄飯白石泉擊火試茶香英豪滿坐驚頭角錦繡詩成出肺腸此日此公逢此客更傳秋榜助飛觴送歐陽南卿并簡胡紹立蕭灘傳榜到柴扉喜見高名挂棘闈二子文場初得雋老夫茅屋亦增輝方驚絶岸孤峯出更待刺雲雙鵠飛盧肇風流今未泯渡頭重看錦標歸和裴主簿九日欲上高高嶺路微疏林蔽日尚堪依楓江水冷天初靜桐井霜乾葉亂飛籬下採花人獨秀山頭落帽客何稀金壺倒盡重沽酒莫惜朝來更典衣安成逢吉守李西美舍人二首掖垣清近泰階傍新賜魚書綰郡章手把玉堂青縷管坐褰刺史赤帷裳紅旗照日三千騎白粲連帆一萬檣幾夜紫微躔次靜飛星今入斗南光妙齡高義動神京獨出漢庭諸老生鳳閣縯綸朝視草麟符分閫夜談兵猶聞豺虎縱橫在已覺山河氣象清欲會風雲扶帝業先令草木識威名喜楊文發生子觸目琳琅滿户庭又聞白母夢長庚杜家驥子誰家有天上麒麟地上行豈但疏眉驚秀拔更期洗眼看飛騰人間萬事何時足但有佳兒了一生周公豫監場解官終年騎馬上山坡鑄得中郎錢幾何解組可能留不住扣門猶許問無他莫因時事輕悲感從此新詩更琢磨竹徑松窗與塵隔幅巾聊且重相過和劉元弼筠亭種竹誅茅欲傍亭亭前花草莫爭名笋根稚子春無數枝上鵷雛晚更清翠逼衣襟添野興葉翻風雨打窗聲何當萬木凋零後尤見青青不世情和劉元弼邃室竹徑潛通幾許深逺窗寒色半晴隂朱輪畫轂走何事明月清風愜素心宴坐壺中觀慧景時遊物外拂塵襟此君定自能留鳳更絶飛鴉噪暮林和李巽伯少卿新年憶行在二首解賦新篇憶帝臺行宫樓殿亦巍哉應曽身作壺中客記得春從天上來雉扇齊開香霧繞龍墀暖赴曉班催君王神武多餘暇綵勝金花似舊裁去國東風又一回江村度歲亦悠哉偶逢花向山間發更喜人從日下來破敵屢聞胡騎走急賢當有鶴書催內中誰進春詞帖西掖須慿大手裁和謝夢叟思鄉用李巽伯韻江頭野老哭聲哀宫殿千門安在哉御路初傳鼙鼓動驛塵猶見荔枝來九重竒禍遽如許四海軍書重困催家在雙龍雙闕下亂雲春思益難裁次韻謝鄭教授二首久服才名老鄭虔奮鬚抵掌便談天平生落盡摩霄翮妙句新如出水蓮晚歲江湖聊可樂夜談城壘不須堅席門窮巷蓬蒿滿安得高車忽儼然騎馬凌風擬八仙不須三斗始朝天細聽街吏鼕鼕鼓看舞歌姬步步蓮問事未應無伯始論文今復得徐堅喜君琢句無餘迹詩到埀成却淡然和曽英發見寄二首聞君要了官中事了事君今竟作癡陋巷端能一瓢足虛名何用四方馳開簾璧月夜生海下筆氷蠶細吐絲想得詩成有新句池塘草入夢中思别後文章殊長進揮毫落紙便風生詩從平淡人難到語不雕鐫句自清無計上書通北闕猶時蹙額問西征憶君過我誦新作殷殷尚留金石聲和曽若虛書生胸次儻無竒讀盡羣書未免癡學似雕龍宜獨步才非天馬敢爭馳青編謾費千章紙白髮愁梳滿面絲愧乏銀鈎酬雅貺含毫徒作畫沙思再次曽英發人物風流東晉時吾家王椽本非癡見君自少能多學厥聞如今已四馳但有香粳炊白玉不須高馬鞚青絲西鄰密度牆頭酒日望扁舟慰所思次韻蕭明強追和芙蓉菴茅齋深倚五雲間忽有高人夜扣關揮麈風雷坐傾倒開簾水竹自幽間天寒已放龍蛇蟄棊罷那知歲月殘兵革未聞消息好且來拄頰看西山次韻周秀實過草堂夜話舍北雲生天一隅短檠細雨夜窗虛銅爐瀹茗助清冷玉麈論文愧闊疏落齒駒兒應有種謂秀實子秃毫錐子尚中書山城忽遇高軒過不避席門江上居和裴主簿栽花來詩有獨醉明月之語曉簷風雪壓前墀勒住羣花未出竒頓覺寒廳有春色雅宜破屋詠新詩朱簾不捲門長靜紅藥微開蝶便知獨酌莫邀天上月恐招惡客影相隨和劉克強謝仲振氷柱雪車詩有聲池塘春草夢初驚兩公共夾清漳住匹馬時衝細路行繞屋好山如罨畫攻愁得酒足鏖兵興來不用多呼客著我樽前伴月明送蘇元老自舂龍陽雲渺蒼梧湘渚濶煙帆初轉九疑高相逢未卒寒溫語此别更為魂夢勞江水江花自今古湖南湖北足風濤何時捨棹登平陸却上晴天跨巨鼇次韻義夫同年見寄二首青袍猶帶御爐煙坐覺江湖嵗月遷憶在九霄聨雁塔恍如三尺鑄龍泉薦書飛鶚聞天上綵筆題詩落眼前白髮郎官才力健知公家世似韋賢高文落紙自生煙論著傳家繼史遷氣壓千軍橫入陳詞傾三峽倒流泉賜袍初並龍墀下走馬同過鳳闕前一落江湖坐窮困顧豫何敢望諸賢和劉賓王縣尉鼓篋同遊璧水春橋門爭看筆如神忽傳紫塞軍聲急尚喜青山草色新儻有風雲起英衛可無膠漆似雷陳况聞作尉功竒絶兵入潢池不動塵次韻劉炳先昆仲見寄未有新詩敵庾郎徒將斷木點青黃峩冠不滿三尺許拆襪仍無一寸長鵬翼端能翻碧漢芥舟唯可置坳堂君才本自堪磨琢穎脫當如錐在囊盧溪文集卷十四
