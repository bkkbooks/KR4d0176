body:
  text: 盧溪文集附録行實除國子監主簿誥詞朕饑渴求賢惟恐不及一介之善罔有遐遺矧吾黃髮之良而朕樂詢者乎爾粹然耆儒凜有直節頃以言語文字抵忤權臣流落排拫殆踰二紀召對便殿敷奏詳華京秩峻遷姑示褒寵尚展平生之學益思補報之忠可特授左承奉郎國子監主簿隆興元年八月十四日除直敷文閣誥詞勑古之所謂老者不稱其齒而稱其德也齒德俱高誰敢不敬以爾少而力學長而有聞今兹年九十餘而智識未衰行義益固錫對便坐富有嘉言庶幾古之所謂老者綴內閣之清班賦真祠之腆祿朕之所以敬老者至矣往服華寵益綏夀康可特授依前左承奉郎直敷文閣主管台州崇道觀乾道七年十二月二十二日行狀周必大子充撰公姓王氏諱庭圭字民瞻其先太原人十一世祖該避唐末亂徙居廬陵郡六十里之何山好善樂施人號長者僞吳順義元年龍見所居陂田間有異僧云是將為佛寺公冝北去百里遇三白即止子孫當繁衍且出文士長者如其言行至安成北之連嶺遇白馬一問其地名曰大白茒稍前曰小白茒乃家焉李氏保太中龍復見何山遂為龍田寺今金地寺是也公之在毋大父夢赤文亘天既寤生公人知為文字之祥矣元祐間自連嶺徙邑中公時為兒童毅然有成人風年十二三刻志於學晝夜不息弱冠通經史百家崇寧癸未舍法取士公一試右諸生何損以對䇿貶廬陵故工部侍郎郭公孝友送之學一日聽公講書歸以大義告損損驚曰後來之俊也明年貢辟雍時方錮史學禁士人說詩公獨與故顯謨閣直學士劉公才邵吟誦自若丁父憂家事一付弟姪居喪盡禮縣榜其里曰清節未幾芝産塋上木生連理人謂孝友所致大觀間提舉本路學事張公根欲薦以八行公曰此士之常乃以為異耶辭不就登政和八年第調衡州茶陵丞邑大俗朴公擇秀民教以學應書者歲增猾吏文雅善交結脅持橫甚前令丞莫敢治公獨發其姦言於郡黥徙之至今父老能道其事也先是湖南田賦不均茶陵尤甚富者受田不受稅以避力役公與令約凡執役者一毫無所需民既不病役徐下令正其賦不悛者沒入之自是産與稅偕而役均矣丞舊兼造船場有部使者嘗薦公既而諉公役匠造私器公不可且歸其章使者大怒亦㑹與守倅爭公事遂拂衣去潭帥曽公孝序挽留再三頃之宰掾倪公濤左官來致書願交且責監司不能容一賢者其為名人所重如此宣和末公年未五十知時事阽危無宦遊意學道著書若將終焉邑有盧溪築草堂其上鄊人號盧溪先生執經來者屨滿户外紹興初州賦屬邑修城期㑹迫遽公語假令黃衡軍興民困城幸堅胡為勞人衡告太守守大怒將劾衡公謂衡君盍輕一官全民力乎衡即日解印綬去守聞愧甚為輟是役趙丞相安撫江西竒衡薦於朝衡欲扳公固避乃已公雖不仕常懷經世心事茍宜民必告於當路宣諭劉公大中李公寀皆遣官屬咨訪利病公盡言無隱二公賴之嘗著論二篇極言招安大盜之害洪帥李丞相竒其說未及用而去後帥參政張公守遂以遺逸薦於朝郡守右史王公洋號儒宗吏師下車首以禮幣邀公虛正堂延訪政事即學宫聽公講經一時士大夫多為歌詩紀賔主之兩賢也十二年今敷文閣直學士胡公銓以忠言忤時相謫嶺南親交無敢通問公獨送以詩語竒峻驚人後數年時相知之命帥臣鞫公謗訕坐流辰州逺人素重公爭以為師武將馬羽攝郡事尤待公厚公謝曰某罪人也將纍公羽曰繇公獲譴其榮多矣更遣子受業遂登科太上更化許公自便時年幾八十讀書益力夜對短檠作細字率夜分乃寢今上即位有薦公者一見寤合詔略曰粹然耆儒凜有直節頃以言語文字抵忤權臣流落排拫殆逾二紀召對便殿敷奏詳華特改左承奉郎除國子監主簿公以年高力求退命主管台州崇道觀令所在州常加存問既歸滋以道誼化鄊閭無貴賤賢愚一接以誠平生工詩至是格力雄健興寄高逺讀者不知其齒之宿也心畫端莊自其天性人貴珍之乾道六年冬再召赴闕固辭上不聽勑守臣備舟車禮遣仍以引道日聞踰年始至對內殿特蠲拜跪禮賜坐勞問甚寵上欲留公公固乞歸於是制誥有曰王某年九十餘而智識不衰行義益固錫對便坐富有嘉言其特除直敷文閣復以崇道俸祿之加賜寶香茶綵皆異恩也公䝉犯霜雪往來數千里略無勞瘁容明年三月己丑乃得微疾啓手足辭色不亂則其所養可知矣享年九十有三娶同邑劉伯玊女前二十八年卒一男頔一女嫁將仕郎彭飛孫男二人詹淡皆世其業孫女二人所著書有盧溪集五十卷易解二十卷六經講義十卷論語講義五卷語録五卷雜志五卷滄海遺珠五卷方外書十卷校字一卷鳯停山叢録一卷公學無不通而尤邃于易少嘗師鄊先生張汝明晚自得於言意之表漢上朱先生震文定胡公安國薌林向公子諲見其解皆歎賞以為必傳公亦不輕示人欲獻公車㑹詩獄興郡守議收公理掾汪公涓奮曰王君剛介勇於義一紙書招之必來他掾變色云云自請提禁卒挾巡尉捕公守唯唯他掾遂行至則突入公家公談笑就逮家四壁立惟易解鐍篋中卒疑其貨也挈以去他日公歎曰天厄吾書或謂今藏掾家云子頔卜以十年正月丙午葬公本縣清化鄊長賦之原使來速行狀將求銘於胡公銓惟昔伯父暨先君與公同為政和戊戌進士故知公詳其再召也必大適對禁中坐定上問胡銓薦詩人朱熹王某卿識之乎必大既奏熹出處乃具言公年德文章在今未易多得且登第五十三年矣上曰官卑何故必大曰斯人蚤忤上官晚復流竄官簿所以不進陛下若哀窮悼屈厚加品秩錫之章服足以勸善上曰俟其至議之明年公至上命寓直西清蓋待以卿監去朝禮必大嘗白丞相濟公王某百年故老扶杖造朝意欲掛其冠神武門丞相能為上言俯聽所請而官其子非美事歟丞相曰君言是也上必不為老人惜一子官明日又言之丞相曰决矣已而乃不報天其或者欲公子孫自以儒業發聞於世乎敢具列之敬俟華削謹狀乾道九年十月望日年家姪左朝散郎提舉江州太平興國宫賜紫金魚袋周必大狀墓志銘胡銓邦衡撰乾道八年歲在壬辰三月己丑盧溪先生王公卒公諱庭圭字民瞻其先太原人十一世祖該厭唐末亂徙居廬陵郡西六十里曰何山彊為善稱長者順義初或見物若龍出於所居田間有僧求其處為寺保太中所謂龍復見遂名寺曰龍田今金地寺也僧謂長者自此北行百里許遇三白即止後當繁衍有以文鳴者如其言至安福之北曰連嶺遇白馬一問其地名曰大白茒小白茒遂家焉曾祖著祖祥父奭皆業儒以氣節聞於鄊元祐戊辰復徙居邑之南公生時大父夢赤文亘天寤而公生乃喟然曰僧言其告之矣公為兒時凜然有立既冠通經史百家崇寧癸未三舍法行公一試即為選首為頖水講書間出新貫聽者環堵時何損以對䇿訐直竄廬陵侍郎郭公孝友受業焉一日聽公講歸以語損損驚異明年貢辟雍方禁史學及元祐學無敢犯者公獨與其友劉公才邵手不停披劉公後為學士常德公不忘丁父憂一一如禮撫弟姪人無間言邑榜其里曰清節亡幾何親塋産瑞芝木連理識者以為孝友之祥大觀間提舉學事張公根薦公以應八行詔公曰此士之常以釣爵位豈吾志耶辭不就政和戊戌登進士第調衡州茶陵丞民俗朴陋擇秀民勸以學士皆向化三年間應書者倍蓰猾胥文雅者勢傾一邑參政不能去公把其宿負白于郡黥徙之舉邑稱快至今六十年人猶誦之茶陵田稅不均富者田多稅寡以規役公語令凡執役者邑毋得秋毫擾使安于鄊民既不病役田復元稅由是産與稅侔役不頗矣他郡之民以事訴於監司願得公决者相踵丞舊兼造船場憲臺初與薦牘久之欲役船工造家具公却其薦憲掾怒甚適守倅亦不相能拂衣去湖南帥曾公孝序力挽留且欲薦諸朝不屑左司倪公濤方員外置致書願交復責當途不能容一賢者諸司大慚濤蓋政和間名士也宣和末公見禍根已萌葺草堂盧溪之上年未四十棄官却歸教授鄊里執經踵堂者肩摩人不稱其官曰盧溪先生紹興初郡賦工役修城時武夷黃衡攝邑公謂衡勞罷弊之民可乎衡白守守大怒欲械繫衡公曰民茍獲免身屈何傷即棄去守大慚服趙丞相帥江西薦衡衡歸功於公固辭乃止初江西盜作公著論二篇言招安之害李丞相帥洪欲行其言㑹罷去後帥參政張公守遂以遺逸舉先是劉公大中李公寀相繼宣諭各遣其屬諏以時政民瘼極言以對二公服膺公未嘗入官府右史王公洋為州令齎書幣招致且虛其堂館公訪以闕失又延詣學官講習一時士大夫哦詩紀其盛公常懷憂世心紹興戊午銓以狂瞽忤時相壬戌秋謫嶺表士皆刺舌公獨以詩送行有癡兒不了公家事男子要為天下竒之句婉孌者告訐詔帥臣沈昭逺鞫治以聞除名竄夜郎公至人爭迎勞執經蹐門者屨滿時忠州刺史馬羽􅖍守尊以師禮公曰加禮罪人恐與時左羽曰聞先生之名舊矣獲譴固所願且命其子從學遂中第公歸自夜郎年幾八十觀蠅頭字率夜分乃寢上踐阼初召對劇剴切詔云粹然耆儒凜有直節頃以言語文字抵忤權臣流落排拫殆踰二紀召對便殿敷奏詳華改左承奉郎除國子監主簿力乞去主管台州崇道觀令所在州常加存問乾道庚寅再被召固辭詔郡臣給輿楫趣遣仍具引道日申中臺明年冬始到闕引對免拜賜坐問勞令少留公以老丐還誥云王庭圭年九十餘而智識未衰行義益固錫對便坐富有嘉言除直敷文閣領祠如故仍賜香茗繒綵士慕其榮公少從鄊先生張公汝明學易晚益悟於理表張公蓋作易索嘗為御史繫蔡氏者漢上先生朱公震薌林居士向公子諲過草堂談經㫖常繼晷見所講易皆降歎文定胡公安國經從亦欵留且云公有經濟大略文章特其餘事爾為作易解序引公不輕以示人欲獻之公車㑹獄起郡守郭東集其僚議逮公獄掾汪君涓曰王君剛介勇於義若幅楮招之必來户掾變色曰彼詆大臣可善待之乎請部卒㑹巡尉捕之遂行至則排闥突入公談笑就逮公之書緘鐍頗固衆卒疑竒貨挈以去公喟然曰此吾書厄遂不獲傳公土木形骸儼然不可犯雖市井無賴子見公亦斂沮人無賢愚貴賤一待以誠聞人善若已出有為不善者畏公之知必慚惕自悔公學極高明尤工詩遷謫既久語益竒書有楷法自成一家平生治氣養心翛然有高舉意溘然而逝享年少衛武公之二娶同邑劉伯玊之女前卒男一人頔能稱其家女一人歸將仕郎彭飛孫男二人曰詹淡皆志學孫女二人有盧溪集五十卷易解二十卷六經講義十卷論語講義五卷語録五卷雜志五卷滄海遺珠二卷方外書十卷校字一卷鳯停山叢録一卷將以淳熙元年正月丙午葬于安福縣清化鄊長賦之邍頔扶服乞銘銓曰侍郎周公狀自足傳信不朽焉用糞土之言頔請益䖍不懈遂銘之銓頃于榻前論人物及公云雖老宰相才也蓋用狄梁公薦張柬之語上不以為過公儻無恙殆未易量也嗚呼惜哉銘曰材大而剛志直而方百世之豪抑彊掖弱搜爾民瘼小試牛刀臯比當路豶其勢距雪虐風叨禮經墓式高止四尺德與山高周益公贊王盧溪畫像嘲弄萬象雕琢太和不見詩人未老鬢皤先生九十乃爾顔酡窮則追澤畔之吟逹則和沛中之歌人徒見其善者機吾獨謂之水盈科蓋風披而文成非日鍛而月哦後此雖千二百歲可也彼造物者其如豫何韓子蒼跋王盧溪題宣和御畫詩自古正人端士一飯未嘗忘君又况形於歌詠贊美聖德之大者今觀王某所作宣和殿御筆鵲圖詩甚於痛哭觀圖足見憂國愛君之切深至於此爾凌陽韓駒書胡明仲跋王盧溪盜賊論王民瞻常以盜賊論獻江西大帥李相公盡得盜賊根柢蹊隧大帥欲用其言而以宫祠去矣時紹興七年也二十二年䖍兵逐刺史閉城以叛平時帶刀執檛立刺史庭下者果響應也雖朝廷遣兵掃滅俱盡而諸將爭上功狀使當時用其䇿而禍消於冥冥之中則民瞻之言亦無以取録所謂曲突徙薪無恩澤焦頭爛額為上客歎息久之余自嶺南歸聞其事遂取盜賊論題其後紹興丙子孟夏望日武夷胡寅書謝諤艮齊跋王盧溪手簡彭君夢協出示盧溪先生舊帖末後語諸甥就學必有事業意蓋可知今觀夢協氣宇不凡論議合理文筆藻麗志在青雲當不負老先生之觀矣紹熙二年四月二十四日太平興國散史桂山謝諤書楊文節公誠齊跋王盧溪手簡盧溪先生以詩取老檜之闕二沈共意出力擠先生以榮元勳竟何成耶先生料其不三年必有大咎未幾果若其言又四年檜亦殪古語云前車覆後車戒嘉泰壬戌人日後五日門人楊萬里敬書帖尾而歸之其宅相彭夢協云李子賢跋王盧溪手簡盧溪王先生天下之士也晚而後遇雖不顯用於時然持正不屈聞者猶能興起於數十年之後比得安成劉君伯深所編文集觀其詞采議論已足以知其胸中之所存彭君夢協於公為外孫家藏有墨蹟乃貶夜郎時往來書問言語鄭重字畫端正可以為法矣至其自處謂如東坡先生在黃州時又謂處此泰然無毫髮可慮之事則又知其所守之定雖困沮無聊而不變也慶元己未冬十月望日廬陵簿領李東子賢書楊長孺跋王盧溪手簡歲在乙酉秋八月二十五日大志彭君名靖字安國來訪余示以盧溪先生王公家書十紙與曾祖親家諱安衡字仲平者三與其祖諱飛字凌雲者六與其祖母女百八娘者一皆先生謫居辰州時帖也其辭有云朱守那城西安福寺見借舍宇明快度夏極凉寄猿皮一番與阿儀作劇歡愈安適無半㸃羇人遷客之氣者山谷先生謫黔州有家書與天民知命云吾在此甚安所居在南寺摩圍閣閣正對摩圍峯蜀人呼天為圍屋極寬潔瀟灑冬溫夏凉風物似江西寄荔枝二百糖獅六枚藥橙藥橘糖霜三􅀈與孩兒甜口兒兩先生言動殆晉人所謂將無同者耶想嚞人為之太息敬書其後而歸之于安國朝奉大夫直華文閣楊長孺書歐陽𤣥跋王盧溪手簡余客族姪秉彜家贅倩彭君益謙出其曾大父夢協所得氷霜翁王盧溪先生復往書札跋者為艮齊謝公誠齊楊公其子伯子藹然前輩風誼見於筆墨盧溪謫所書兩幅尤見居艱險如平夷冝與忠簡齊名於百世也至正壬子十一月二十一日冀郡歐陽𤣥跋盧溪文集附録
