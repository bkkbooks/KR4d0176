body:
  text: 盧溪文集卷四十五宋王庭圭撰墓志故左朝奉郎劉公墓志銘劉氏世家安福縣即古安成郡也自宋彭城王義康廢徙安成郡因家于郡之西隅其族至今猶繁也五代之亂所在盜起有劉德言者率遊手之民團聚為鄉兵以捍閭里事平以其兵歸朝聽命藝祖嘉之以兵屬諸將以文官賜德言終于水部員外郎自水部八世而生朝奉諱安世字世臣幼敏悟自知力學時從祖諱溥方以能文博古為世名儒晚年魁天下特奏名每見世臣之文曰汝方髫齔文已可觀恨吾不見其成耳由是舉族儒業皆從祖與世臣淵源所自也世臣自負其材謂科名可必取每遇取士之歲多士咸集紆侈袂曵方履望棘門將鼓篋而入輒以近親期服阻不得試凡如是阻試者連更六次豈天付之才而厄其早逹非命也夫紹興十四年始獲就試是歲掉鞅者五千人以君為榜首十七年又以第四人薦説者謂北斗第一至第四為魁星君平生未嘗遭黜落才兩試而兩魁多士其材不可敵也明年登進士第授嶽州司戶參軍獄有野夫傭雇於大姓家父病乞歸省主人不可野夫徑去其家誣以盜物而去獄已具君爭之曰奴以孝而省父病乃誣以為盜衆服其説而釋之郡丞以財用不足為名議減將校月支諸軍日守司戶之門且譁州民大恐君曰給納吾職非丞事也亟發帑給之無一人敢呌譊者郡丞初怒君至是反自愧作詩以贈君而稱其材後為永州教授適丞相張魏公徙居是邦今侍郎王公宣子綰銅虎符二公皆注意延譽之逮魏公再用欲薦之而以讒去君亦抱疾求退矣秩滿改宣教郎知贑州雩都縣邑大而俗獷有大駔孫氏鍾氏為害異時為縣者莫敢輒呵君首窮治此二人而枿其根芽三年遂以無事君素有微疾當此冗劇病益增大守為丐祠祿以歸轉朝奉郎致仕終于家享年六十有八父思贈右承事郎母李氏贈太孺人妻彭氏封孺人男四人格非去非勝非知非皆業進士能文詞格非奏補將仕郎女二人嫁李大年羅昌辰夔州録事參軍竇依君之考臨終以諸子皆早亡婚嫁未畢為憂君泣曰安世任此責願無憂厥後聚諸孤同居資産秋毫無私諸孤婚嫁了方及己子孫遠近聞風負篋而來學者戶外之屨常滿其學以明道通經為主不專傳注世俗之文有文集三十卷論語尚書解二十卷藏于家遺命不得以佛事薦享蓋平生所不喜也將以乾道六年十月庚申葬君于循化鄉封紫嶺之原其孤攜奉新宰楊廷秀所撰行狀來請銘廷秀名萬里自幼執經帳下學成即登第益能為文以顯於時不忘師學嘗言張魏公丞相為侍郎張子韶服友之服今侍讀胡公為清節先生蕭子荆服師之服萬里今亦為劉先生制服先期門弟劉承弼復與衆私諡曰清純先生嗚呼師弟子朋友之道廢久矣忽見此舉可以興古禮振頽俗遂併書于石銘曰世有通儒清純靜默不求人知名自赫奕挾藝射䇿每發中的三歷州縣洗手就職宰臣欲薦命制其力考其平生勒銘于石故孔氏夫人墓志銘夫人孔氏世居臨江軍之新淦其族甚大不知其所以徙異時經甫伯仲以文章居顯位名重天下世號清江三孔遂為一世名門士大夫偉其望而爭與為婚逮崇寧鉤黨之説起取元祐以來名卿才士悉陷黨中皆一時俊異也於是三孔散徙不敢以譜系自矜唯夫人父俊民實其近屬為潭州湘鄉縣尉與廬陵郭氏接境壤知郭氏世業儒有字君建者名播州里遂以其女歸其子景聞焉景聞既筮仕監戶部酒庫獲轉運司文解夫人年二十三歸之入門而少長相慶喜其有孔氏家法而無孔氏閥閲氣其祖姑老至百歲封孺人夫人事之積年不見有茍慢之容事姑尤謹上下戚疏靡不愈悅景聞所居當新淦舟車之衝故人賔客日至夫人密為具酒食咄諾而集曰此吾職也雖賣奩中物亦當為之景聞初為某州稅官懼瘴煙不敢携家屬夫人生三子長曰仔已能立次曰份未冠夫人日遣從師問學夜則燭短檠置座隅聽其誦書份亦頴然異於常兒自知刻苦磨礪以成其材景聞罷官歸是歲科場份已預鄉薦景聞亦驚歎息閭里識之者尚少明年試禮部遂登第歸榮其親於是人始知其材而翕然稱譽之且歎古之所謂賢母者於夫人皆可考也自出官堂除三郡教授改宣教郎才譽䆮聞于時矣幼子偉早夭女二人長適李揚次適鄉貢進士羅全德孫男五人杞梓椿柟樞夫人以紹興辛巳七月二十六日終于家年六十有七某年某月某日葬于新淦疇陂之原左朝散郎通判贑州羅欽若敘夫人之行狀其孤又以景聞之命來請銘為之銘曰孔氏崛起震驚南斗一時聲名風生雷吼江西氏族無出其右夫人在室世習熏揉來宜其家為婦為母以義教子磨光剔垢梯雲取官如探懷袖夫人之榮尚考于後故劉推官墓志銘劉氏得姓遠矣而君諱洽字百禮世為吉州安福人余幼從鄉先生劉公濟考其譜系之所自出與郭明叔內翰嘗志劉氏之墓皆云晉安成太守遐之後公濟以文行為鄉里儒宗晚以特奏廷試為第一厥後諸劉益蕃衍彬彬多文學之士君最後出尤警悟絶人讀書不常勤忽一日閉戶經月不出日誦數千言過目輒不忘比他人窮年盡氣勞苦而不得須臾息者力常有餘會新法更用詩賦老師宿儒既殁士皆病之君獨操筆如素習精深律切得唐以來作者之闕由是聲動場屋三掇鄉舉皆連中遂登紹興八年進士第調柳州推官適太守以墨敗經略府欲選能吏以撫摩其民而部使者咸以君為能遂綰銅虎攝州事踰一年先是郡有大姓以賄亂政姦胥舞文廢法又承創弊之餘大獄方興追繫接踵于道君辨其誣枉者湔滌之數日之間犴室幾空老姦大姓縮頸遁逃柳素僻陋庠序隳廢君為興學日延諸生登堂誦説於是州之秀民輻湊褒衣博帶如齊魯焉轉運使李公紹祖尤加識拔奏辟為屬官成命下而君已病時紹興十二年十二月十六日終于柳州之官舍享年四十有二祖諱質父諱開皆隱於閭里子男五人曰杞力學有父風餘尚幼有詩賦論雜文十卷號青錢集藏于家君平生倜儻不事細謹無貴賤皆與之遊至當官臨事剛果有不可回者嶠南吏習茍玩驟見君所為往往羣嘲而飛謗部使者久而卒知其賢交章薦于朝唯壽不究其材使天假之年當有著見以自顯榮於世其孤卜以明年十一月丙辰葬于安福縣西萬石塘之原泣敘君之始末以君為余門下士來請銘不可不銘也乃為之銘曰得官南走桄榔林忽從青霄墮嶇岑驥行萬里馳駸駸出門折軸理莫尋乘風破浪違初心雲帆方張落蹄涔為銘子墓誰知音萬里山高與水深故桂嶺劉府君墓志銘君姓劉氏諱章字微之廬陵宿學老儒也為人倜儻善談前世治亂其國家所以存亡興衰勝敗所繇抵掌雍容一座盡傾莫能與之抗其於書無所不讀而名動場屋後進慕之出其帳下者皆嶄然而有聞少年時與上計吏偕至京師試不得意乃上書言治亂之事不顧忌權貴久之會蔡氏用事變更治令取當世宿望大臣嘗有功而不附己者籍其名謂之姦黨士人上書不合意者籍為邪黨而君之名在焉天下義士歎息號黨籍為仙籍以其所籍皆賢者也乃知賢者所得之禍反以為榮耶君坐是不得預三舍考選宣和三年始以免解登第調賔州上林丞會村民有告鄰婦殺其妻者君適權尉事驗視以為非太守怒欲按之君爭不已忽遇赦兩釋之由是太守始知君之賢與諸司交薦之關升從事郎就移賀州桂嶺縣令秩滿以疾終于容州建炎己酉九月二十七日也享年六十有三君初娶歐陽氏再娶敖氏子三人長曰德驥次曰德麟幼曰德象德驥德象同登建炎二年進士第德麟嘗以才武舉至行在德象以宣義郎終于廣州教授德驥朝奉郎通判欽州罷始扶君之柩歸廬陵將以某年某月某日葬于某所之原未幾德驥亦卒以治命屬其子某使來請銘不可不銘銘曰奮身業儒崛起蓬藋晚始登科誰識此老十年之間復見二妙三折蟾枝宜大顯耀胡嗇其年殁于嶺徼歸藏故鄉勒銘以詔故吕氏宜人墓志銘左朝奉大夫前通判吉州軍州事趙公名伯璋之宜人吕氏世居衛州之新鄉譜系所自時有缺人贈金紫光祿大夫諱持者皇曾祖也登封縣長官諱覺者皇祖也朝請郎通判欣州諱無黨者皇考也長官有女弟適王氏是為顯恭皇后之外舅宜人視后為表姑后愛其慧淑欲留宫中以候其長宜人性沖淡不樂也然吕氏因之門戶浸顯公卿貴人走幣求婚於吕氏者袂相屬于道吕氏獨欲擇對於士人中會三舍法初興通判公才冠屢中高等馳聲庠序間吕公初見以為國器遂許以歸焉宜人雖生於大族德性柔淑樂勤儉能以法度自飭於閨閫上承下順無纎芥不滿其意諸吕南渡困厄不能自救者悉力賙之無少靳方少年時以閫內事自任而勉其失以學遂中政和八年進士第由是仕宦四十餘年所至有聲實有助焉先任興仁府幕官適軍興當干戈之衝遣家屬奉太夫人版輿避地于壽春太夫人欲留宜人於興仁宜人泣請侍行太夫人道中感疾朝夕臥起飲食醫藥獨宜人服勤左右不見惰容太夫人稱其孝謹後太夫人去世奉几筵如事其生此雖婦人女子之所當為然而近世或以為難宜人子男五人曰師韓補將缺女一人初適右從政郎梁杲任缺適右直郎廣州僉判李琥梁氏三子曰公鼎公弼公偉歸于趙氏宜人撫之如己子與師韓同就學人不知其為甥也孫女一人曰嚴娘尚幼紹興二十六年通判公監吉州秋試鎖院宜人與兒婦宴飲話平生若遺訓者至夜深無病沐浴而亡八月二十六日也享年五十有五卜以二十八年十二月十一日葬于吉州安福縣新樂鄉嘉林大塘岡之原銘曰吕所自出原于齊姻聫戚里門䆮輝不願缺學八姨獨適賢士得所歸良人弱冠名四馳早穿月脅攀桂枝江淮所至為吏師夫人端能助設施家聲千載尚可稽盧溪今作幽堂詩盧溪文集卷四十五
