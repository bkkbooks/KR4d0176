body:
  text: 盧溪文集卷八宋王庭圭撰古詩和趙叔清蠟梅春入梅花村蠟粧林影繁香肌冒寒立此意為誰存宫額半塗黃要為出俗韻不露氷雪姿風流真素藴江亭候施倅醇翁阻水漲作詩寄之夜雨漲溪碧天明望歸舟飛帆出木杪浩蕩兀中流洪崖仙人姿謂落滄海遊興盡却回棹待此霖潦收抱琴出竹迎倒披翠雲裘風濤正可久煙波生暮愁施肩吾得道於洪崖公其裔也聞郡中請賢老住報恩作詩贊之夜郎佛剎接西土誰敢招提境中住老賢元是住山人拄杖無心自來去山中猿鶴不須驚明朝聽打禾山鼓鼓聲新響振人天水禽草木咸歌舞贈羅道人余昔遊湖南聞羅道人而未識也忽相遇於螺浦之西鬚髯如畫神鋒甚偉又出時賢所贈詩益知其有以異於人也亦作一首贈之道人渴飲石縫漿鬚髯墨黑兩頰光或云公是伯休那又疑楚有接輿狂倒騎白鹿渡湘水獨識老翁跳玉堂他年賣藥長安市乞我仙人不死方贈蜀僧無觀蜀僧無觀善相自謂未能遍閲天下士意江海山林之間必有異人行當訪之於其别也贈之以詩師出峨眉西極天萬里一衲雙行纒朝遊名山暮滄海不著腳踏諸方禪眼中自有識人物行盡江南山水窟紫雲深處有神仙高馬達官無此骨溪頭惜别強吟哦顧我無才奈若何他日長安逢李白為乞峨眉山月歌次韻胡邦衡衡陽縣瑞竹堂牆裏圍修竹竹間開草堂經春多夜雨入夏長新篁節抱幽人操風敲明月璫孤根元獨立並幹兩爭長影落龍蛇動清移枕簟涼門常對衡嶽氣足傲羲皇日射玲瓏色林疏瑣碎光雙莖非别種異物出時方海嶠名雖久湖湘迹愈彰行當卧龍起天為見珍祥和胡觀惠詩兼致守倅招延之意伊昔橋門盛環觀璧水春一鳴先折桂百拙誤謀身憔悴湘江曲淹留京洛塵思歸緣竹鶴靜念愧朝紳顧我蓬蒿賤逢君海岱珍贈言多溢美秀氣發清淳本出東臯裔元非水北人山靈回俗駕幕府盛談賓駿骨千金重沙鷗萬里馴人生各有趣忍負接㒿巾和施倅歲暮感懷野濶生愁興時危無定居淵明傷倦鳥張翰憶鱸魚宦路風波惡交情勢利踈謀生成齟齬欲進復躊躇盜賊猶猖蹶田園未墾鋤君王圖治切新下急賢書近有詔求直言和歐陽廣明竹間桃花雨罷新花明曉日竹隂瑣碎錯黃金牆頭過盡雙飛蝶葉底巧啼何處禽玉女洗粧勻淺淡老龍脫籜著青深柔姿敢並高標立直節時容粉面侵愛客分明莫來折坐輿徑造不妨尋桃花落後春事已唯有清風滿竹林盧溪文集卷八
