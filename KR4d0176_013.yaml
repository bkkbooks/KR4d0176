body:
  text: 盧溪文集卷十三宋王庭圭撰律詩七言劉美中自翰苑歸追懷平昔之遊再過唐興寺陳迹依然輒成長句奉呈重尋古壁舊題詩林竹蕭森上翠微但見曉猿驚蕙帳應無山鳥怪儒衣野僧忽自雲中出閣老新從天下歸拍手相歡同一笑可能長伴釣魚磯唐興寺再呈美中七年三過唐興寺夢裏聞君得好官遍厯蘭臺兼柱史近辭香案出金鑾從來呼客沽村釀不敢移㕑洗玉盤政恐人情賤楊栁送迎唯作故時看送胡邦衡之新州貶所二首囊封初上九重關是日清都虎豹閒百辟動容觀奏牘幾人回首愧朝班名高北斗星辰上身墮南州瘴海間不待他年公議出漢廷行召賈生還大厦元非一木支欲將獨力拄傾危癡兒不了公家事男子要為天下竒當日姦諛皆膽落平生忠義只心知端能飽喫新州飯在處江山足護持次韻周公子秋日書懷酒酣下筆不能休寫盡江南萬斛愁長史果為何物漢中軍不是置書郵又聞戰馬將休息且任浮鷗自去留觸目西風易增感山川信美莫登樓和曹溫如都監惠詩兩腳誤隨車馬塵江湖嵗晚始謀身籬邊日醉陶元亮窗外夜呼祁孔賓倒著敝衣迎好客急搜竒句發陽春阿瞞豈但能橫槊文彩風流世有人次韻呈劉立道宣諭二首萬里窮民欲呌天天邊御史兩隨軒潁川大姓行當案河隴幽囚自不寃權幸畏威先縮頸姦回未死已羞魂江南弊冗如蜂蟻入奏猶須一夜論使星光出太微庭馬上風雲日下生斧鉞疑從霄漢落絲綸如被衮缺榮歡迎道路初頒詔威讋姦雄不動聲誰識張綱最年少耆儒空愧舊知名向文剛讀書齊試雙井茶有懷黃超然雙井老人嘗以青沙蠟紙裏細芽寄人不過二兩今復見之黃蠟青沙未破封已知雙井社前烘一邱風味極不淺萬頃烟波興不窮東晉書齊頽壓後西湖山色有無中危欄傑閣明人眼獨覺登臨缺此公二月二日出郊日頭欲出未出時霧失江城雨腳微天忽作晴山捲幔雲猶含態石披衣烟村南北黃鸝語麥隴高低紫燕飛誰似田家知此樂呼兒吹笛跨牛歸次韻謝同年劉子堅生日惠詩某與子堅同年生既長同學又同預州里薦名今各潦倒蟠屈巖穴因生日䝉惠詩次韻奉酬來詩記某家祖夢天上赤文詩詞清麗筆如神猶記同年歲在申弧矢志高千萬里烟霄路濶幾由旬曽無紫氣衝南斗空有紅光動北辰自顧頑才類銅錫敢期陶冶鑄成鈞和劉元弼亂後見訪缺下清談已絶塵莫嗟離亂恐傷神兵戈亦是缺來事邱壑還須我輩人吟罷細傾桑落酒歸來倒著接䍦巾茅簷近喜聞雞犬步屧尋君去亦頻朱通判見訪病不能出以詩謝之鳴珂傳響動比鄰爭看題輿朱兩輪節擁兵符分半刺道經山邑訪閒人行春號令清如水落筆篇章妙入神應念窮愁病書客經年憔悴楚江濱和井令西山石屋感雨漸見時平草木蘇姦蹊盜穴已汙瀦登山敢憚牛馬走置酒誰呼陳趙豫助魃旱龍初偃蹇隨軒飛雨不躊躇雲騰石屋蒼崖峻磨刻行當候璽書次韻謝處州倅毛長吉見訪惠詩文翰謂達可內翰也有客江邊問草堂銀鞍白馬爛生光不嫌茅屋絶低小往坐竹隂移晚凉入洛聲名動冠蓋傳家文翰在巖廊高風誰復如公者肯接山林氣味長再次前韻二首邂逅忽登君子堂眼眀初識斗間光如窺銀漢纎塵靜更酌金盤曉露凉玉座正臨天北極蓬山歸直殿西廊野人不識升平事但覺江邊白日長毛公過我竹間堂贈我新詩敵夜光盛德自為南土秀清風何羡北窗凉漳江日落人爭渡古寺僧歸月上廊揮麈細談家世事時材無復數真長和胡觀光黃元授二首樂天微之同試制科各纎鋒細管筆二公同年登科故云兩翁忽動鱸魚興膾縷無聲雪落砧細管向來曽並試清流可賦共誰臨好詩自昔員如彈古錦何勞嘔出心一覽雕章知格律吹笙學得鳳凰吟卧聽蕭寺五更風錯打當年飯後鐘不願綈袍憐范叔獨緣蔬饌識茅容黃旗接武來招盜皂蓋行春且勸農如此偷安欲持久荒謀誕計恐無庸讀韓文公猛虎行夜讀文公猛虎詩云何虎死忽悲啼人生未省向來事虎死方羞前所為昨日猶能食熊豹今朝無計奈狐貍我曽道汝不了事喚作癡兒果是癡向宣卿生日庭下秋風吹紫蘭蟠桃為壽菊斒斕厭分銅虎天邊郡屢直金鑾海上山洲渚忽然生户外歲星今却到人間願扶帝業須難老穩踏龍墀尾近班次韻歐陽叔向寺丞早春呈周子發知縣氷底涓涓已作聲曉看春色上蕪城江南樓閣烟中出檻外山川翠欲萌梅㸃宿粧凝笑靨栁搖新緑換枯莖化權初入東風手莫使階前草亂生謝劉時升見訪訪我林間一病翁數椽茅屋貯清風華裾織翠來天外揮麈談兵伏坐中回首此時增感慨出門何處問窮通北溟待看鯤鵬變坳水蹄涔詎見容送别葛德濟朔風飛雨未成晴脫葉打窗雞欲鳴此處霑襟話離别向來傾蓋識平生尚期揮麈堅談壘不必攻愁用酒兵北闕上書無計策誰能穿履雪中行再和德濟舊韻小雨􅀢􅀢弄晚晴饑腸過午自雷鳴鐘聲隔岸聞香積風味令人想麴生近報邊頭新奏捷獨憐江外未休兵誰能馭此不羈馬縱使脫韁千里行題劉端禮達軒昔賢曽此卧烟雲鶴怨猿驚幾度春緑蕙再遊今日路青山如對往年人兒童共是窗間客夢寐猶懷席上塵待得繞軒多種竹等閒來看莫嫌頻重陽日送李彥文之衡湘兼簡向豐之九日君當簇馬鞍重巖細菊為誰斑吟登回雁峯頭月看盡清湘雨後山莫遣音書和夢斷㑹傳名姓落人間向郎理棹歸何晚湖水今應不滿灣用前韻酬豐之每煩書札問平安落紙遙知筆管斑塞北未聞輕解甲江南應得飽看山荒村但有兩三户廣厦何由千萬間他日溪邊尋我去釣船刺入蓼花灣再用前韻酬胡觀光蔡誕自言為老君牧龍因博戲輸一五色班龍被謫牧龍天上幾時還因失仙龍五色斑暫謫南昌為隱吏㑹歸東觀校蓬山高名久已聞江表異氣今猶出斗間下筆不休才思濶清如星漢㵼銀灣從叔君冕見訪山間自云平生躬耕釣無求於人中有至樂令某作詩寫其蕭散之狀為賦此篇青鞋布襪緑蓑衣滿目秋江白鳥飛小楫扁舟乘興出斜風細雨釣魚歸有間茅屋臨蒼巘尋箇樵夫上翠微閒趂牧童吹短笛倒騎牛背入柴扉和劉元弼見寄終日思詩句未成夢回春草繞池生拂雲松竹兼天盡如畫江山照眼眀幽處園林皆可隱亂來軒冕亦何榮即時使有一杯酒便勝區區萬古名次韻李世京惠詩童稚情親不記春白頭相見眼猶新為文未辦送窮鬼買宅何妨近里仁魯國儒衣原自少棘門兒戲定非真斗間縱有衝天氣樓上應無識劍人和劉端禮避地初歸見訪庭前喜鵲亂棲鴉知有鄰翁酒易賒老瓦盆隨田舍飲半溪雲屬野人家莫將釣手遮西日來倚危欄詠落霞無奈醉歸燈火亂僕夫爭路頗喧譁和劉允升夢草菴前月夜看酴醿誰與東皇殿後塵更無凡木敢爭春來觀夢草菴前月疑是廣寒宫裏人雨罷香風吹滿院夜深笑語動諸鄰詩詞要並花竒絶對此吟哦句自新和端禮惜花苦風雨之句花逢暮境已侵尋庭值狂風不可禁已捲殘紅隨日腳更吹嫩栁到眉心明朝藉地猶堪醉小雨籠晴未作隂騎馬訪君春好在不勞鐘鼓報新音盧溪文集卷十三
