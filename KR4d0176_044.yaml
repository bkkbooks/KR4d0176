body:
  text: 盧溪文集巻四十四宋王庭珪撰墓誌故右奉直大夫康公墓誌銘康氏世為開封祥符人公諱翼字南仲性孝謹通練時務能談當時事冗穴弊源皆有本末故入仕以來所至有聲初以䕃補太廟齋郎授將仕郎衛州新鄉縣尉當塗交薦陞從事郎又陞儒林郎監定州北嶽廟改宣德郎監在京廣衍倉為博州司錄知興仁府南華縣監左右騏驥院草塲靖康改元轉朝散郎賜緋衣銀魚除開封府戸曹將擢用矣是歳金人再犯東京公攜家自圍城中出望江淮南走冒百死求一活而不自保也㑹張丞相召入相遇入建康論時事知其材可用既拜相除公知德慶府德慶所𨽻止兩邑賦入無贏餘改陞藩府之後前政輙㑹肇慶例百色皆增於他州至是財用頓窘公究其弊曰元不曾申明朝省一切當如舊月給減省宜自太守始由是財用僅足而官吏請給亦不闕人皆難之劇賊賂科起湖湘擾二廣將犯徳慶去城十餘里列寨城中忷忷咸請避賊公曰我非不知驅羸卒守不可恃之城以當倉惶蠭起之賊勝負未可必但守吾城不可以去乃率州兵保甲登城列旗幟以候賊聞鼓聲謂城中有備一夕引去州人德之繪公像于家示不忘也自德慶罷歸年未六十不復仕宦卜築廬陵閒居二十六年以某年某月某日無疾危坐而化享年八十有二官至右奉直大夫文安縣開國男食邑三百戸賜紫金魚袋公曾祖諱九齡故東頭供奉官祖諱浹故贈通直郎父繼隆故朝議大夫贈金紫光祿大夫母趙氏累封安康郡太夫人公娶胡氏次董氏次謝氏次嚴氏次董氏皆封宜人先公而卒男三人長曰行簡早卒曰光祿右迪功郎連州司法叅軍知書能文卒于官舍次曰照祖前潭州善化縣主簿女二人長適進士李元卿先卒次適進士曾畇孫三人寧之慶之皆將仕郎永之以公致仕恩澤奏未下將以是年某月某日葬公于廬陵縣儒行鄉青湖山之原右奉直大夫謝公鐸與公同辛苦渡江知公為最詳以狀來求銘序而銘之曰公材足以經世未始出而自媒守孤城於海嶠當兇冦之猝來驅羸卒以捍敵志臨危而不囘賊亦引退城亦不頺迨今無有知公者余謂世之君子非特不能知知亦不能用用亦不能盡其材作此銘詩以寫其哀故左朝奉郎前知潯州董公墓誌銘董氏於吉州為顯姓世居永豐縣其族繁衍時有聞人公之曾祖諱洙擢進士第為桂州觀察推官祖諱師範右朝奉郎考諱唐贈右中奉大夫公諱觀字坦叔㓜孤能致其孝於母稍長慨然有志於學欲自奮以榮其親棄貲産勿問委昆弟以養母年未冠藐然孤童徒歩入東京聞有太學者近天子之居天下豪英俊傑鼔篋其中公一試而入焉時方重經術往往脫傳註而得經㫖於文字之外學成嘗與太學薦名㑹三舍法徧行海内太學生悉歸本郡從里選以興於學公復以鄉舉貢于禮部試不得志自是以經術教導鄉閭族人子弟皆從之遊有以文章廷試魁天下士為狀元不數年遂叅大政者亦公之姪也可謂盛矣宣和甲辰公始登進士第調舒之太湖尉值丁進之亂官吏皆避匿公獨陳討賊之䇿於提㸃刑獄馬公勒弓手與州兵㑹卒殺丁進馬公上其狀以功循文林郎又改宣義郎秩滿道中復聞李成鈔刼行旅百姓奔亡至江不得渡公告急於彭澤令得舟以濟復回舟渡奔亡者渡絶而賊旗至人咸以再生德之後知南安軍南康縣臨江軍新淦丞以朝奉郎知潯州所至皆有治績潯州罷歸築室郡城之東有江山之樂不復出仕遂致其政以終老焉公雖不大顯用於時退居江上猶二十年未嘗一日慼慼于懷遇今上即位轉朝請郎賜紫金魚袋享安佚之榮亦人生之所難得也壽八十有六忽呼兒孫如平時訓以勿負墮即奄忽而終隆興二年七月二十九日公初娶曾氏再娶許氏子男二人皆曾氏所生長曰逢吉早亡次曰膺右從事郎知融州融水縣女一人嫁進士曾彌髙孫五人長曰伯璋逢吉子也次曰聘曰珏曰瓌曾孫八人大猷大雅大節大亨大受大任大成大明是歳閏月九日葬公于新淦縣揚名鄉慕善里今剛山之原其孤以興化太守張景純狀公之行事來乞銘銘曰公以孤藐振㧞崎嶇徒歩千里登名天衢初仕得尉邑當太湖大盜猝起官僚四逋公獨建議卒擒凶渠有材如此未盡發舒時莫能用宜有後歟故縣尉劉公墓誌銘君劉氏諱彥弼字英臣世家安福之北四十里曰東岡蓋古毛亭之地王烈之安成記厥稻馨香飯如凝脂即此毛亭也故其俗貴重農桑不趨末業君自髙曾以來家已富殖而好施然為士者尚微至大父時始置屋延納鄉里宿儒使子弟擇術受業由是束岡之劉彬彬然多儒其家矣君考諱昱尤能捐金帛買書至萬巻君自少强敏能讀其書長而才具秀發亹亹有聞于人建炎初江湖盜起余避亂山中君亦槖其書以相從倉惶轉徙未嘗一日廢書不觀於是益知君才行為詳與兄之子冀同室廬無異殖僅三年矣如其父不没鄉閭以為難兵興歳荐饑人方閉庾廪乗民之急君獨先時平其直出之價卒不踴歳歳如是遠近德之性和樂喜賔客居家與待交游終日不見惰容尤能振人之窮急君之居鄉大率如此士大夫識之者皆知其有學問獨恨其平生以貲蓋其才故不能顯大丞相朱公以軍興制置江南君因補右迪功郎有薦其才用權新淦縣尉提㸃江淮荆浙等路鑄錢向公行之直秘閣知道州向公宣卿兩公皆一時顯人咸羣薦之未及行君已得痼疾紹興十二年九月二日終于家年五十有二以十二月三日葬于清化鄉鴨遊原娶王氏男一人庭堅初業進士是年與兄之孫暕俱以外姻故丞相吳公遺表授承信郎女一人余之子曰頔其壻也庭堅以君從余遊最久且有姻婭泣請掇其事誌之誌成人以為無溢詞迺使刻而措諸墓中復銘之曰士生一世兮或不遇時善積一身兮人或不知人不知兮天知之唯天知兮必報施故彭夫人墓誌銘廬陵段允䘮其母三年厄困不能舉挾書冊走四方為旅人欲盡力致其孝以葬紹興十四年正月抵盧溪狀其母以告曰葬有日矣卜以三月壬申作馬鬛于儒行鄉樟山之岡求文以銘其壙余嘗與段之父元游並美學校又及識其大父承議公因以知夫人之賢是宜允之來請也夫人彭氏世為廬陵人曾祖太常博士諱齊以文章名播海内一時公卿傾慕之至今士大夫猶能誦大博之文至於醉墨戲藁時見於野史小說則其魁豪風味可以槩見也祖諱說不仕父諱聞明復能文辭終於廣州觀察推官與承議公同州里相好又同登元祐六年進士第故夫人得歸于段氏夫人生名儒家渉獵書傳知以禮義自飭事其親以孝聞至為段氏之婦事舅姑如事其親承議公與賔客燕談夫人治酒食咄諾而具其夫字元美力學淹貫羣書取官不得志夫人導以泉石之樂卒能使承議公日與客飲酒而忘其家之貧又使其夫不以得失累其心而終身不戚戚者實有助焉元美先七年而卒其家益窶夫人閨屏蕭然聞其子讀書夜寒聲出金石則喜曰我㓜聞先大博微時如此故用以起家於是夫人又能使其子甘寒饑不以貧富動其心而得自强於學問至於有立者歟今之為士而不能安貧茍冒突梯失其守者多矣幽閨婦人能為士君子之所難是其為德豈不侈大矣哉夫人生三子長曰允有才行鄉舉異等次曰雍亦好學㓜曰亶柴毁而卒女二人長適進士蕭安行亦以聞訃大慟而卒㓜已先夭孫男曰荺孫女二人皆㓜夫人享年五十有八死之日實紹興辛酉四月二十八也吾既許段子以銘而序其事乃銘之曰婦德弗耀閟于閨門能談詩禮乃大其傳亦既有子而又有文升于州里頭角嶄然人不稱其子而賢其母謂真彭大博之孫故王氏夫人墓誌銘夫人王氏吉州安福縣老儒王遵道諱行已之女遵道業進士有聞于州里初以詩禮論語等書自教夫人讀數過輙成誦耳聞目染不待勤苦而成字畫亦工故人蕭公敞素善書見夫人埀髫時學書驚曰此女可教因授以筆法由是書益好遵道愛之為選壻得同邑劉户曹邦傑之子大虚名敦實未冠以文行知名夫人年十九歸之逮事舅姑内外歡忻無一異言舅姑稱之未嘗有一日不滿之色又能以順相其夫處其家以勤儉至於奉賔客車馬驟至則傾匳中物無吝情戸曹公初為明州奉化主簿夫人長子曰思文始就外學日誦千言夫人夜具短檠手自縫紉而勉之誦聲琅然響徹鄰壁縣僚聞而歎羡常語于家以激勵其子弟而稱夫人之賢也夫人生三子曰思文兩貢于禮部曰思問思謙皆俊而有立女五人適士人周郁段徽柔伍稷臣朱侯度將仕郎李翀孫男十人作肅九垓作又作哲作謀九疇九叙九德九扈九齡女九人曾孫男六人女四人大虚夙富學問而不樂進取二親既没年尚强不復掉鞅於塲屋益讀書為文以自喜夫人雖好學然知古今而識道理視榮利亦泊如也大虚嘗言吾得老於邱園以樂其生不以富貴得失動其心者吾妻實有助焉夫人能為小詩大虚未嘗以示人獨於余厚善時得觀之其意亦謂此非婦人女子之所當急詩一傳於人則爭相騰播卒掩其内行然以婦人之知書識翰墨又以教其子孫非賢能若是乎余觀夫人子孫滿門皆頴秀而能屬文固已知異日劉氏之後必有興者寧遠縣丞江致堯叙夫人之行來請銘毎以賢婦稱之嗚呼可謂賢矣夫人以乾道乙酉八月微疾忽呼兒孫環立左右戒以孝弟輯睦勿墮家訓語畢而終實二十日享年七十有七以丁亥十月丙午葬于安福鄉焦坑之原銘曰婦德之賢弗暴于外良史不書惟銘可載行稱于鄉歸宜其良階庭競秀蘭馨玉光他年駟馬車煌煌生不及享後益昌盧溪文集巻四十四
