body:
  text: 盧溪文集巻三宋王庭珪撰古詩謝張欽夫機宜惠靈夀杖九疑連綿青未了郴江擘出蛟龍吼雷公霹靂搜巖幽化為鬱律黄蛇走飛電迸火出竒節黄蛇走立僵如鐡攜看玉女洗頭盆拄上九疑探禹穴莫挑馬箠渡黄河莫扣天門閽者訶但掛百錢時一醉從教風雨濕漁蓑青錢學士年方少年少羞為老人調即看飛歩上蓬瀛别有青藜夜相照魏彦成寄示桐川琅琊送行詩集奉次栁字韻一首系于巻末少年班玊墀美若靈和栁一麾出銀䑓風流亦不朽琅琊古名郡屢移賢太守天子憂逺民謂公極其厚林甫既當國不便珉與玖何如訪醉翁翁意不在酒次韻張䖍州兼呈向宣卿賊鋒繞章南殺氣動秋色主將初無謀突出誰與敵君門九重深羽衛森旗㦸我欲獻竒計何由吐丹臆萬言一杯水平生㡬兩屐時雖急搜賢毁譽皆失實頃聞向衡州姦盗俱惕息人材有如此宰相安可失和李巽伯韻贈甥劉志道年少嘗讀書復挾琴與醫世無識真者持此將安之古調不詠俗空嚢不貯貲結交名公卿雲間接風期披烟對珠玊常恐生微疵向來壁上弓落杯輙自疑此事一了了昔賢當並馳李卿句有眼妙語真而師存存閣王郎身如椰子大胸蟠萬巻猶能載少年著足名利塲歸來卜築紅塵外太虚為室月為燭四海諸公常所㑹窮閻陋室天下貴駑奴豐車多覆敗坐收浮念得此生如鍊真金豈常壊是中本自無虧成壞與不壞亦何在請君直下賦一言要識所存當默解次韻周秀實觀李觀察勒兵霜風獵獵吹旗旌將軍束装來勒兵白鷺洲前雲鳥合青原䑓上山川横李侯凛凛萬人敵匹馬横行沙塞北至尊殿上親賜名生坐閻羅官柱國提兵括冦來江西探取賊窟如連雞軍中超距多暇日却學臨淮親校旗中興猛士如吼虎二十八將隨光武要看麒麟第一功金印埀腰光耀組送陸景莊提幹驅車越荆吳轍跡走欲半是時親戚多烜赫踐華貫中有衣繡人持斧下霄漢利權炙可熱冷語氷未泮徒乘朱班輪呵殿嚇閭閈如儺帶面具應遭鬼笑玩而况新失職誰肯聴呼喚坐令公困窮旅突幾不㸑蔚然鸞鳯姿胡為雜鵝鸛我實憎此曹期君遊汗漫次韻曽育才翠樾堂雪詩哦君翠樾堂中雪詞如劔㦸相磨切又如牛鐸應黄鍾水中躍出㽔賔鐵因誦東坡憶雪詩城郭山川兩竒絶翠樾堂中雪復然敢擬片詞増竄竊長安道上醉騎驢忍凍不知蹄屢蹶争似淮西破賊時蔡州城外沙如月將軍一箭射欃槍夜落城頭曉方滅㨗書飛奏不動塵露布馳來迷玊闕醉翁句律號令嚴凍口何由更開說銀杯任逐馬蹄翻斷藁殘編且扄鐍送趙逢源赴趙提㸃辟泉司近年浸鐵成銅以足國用使者與公皆賢宗室故以比子政云曩日逢君盧水頭來如天馬初伏輈忽然去作幕下士奮袖起如鷹脫韝黄雲壓空欲成雪笑捧辟書還御闕王孫俱是天麒麟枕中有方能㸃鐡同陳思忠訪洪覺範尋春反向僧房卧無乃行蔵與時左起來刮目覽新詩花壓欄干夢初破黄葉丹楓屬興深吁然莫測疑楚些惠休島可沒已乆二百年來無此作世間何處著斯人秀句天教出寒餓我氣未衰詞頗弱欲借鼓旗聊一佐終朝巖下不逢人苔色應嗔馬蹄涴次前韻酬劉美中筆勢斕斑如虎卧何止風流盖江左新詩吟出鸞鳯音曉鶯未啼春欲破始知李白飄然思俊語天成安用些鳳簫聲不類人間玊管定非人所作可憐洛下書生冷雷轉空腸發清餓終日長哦學不成掩鼻皺眉相賛佐與公並轡且西遊舉扇勿憂塵土涴贈忠㐮公二孫乃翁精忠貫日月一門挺秀俱琅玕丹山飛來兩雛鳯碧梧翠竹皆停鸞武陵溪邊忽相遇口角流涎誦詩句盧溪摩頂欲作語他日雲霄還記否送安成知縣周子發公家伯仲方持節江淮發運提㸃荆湖刑獄公今又趨朝故有是作安成斗絶吳楚東妖氛未息仍歳凶公當是時宰斯邑眼底日厭旌旗紅北兵初冦中原地驛騎符移星火至衆方敲捶立威名公能使民歌愷悌公家人物自魁雄弟兄蹀躞騎青驄端能經世任國事同時獻納蓬萊宫繡衣持斧今無對虎節麟符照湖海行看三鳯接雲飛共濟艱危熙帝載酬聶達夫惠所業聶郎贈我長短句大盤小盤堆玊筯當年持此驚市人破㡌蹇驢誰借譽厭聞百鳥呼春風自作綵鳯鳴孤桐俗聞惡語敗人意胡不謁帝明光宫酬劉英臣載酒送花去年花下探春雨鳴鞭走馬看花開今朝危坐空山裏不識春從何處來誰云山中春亦好忽見花枝被花惱無柰窮愁輙賦詩對酒簮花能絶倒次韻劉謙夫同年二首子雲昔獻長楊賦詞傾江海濤翻素溪邊相遇覽新詩陣馬迎鋒敢馳騖忽憶楓宸賜第時青袍紛紛莫知數與客流落最多年不記紫騮花下路蒼龍闕下同充賦偶著青衫脫寒素當年千佛共題名勢若飛黄正騰騖此時入彀多英雄只今豈可一二數朱輪丹轂滿人間亦有傾輈猶載路次韻張子春賦瑶林春色余瑶林洞中以酴醿作麴因為酒名花間酌酒邀明月月照金罇佳興發鯨吞霧捲百川空醉挽酴醿落香雪便將壘麴築糟邱酴醿壓膏麥為糵醸成忽見張公子公子家居近丹闕為余乘興誇洛陽笑指沙頭卧䨇榼洛陽視此真草野敢辱新詩借牙頰瑤林名字出風塵未遇知音那敢說况能大讀離騷句痛飲雖多不為餮未識王家碧玊香髣髴東坡真一訣誅茅本結方外人豈用禮法相分别預拂瑤林一片石與君醉過清明節窮亦不足悲逹亦不足悅酒䦨㧞劔露肝膽正恐不免論功業和陳柄臣見贈北人愁聽江南曲細草新蒲幾回緑當年避敵初渡南千官蒼黄飯不足中原亂後又逢春邊頭只道無烟塵邇來公卿不生事此事必屬非常人我曹生長江南樂豈料翻成風土惡湖海元龍氣尚豪贈我新詩何璀錯拾遺後出最能文脩椽大屋今荒墳逺孫高材淹管庫猶能落筆生烟雲山城相遇初相喜共論大梁人物美莫學夷門抱關吏謀竊兵符椎晉鄙和胡子敦實少年行酒酣坐待東方高臂鷹走逐城南豪彎弓射殺白額虎醉騎歸馬雪花毛日暮黄雲動天色易水迷魂招不得莫學并州遊俠兒徒費黄金飾韉勒暴雨初晴馮夷聒天夜椎鼔盡驅羣龍起行雨阿香推出雷公車惡風動掣不周柱似聞帝坐清霞宫號令羣龍收惡風便令萬物有生意虞淵取日當春空觀李氏畫壁間冥冥雲塞川細看幻出江湖天寒鴉雪壓凍不喧沙尾忽有瀟湘煙黄蘆碧草鴈初下畫此千金不當價為君覔紙一題詩詩不能工且觀畫李仲孫佩軒我友李仲孫飭身一何介被服古衣冠昻然偉而怪開軒蓬户中紉蘭以為佩布袍揖公卿脫幘卧江海方其得意時天地不能礙荷鋤入深林剪薙發幽薈清芬動忩壁蕙若連光彩君看紫綬翁腰埀黄金帯璜珩錯琚瑀印章如斗大歩趨踏龍尾鏘然中音㑹豈如此香草擢秀繁霜外秋風落萬木臭味乆逾在我思軒中人免食三年艾夢寐欲見之一往清鼻界酬劉震仲憶對秋風與公别風吹雲開露明月高談不作儒生酸舌翻波瀾吐竒絶今朝馬首從西來笑我窮愁不掀揭蟠泥蛟螭氣如蜺不肯一吐人安知要令光彩射月脇五色萬丈天南垂我聞此語中夜起誰與挿翼白日馳低心逐駑駘青衫走塵土何當大醉騎鯨魚凌烟飛過蓬萊渚送南䑓長老并序夲老遊吾州數年余固知其名而未識面也忽飛錫赴南諸侯之請訪余於溪上談論亹亹獵取孔孟荘周之言以證彼大事此又談禪而無蔬笋氣者也竒事竒事余聞南䑓古禪窟大師時之偉人其徃也必不為彼寂寂故作數語以贈行祝融峰畔南䑓路傑閣危欄上雲雨繡木泥金好佛堂撞鐘擊鼓聞瀟浦瀛洲仙人東道主缺招提境中住請公説法也大竒要公别下一轉語盧溪文集巻三
