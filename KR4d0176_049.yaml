body:
  text: 盧溪文集卷四十九宋王庭圭撰題跋跋黃給事行狀藁山谷先生文章震耀天下墨翰以石刻傳者遍九州而其真蹟槩見於世者鮮矣雙井黃子卞家藏山谷所作乃祖給事公行狀藳亡慮四千字落落如明珠大貝自然可貴方作文時無意墨翰畦畛間故能如是唐顔魯公字亦多矣而論坐位書藳尤竒亦取其自然韻出意外爾跋彭大博家傳彭孟舒與祥符天禧以來名臣皆擅聲一時而官止於太常博士余嘗慮浸久而逸其傳孟舒遂泯而無聞其裔孫德宣出胡英彥所作家傳髣佛其平生庶幾可以備異時史官之採擇則孟舒為不泯矣書黃山吳道人墨已有吕辨老胡藏之題離亂以來徂徠易水皆斗絶一隅比年供堂及士大夫所用惟黃山墨爾吳道人所携亦黃山之佳者吕辨老胡藏之皆工書蓄竒墨臧否當不妄跋趙孝穆帖崇寧間約閭丘宮教飯其孫以遺趙從季孝穆孫也陳孟公與人尺牘人皆藏去以為榮良史書之孝穆公在先朝時貴公子也自折簡邀客客寶之閲三世而猶在客豈以是報一飯之恩蓋以公子聲名貴重天下而然爾既而以遺其孫從季從季好學工文能世其家者也故客卒不能有而復還璧於趙豈偶然哉跋錢希白上宰相啓錢希白自吳越入朝折節學問晚以能文章入翰苑當楊劉力變文體號曰西崑學者病之唯希白博古能逐追其間方投時相啓求識擢時年尚少詞雖博贍猶餘五季文轍然不蹈襲陳言至崑體亦出自然知變而冠絶于時非才大莫能然也跋二蘇帖兩蘇公醉墨斷藳不自愛惜求者輒與往時士大夫家多有之近嵗有力者喜奪人所好藏書者至不敢示人趙從季所藏甚富何以能然蓋所謂廉者不求貪者不與能如是所以存久也年月日王某書跋黃魯直帖東坡先生嘗言山谷老人來僰道觀長年撥棹乃覺稍進山谷自論亦然此帖真山谷書非不秀偉要是元祐以前作跋范文正公帖范文正公待客意不在酒食客方入朝為諫院官折節呼為長者蓋臨别贈言使以直道侍天子之側勿阿諛權貴私其喜怒爾此長者之道也跋楚老帖佛固不可求㑹處豈容說苦作如是言為誰略饒舌乾道乙酉冬至日書跋劉美中書李氏先墳連理木為士而孝於其親固未足以驚世絶俗而李氏之孝若能動造化至為之熏蒸草木出瑞物以錫之何哉豈近世孝子之道衰雖為士者或有愧於斯天乃表其異而張之耶翰苑劉美中嘗推本瑞應為之說而邑令尹又喜其在境內而褒寵之將見鄉邑之間皆相率而為孝雖閭巷刺草之民能持一槩以自顯而風俗大變或自李氏云跋黃秀才詠史詩士窮不極必不能奮厲以竒自出而力傳於世柳子厚少年時名未大振一附王叔文遂陷於不義既廢斥材不為世用道不行於時窮愁困悴能自力為文辭以求别於衆人而其名卒顯焉分宜黃秀才昔嘗蹈艱險幾危而僅脫由是感激閉戶讀書忘寢食不數年作詠史詩至四百篇貫穿古今上下數千載間事跡粲然夫能如是可以昌其身而無愧於人况駸駸未已欲破萬里道爭先而疾馳未可量也題圭粹中偈後圭粹中嘗有詩送余鄉人彭青老兼以見寄且叙云為異時蓮社之依其詩蓋從三摩鉢底來不假雕鐫而放逸自在每恨未識其靣而粹中順寂圓無住携所得粹中偈相示有感於斯人遂取昔年送青老詩題其後以示圓當與此老更結三生蓮社爾芒鞋竹杖西出關行盡千山與萬山黃塵烏帽不埋沒丹霞選佛非選官請君擡起幞頭腳向上猶有二四著再拜更問王老師老師規模難摸索此粹中詩也紹興己卯二月五日書跋謝仲振所藏秀王帖時乾道六年端午日書國朝以來士以職事相交承者謂之交代契義之重至纍世猶敦宿好近時貴顯者或忽略此事其風寖微秀王天人也應典册啓國封為真王初筮仕時與開封謝仲振為代於淮陽軍幕中厥後或以事至東都必先尋訪叙舊故接殷勤通書必親灑墨英風義氣表表出常情之外使人歎仰仲振今為右奉直大夫以祠祿居江西藏此書以示子孫為家寶也跋趙從季所藏吳傳朋千字文世稱吳傳朋書一筆盡一行不斷目曰遊絲書今觀此千文殊不然始知得名之誤也東坡云唐太宗評蕭子雲書行行若縈春蚓字字如綰秋蛇信虛得名耳東坡取其鄙象之不類特表而出之人莫悟爾余於遊絲亦然蓋善書者隨手萬變安可指一物而求盡其妙趙從季親得此本於傳朋亦其晚年筆力縱橫得意時書者也跋靈樞經靈樞十卷扁鵲注其書多論脉而中有衛生之經說虛皇九真隂陽之精皆出天地之外非凡目所見也侯大淵示余此書讀之灑然益知金丹果可作而不復自疑者蓋探出扁鵲之肺腑而取證焉耳大淵切脉論病出人意表其亦有得於斯歟唯字多脫誤不敢以私意竄定為題其後而歸之書李仲孫程文士失志於舉場不自振拔往往窮悴齟齬喪其英氣豫少年時已聞李仲孫善屬文論辨俊偉氣豪邁獨婆娑連蹇於場屋中今年秋復不中選覽其程文詞鋒森然停蓄雅健縱橫磅礴豪邁之氣不减昔時非胸次吞雲夢筆頭湧若耶奚能若是乎竊意仲孫平生蓄藴終必為世用異時或不由場屋以顯則當如嚴助朱買臣田千秋馬周輩起徒步逆旅之中言天下事發其精煒以震耀于時必有竦動而觀者豈有司私闕盧溪文集卷四十九
