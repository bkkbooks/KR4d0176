body:
  text: 盧溪文集脫藳宋王庭珪撰送郭仲質教授雪欲留君君不住散作晴天送君去滄江破臘缺古詩題羅巨濟翠波亭律詩五言和伍孺安瑞竹律詩七言遊仙壇欲登芙蓉峯山元弼賦詩因次其韻欲結茅齋一兩間芙蓉高處掩柴關人逢好景缺送劉諤卿赴鄂州司戸送楊文黼赴松溪主簿春曉乗舟至豫章城外送王仙老歸洪州兼懷黄超然提㸃送劉世臣赴省試律詩七言余竄夜郎嘗約彭士貴他日必相㑹于瀟湘之間東歸至長沙果相遇焉士貴惠詩次韻奉贈缺江南一夢中覺來說夢已無蹤㑹尋湘水缺枕上逢逐客衣冠尚繿縷故缺欲下非堅敵試舉酒兵令登辰州城樓觀雪缺白銀宫斷椽破壁缺宛積玉千頃流水灣如月半弓江邊寒梅自竒絶何必更畫漁蓑翁絶句惜春亭觀酴醿招韓宰送陳鵬舉入吉州學幷序陳鵬舉自嶺南萬里慕廬陵文物之盛欲遊學焉士或以書來求先容於學官僕恨聞廣文之名而未識作小詩送之以呈學官和答韓宰諸公晚春絶句讀道藏雲笈篇次韻别向豐之次韻江伯任見寄送義宗住小盧山盧溪文集脫藳
