body:
  text: 盧溪文集巻二十八宋王庭珪撰書與黃平國正字書二幅茅齋作别行復二年瞻仰清標如在天上今夏忽聞有館閣之除凡交游孰不共喜而僕又倍於他人也蓬萊道山從容之樂囘視昔時州縣與俗吏庸人之校米塩者其㑹豈可同日而語某與平國相識雖晩而一見知公為異人果具高材為時揀㧞朝夕珥筆螭㘭廌冠南臺指陳時弊使海内䝉福此亦平國之志而野人之所願見也今覽所惠書益見議論高明北使之來雖叵測汴京實大亂彼畏我之乗其虛姑為請和之議謀緩王師耳若其狼心侈欲固多則蜀亦是其一也僕謂近時禦㓂無策最莫甚於遣使當建炎倉猝之初不可不姑為之今已十年在目中遣使何益徒墮賊計損國威耳為遣使之策者非有竒謀偉議不過曰二帝在彼不可不遣而已前年胡明仲曽論此事引魯威公為齊所殺而其子莊公屢與齊通好春秋惡而書之其指陳利害始終剴切炳如日星上嘉納之未幾時宰惡其議不出已復議遣使矣不審平國曽見此疏否范伯達必有本不可不一觀向嘗略及盜賊事正慮行朝誤聽得來教果鑒其事因李丞相與孫䖍州佑不相能各為異論孫欲殺而李欲招既而罷孫除張觷遂專用招安之説破械釋死因而與之官以歆艷羣賊不數日皆解甲束手來授官因以盜息聞於朝此豢虎狼之術饑飽適時未肆毒耳今招安之官反令握兵巡捕被刼殺者痛入骨髓寃無所訴異時招安之官不叛則報讐者操戈而起所謂盜賊直須時爾平國髙見料此可以為長久之計者哉今日事大抵皆然可為太息也比來年榖雖稔民物虚耗州縣誅求愈急向使今嵗更遇小旱不知肉食者何以處之每見平國慨然有體國憂民之心因書輒敢及之如某蓬室之士興言及此正猶嫠不恤其緯也幸勿以為笑辱賜教仰銜眷意之厚啓緘方知平國入尚書攝郎曹清資顯秩將逼禁近尤慰巖穴故人之望每有知識自行都來未嘗不䝉記念顧田野一人何足以煩齒頰平國今逢時得路當奮發之秋不可與田野之人為比况執事本受知於趙丞相丞相居外一年亦備見天下之事靡靡然日入於敗壊將欲救之必易其轍而後可向來以吕某總淮西有識者皆知其必敗事而莫敢言及今禍亂已成而後論列不亦晩乎徐穉山將江西風㟁稜稜錄寃禁暴不避權豪數十年來無此監司也第恐為羣邪所忌爾今若諸路盡得如此人則何憂不治此亦執事不可不知也狂言幸恕僣越答鄧克强書余平昔欽嚮克强鄉里宿儒遊場屋時間闗出處慷慨論議克强亦若喜其為人矣後因盜傷先塜遭桑梓之吏不良僕走闕下上書陳寃是時宰相公卿與臺諫之臣皆惻然動懐爭為論列決欲究治惟鄉閭私好惡之人忌其以布衣動天庭乃郵傳他詞汙衊之紛嘵十年卒有公議不能加損如蟲讙鳥咋自鳴自己了無相干亦有輔盜賊鼓唇吻教其張皇筆札欲以竒動某者葢亦不知某之不可動也方上書理墳墓時死且不惜遑他惜哉世俗欲以區區謗語相摇脇寧不謬乎頃得官湖南㑹監司守倅皆庸俗人爭事不直棄官而歸放浪山水間與漁樵雜處甚自負也而紛嘵之徒復加釀惡語甚者至蹙額相弔唁以為失意尤可笑也此非特不知某之心亦是世間久無我輩人驟見一二事自然怪駭如克强平昔最相知今者䝉書鐫諭為賜甚大豈不知感但其間責某不能隱忍如韓信胯下等事未敢以為是信淮隂一餓夫當擾攘之時與夫所謂鼔刀僕馭販繒之徒俱碌碌未有所奮使不遇高皇帝則數子者遂沒齒於鼓刀僕馭販繒之間而信之事業終身為胯下之人而止耳何所取哉且信貧無行方從亭長妻漂母乞食時尚不得推擇為吏豈自知有拜大將軍封齊王之事况今遭世承平與信之時異決非黥奴餓夫可以僥倖攘臂而得志者胯下之事可為則鄙儒腐生喜爭為之獨不見衛青汲黯同在武帝朝方青為奴僕時正胯下比也二人者功名亦略等然武帝踞厠視青至汲黯不冠則不見也葢青庸奴固宜踞厠見之而黯又䝉尊禮如此則士之所處不可不擇信何足道明矣克强又有取於陽城初若尋常庸人至其剛毅見於伏闕之際此尤不可曉若城當徳宗多事之時不能吐一辭以開悟人主為諫議大夫七年在職不為不久顧乃含糊緘黙適遇陸贄裴延齡二事便伏闕爭向使城五六年而遂遷他官不過齪齪隨仗馬俱退而已何足羡哉幸而七年不遷畏天下議已始一開口冀以塞責此前賢亦嘗著論議之非僕之私言也夫士於困窮之中能秉節自高者於今已少克强今又作此論恐後生棄廉恥欲無所不為庸懦畏怯不才之人沈黙茍活於世者必竊借其説曰克强教我如此隱忍以就功名兹風一煽克强亦必悔之於今所以勸僕為之者豈非見僕官不顯赫多困厄因摇撼之使俛仰自屈以求合於世俗之人其意非不善也顧僕不能為耳君子不論窮逹不失其志而已夫志雖不可得之於天下豈不可得之於一身若無位以行其所志則當求之於山林之中或陸沈小官雖有利祿刑禍在前使不撼其闗鍵此亦窮而不失志者也僕愚所見如此聊布腹心以當一笑與向宣卿直閣書二幅往年衡陽山中執别時方被竄蠻荒李林甫為國怪祥無復生還之望自舊嵗䝉恩還鄉實出萬死一生之中每欲渡湘水一見顔色而久客乍歸百事牽制前日遽辱使車壓境枉道見訪喜不自勝衰蹇之人何以當此厚義懐感之餘瞻望悵然輒復成二詩聊申謝意葢千里命駕稀闊之事不可不以詩記之且留為異日佳話亦可少警薄俗耳如聞次第遷入新居高門大第㨿衡湘之勝浩然自得有天下之至樂彼富貴時來則為之耳恐晩當為蒼生一起卻不得常享此樂也經略直閣執事自七月中聞詔下除帥五羊傳者謂即日引道遂無從遣介為賀直閣名重縉紳間屏處江湖餘二十年以道自樂未嘗干進一日忽有此除非獨嘗遊者喜幸無涯葢中外莫不以為慶始見公道之行也自聞除命恨無羽翰一見顔色近有自湖南來者云直閣方具辭免尚留舂陵葢此除出廟堂特逹之知豈容避也竊惟直閣藴公輔之才蟠屈已久平生所藴乃四方所瞻望世之君子莫不知之向之所以未大用者羣小人衆而君子莫能勝也習俗之容黙相高非一日之積驟見一人㧞俗異衆則羣聚而非之今日忽起寂寞之濵而付以方面之寄此固有深知直閣者某尚慮其間小人無以窺伺獨謂大剛而不容物嘗聞前輩諸老言二廣控蠻海其地濶逺吏俗不類近地緩之則事不振急之則無全人凡事比餘路宜少加闊略不識直閣以為然否新叅屢言和公有補天浴日之功人雖忌之往徃憚其正而不敢駮近數於朝列間問小人動靜老耄矣絶無此念特受其一用公道而知以人物為念耳此可為多士慶老者固無憂也想大斾朝夕啟行益逺瞻奉但日聽佳音以為慰耳答方耕道刪定書服廣譽之日良久惟是湮沈之迹未獲一瞻風采承誨語也仰髙之心以日為嵗執事不鄙賜以教札存問勞苦感佩亡已惠及墨刻三本皆竒作也欽夫學士生相家而文章典雅如此彼掩公議而盜取省殿魁以為名者其榮辱孰輕重哉久欲通書慮丞相方杜門而不敢今方欲為之兼嘗面辱誨諭想亦不卻也去嵗大臣論和公者非不剴切獨不見李逢吉輩忌裴晉公居百計以沮之君子小人其勢然耳刪定負抱竒偉中外所聞某竄居辰陽時沅靖接壤武岡孰聞動靜近者廟堂諸公亦備知當時誣枉之狀若一㧞九霄當自湔洗况今執政同時館閣故人豈不能辨之邦衡亦同僚皆一時名士以彚而進正其時矣盧溪文集巻二十八
