body:
  text: 盧溪文集卷十九宋王庭珪撰律詩七言夜讀唐鑑有作開元貞觀承平後羣盜縱横似撒沙可惜君王自神武不知盧杞是姦邪𤓰分叛將根仍蔓鼎付哥奴禍已芽不有汾陽功第一孰能談笑定中華次韻蔡德億年聞子規逐客思歸正倦聞三更枝上月微昏一聲夢斷湘山曲千古空餘馬足痕東郭雖無揚子宅西枝應有少陵邨不須宋玉憐憔悴招得騷人幾許魂贈胡紹立并引紹立頃年遍遊西南諸州聞余竄夜郎冒重險至沅陵由湘南以歸己夘秋預清江高薦復至安成訪别道舊賦詩因以送行憶昔烏蠻絶塞亭巴娘歌罷月三更重尋湘水江邊路又見蕭灘榜上名此去飛騰對天陛不應顦顇困書生將軍三戰成功後未數焚舟老孟明送項直卿赴省逐客歸來訪里閭後生文彩益増竒低頭見子如東野滿耳聞人說項斯果有高名動場屋行觀大䇿對丹墀親闈日望泥金信報我仍須寄好詩劉大虛作十花詞相示復以詩來有求揮斤之句兼簡中問僕無恙吠犬不為災次韻一首奉酬新詞藹藹吐春雲清似金爐百和焚白雪固宜招吠犬真雷豈比聚飛蚊陶潜賦就歸何處李白詩成思不羣君是廣寒修月手顧予安敢強施斤次韻董體仁叅政雷雨何年下九天公為舟楫濟長川涸鱗亦逐龍蛇動異氣先衝牛斗邊總謂相君扶帝力忽傳飛詔落巖前但隨一氣洪鈞轉造物豈知然不然次韻李昌齡以詩督景賢堂詩李廣傳云得當單于陵傳亦云欲得當以報漢欲醫詩病了無方悵望黄州舊雪堂歳月易奔梭一擲文章徒費紙千張相如賦麗終遲思李廣兵微未得當句律年來亦如此收功何以得鷹揚宋英臣景賢堂當塗人物盡豪英平日相逢眼自青傾蓋欲交天下士披雲如仰斗間星向來道義多耆舊尚有風流繼典刑更待里門容駟馬不應空頂佛名經劉君鼎主簿登第累年家貧猶待闕欲遊章貢謁梁提刑作詩送之收科天陛幾年餘猶似揚雄寂寞居霄漢又生新羽翼侯門應許曳長裾暫遊嶺海非凡客却上蓬瀛行秘書何日扁舟下螺浦㑹㸔丹詔有新除送劉簡之兄弟赴省弟兄連牓俱高薦正遇龍飛急詔求蘭省深嚴清禁近丹梯曽上廣寒遊豈惟一舉兩黄鵠便好同修五鳳樓草綠江南舊行路春風歸馬控雙虬謝向提刑見訪并引某自貶所東歸伏辱提刑直閣千里命駕來訪死生感激高義輒成長句聊伸謝懇夜郎逐客遇生還秘閣老翁來扣關坐聽犀揮妙言語慚非櫑具偉衣冠高名業已照六合賤子窮當隱半山陸納家風元冷澹口將茶果薦杯盤渡湘千里憶分攜因誦癡兒不了詩送我出門還作惡今朝㑹面豈前期樂天獨往青山日裴相閒居綠野時從此功名恐相逼伊山安得久棲遲李訓王涯排陷樂天訓等死日樂天正遊洛下青龍寺有詩云當君白首同歸日是我青山獨往時或謂白公樂禍東坡云樂天豈樂禍者特悲之耳余今亦然送魏彦成赴召一騎追鋒下九重手持丹詔紫泥封君王夜半應前席郡國名高莫說功民吏不須留召父朝廷久已知弱翁還如漢室中興相治行于今有祖風魏彦成座上忽見擒至吉水賊奉呈彦成城上啼烏曉欲狂樓前爭㸔㨗旗黄略驅部曲千餘騎不折將軍半段槍樂土異時為賊窟太平今日有官方弱翁治行今如此何待天邊下鳳凰西園探梅三首俯窺溪影忽横斜仰㸔寒梅已放花未覺東風吹水面早驚春色到天涯年時肌骨瘦如許日暮烟雲薄不遮折得一枝歸靜院夜深玉頰照牕紗東閣官梅未有詩竹林斜出兩三枝臨風玉面如相識殘雪江頭想更竒立盡小橋溪上影誰將清調笛中吹犯寒傾倒先春色萬木寒癡凍不知一株斜壓半簷茅索笑誰堪著句嘲風度暗香浮逺水枝回嫩綠到新梢冰生處子精神外玉立天涯雪月交吟處不須歌酒涴柴門誰許野僧敲次韻劉景明寄詩求近作道邊埀栁綠隂隂馬上攜書閱古今陋巷豈無人載酒他鄉誰是子知音鯤鵬未化風雲外江海相思歳月深逺寄雕章覔新句窮愁唯有苦寒吟外孫劉子野遊學南安纔歸數日又告行怱怱贈以一詩為别且以勉之九十龎眉老舅翁暫時見汝又西東舉頭共㸔天邊月刮目知非呉下䝉學至超然應自解詩唯窮者乃能工太阿鍛盡山中鐵始得光芒倚碧穹送劉天遊益明赴省兩驥騰風上九垓瑶林瓊樹絶纎埃行觀海運幾千里坐待春驚二月雷霹靂一聲天外響婆娑雙桂月中開老翁日望長安信報喜泥金早寄回次韻曽英發泮水橋邊不記年後來誰復敢爭先襄陽耆舊今無在江左風流寂不傳窮巷閉門佳客至新詩照壁夜光懸未應晩節嗟流滯三子青袍慰眼前酬梁宰惠遊永新百韻詩君曽攝縣事聞君跋馬禾川道攀􅌱遺民識轡環滿野悲風蟠蔓草數聲漁笛下汀灣雲藏甘露峯頭寺路接青湘雨後山觸思便能成百韻偶題僧壁不須刪謝郭運幹見訪歐陽公有思潁詩郭乃潁人窮巷俄留長者韁清風入户竹生光不嫌茅屋絶低小來坐松隂移晩凉南國諸侯老賓客西湖六一舊家鄉錦囊賸拾詩千首他日還思潁水傍天馬從來不受韁騰雲注目電爭光心如銀漢纎塵靜氣逼金盤曉露凉妙語織成文繡段扁舟刺入水雲鄉朝天便若登仙去騶馭何人得侍傍次韻劉子方喜雪萬木寒癡凍不蘇六花爭巧出枯株天將平地開銀闕人似清氷在玉壺未見囓氈持漢節徒聞穿履待公車月邊恐有瑶臺路擬欲凌空謁帝居懷故人留題桃李無言對斜日可堪回首一凄然子雲投閣知何在太白騎鯨已上天春蚓秋蛇留敗壁金鈎玉帶鎖寒烟人行古木横塘路門掩長江上水船次韻王秀才怒髮衝冠忘指瑕要能全璧始還家閉門且任蓬蒿長落筆當令綺繡華麗句美如青玉案明珠深貯絳囊紗愛君年少已如許他日相逢未可涯波光亭遶亭春水縠紋生拍岸風微鏡面平日破浪花摇柱礎影浮山翠落簷楹魚跳蓮葉東西動月湧金盆表裏明夜久光凝收緑净冷涵星漢逼人清酴醿百花狼藉㸃青苔始見酴醿爛漫開虢國朝天嫌粉汚唐昌夜月恐仙來寒梅勝韻聊堪友穠李凡姿詎敢陪便欲乘風凌倒影醉尋香徑上瑶臺和黄元授送趙敦本赴萬安宰元授先攝邑事故末句云欲救斯民病久尫想君家譜有竒方但須去惡猶去草要使牧人如牧羊正值彫殘經寇亂還思激烈詠時康當年手種閒桃李今日成隂總類棠和元授閔旱時男子皆防城旱魃凌空氣愈炎斷無微雨應時霑正憂龍卧深蟠水安得江聲碎㵼簷禾黍似堪供野火婦姑猶擬共腰鎌此時政要調元手誰作商霖慰具瞻盧溪文集卷十九
