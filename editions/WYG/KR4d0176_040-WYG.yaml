body:
  text: 盧溪文集巻四十宋王庭珪撰盧溪讀書堂上梁文兒郎偉四壁徒立本為埀釣之區三徑未荒就築藏書之室即劉令公之别館乃歐陽子之故鄉城郭猶存山川不改化煙墟為樂土亦先人之舊廬冠蓋如雲識烏衣馬糞之巷風流異世有青箱鳯閣之名盧溪處士江湖散人山谷遺叟初無五畝僅如顔子之居有此一區便是揚雄之宅豈須金椀玉杯之號况非芸輝綠野之雄但有軒楹可延風月高冠赤幘敢貪西壁之金古井丹砂益薦老人之壽聽余善頌助爾歡聲兒郎偉抛梁東天開麗日照梁紅舉頭忽見金烏近更覺長安在眼中兒郎偉抛梁西蕙帳風清待鶴歸五色大雲遮洞口山人不用勒銘移兒郎偉抛梁南門外人歸響轡銜報道諸生新及第來騎白馬着青衫兒郎偉抛梁北溪上東臯雨初足三節灘聲夜半來夢回寫作昇平曲兒郎偉抛梁上宴坐圖書滿方丈戸牖門庭著筆牀文章戲作三都様兒郎偉抛梁下古郡江山元似畫明月清風不直錢霜松雪竹兼宜夜伏願上梁以後羣犬息吠怪鳥不鳴君子得輿從兹奠枕小人安分不復跳梁樂此邱園足避風塵之地煩他父老更高里閈之門安福縣㕔上梁文兒郎偉西晉雄藩東吳舊壤郡樓相對猶名經史之齋父老流傳云是大康之郡風聲未泯城郭猶存冠蓋如雲時迓天邊之客言談彌日光餘江左之風可不高𢎞决事之㕔遠引回廊之序山川環繞動氣象以生光民吏爭趍拂旌旗而改觀勢若虹蜺之夭矯雄秉柱石之瓌竒山出晴雲地增勝槩可無善頌用助歡聲兒郎偉抛梁東畫棟飛簷出半空百里煙霞迎曉日萬家簾幕捲清風兒郎偉抛梁西西湖官柳䕃長堤未羨河陽花滿縣只今桃李自成蹊兒郎偉抛梁南鉦鼓無聲白晝閒耕罷牛眠煙雨裏夜闌漁唱水雲間兒郎偉抛梁北如今令尹真侯伯路人猶指縣衙庭便是當年史君宅兒郎偉抛梁上寅陂新築隄千丈未說秋成大有年且看麥壠摇青浪兒郎偉抛梁下四靣溪山如罨畫罨畫光中聽鼔聲修梁夭矯如虹駕伏願上梁之後風不鳴條吏無黷貨士皆升俊俗不喧囂入其里閭而長㓜相孝慈於家行於道途而子弟爭扶持其老戸門不閉囹圄常空強暴不至於奪攘田野各安其教化遂成樂土協濟中興安福縣學上梁文兒郎偉晉朝劇郡冠八邑之封疆盧水清流接三江之襟帶秀嶺干霄而直上鳴鳯覽輝而下翔昔有儒宫甲于江右鞠為茂草㳂值兵戈物必廢而有興功自我而作古縣宰向公才有餘地役不勞人曾未踰時鬱有成績舉兹寂寥不詔之典延聚卓犖非常之倫堂皇靚深楹桷峻整豈但太平之壯觀實為治化之淵源將見鄉邑閭巷之間咸知向善寧有公侯將相之種不出此塗使北斗星辰以南見東壁圖書之盛樵兒牧孺亦知有夫子之門墻賢士大夫當盡入聖人之閫閾請陳謡頌用助歡聲兒郎偉抛梁東峯頭日出半輪紅粉袍競集紗帷外聽打開門鼔一通兒郎偉抛梁西千年華表鶴來歸好在浴沂橋下水他時城郭未應非兒郎偉抛梁南千尋古木與天叅他日明堂雖柱石萬牛回首轉巖巖兒郎偉抛梁北喜有中原近消息將軍一箭落欃槍果見圖書出東壁兒郎偉抛梁上夫子門墻高數丈他年應記上梁人令尹為誰今姓向兒郎偉抛梁下枹鼔向來驚里社夜聞南廡讀書聲已足張皇壓戎馬伏願上梁之後民皆安堵室有鳴弦同底茂規咸升俊造窮閻陋室能誦詩書禮樂之文悍卒武夫亦識父子君臣之義接踵赴雲龍之㑹乘時依日月之光致語乾龍節致語時金人初犯京闕而復守舊盟河千年一清慶符宗社山三呼萬歲聲動華夷惟震一索出帝之辰當乾九五飛龍之月雷霆孚號草木生春用煥昌朝永標盛節恭惟皇帝陛下天錫勇智生而神靈紹寳歴以埀鴻握元樞而獨斷德動九天之上功求一日之間蠻羌巻地而來遂空巢穴金鼓從天而下盡掃妖氛治具頓新國威彌舉遂致四夷慕義知中國之有聖人百辟稱觴指南山之如帝壽天聲所暨海宇同歡遥望皇居表裏山河之壯幾多瑞氣增崇日月之光臣等獲見太平上呈口號紅日初生碧海邊蓬萊金殿起晴烟幾重瑞氣籠雙闕萬室歡聲動九天百二山河扶寳祚兩階干羽舞文甎遥聞葱嶺新都䕶願舉霞觴祝萬年天申節致語炎精復耀天開赤帝之符蘭殿陳祥慶協青雲之瑞當南面離明之日逢中興泰定之年紹寳歴之垂鴻廣鈞天而張樂車書所暨夷夏同歡㳟惟皇帝陛下躬睿智之資撫艱難之運十六載南廵之後始致太平千萬嵗上壽之榮遂超前古士成於學兵合於農長安市􅆵不識將軍之旗鼓東都父老喜瞻大漢之威儀萬邦陶禮樂之中四塞絶烟塵之警諸蕃慕義方物歳貢于京師列辟稱觴天子壽齊乎箕翼臣等世工末技再覩昇平不度荒蕪謹進口號樂事初從天上傳慈寧宫在曰華邊慶逢誕節張鈞樂奏舉遐方錫御筵滿殿薰風旗彩動一墀鳴玉佩聲喧遥聞儀鳯隨韶奏報道君王壽萬年閱軍致語秣馬練兵威行百里翔輣舞旝歡動一城㧞寳劒以衝星擁雕戈而耀日士增感慨天助精明溝壘方興聊試風雲之陣欃槍未滅敢忘龍虎之韜某官鐘鼎名家詩書賢胄謂艱難多事之日非從容緩帶之時心本在於王家職方寄於民社乃以窮秋九月講武一時紀律無譁便識三軍之號令風聲所指今觀大將之鼓旗㑹縣内文武之官僚列天上孤虛之圓象拓弓躍馬人驚霹靂之聲巻甲還營時有凱旋之樂某叨居樂部不愧荒蕪輙對帳前上陳口號秀嶺東邊今日晴千兵繞出陣雲平長槍大劒遮行路後虎前貔擁使旌看拓弓弦聲霹靂願回甲馬掃欃槍山農野叟何曾識來聽秋風鼓角聲疏請智老住東山疏英鐡觜小師煉金失寳須攜將分上鉗椎駐錫經年未放出手中圏樻傳西來之祖意坐東山之道塲古郡遺區干江名刹金輪飛動雖兵火之荐興紺殿崔嵬實龍天之回護豈是佛堂不聖㑹知木馬能嘶智公長老問學無邊得法有自作駒南嶽且休脚踏天下人欲嗣老英更須鐵打新羅觜只今海㑹共聽潮音若能用舊日家風乃不辱先師門戸拈椎舉拂本無法可言打鼓升堂看作麽生說請如老住曹山疏百年鑽故紙徒勞入海算沙累刼坐道塲謾欲磨甎作鏡凡情豈異如來藏大地無非解脫門未明教外别傳那得塵中自在要知端的須藉宗師如公長老戒行孤高世縁淺薄心空及第選佛已勝於選官筏喻度生拯迷還同於拯溺久處隂以休影迺騰實而飛聲果遇知音不容袖手便好重開舊店何妨再轉法輪地久天長祝聖主無疆之壽花黄竹翠談祖師直指之禪遠續千燈併清衆目請簡老住報恩疏泥牛吼處雖假真空獅子哮時孰不諦聽乃聞大士崛起為此諸佛因縁來坐道塲請如法說簡公禪師獨秉慧炬秀出叢林明鑑當臺靈珠在握具正法眼藏乘出世舟航龍象蹴踏而絶羣林檀芬馨而無雜宜廣第一義為通向上關但能提起布毛吹不須講得天花落拈椎舉拂掃除前代舊家風打鼔升堂竚看老人出場屋高峯禪寺修殿疏高峯寺在縣西極遠危峯絶磴之上有鳥道通仰山愈入愈深巖谷益秀學出世法遊心物外者始樂居之初兵火蕩為賊區佛殿頹毁金碧圖像鞠為茂草凡數十年前住持力不能興起今長老證公自永和飛錫來此初修戒律晚悟禪宗有材力喜作佛事侍讀胡公紫微周公常稱歎之今欲於舊基重起佛殿遠近檀越必樂聞而咸起信心焉故為書此而繫之以偈曰紺殿傾頹幾十秋佛應不語阿難愁諸方檀越宜興念共出把茅來蓋頭盧溪文集巻四十
