body:
  text: 盧溪文集巻五十宋王庭珪撰題䟦䟦盧贊元題惜春亭詩後公負英偉絶世之姿文章流布海内而此詩乃自衡湘北歸日過某家真逸堂夢草菴染大字于梁間至惜春亭復留長句筆墨飛動光照林谷要當使觀者如讀杜子美到䕫州後詩韓文公自潮州還朝後作異時欲譜公之詩者必有攷於斯䟦王樞宻環秀亭詩玉牒趙季成通判江州日作環秀亭於江上今樞宻王公適至而登焉覽山川之勝據上流實襟帶淮甸長江九派驚湍怒濤頃刻萬變見昔人用兵出竒戰勝之處濡須赤壁若在牖外黙有感發於心賦詩壁間識者知公有經世志不徒玩景物而已將見敵人不敢復窺江涘而曰朝廷有人焉豈不美哉䟦顔持約詩士負其才詞彩足以驚衆者豈盡濟世之人也哉李太白天人也而失節於永王璘况餘子乎顔持約昔以詩畫擅名京師雖登甲科而卒遭竄逐望嶺南走道出廬陵始尋方外釋子談佛以自解故松菴上人得此詩於隆慶要其詩與字亦不可棄爾䟦曹子方墓誌銘曹子方起孤生一經蘇黄品題遂以能文章名於世一時豪士詩人咸慕而稱之余崇寧初與公之㓜子唐老同舎于東京太學暇日至其家盡閱蘇黄諸老先生詩文尺牘皆極力推挽以故名益貴唐老後亦登科墓誌叙公之行事獨至此而文辭不少槩見何哉然事跡迭見於時賢文集中者後世亦可考也䟦王元勃鳯林橋詩右史王元勃平生為文章力去陳言逈異常境非醞釀而成者詩篇蓋其餘事然亦未嘗茍作鳯林橋詩尤典雅發於忠厚其叙安福令韓君朝美之為橋而見廉平簡易愛民之意有足以激拂當世者夫前世良吏史或逸其行事而班班見之名士之詩者尚多有之韓君之政後世或有攷於此歟䟦黄夢升墓誌銘余讀歐陽文忠公集已悲南陽主簿黄夢升以文章從公遊而卒不得志以死公嘗稱其文曰博辯雄偉意氣奔放至於諷誦歎息而不已初謂文忠公喜稱道天下士特以雄文善飾其說題拂之耳至於作銘乃摘取其祭兄子之文以􅍊耀於世始知夢升之文實竒偉而凡人不能道也然夢升素剛不茍合既失志鬱鬱而諱道於人使不遇文忠公遂泯然不傳於世今得著見於六一文集中後世不磨滅矣四世孫伯思得胡明仲重書誌銘將刻諸石伯思學問曄曄有祖風能任斯事盧溪王某書䟦胡侍郎撰比真觀記安福圖經舊無此觀獨有遺址在深林窮僻之野亦以碑刻可攷里中王氏諸豪力請建屋於其上始得今名而榜之復得侍讀胡公之文以為記碑成龜趺璀然氣象雄偉如天球琬琰金鐘大鏞列在東序拭目者改觀榱桷之華豈止百年無慮其隳墮也萬一千載之下陵谷變而壑澤不能守此碑或淪棄於頽垣斷塹之間好事者得之决不沈泯跡其姓氏猶足以誇世耀衆而復興於寂寞不詔之後然則此碑實為比真不朽之託也歟䟦蘇養直贈李東老詩蘇養直清詞麗句為前輩諸老先生之所稱此詩蓋暮年所作李東老嘗挾書册從之遊而得之他日江西宗𣲖後為養直拈出一瓣香者必子也書向豐之詩軸後向豐之自㓜能作詩句律便不凡叔父宣卿愛之毎遣從余遊余竄夜郎日道出伊山宣卿駭愕與豐之出三十里下馬流涕而别後二十年見此詩軸於劉夢得家夢得與豐之雅故尤能誦其詩聽之喜且悲惜其早亡時人知豐之者尚稀使之少延當更竒麗而名顯於世矣書汪聖錫簡後汪公聖錫自㓜名聞於世未弱冠當廷試陳治安之䇿以竒材動悟明主擢居第一震耀天下賜名褒稱甚寵既貴顯與故人書札皆纎鋒細管字小楷而清勁不以勢貌士真一代偉人也乾道己丑清明日書䟦曾世選三賢論古之人有負天下之賢而天下翕然師尊之决非偶然者必推其本末權其禍福之輕重以救當世之弊乃能然耳歐陽文忠公以道德文章震耀一時昭若日星終古不可掩也金人圍建康守臣大將不戰而降獨楊忠襄為通判如百鍊之鋼不可屈金燕守將于堂上引忠襄于堂下誘以好辭忠襄詬賊不絶于口毅然之氣至死不折諸失守者埀頭喪氣敵亦駭而退厥後我國家兵威稍震大軍已屯東京金亦畏讋秦檜忽自金舉族以歸力主和議有異議者檜輒害之人皆股栗獨一胡編修上書乞斬檜罷和議方其歴天階攀殿檻陳禍福左右皆震動敵亦知國有人焉俛首聽命不復他言然則二賢者可謂有功於國昔孔子作春秋孟子距楊墨其功乃配於禹善乎曾世選以二士合文忠公為三賢論其道一也三賢者皆廬陵人他日有能繪三賢之像屋而祠之使千載之下亂臣賊子過之者猶縮項而趨可畏而仰哉盧溪王某書䟦趙德全家大年畫大年作寒江雪鴈不在筆墨畦畛間德全學大年筆法如後騎駸駸欲度驊騮前他日定逼真矣紹興丙寅初伏日觀此畫於德全家故倂論德全畫云題唐興寺壁後七年美中自翰苑出守漳浦再㑹于此三日道舊賦詩談玉堂天上事感今懷昔酒酣氣振躍馬而别甲子十月二十九日民瞻書䟦錢吏部燕舉人詩國家網羅英材必始於郡國命鄉論秀而升之太守實任其責廬陵多士之域方昇平時掉鞅於舉塲者四千人㧞其尤而充貢者纔四十五人厥後寖盛而州郡多事止給牒與計吏偕至京師廢罷鹿鳴之禮乾道四年戊子賔興之秋乃遇臨安錢侯吏部綰銅虎適至閱仕版見峩冠侈袂爭鋒而入棘圍者至八千人㧞其尤而升者六十八人侯乃修故事舉墜典以鄉飲酒禮設賔主陳俎豆合樂張宴歌鹿鳴之詩叙長少焉太守即席賦詩鄉先生胡侍講周舍人貢首劉懷英等六十八人皆屬和州民耆老聚觀以為榮咸稱頌太守之美使此州文物益大張闡真稀闊盛事前所未有不可不書盧溪王某謹䟦書贈墨工戴國和古之以墨擅名於世者皆止於其身雖其子孫不能究其藝豈其斲輪之妙固有不傳耶潘衡去世未久士大夫家所蓄衡手造者尚多余復何言戴國和法墨實出於潘氏其墨固自可貴特不必以差殊校爾盧溪文集巻五十
