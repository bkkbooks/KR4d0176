body:
  text: 盧溪文集卷二十宋王庭珪撰絶句建炎己酉十二月五日避亂鴿湖山十絶句平昔無才可致君此生何處欲超羣今逢四海干戈動猶得山間卧白雲偶攜琴劍入山來驚覺高僧定裏回扶下繩牀始開眼嗔人馬跡涴蒼苔幡竿挿入千巖底鳥語飛來絶壁間洞口行人迷處所不知鐘梵鎖孱顔山腰危殿倚青葱知是雲峯第幾重恐有書生來問道為慿輕打飯前鐘竒峯削出青蓮蕚逺溜縈回碧玉環氣接混茫藏句法不知誰與破天慳洞裏花開透碧霄溪横三繞赤欄橋他年橋斷人迷路咫尺山源萬里遥三渡橋昔人騎鶴嶺頭歸應有仙居在翠微絶壁蒼藤無處問時聞清唳掲雲飛白鶴峯破臘山桃已盛開飛花無數㸃青苔莫教流出前溪去引得魚舟入洞來山桃花巖下逢人說亂離十年眼底厭旌旗邉塵復暗江南路堪羡山僧總不知贈寺僧偉岸稜稜似立朝巍峩冠劍想風標可憐有貌無肝膽何用昻然近紫霄次韻贈周師禹二首山中自有陶宏景牕外誰呼祁孔賓不敢移文約周子升沈共作太平人晝卧柴門打不開相逢未識濟川才那知此夜聞猿處忽有新詩隨雁來贈李子安窮居未有四立壁負郭兼無二頃田擬斸雲根結茅屋不知誰贈買山錢次韻高秀才臘盡梅花落不停笛聲孤起不堪聽且留溪影弄清淺更㸔殘英動曉星贈松菴僧菴在深邨翠嶺㘭狂風捲盡屋頭茅斷椽破壁何時理卧㸔松隂月轉梢和鄭元清同遊殷仲堪讀書臺二首晉國衣冠掃地空漁歌長在水雲中倚欄欲問興亡事木末琉璃墜曉風池上高臺倚碧空郡樓相對出烟中讀書太守今何在寂寞無人繼此風梁道人借示丹經數册閱未遍輒告行歸其書贈之以詩二首丹經汗損幾車牛奥意難從紙上搜相見纒腰無十萬待㸔騎鶴上揚州夜半滄溟㸔日頭忽聞風雨下層樓却尋雙徑朝金闕又跨蒼龍海上遊謝彭仲寛惠小茶磨并仙茅二首踏梯割得紫雲歸琢就雙輪半尺圍晴日午牕新睡起掌中輕轉雪花飛夢具白雞猶不死胷吞赤鳳得長生向來未識仙茅草誤向松根採茯苓次韻魏伯元公榮自可不與飲子美何時得細論正遇題輿陳仲舉豈容無禮灌將軍侯大淵惠花揚州廟下子規啼曽㸔花開萬玉妃二十四橋明月夜春風十里捲簾時和讀書臺入夜即事二首池底星光箇箇添半鈎斜月吐纎纎數聲寒笛西風下人在朱樓捲暮簾雲捲寒蟾玉暈添嫦娥遥想鬢毛纎此時清境非人世要望烟霄不下簾次韻盧贊元䝉田寺橋亭夜月青版橋邊秋月明江風不動縠紋平沙頭野鶴摩天起飛入紫霄雲外鳴次韻劉美中贈段居士昨夜送人為太守今朝不記是何年歸來一粟菴中坐水在瓶中月在天次韻贈慈書記仰山慈書記往來安福道中數經我草堂識之舊矣復辱惠詩自敘老洪之裔蓋知僕與洪雅故不可不酬也感今懷昔為和三絶句兼簡大仰祖禪師亦覺範同門嗣也慈猶記在湘西寺洪和予左字韻有云云探驪猶記湘西寺愛我詩如左􅃝軍慈也果能拈此句定知詞筆帶烟雲寂音尊者斷聲聞猶似衘枚未戰軍横出一枝來大仰如今不賦暮天雲老洪作語驚一世筆力可敵千人軍足下馬駒今復出縱横踏破嶺頭雲次韻向文剛三絶沈謝曹劉擬絶倫唯公詞翰可招魂新詩不拾前人語文彩風流自一門吏案堆塵畨故紙茶甌浮雪動吟魂長官政擁黄紬被卧聽排衙晝掩門詩仙句法可換骨豈但能蘇九死魂要自胷中出機杼不須剽掠傍人門兵火之後家藏墳籍蕩然寄居江邨欲借書諸公先寄此詩卜築江邨翠嶺㘭喜君書室近衡茅牙籖挿架幾千冊準擬從頭借一抄聞道藏書埒石渠仍能一讀五行俱不妨借我遮愁眼勝著閒牕飽蠧魚甌陽廣明病中覔酒滿徑蓬蒿貧不病一區寂寞奈愁何杜門芳草長楊賦可是無人載酒過胡烈臣卧雲菴小菴深隱紅塵外雲在茅簷四角邊月落烏啼天欲曉驚回何處夢遊仙和葛德裕寄紙覔蘭四絶句麗句雲箋敵夜光窮兒得寳但能藏慚無好語酬佳惠徒詠春洲杜若香林下無人亦自芳幽姿閒澹若深藏與君坐上添幽客勝爇金爐百和香君家詞翰妙天下蠆尾銀鈎世所藏贈我雲藍豈宜辱強吟春草拾餘香兩朶幽花費詠章是中佳境若為藏何時同上瑶臺頂遍翫芝田蕙圃香聽麟師誦經念經衲子亂如麻心悟方能轉法華待得蓮花從口發自牛車上覔三車荅蕭道人喚起赤龍耕玉池鵲巢抱出鳳凰兒且㸔火裏蓮花發十二樓前雪自飛盧溪文集卷二十
