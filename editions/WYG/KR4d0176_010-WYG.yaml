body:
  text: 盧溪文集卷十宋王庭珪撰律詩五言廬山道中寄送聶名世邨逺孤煙起山明曉霧開人行萬松裏路過九江來此去日千里其如腸九回淮南酒樓近玉笛不勝哀次韻楊廷秀臨安小樓不寐之什坐待銀蟾上寒禁酒力加霜清羣動息雁過幾行斜樓角猶吹笛天街又走車客眠終未穩人語已爭譁次韻李巽伯贈琴僧惠端老端高世士髯李仙中人鳳吐千篇久鸞吟十弄新妙談天地假笑破海山春物物消磨盡今年始是貧野外春日步屧穿花徑香風吹客衣地偏窮谷暖雨過亂鶯飛草色連空濶僧居入翠㣲田翁泥人飲數肘不容歸送向主簿櫪馬志萬里棘鸞纔一飛薦書聞帝里綵服過庭闈野渡生春草林花弄晩暉君家芸閣老應問我何歸題劉元弼逺菴門徑臨官路耳根無市聲山從雲外起風入坐中清靜趣逸天半孤吟待月生緬懷江海意溪水遶菴鳴辰州上元留滯沅湘浦飄如雲水僧來為萬里客又㸔一年燈翠幰褰珠箔高樓俯玉繩鼇山今夜月應上最高層用前韻酬清首座寺寄他鄉客家居何處僧一盂鐘後飯數盞夜深燈出井初無索斵輪還中繩擬心觀此境階級已成層早春遊孔志行園小圃傍城郭新堂磨碧甎青楓未鑚火高栁已參天好鳥又相語幽葩自在妍敲門時逕造不問主人賢春日攜頔子同劉養正教授遊凈國寺至李家園野外煙光濶僧園竹逕通栁絲摇嫩綠桃雨落輕紅處處花如舊年年人不同自矜雙足徤著屐試春風清明日訪胡師顔記是日所見門巷倚城郭林亭占水雲竹摇碧玉玦池皺綠羅紋鸎舌初調曲蘭芽忽吐芬牡丹雖晩發風味獨超羣入辰州界道中用頔子韻路入荒溪惡波穿亂石跳騎驢行木杪避水轉山腰倒掛猿當道横過竹渡橋吾生本如寄嵗晩尚飄颻憶馨鴻二孫余竄夜郎日二孫纔三四歲阿馨已誦得數部書兼寄書紙來阿鴻尚幼余甚念之作憶馨鴻詩寄令誦之憶汝何時見愁眉此日舒别來三換歲誦得幾多書字稍堪拈出翁今喜有餘阿鴻纔弄筆相對想軒渠題步雲軒身在飛煙裏如登霄漢行雲從脚下起雷忽耳邊鳴暮碧佳人逺春紅晩照明能消幾緉屐當不負平生題昭昭閣天意豈難訴雲烟𣺌降真倚欄瞻日月滿壁繪星辰夜梵光生户晨炊竈見神高門有隂德當不誤儒身和余教授詞高雲藹藹筆掃陣堂堂妙絶江南社清新樂府章窮通元自樂身世兩相忘不下千尋海焉能得夜光和胡觀光聞蟬地僻林逾靜山幽鳥不驚日高簾影重蟬噪栁隂輕鬢學風前翼琴傳葉下聲士龍能作賦為爾特留情琴曲有葉下聞蟬陸士龍作寒蟬賦送李彦明彦明欲赴大學補試因省叔父吏部吏部余之故人作詩送之兼寄吏部叔父今誰貴中郎一世豪渡江人物盛容駟里門高冠蓋榮吾黨芝蘭見汝曹兹遊兼問學鼔篋莫辭勞江上倚杖江風起呼船水面開人從州觜渡帆破浪頭來月色共千里天恩徧九垓當年送客處待㸔赤車回送楊彦昭往湖南謁陳夢肇運使結客少年日同遊碧水邊今持繡衣斧就覔孝亷船湖濶驚千里雲開有一天莫嗟清絶地不異泛紅蓮謫辰州得失真何事文章妙入場隱身三十載汗簡幾千張名落江湖外氣干牛斗傍吾衰任飄泊朝夕渡沅湘沅江上晩晴用頔子韻急雨捎溪面蘭橈轉渡頭寒鴉栖古木晩日射危樓山帶黔巫逺水還荆漢流晴天思無限細細數沙鷗次韻周秀實通判送段季裕還永新二首竹下忘年友誰如藉與戎相從知理窟㑹見立竒功兩地風烟接三呉水石窮飄蓬歲事晩何日一罇同又州里聞名舊江湖識面新讀書元自喜擬古欲誰倫巖穴人歸隱池塘草又春周侯有佳句持贈可娯親惜春亭席上和伍孺安酴醿滿眼傷春色瑶花墮玉巵羣仙下來㸔皎月自相隨國艷晩尤貴天香發每遲我方留客醉簾捲未教埀同施倅遊壽昌觀岸曲穿叢篠山回轉翠屏烟雲摇晩霽樓殿倚空青栢黛參天峻松脂入地靈幽尋未能及重約扣巖扄贈惠門端師亂後過連嶺閭井皆空唯惠門寺巋然獨存書贈端師刼火燋鄉邑烟塵何處逃雲藏佛世界門背古亭臯徑隱花木靜山深人物高老師具眼目法力辟兵刀齊雲閣縹緲虚無裏嵯峨碧繞穹雲從斷山起樓在半天中暮碧千峯雨凉生四面風更臨風雨上待㸔出豐隆清音亭亭枕秋山窟山明水共清空林生逸響飛溜落寒泓誰識高深意初無世俗情何當攜韻磬冩此澹無聲次韻伍孺安賦草堂瑞香草屋簾埀地移花共宴遊艷姬香入骨熏炷錦幪頭絶世方名立殘霞暮不收夜聲燈影亂猶缺水亭新暑池亭上竹風吹我衣殘花經眼盡好鳥傍簷飛水面澄隂濶橘林香氣微儻容攜茗具來此避炎威遺經閣殖財作爭府教子乃義方斗起千尋閣中藏萬丈光諸郎一受業丹桂幾回芳他日石渠論斯文想未亡盧溪文集卷十
