body:
  text: 盧溪文集卷十八宋王庭珪撰律詩七言中夜起坐惜春亭月照酴醿清香郁然因成四韻袖手歸來避世塵酴醿對坐惜餘春靚粧不入市㕓眼幽韻只應邱壑人醉喚江梅君益友力移亭竹我比隣天公著意憐詩客月色西牕一夜新任子嚴凌風閣朱簾下瞰梅花發百尺梢頭掛玉鈎人在半天攀玉蕋山如方丈接瀛洲曽留深夜乗鸞女相對誰家却月樓將此層軒擬東閣正緣詩興似揚州楊文發將趍行朝輒用所惠詩次韻一首贈别欲贈初無金錯刀待慿巧冶鑄豪曹公家勲業麒麟上國史聲名泰華高已見郎君如玉樹便為名士讀離騷甄􅑮他日驚人去標目須經大手襃忠襄公大節震耀天下而行狀未能詳昔甄逢能標目其先人甄濟事載之天下耳目徹于天子赫然驚人然濟止能不汙賊而已其事至微史臣猶特書之今文發以神道廟碑俱未立欲徒步有請于朝當得大手筆以張闡其事故篇末激之寄聶賁逺襃勲新命日邊傳萬户重封眷愈專山海盡籠天下貨江淮流出地中錢時平麟瑞三千歳夢恊熊祥五百年富國自能躋壽域寧論齊相海王篇張紹祖雙秀亭義山山下三丞相門倚山光照户庭盛事流傳千載後寒空高並兩峯青雙崖過雨好雲氣絶壁參天列畫屏更羡君家亭子近細聽泉溜響泠泠題竹溪讀書堂李太白孔巢父韓準裴政張叔祖陶沔號竹溪六逸竹外溪邊沙石幽欲招詩客賦臨流萬竿深鎖藏書屋百尺清潭遶橘州千里水烟漁唱晩一堂風月暮雲收何當挽取六君子占此佳名作勝遊扶疎堂碧草深林遶一區何年開徑洗烟蕪晨光浮動三竿日古木隂森十萬夫靜愛長松梢月色絶無凡卉蔽簷隅殘枝敗葉風吹盡簾捲山尖好畫圖和曽英發見訪惠詩二首陋巷誰過馬糞王一經題品自芬芳桃花流水春猶淺茗椀薫爐話更長千里夙期衝雨霽十年閒事入篇章明朝未免成離恨莫苦吟詩作許忙宴坐壺中日月閒相逢無復話呉山如君豈是噲等伍置我當容平子間喜遇故人持節鉞猶能跋馬問荆菅扁舟後㑹重尋處更刺灘頭轉一灣别後再和一首平昔高談古帝王到今春草幾時芳揮毫欲上三千牘拆襪初無一寸長亹亹逼人逢此意怱怱下語不成章歸來閉閣焚香坐端為思君聊復忙謁魏彦成郎中病夫投老入城闉到處逢人說使君豈料騎驢衝大尹政須扛鼎識竒文池生春草何曽夢楓落呉江誤所聞更願兼收湖海士當令冀北馬空羣王主簿清暑閣冐暑貪程作熱官何如避暑得清安輕隂畫出三湘境爽氣能為六月寒自有薫風生屋角不須纎手捧冰盤闌干半倚紅塵外卧聽江聲㵼碧湍段廷瑞四美堂風月江山何處無良辰樂事古難俱其間景物從來美此美天然畫不如莫唱黄雞催曉曲且聽青鳥勸提壺暮雲收盡朱簾捲四者横陳獻坐隅次韻周穆卿教授兼簡黄元授司户嘗記楓宸賜異恩同時人物亦詵詵從前百事不掛眼初得微官便退身教授才華欺蜀錦參軍詩句似唐人中興勲業歸公等顧我徒為避世民讀晉史偶書夷甫清談萬事虛阮宣亹亹定何如䱥魚蝦鮓方乘獻豆粥萍韲立可須柱石莫傾人棟宇纎兒撞壞好家居揚州䘮敗將誰咎猶自空中咄咄書次韻贈隨上人扣門衲子誦詩聲雙脚行纒拄杖輕何處參同得消息便能作句吐新清高僧著意遊湖海逐客從誰匿姓名試聽窟中獅子吼未應斷盡野牛鳴送李仲文赴省試何人解薦相如賦缺監缺流壯志未登龍虎榜薦書重入帝王州烟生漁浦雁初下月滿江樓霧已收早晩書來聞好語沙頭春晩望歸舟謝梁亷濟運使見訪夜向天邊識使星使星光近少微明朱輪疑自丹霄落陋巷忽聞驄馬鳴臺下霜威驚草木山間旌斾爍簷楹慚無櫑具衣冠偉久服西都暴勝名離行在别胡舍人幾年南畆把鋤犂尺一呼來上玉墀未有涓塵荅明主只思耕釣樂清時著鞭不慣朝騎馬擊鉢猶能夜讀詩回想都城春色裏㸔公談笑定邊陲生日周公予惠詩次韻皇天何時生此漢六十年前歳遇庚不使聲名驚四海未教文陣掃千兵如今只作癡頑老晚節猶干造化情每辱雕章勤剪拂勝驅斗酒下愁城資深堂至深無象本強名不可言傳著耳聽克己獨稱回好學問詩唯有鯉趨庭㑹須絶倒聞談道更㸔鼎來能說經欲造淵源惟此得百川終使貫滄溟清暉亭畫簷雪壁眺前溪溪外羣峯碧四圍日上林梢増秀色珠生潭底䕶長堤落霞孤鶩真竒境捉筆題詩無此詞擬就江山覔佳句更須春草夢回時次韻歐陽廣明以詩送鉢盂方丈盈前送八珍山人不是此中人試尋僧鉢齋㕑近更喜園官菜把新秋滿城頭㸔落葉風吹酒面已生鱗何時共過溪邊寺雪夜扁舟發興頻次韻歐陽廣明來詩問余遭謗故云半盂香飯敵猩脣羮芋菹鹽度幾春坐倚蒲團聽粥鼓曉擎花雨供天人庾郎三韭徒多品顔巷一瓢真絶倫邑犬狺狺尚羣吠隔籬安得近吾身次韻劉唐卿㸔鑄銅人五百年摩挲已是落因緣洛州司馬老方遇梁苑詞人晩見延稚子詩書聊可喜荒邨草木亦堪憐龎公要說無生話兒女團欒在眼前雪中訪胡次魚因覽新詩次其韻公嘗為郢州教官天涯流落與誰同雅什重聞正始風文陣向來無敵手詩壇今孰敢論功郢中遺唱人難和冀北成羣馬遂空接屋同隣江上寺過從猶幸不怱怱和王彦謨縣尉二首江左盛時王氏門中高者龍鳳劣猶虎豹耳厭鉦鼙處處喧此時猶得卧邱園負材磥砢幾無用舊業荒凉半不存嗟古英雄多朽骨覽君詞翰可招魂濟川政要艅艎急樗散何因被選掄虎豹相傳王氏門風流千載識遺昆吟詩作賦取高第挿羽鳴弓待報恩寇賊漸平妖破膽烟塵猶起客銷魂山城詩酒方為樂豈料西歸席未温次韻常德府葛倅見寄武陵節鉞控湘西通守仍兼把一麾玉帳靜談千里月銅符遥鎮五溪夷漂流欲識荆州面飢渇正如桑下兒仰止門牆訴羇旅窮愁那復有佳詞和王彦休彦休學錄相别二十年蒼顔白髮著書不倦尤䆳於春秋䝉出示註解數編將欲獻於公車以佳句為惠誦歎之餘輒次元韻奉贈書成欲奏未央宫起廢鍼盲略異同巳就外車傳服氏應曽綵筆夢文通且觀落紙驚回鳯莫歎摩天欠阿鴻宿學暮年方發策菑川重㸔一衰翁盧溪文集卷十八
