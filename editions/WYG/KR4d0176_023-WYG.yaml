body:
  text: 盧溪文集卷二十三宋王庭珪撰絶句遊沅陵劉道人菴中唯一禪椅不置卧榻云不睡四十年矣戲作二絶一菴茅屋白雲深坐待丹砂欲變金誰信菴中人不睡滿池春水聽龍吟九曲江邊雲欲凈三更海上月華孤金缺滄溟底奪得驪龍頷下珠次韻陳君授暮春感懷雨餘山鳥百般啼烟隔桃蹊一線微南北東西春總好杜鵑何苦勸人歸辰州馬觀察送酒壺頭直下開邊郡勲業誰如馬伏波還見逺孫持漢節坐令千騎擁雕戈倒盡隣翁老瓦缸使君忽送玉為漿昌黎對月無詩酒絶句聊酬馬侍郎董仲儀來夜郎訪死生雪霾鬼葬山頭路霧失鬼門關外邨不謂故人千萬里忽攜書册夜敲門我識君家董狀元草萊崛起跳天門揮毫玉陛摩星斗持槖明光奉至尊次韻酬國子生趙秀才四絶句淵明五栁非無宅子美西枝自有邨堪笑長安近時客紛紛騎馬傍誰門入關莫戀銅駝陌待詔行趨金馬門塲屋若歸丞相府可無公道得推尊羡君將入銀蟾窟容我歸耕谷口邨遥想明年春殿下臚傳先出九重門聖主方今舉八元何人復掃相君門迂生曲士如丘垤回首方知泰華尊程子山侍講自靖州貶所歸相㑹于武陵怪余顔鬢未改作四絶句示之誤讀黄庭玉字章醉翻王母九霞觴從兹一墮人間世獨賴寛恩謫夜郎問我何年謫夜郎尚餘疎髮未成霜夢朝玉帝窺香案偷得神仙不死方欲弔沈湘乏雅章借君妙語酹餘觴已知絶倒如平子更喜清新似庾郎莫把蓮花比六郎六郎元自不禁霜君㸔磥砢松千尺高節參天孰可方次前韻酬趙提幹解作新詩似樂章交情風味敵壺觴平生閲士知多少聳壑昻霄見此郎留滯沅湘見此郎氣如九月雁横霜麻鞋踏雪穿沙底賜履他年出上方謝郭景文寄魚鮓開緘如見故人面仍喜故園風物來想見金刀落飛雪何時斫膾共銜杯雪中喜梁養源惠炭雪裏烏薪絶市珍能令寒屋坐生春此中有句誰能道煖得曲身成直身江上沅陵春盡草萋萋忽見扁舟繫栁堤誰寄愁心與明月肯隨君到夜郎溪竄居夜郎雪中杜門數日不出忽郡中送春來始知今日立春東風來從幾萬里雪擁江梅未放花忽見土牛驚換嵗始知春色到天涯寒食日孟司理送酒兩翁俱是江南客寒食他鄉歎滯留燕舞鶯啼春未老一罇分我洗窮愁郭仲質南牕東風吹月下長汀牕外雞號天猝明時有諸生來問字隔江猶聽講書聲簷外羣山碧四圍風㠶過盡小平堤先生獨坐紗帷裏掛起南牕月滿溪夜坐聽沅江水聲雨過風林生夜清坐邀明月正關情漁童酒醒莫吹笛要聽一江秋浪聲水急灘高欲倒傾來如萬鼓遶山鳴奔流更借洞庭濶飛浪朝宗壯此聲辰州立春清首座送生菜餅聞道春風今日回走尋消息傍寒梅恨無纎手挑生菜也有青絲滿飣來王巖老攜詩見訪詩未究雪下索余作詩贈之扣門有客懷珠玉被褐長吟坐晩暉雪打牕扉忽驚起還將破帽蓋頭歸君歸大酉峯前住嵗晩楓丹蕉葉黄試訪酉陽巖石裏秦人逸興未應亡初寒方葺火閣而㑹溪知城周子康惠竹簾火爐寗公瑞惠蒲團便足了一歳無事矣作二絶荅之細栁將軍來䕶塞夜郎遷客正窮居火爐恰恰簾埀地足了三冬讀我書户外霜風入骨酸誰褰紙閣問平安正憂坐客寒無席遺我新蒲入突欒寄贈王保躬求小山石扁舟斗轉五溪灣湘北湘南飽㸔山袖裏雲岑皆寸碧一拳分手亦何慳巖蟠蛟虎石骨瘦地飽霜風山脚寒我欲借君修月手為持玉斧劈烟巒寄子老并序子老自江西來赴沅州報恩謂必取道辰陽翹俟久之忽得書乃趨徑路去已開堂矣奉寄二絶句以當相見也半程蹉過夜郎溪不到昌溪問路岐空使辰州亭下客隔江招手立多時古錦林邊獅子吼一聲驚倒五溪蠻何人來問山中景寺在千巖萬壑間訪清首座觀薔薇紅玉蘂攅青玉枝羣芳凈盡獨開時只應天女回軒晩散得天花滿竹籬花開花落春何在宴坐高僧總不知空色難謾禪伯眼薔薇應待老夫詩贈别陳君授并序紹興十九年余坐詩語竄夜郎遇太學生陳君授前二年上書言事忤秦太師意亦貶居是州二十五年冬秦太師病死遐方未及聞聖上慨然施曠蕩之恩盡放流人某與君授始獲生還感恩出涕作二絶句贈别十載投荒坐獻書忽逢飛詔下荆巫歸來好上昇平頌已死姦諛不足誅雷雨沅湘振滯寃皇恩普出九重天乞兒猶戀權門火應謂死灰能復燃離辰州逐客休嗟行路難歸鴻心在杳㝠間初驚草尾千重浪險渡湖頭十八灘行盡黄茅白葦叢舉頭忽見兩三峯青青盡出湘天景如覺身離蠻蜒中尋小舟東下忽見巨艦有作本是蓬頭漁釣客飄如行脚水雲僧誰家巨艦和州載笑我扁舟一葉輕次韻任子嚴并引余竄夜郎日惠門僧祖麟徒步萬里訪生死東歸過其寺見壁間題詩乃故人任子嚴見懷嘉麟之義而嘘拂之也時士方以詩為諱而覩此作感激次其韻解訪江南處士廬行藏正自與時迂題詩更及夜郎客此段如今絶世無君是石渠東觀人小邦聊見宰官身山僧似不孤題品衆角叢中有一麟書覺範詩後并引余昔年遊嶽麓識覺範於南臺因留數日酬唱詩盈巨軸時侍者數人皆能詩而圓無住亦在焉别去既久圓忽攜覺範字見訪悲感疇昔復用覺範韻題其後憶探驪龍頷底珠湘江同賦夜啼烏當時吟罷鬼神泣此段如今掃地無戲贈文彦明江淹才盡一雙筆庾信窮生萬斛愁對客安能吐佳句牆東老駔正操矛酒酣拔劍悲生事病起扶藜踏淺莎逆旅正如蝴蝶夢還家試聽扊扅歌和羅思武作子房孔明二詩見贈子房夜半叅黄石手握豹韜揮八極蒼黄忽起振長流天地風雲皆動色三雄戰爭海水赤欲攬英豪扶紫極南陽喚起卧龍人至今草木生顔色次韻周孟覺記皮老人事皮老九十餘嵗能談熙豐以前事但稍聾耳百年人物已無餘况說銅人鼓鑄初欲著承平舊時事政須此老助潜夫何物龎眉一老翁能談慶厯至熙豐只應坐厭聽鼙鼔到處逢人說耳聾人壽何曽有百年再逢甲子換新元眼明重見清平日自可治聾聽好言吉州凌波亭月夜螺浦東邊雪浪生峯頭月出半輪明扁舟欲載銀蟾去一聽蒼龍水底鳴贈日者張谷余竄夜郎八年東歸至長沙遇日者張谷考十年前所言皆不謬余雖老然壽則非君妙術所得而推故末句云夜坐吟詩竄夜郎君將何術考休祥近來偷得西華法不敢煩君筭短長盧溪文集卷二十三
