body:
  text: 盧溪文集卷二十一宋王庭珪撰絶句讀唐遺錄六絶梁祖紀深宫三鼓夜方分梁祖唯知慮太原錯料諸兒非彼敵斬關還入萬春門李愚劉朐同傳兩公罷相由諸吏提印驩呼頗自誇因謂我曹當快活月華門外聽宣麻楊師厚萬炬千釭照一城彩舟猶聽棹歌聲鐵車空駕黎陽石豈悟碑來禍已成成汭勞役三年成巨艦出師未戰失江陵不知雷滿和州載始悟齊山截海名安審信入閣趨班最後時崇元御史合彈之如何進奉二十萬便逐臺中乞索兒馮道大帝四朝咸敗事惟君賣國作功臣平生自謂癡頑老晚節仍為謬語人次韻盧贊元江亭即事二絶句斜日江頭春又歸半天埀栁拂雲齊流鶯向晩渾無頼隔水飛來枝上啼江水磨銅鑑面寒釣魚人在蓼花灣雲間貪㸔新月上不覺小舟流下灘縣尉任子嚴出示從軍陪大將呉侯遊石峒五絶句奉次元韻頌平賊之功云東來騎火照松蘿野老逢迎笑語多共指巖前一方石將軍大劍可横磨石窟巉巖鬼不開狂童乘此起氛埃殿前兵馬何曽出旗鼓初從天上來錦帶雕弓銀馬鞍鳴鞭飛下白雲山回頭却望經行處已在青蒼杳靄間不待皇恩下九天將軍兵已入盧川姦人妄獻招安策留客丹崖萬古傳回師小度石門西鐵馬嘶風四百蹄不為從軍一時樂捫蘿攀徑豈能躋贈筠州司户施文叔二絶句高軒過我不停輪風袂飄如出嶺雲渭北江東無盡意何時重得細論文邨巷盡無車馬塵君來笑語動比隣兒童驚問此何客亹亹清言來逼人送周解元赴岳侯軍二絶句將軍欲辦斬樓蘭子欲從之路匪艱十萬竒才并劍客㑹㸔談笑定天山書生投筆未封侯拔劍聊為萬里遊燕頷果能飛食肉要令豹尾出兜鍪雪中贈别黄秀才雪欲漫山氷未澌梅花破雪吐寒枝溪橋漸見黄昏月應有横斜倒影詩劉虞卿衣弊履穿有號寒之憂賦絶句以道其意江上丹楓半摇落簷間青女忽横陳可憐范叔寒如此誰解綈袍念故人次韻黄子餘二絶句沈謝曹劉俱一體風流文彩自難兼黄香獨負無雙譽不管紅塵壓帽簷秋風動地吹纎末夜雨連明攪寸心西北高樓何縹緲信非吾土莫登臨次韻劉英臣早春見過二絶句池草青青細吐芽夢回疑到惠連家東風未暇吹桃李先發寒梅第一花春至盤蔬有蕨芽紙牕竹屋自成家客來清坐不飲酒旋破龍團潑乳花送羅孟弼并引孟弼吾年家子也少年高薦未第今之行朝就䕃補兼謁徑山妙喜和尚平步蟾宫脚失梯當年才命巧相違遭時何必由場屋但著青袍騎馬歸君到呉山莫問禪禪翁無法與君傳若從妙喜覔言句掀倒禪牀却悄然次韻周希稷餉耕三絶句初下車來首勸耕老農爭走道邊迎歡聲便似承平日不待朞年政已成夜聞催餉不成眠遥望官壺眼欲穿醉倒田間真快樂念無田者益堪憐東坡種麥得雪而喜復念無田者終夕為之不寐莫厭行春馬足勞彈琴吟詠節彌高盡驅赤子持田器勿使潢池煩賊曹贈寫真劉琮并引廬陵劉琮與其父俱以寫真名一時玉局老人自海上歸嘗贈以言由是士大夫益稱之紹興己未過廬溪草堂為余作隱居圖頗有勝處作三絶句曽寫峨眉玉局真逺㸔前輩畫麒麟此翁此畫不常有宜並銀鈎絶世珍布襪青鞋倚瘦松我生骨相真生窮煩君畫著漁船上刺入盧江烟雨中畫作蕭然物外身筆端如此有風神蹇驢破帽江南岸不是尋常行路人送風雅長老并引風雅長老自衡陽花藥山英鐵觜座中相識一别數年訪余於安成將遊仰山謁超禪師留之不可作偈送之且速其歸也集雲回雁兩峯前木馬嘶風鶴唳天他日歸來無一事却教誰出草鞋錢送胡紹立往高陂遊學天下干戈未盡稀獨騎瘦馬苦吟詩窮山窟裏攜書劍半夜不眠聽鼓鼙遊湖頭觀桃花行數里彌望不絶有僧新開蘭若於萬花之中留三絶句書辯公房十里紅香襯馬蹄更穿林樾訪僧扉烟長草逺望不斷忽有鐘聲出翠微城内僧來城外住寺邊花隔寺中籬花開花落春如許宴坐深房總不知方丈前林萬木春桃花面目更尖新為師拈出靈雲話却恐桃花解笑人歐陽公制糧盡扣門索米戲書絶句送之聞道瓶中無積粟不憂甑裏有塵埃饑時且就我索食更恐胡奴送米來次韻趙逢源秋日溪居十絶溪面微凉生晩風山銜落日半邊紅臨流解賦歸來句知是柴桑避俗翁門外仙槎泛急湍應從霄漢落銀灣歸來不記河源路風霧凄凄月滿山水邊樓上最宜秋天在闌干四角頭覔句正緣償宿債著書元不為窮愁仙人山水古今無畫妙詩工可得俱論畫已非前輩手聲詩能作輞川圖出水芙蓉天與工六郎何事比花紅後生不識李元禮試聽長松引勁風南嶺浮雲過北嶺東溪流水入西溪秋容清澹石骨露更㸔明年浪拍堤昔人萬里醉為鄉暮越朝燕不裹糧却怕醒來塵外出千艘銜尾夜鳴榔鵶翻日影弄清溪溪上危巢鳴哺兒林下西風晩來急滿身木葉碎琉璃千尋塔影照江清古殿金龍蟠繡楹秋色排門入蕭寺閒來飯後聽鐘聲題畫鯉魚誰把呉松江剪斷得此鯉魚長尺半㑹逢李白過江來騎上青天遊汗漫適從縣門下經西湖上歸見竹間桃花盛開湖上景物一新因成兩絶句呈向宰彭澤門前惟有栁河陽縣裏只栽花如今夾竹開桃李猶似當年刺史家何處春深刺史家園林猶鎖晉朝花風烟况接西湖水重起書齋對郡衙再次韻二絶句牆根巨竹新生笋竹下小桃初試花竹色花光正如此香風吹落幾千家新竹高齋凝燕寢從教細雨落簷花青山綠水中為縣卧擁黄紬聽打衙次韻韓宰上元二絶句火炬銀花照眼眀亂來誰得見昇平邦君解與民同樂海上初移不夜城傷時此夜憶神京月照鼇山輦道平朱雀街門舊行路星毬飛上鳳凰城和劉英臣見寄二絶句諸葛竒才當十倍謫仙詞句滿三千我惟閉閣捫書册掃地燒香亦靜便胷吞雲夢欲八九日誦古書常數千撑拄枯腸只堪睡從君嘲我腹便便幽蘭寄向文剛二絶句西風黄葉深林下忽有新蘭動地香公子夜寒誰對語應容幽客到書房連夜風吹碧玉枝山深寒重得香遲窮秋故出邁往韻要就高人覔好詩次韻黄超然楚詞賦物取香草衆草猶須避國香一辱雕章重題品何慚清廟薦芝房雪中遇胡烈臣歸自郴陽戲成一絶路傍有客騎牛過乞與蓑衣作蓆眠邂逅若能相顧問和公畫上釣魚船盧溪文集卷二十一
