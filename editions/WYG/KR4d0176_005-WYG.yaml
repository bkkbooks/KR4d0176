body:
  text: 盧溪文集巻五宋王庭珪撰古詩雅歌樓詩送永豐宰鄧晉卿潢池赤子弄庫兵犬牙蟠接䖍漳汀十年烽火照縣郭白晝不敢開衙庭忽見青樓臨大路樓上高歌揮白羽樓前解角看投壺終歳不聞撾戰鼔主人坐嘯已風流小婦鳴筝樓上頭曲罷仍能雅歌舞送君此舞傳中州送董衮臣提舉并序湖西提舉董公館于方外幕中月餘日得報杖屨之遊每聽髙論慨然有經世之志忽聞大丞相李公來鎮長沙即日撰裝走臨川以迎謁謹書長句叙别因以送行小菴遂在青林裏高軒大馬從何至慨然吐論翻濤瀾茅簷為我清風起忽傳丞相下湖東羣兇落膽先摧鋒便欲磨盾作文檄㨗書飛入甘泉宫丞相叅謀虚位處㑹看出竒兼破虜席巻江湖波浪清貂鼎勲庸歸自取次前韻酬董衮臣使君見寄時公知岳州少年通籍金閨裏持節荆湖已三至巴陵江水天上來樓觀崢嶸半天起使君才氣雄山東豪曹巨闕誰争鋒譙門髙開洞庭野鼔角震動魚龍宫此中景致最佳處讌間不復談征虜題詩逺寄江外人政恐六丁來下取再次韻酬岳州董使君聞去嵗妖賊犯境即時擒滅西望岳陽煙霧裡聞有璽書天上至増秩何年下鳯凰初無草動風塵起我生飄泊任西東孤軍敢犯千人鋒郢中白雪豈容和牛鐸輙應黄鍾宫郡樓把酒題詩處笑命騷人等奴虜不憂突境有狂夫立遣偏禆生縳取江虞仲生日正月十四日王春正月東風回星橋鐡鎻明夜開鼇山千仭接雲漢平地五色移蓬萊公家今夕果何夕適逢間氣生英才清都虎豹失呵禁九關轉鈕驅河魁爛柯山頭瑞煙起太白之精天上來却來人間知幾載少日聲名震寰海太學高文擅俊場江南刺史多遺愛江邊父老祝長年南極年來一星在明年此夕從宸遊鼇山正出鼇頭外新鶯百囀栁初青龍池鳯閣遥相待李真狂過盧溪盧溪慮其狂之無所歸作狂語箴之江南有狂客氣欲横九州朝為長安市上遊暮出簀中思報􅄷皇天恐爾狂不休囚鏁置之東海頭盧溪為脫千金裘換酒仍作商聲謳醉來騎折六龍背醒後槌碎黄鶴樓摩霄㧞劔斫月窟何如投筆亦封侯白晝殺人誇意氣何如煙雨卧漁舟和周通判永豐破賊五更盾上聞磨墨夜半偏思破殘賊平明露布已成文倚馬不知軍務劇初傳别駕下南州人如天馬徠西極指揮猛士驅貔虎坐使威聲馳絶域單于昔渡西樓山漢皇不閉玊門闗四方羣盗蝟毛起旌旗光拂牛斗間回戈必定東征去鎧仗如雲光照路㨗書飛入甘泉宫挿羽鳴鞭氣横騖公家人物世不衰况復詩名天下知探驪得珠何崛竒更欲盡採珊瑚枝題李伯時畫馬秃筆戯掃凡馬空人間始識天廐龍山城逼窄那得有注目萬里生長風奚官緩牽紫絲鞚好頭不著黄金籠時平諸番盡入貢此是玊花于闐驄劉偉明家蔵名畫數軸其姪時發得之以示余且求余䟦而以李伯時畫于闐驄馬為惠余愛其善冩神駿之姿非伯時不能也復䟦其後而蔵之送向豐之君家梁苑妙人物羯末封胡咸勃窣子今二十能綴文詩如陣馬敢馳突此去荆湖道路長要吟秋水動三湘歸時蕉葉應黄落賸入騷人春草香和周秀實田家行旱田歳逢六月尾天公為叱羣龍起連宵作雨知豐年老妻飽飯兒童喜向來辛苦躬鋤荒剜肌不補眼下瘡先輸官倉足兵食餘粟尚可瓶中蔵邊頭將軍耀威武㨗書夜報擒龍虎近報殺退龍虎大王便令壮士挽天河不使腥羶汙后土咸池洗日當青天漢家自有中興年大臣鼻息如雷吼玊帳無憂方熟眠再和酬王元勃舎人見寄風電聒天雷動地老父閉門呼不起從教卷却屋上茅偶遇時豐且歡喜閭閻比嵗連旱荒椎肌斵骨生千瘡羽書止欲調兵食不貯别庫為私藏吾君撥亂如光武將軍不數韓擒虎龍神自將羽林兒折箠一揮開北土誰識江南刺史賢政平訟理仍豐年村中儻無石壕吏吏不捉人人夜眠贈蔣山僧并引蔣山僧覺海持劉美中書來茶陵予以解官遇海於廬陵作數語送之俾遊雲陽尋定佛果祖師道塲以乞丐於衡湘間雲陽秀湘南祖刹隐林嶠曾出老古錐今尚闕神駒過江來覊靮不受敲潮音震海湖乞食徧蠻徼遣子尋故岑飛錫出泥淖端能破慳貪亦須硬觜爪定林枕䨇溪門前風水閙一𣲖遶鍾山歸時可自照沅陵遇公美忽談道術如有所得將之桃源作詩送之昔年結屋並江灣見君心膽方未閒牆東月出夜扣闗酒酣說劔翻濤瀾邇來書劔謀俱左尋仙欲鼓蓬萊柁三寸田中已發花九曲江邊仍進火蓬萊萬里天無涯驚風落葉巻黄沙且過桃源訪秦洞玊盤應飣棗如𤓰贈寫真徐濤并引世言畫工喜作鬼魅謂荒誕易圖也故傳神寫照為難聞徐濤畫盧溪老子作幅巾芒鞵蕭散之狀見者以為甚似作詩求之徐生畫人不畫鬼㸃目加毛必佳士邇來下筆更逼真勿論山僧及童子㑹貎詩人孟浩然便覺灞橋風雪起如今儻欲畫盧溪一菴冝著深巖裏贈高伯强高郎讀書有何好如魚蠧書終日哨㸑烟不屬長苦饑行吟安得追風驃羣公頓網加羅搜未肯放子出一頭先生上堂應勞苦向來白璧何時酬和歐陽叔向寺丞韻酬劉漸父渤海赫赫東南豪俯挹前輩傾時髦有如青天白日出平地放著崑崙髙都下官寮車可載聲稱寂不聞中外二陸初來浪得名謬以蓴羮誇㨗對文章直要窺孔顔不可睥睨馬與班君門九重耀晶㦸逺臣胡得來其間清新不見庾開府寂寞詩壇將無主縱使揚雄識字竒劉歆泣歎空自苦也知未遇何足悲時來忽睹青雲低鳯凰孤鳴得天律百鳥束喙不敢啼先生能作鳯凰語議論逺過袁虎子豈惟一日動朝廷留作詩人後來史汪洋尤喜陳時議一夜稱嗟豈徒謂九衢傳寫已喧闐氣壓五侯驕七貴螺江地古人物好迄今故老猶能道醉翁沒後頗荒凉秀氣盤旋此環抱天恐斯文乆遂終英靈挺出嗣家風身雖富貴異流俗兩眼觀書耳亦聰應曽夜半參黄石神幾暗得無蹤跡我本閒愁寡才力閉吻逢君那喘息郡齋次張參政韻呈王舎人使君天下士豈止臨一州此州乆廢亂弄兵非䑕偷使君醫國手頓若沈疴瘳下免北征苦上寛南顧憂壊堤防蟻穴回瀾障東流潢汙與行潦咸可供薦羞幕府羅俊彦巨細靡不收天生一世人異趣各有求盧溪老病叟十年不浪遊失脚入城府本自非人謀賢侯新下車採矚加窮搜隣里輙驚怪出門爭挽留平生江海思缺缺徑坐大孤秀猶沈百寮底朅來尉吾邦聲華愈曄暐諸公用法律領略極不似輶軒日邊來􅂅採書于紙送通判周監丞秋江水净磨碧銅秋山先作歸意濃况逢星火羽書急立馬不復能從容船中載書三萬軸鳴鐃揷幟摇秋空前年羣盗尚蠭午眼底日壓旌旗紅行春兼督貔虎士破賊屢奏明光宫今年豈料煙塵起赤白提囊走邊吏縣官飛符急索租誰能急了官中事不如置笏還縣官頭巾脫掛西林寺詩句留傳天地間時有人來問竒字功名正恐未免耳此役由天不由己盧溪文集巻五
