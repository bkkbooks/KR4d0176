body:
  text: 盧溪文集巻三十一宋王庭珪撰手簡答董體仁叅政二幅某違逺盛徳積十餘年矣往嵗叅政射策廣庭魁天下多士鄉邦仰歎是時某政以詔獄初興奔走洪贑兩州供詩帳不暇既而流夜郎萬里之外益復闊絶爾後雖聞閣下叅預大政皆不敢僣上賀幅蓋名在刑書非自棄也今春幸獲一曕履舄辱降顧之重曲敦疇昔不以兩地之尊髙車駟馬儼然辱而臨之繼承燕豆之勤俾奉笑談終日之樂示以金石絶妙之文驚耀耳目臨行又辱名酒餼牽之恵顧衰暮何以得此感戢厚意徒增悚惕而已某竄居夜郎七年無復故園之念乙亥冬叅政秉國之鈞又適當郊禮雖出聖主惻怛之誠意而赦宥之所推行者非叅政輔賛之力而疇為之然某特鑪錘中一人之數耳斡鈞衡者豈物物而較之以自徳邪宜叅政遜之而不受也彼鄭賈謀歸茍罃事卒不成罃尚不敢忘况流人賓歸敢遽忘邪䝉寵賜和章輒復次韻聊申謝懇某再拜與劉美中尚書三幅秋末遞中傳聞進陟道山之選囘思昔日勝遊雲泥相望矣近承惠問知館下異書已抄錄及萬巻且欲圖歸為來嵗金地寺之㑹某今已七十餘無復榮望但得與公相從盡讀平生所未見之書亦足滿其志願然公方登用翺翔朝廷豈能復作林下計乎青燈夜坐舉觴道舊當復有時未間千萬保嗇别膺殊寵不勝拳拳某再拜即日秋老伏惟玉堂清近視草之餘台候萬福某還溪上餘半年久客乍歸亦粗可樂不敢上闗雲霄之念但兩姪化去家事荒蕪然老子甘槁薄随分易足亦不較也惟坐隔笑談為恨耳兩日方聞進登八座未果具啓為賀又聞有出疆之命不知是否兩者皆重任即日大拜之資也更乞為國調衛興寢榮服寵渥某不接言誨恰十年被竄八經寒暑去嵗還鄉是時左右已赴召持槖禁從日侍天顔相望益遼逺比聞以㣲疾請祠榮還里第赤車駟馬驚耀州閭觀者靡不仰歎謂稀闊盛事某沗疇昔之雅宜先諸客迎於郊外而老大不能追逐車塵馬足之間然欲見之心殆如飢渇尚慮賓客正冗兼私門比亦多故碎事逼人徐當有晤言之日與王元勃舎人三幅某頓首即日殘暑尚熾伏惟郡閣燕閒神物䕶持台候萬福某杜門茍安自得於溪山之外蓋仰泰山北斗以為重也未縁叅覿伏祈保綏為國自重某違去門墻適踰一年景仰之誠未嘗一日不繫於懐頃嘗得教帖有丈夫志四海萬里猶比鄰之語熟讀詳味莫見涯涘韓子有言志同氣合魚川泳而鳥雲飛葢古之蓄道徳外形骸相與徃來太虚明月之中者用此道顧僕何人哉豈非所謂誘之欲其至於是歟此身未死祈見執事建大勲於王室得與山農野老相慶於茅簷之下感激所發遂忘其身之窮賤作語僣率愧恧之甚某惶恐小禀前月初聞警報郡縣倉惶輒自驚擾洪袁諸州或虜公私船或甲牌閉門便似失措萬一猝有非常不知何以應之獨聞治府帖下人情非嘗輒驚非術之素定安能如此今日朝廷又有助軍之歛蓋縁軍興豈得已而行也言利者既已失謀頗聞諸縣奉行不一如税田畆固有定數至於家業則明言十等戸今坊郭所謂第戸正應此一項無可疑者若營運則無跡可驗然止言坊郭則財力多者亦可以槩見少者所得無幾徒為擾耳今諸縣或官吏入人家打量間架搜索有無下至抄及賣餅菜之家如此行遣全類税間架恐非朝廷之意家業營運獨言坊郭蓋謂逐厚利者恐有不均之患今有田畆者即有家業有家業者則營運在其中若使一家而納三色錢恐必至於重困何坊郭之民獨不幸也某愚見以謂且從多處納則後日所取猶有可繼願審思之行下諸縣使不至重擾則民户受閣下之賜豈勝計耶僣易僣易與彭仲平親家三幅某頓首再拜上啓仲平秉義尊親前此伏䝉新拜誥命咸增懽慶某不惟老病所拘是時適子姪皆赴試遂與東岡皆不獲親往必䝉照察即日苦寒伏諗尊候萬福謹奉起居不宣某頓首拜問某頓首再拜上啟仲平秉義尊親貴眷並佳萬福凌雲與諸甥並安聞全道已交割未聞歸信某再拜某再拜少懇周行甫新被薦欲求見而素未拜識孟覺來覔書理不可辭幸勿訝䝉一顧幸甚某再拜與彭郎凌雲將仕六幅某啟上彭郎將仕半年不收家書遂久不通信朱三來承書喜聞長㓜皆安去冬朱守見覃家屋大窄遂那城西安福寺見借舎宇明快度夏極涼於是煩惱百八未歸既聞其歸心遂豁然其他事並不將心計較頗聞家事多災患而家書不報老人亦忍而不問恐傷懐耳己巳冬作書與彭彦直王十五迪洪時云昭逺欲䧟我而進身我非凡人二沈不出三年必有大咎彦直以示同僚端脩亦聞之莫不笑以為狂言近方知端脩死狀與昭逺無異皆不出三年天道如是我又何憾當有歸日矣百八娘喜無恙好㸔二外甥聞皆就學我處此殊無所慮逺寄衫袴等已收吾二孫頗能誦書差可喜尊丈不果别奉問不宣某啟承書久雨乍晴喜聞安裕大小均福惠茗良荷袋者必佳族人過省示盛事可喜示及俸錢如數領之甚煩也過便更煩掛意近殊新開殿榜合到亦未聞人還布答匆匆不宣某啓上彭郎將仕諸甥已就學必有事業逺承緘啟審聞長至所履増慶百八娘諸甥均福值節中人事之冗草草答來价不宣某啟白彭郎將仕東岡人至得書甚慰渇思聞新年動履之佳尊丈以次並萬福百八娘卧蓐得女且幸無恙百六姪病中久不得書因疑而憂之每人來不忍根問恐傷懷耳去夏以來節次問得甚詳痛苦不可言葬畢次女又亡今百三郎房下子弟未知事百八又素未更練乍管家事疎脱必多數要來此已力止之我寓此泰然無毫髪可慮之事若以為老是以衆人料我不知我殊未也奈清亦可上學今授書為誰也尹商老亦喪妻亦先䕶其柩歸仲質三月赴道州省老已住沅州報恩李郎中請也某啟承書比辰大小均安示及俸給錢如數領之甚勞煩也諸外甥今嵗學不成次緒來春早為之所幸資質可教過時則難致力尊丈秉義全道知城侍次致意不宣某啟逺承書喜長㓜均萬福但聞塲屋失意此固有時命慎勿因此自墮當更磨琢自有發時如鄉榜雖謬然其間亦有苦學而得者湖南運司初傳彦嘉賦甚好亦遭黜叙浦楊憲之子得魁乃范漕之子也聞全道尚有一半文字索金乃屬若遣陳才將錢去取是一髙念二死一髙念二生也不知憑誰去理㑹人逺來何煩惠果子金橘等所送景聞適㑹其中因亦甚喜仲質峽州考試百日在路干諸司今文字巳足可慶也尊丈近上狀不欲疊疊侍次言之不一不一與百八娘百八娘别來思念不可言人來喜安樂殊慰逺懷我在此安健正如東坡先生在黄州時不須憂慮所寄衣服果子已收中都無物可囘猿皮一畨與阿儀作劇若縁作坐蓐可得兩箇答吕知府郎中某頓首再拜知府郎中閣下某郡民也當以民禮事太守頃聞使車褰帷入境宜與此邦士民奔走車塵馬跡之間迎謁道左而犬馬齒衰卧病衡茅無復生意又自顧官卑人㣲去治府不逺不敢溷以書方此畏恐不謂閣下遣价呼召賜以尺書詞謙而禮勤固宜整襟下拜即戒行李一識大人君子之威儀觀道徳於前後聽言論於朝夕以釋平生之願望實以病纔小愈步履猶艱未可趨走侍坐於大人君子之側竊觀閣下視政以來境内肅清吏俗畏威盜賊不起素號繁劇今若無事葢閣下心術之素定其於古今治亂興衰是非之際應接酬酢萬象之變皆素定於胸中不假羣言之助况大門甲族祖宗以來英豪濟世之士常滿朝其家風淵源為天下士大夫所師表一旦擢居廊廟宰治天下術亦猶是也如某學術荒唐知識淺陋進何説於左右昔東漢黄叔度之流以人望自髙州郡禮請多不至漢帝召之或不來其言論風㫖無所傳聞而聲動於一時及其終也死於草萊卒無一言一事有補於世而卓然可見者由是觀之使人亦畏懼而不敢如餘年尚可茍活起復為人即走墻屏一識天下偉人無遺憾矣伏惟幸察某頓首再拜與彭子從提刑三幅某頓首平生困蹇拜違台矩餘三十年升沈異轍雖有慕仰之心常若有物隔闊之暮年復因詩語竄居夜郎不謂東歸之日適遇輶軒出使廣右龍旗虎節道經里門遂獲瞻承良慰積年傾傃之情豈勝幸甚某頓首再拜某再拜竊惟提刑丈駿徳雅譽藹聞於時天子之所簡注大臣之所推轂羣聽肅然下車之初百吏承風夷落安堵異日踐臺省一舉萬里皆由此始非獨蒼生被其福抑且為鄉閭士俗光寵幸甚幸甚某再拜正初領去冬所惠台函累幅兼寄示王漕書并文字極以為感某老朽四十餘年不調頃嵗䝉恩自便歸老田里已足平生豈復戀此卑㣲之階王漕故人念念埀意荷其愛厚非此公髙義某安能自經營也他日不掛罪籍而死亦良幸耳與胡觀光知府三幅即日春霖作寒將履清和恭惟坐鎮千里民兵靜肅台候萬福草㓂突出鄰州皆被其毒不犯治境功績昭然㑹當有聞於朝者更冀調護以迎新寵平生交遊久而不替如吾友觀光可屈指數也知車騎久到臨賀方欲候袁倅赴官上狀忽承局道出於此先辱教字問勞之勤益服髙義未遽以疎懶鄙棄之也前年䝉召命初不欲行自顧夲疎賤豈敢學違朝㫖之人但不可久住耳既誤䝉恩數遂乞祠以歸來教問及且以為慶愧悚而已今年八十七矣然尚健獨未知有晤見之幸否此心切切臨賀接廣西湖南最為佳郡狂盜奔突如此而不敢犯豈非威徳有以鎮服之耶某亦嘗測此盜不可輕正如來諭近人料西北亦如此但茍目前暫安耳黄元授昔時亦甚熟後嘗通書否一子名文昌者登第頗能文士大夫多喜之張安國尤極力推挽元授去嵗得南安軍文昌復得編修亦可謂榮矣與范元觀某再拜育才齋作别三十年矣中更大亂南北否梗絶不相聞當時同舎為鬼錄者亦已過半想執事亦不知我之猶在也數年前鄉人王世臣自廣東歸始知元觀登進士科入館閣韓徽猷居吉州時車從亦嘗經由適避盜山中皆不及知頃者復聞同判長沙聲跡甚邇雖企仰之切何由一見眉宇每思向來筆硯之遊與今盛衰異時人事屢變令人感慨不能已也某政和末得一官調茶陵丞值監司守倅皆庸俗某素樸拙不能取容又見州縣之態不可為遂歸耕於盧溪之上杜門不出已久今聞元觀方以髙才為時㨂㧞進取美官如不忘貧賤之交時飛謠音以慰岑寂答楊文發某去冬兩辱教帖拜意良厚新春計尊候萬福執事薦章無患不滿平生故人方䇿足要津若一榮改則駸駸朝列矣示及嫦娥奔月等詩寄意髙妙開發衰鈍之思幸甚見索拙惡俟續訊當不避嗤笑錄去也與劉舜元三幅某啟上舜元省斡賢壻竊聞遷轉之榮共增歡慶長至無緣相聚迺承惠啟四六粲然賛美過厚且審履此新陽諸福駢集乏人寫啟為報兼迫人事草草布謝不宣某啟相别七八年矣今春末到家獨未見舜元念之不置忽得書聞行李已歸長途盛暑涉履無恙深慰老懷何日一見以欵緒言安鄉之闕不惡且不甚逺久滯中亦一可喜事也某啟新年未獲靣慶竊知大夫之體候已安良以為喜聞造軒館甚壯麗恨未獲倘佯其上索詩少暇即寄圃中去嵗前略葺修邇來遊觀者甚盛䝉為明年之約人生幾何當不爽盟㓜麟久擾侍下此兒似不癡他日當作外家宅相新守此旬末禮上恐欲知子柬子華並致區區與胡至文某頓首再拜啓至文秘書賢友不記與公相别之日每渴清言坐以馳仰比辰絳帳雍容起居萬福至文髙才而尚沈屈人所共歎然近聞書館甚盛摳衣承教者滿門良可喜也惟未卜面晤之期此懷鬱鬱邂逅一笑再當有時未間加愛不宣答楊秀才某辱惠書寄示盛文珠璧粲然獨不鄙謂老拙越數百里而虚辱之敢不奉報蓋士患不能文而塲屋之文患不中有司之尺度雖有竒偉髙世之才一語不中尺度則棄不肯取此塲屋之文所以為尤難也竊覽所寄三場詞彩議論皆有出人之見只依此軌轍益之以學問巍科可俯而拾也文軸封納亦随所見不可自隱耳惟冀孚察盧溪文集巻三十一
