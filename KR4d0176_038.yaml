body:
  text: 盧溪文集卷三十八宋王庭圭撰啓回王舍人啓伏蒙知府舍人遣安福縣尉持書禮至山中者竊以烏公出鎮之三月先搜處士之廬陳蕃為郡於南州特設高人之榻考之前古號為美談茍不得人徒成亂俗如某本無魁梧奇偉之質適丁方隅橫潰之時紆鄒陽可曵之裾恥為遊説負虞翻不媚之骨動輒忤人由是歸休往而不反初非高隱敢當太守之威儀正坐羇窮恐類山人之索價豈有門闌未造介使先馳禮幣荐頒翰箋沓至朵雲奇逸下垂蓬室之光一紙殷勤實戴荆州之重恭惟某官名蓋天下學為儒宗以英豪挺拔之資躋侍從論思之列厭螭頭之注記請麟符而布宣號令精明兵民靜肅全家飽暖無非五袴之恩環堵恬安例獲二天之庇况兹庸品敢盜虛名非不知馮岱相見於苻融禮勤州郡林宗一遇於元禮名動京師實緣衰病之交攻未即奔馳而捧謁心搖雲表望極龍門厚禮已過於陳羔報語無嫌於買菜回魏寺正啓被病殘人失修桑梓之役謙詞厚禮忽頒羔鴈之儀顧匪其倫難任斯事蓋懷祖為郡不過逸少之門况孺子間居敢下陳蕃之榻伏念某低回暮景飄泊平生坐癡兒不了之詩竄居蠻域逮渠魁殱厥之日初返鄉閭未即參承更煩呼召恭惟某官一朝傑士四海名儒金榜射於天門早登龍虎霜威振於朝內不赦豺狼天道好還忠精上逹旋頒紫詔寵鎮侯邦昔者烏公開藩先聘處士何武按部首訪諸生不意古人復見今日某敢不續扣守閽之吏一瞻刺史之天雖無補於事功庶有禆於風俗原其無用或有可觀賀王守除直寶文閣啓佐伏審顯膺褒寵峻陟邃嚴占北斗之魁星名傳海宇聨清班於寶閣身上蓬山恭惟某官識際混茫筆參造化橋門拔萃號稱國士之無雙金殿唱名擢居天下之第一諸儒仰首萬國聞風早登螭首之坳用副龍頭之選旋求外補未正中台輿誦逹于京師璽書來於郡國蓋弱翁治行朝廷久已知之而黃霸功名天子以為長者盡作中興之名宰皆緣治郡之休聲行觀一節之來益竦四方之聽南州父老望輕車白鹿之行春北闕公卿想曲蓋朱旗之就道某奔馳驛路阻慶門闌鴻鴈雖失於寄書燕雀敢忘於賀厦惟兹疏緩實負兢惶回蔡寺丞啓洸伏審召對嚴宸雲漢下九重之詔藩宣大屏旌旗照千里之疆凡受一㕓而卜棲皆托二天之所庇仰聞寬大之令樂誦中和之詩所被仁風咸生和氣恭惟某官望高四海才過萬人家聲冠冕於本朝人物琳琅而滿目惟神螺之川陸控湖廣之舟車民物夥繁衣冠駢集乃得魁壘非常之士用副淵衷異眷之求開府浹旬騰聲遐邇與我共理其寬西顧之憂令民咸知不隔奉宣之吏即下稱揚之詔召歸清切之司豈但漢皇之賜金佇看弱翁之拜相某抱病鄉邑竊聽風聲遙望高牙方伏枕而物繫其足稍能上馬即擁篲而願掃其門賀楊徽猷子登第啓伏審令嗣學士校藝蘭闈登名桂籍士夫傳播閭里交歡恭惟某官教子惟以義方積善必有餘慶材兼文武謀贊鈞衡昔隱漁樵能通天下之務旋升館閣復運幄中之籌詞鋒當一座之鼓旗名譽振四州之草木金門賜第首蒙先帝之知玉帳談兵獨出諸公之右是知善治獄者門閭可大能活人者子孫必封定國果侯信于公之隂德於陵有子表楊氏之慶門豈惟荆楚之材多奇固知川嶽之寶不匱可並東京之名族何慚南郡之先賢龍虎同登盡天下英雄之異選風雲千載當國家宗社之中興廊廟竦聞家聲益振某恨居謫籍阻造台庭徒懷賀厦以馳誠莫獲鳴靴而下拜盧溪文集卷三十八
