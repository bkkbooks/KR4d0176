body:
  text: 盧溪文集卷二十九宋王庭圭撰書答王元勃舍人書三幅判府舍人閣下某仰服駿德偉望幾年於兹矣霄壤異趣修敬無階而又天禀疏介動與時違政和初嘗竊進士第薄宦湖南不得行其志自退居林下邦邑僻陋中朝名卿巨公遊宦鮮或至此以是雖欲一拜眉宇識風度承謦咳有不可得日者舍人下車之初承積弊之餘櫛垢爬癢皆當民心威驅恩收和氣翕然千里之士求出於門下者衣袂相屬獨某未獲造謁者蓋以憔悴窮愁之久不特自棄而時人棄之亦久矣伏辱台慈遣吏致書副以醪醴親灑教墨詞㫖謙厚如待古之有道者捧讀驚懼至於失措顧其中實無毫髮可以仰當禮請之意竊意必有人張飾虛詞譽過其情以欺大君子雖然近世公卿鮮能下士舍人有時之盛名而不以驚愚頑二千石之貴而不以驕傲賤其風流標表有足以竦動四方激拂當世固欲行古人之道於今日而俯及疵賤之蹤豈亦如昔人市駿骨招郭隗始以是存心者耶某居是邦既不能修桑梓之敬於下執事而反䝉以書禮為之先益見邦君下士之美而僕之罪戾無以自逭也舍人朝夕歸朝議論大政進退羣材天下瓌瑋閎博自重之士皆將願綴於門䦨之遊如某何足道哉疾病稍痊當即戒行摳衣登堂終必圖之惟少埀察幸甚某違去几下三易晦朔歸卧園林不敢時上起居是非自取棄於門館伏念平昔本以愚疏與時不相值遂自放於山巔水涯者僅二十年聲迹不聞於人一旦執事者誤採虛名損大府禮遇之重既歸日夕惶懼無以塞人之言又慮流俗不察便以為幡然作進身之計用是愈益戰栗不敢某請於門下前日遞中辱賜誨帖詞意爛然存撫之厚恍然如在郡閣登高臺侍杖屨而奉名理也逡巡久不敢申意似若傲慢顧舍人心事落落嘗加異顧超越俗情固知必䝉恕察某有鄙見上塵台聽今嵗廬陵境內初若大旱幸而晚得雨差勝他州誠德所感千里受福竊見一鄉之中自有豐歉不均近陂塘處全不覺旱高田有至絶穟者視旱官往往只見路傍平坦處便謂豐熟至於山溪僻逺之地多不及見若要一一核實勢有不可弊亦滋多終不能均今諸邑高下使府必自探聞不審只可均情作分數減放否若以所見熟處一例不減則絶穟之家重困賦稅恐不能辦也又聞諸邑官多以旱為諱向非台㫖與行下諸縣決不敢受接旱狀伏望博採輿論斷而行之僣冒及此非私言也伏惟幸察久以衰殘不敢上通記室方具尺牘以自解乃䝉再賜誨筆存問有加仰戴厚德遂釋危慮豈勝幸甚向嘗妄以旱事上瀆台聽伏䝉開納詢究幽隱一方受賜矣竊謂田畝高下雖不均而一鄉之中大率亦可槩見正合尊㫖所謂計鄉分作分數蓋易此說為可行若一鄉之內又分數等則吏緣其姦終不能均至於間有漏網亦理之必不能免若欲賑恤貧下庶幾計鄉分以定分數上户作一等數若干下户别作一等如此則無不均之患也愚慮如此舍人以為如何近有行朝及湖南來者莫不盛談螺浦治譽赫然驚人此非諛言蓋逺近之言如此亦欲舍人知之耳向宣卿書中尤所歎服兼云十年前曽兩見舍人於蕭山姑蘇自後流落天涯不曾通問此公留意政務喜聞治聲重不能自已矣與周秀實監丞書三幅䝉賜教翰奬豫過情伏讀赧然某湮沈之跡鹿鹿林巷僅二十年將終老盧溪之上未嘗敢自衒粥求合於人而人亦莫之顧也不謂監丞過聽一見輒欲將成之自忖虛薄恐終無以上副憐念之意比者判府舍人遣吏奉書如待異人受之慚惕恐執事奬飾大過他日不副所聞適足纍閣下此所以驚懼不得自已也王公天下偉人與監丞俱負抱絶異之學欲行古人之道於某而某實非其人十五年不入吉州城門矣尚冀憐恤保其進退某近亦卧病新起自顧何人豈敢拒大府之命或此去賤體平復瞻視稍爽即戒行李進謁門下諸凡更望埀教違去門墻倐然秋盡仰思名理時奉薄遊高齊論文靡間朝夕雖扞格之資一聽發藥恍如有得以是别後尤遽傾跂之勤無由馳謁門屏惟望使車行縣乃獲瞻仰前日途中辱賜手筆存恤周旋久稽修謝是時竊聞郡人有聞於州府使人憂懼者久之自惟窮困之跡所以受知於監丞者相得於形骸之外如平日吹噓澡袚之賜固自感激若欲挽而出之使逐榮利蓋非所望也中間亦䝉舍人再賜手書今方修報想未加叱怒也右使門中英彥如林豈少老僕得非以隗始之意耶聞大斾之吉水督捕曽不淹日渠魁就誅餘黨散滅一方之幸近日諸鼠盜間作此尤當治之於早若巡尉留心無不可捕者頗聞諸邑似以盜為諱此豈持久之術養虺成蛇為害愈大不可不慮也胡縣尉本寒素䝉監丞特逹之知舍人亦惻然憫之近緣細故輒求罷去聞得權局保全考第乃使府終始之賜舍人以嘗有意惜其功賞未審其事體可行否尤望讃成之力成功與否乃胡子之命獲出大賢門下亦足以光其腳色也近䝉大斾寵賁不獲詣行館修謝豈勝感懼某雖處林下無預人事每辱監丞顧遇之厚輒有所聞當布於執事某自甘閒曠之久絶無外慮不意鄉人輒列狀於使者於是令人羞悸不敢出既而諸使屬皆見訪察其論議州縣情僞十得七八或時有悮聽隨即自明蓋以詢訪之廣也初云吾邦大不治實緣二千石之柔遂併及執事今嘗反覆與論掣肘之由尚且疑信相半兼云此郡非有風力莫能治今者閣下權府事願痛革前弊蓋郡人所患苦者莫甚於吏風大强與三獄之淹延若嚴責時限立要結絶勿容以追逮證佐為辭指顧之間何事不了又聞受納多邀阻部僚日夕飲博此聲頗喧願使府伺察之勿使逹及於持斧也僣冒不勝悚惕答劉喬卿書某啓喬卿外甥去秋臨行承以新詩為惠甚佳别來匆匆已見新年想侍奉進修之外所履康勝老舅初被譴就道懼人以為罪人而鄙斥之所至逆旅輒杜門不使之知姓名自入荆湖界行路之人皆逆知之爭相迎問士大夫或至相賀謂此禍非庸人所宜得自昔名士天必厄之子厚至永而文始盛魯直至涪而詩益工况我無二子之才而又謫輕地蓋虛有其名豈非造物者見賜甚厚而獲䝉聖朝寬大之寵邪初至宜春得一故人書云不合暮年作詩不肯休宜得此禍又可笑逮至貶所未敢遽入城而城中士大夫多出城見訪相勞苦州民驚喜如異人至其邦授館如歸得一蘇氏花園枕沅江之上夜郎牂牁之水出焉自入桃源觀晉人捕魚至落花流水處又歷漢伏波將軍征蠻故道湖頭石室宛然所謂武陵五溪盡屬境內以至洞天神仙古跡不可勝數於是乃知昔人雖流竄而有以自得者良有以也始望皆不可以及此今乃自負知未為時論所棄也近袁季明書又云老舅猶有十六年夀嘗答之云所謂十六年亦非不多但子之術所能知者天年之夀耳若十六年之外在我而不在天則非子之術可得而知不審曾見之否因筆及此亦論喬卿知我自有定處也相見無期言不能盡餘惟力學自愛不宣盧溪文集卷二十九
