body:
  text: 盧溪文集卷十六宋王庭珪撰律詩七言九日登鴻飛臺拄杖扶登何處臺天高風急雁聲回疎林紅葉紛紛下遶逕黄花細細開此地崔嵬聊試脚明年強徤更銜杯綠罇烏帽隨時足無用白衣人送來豫章别彭養直時謫辰州茘子欲丹蕉葉黄别君南浦正凄凉九疑隔嶺共明月萬里窮途非故鄉坐見浮雲更百態行吟秋水動三湘金雞放赦知何日尚許生還天一方送任子嚴江西運幹正坐懲羮吹冷韲送君那復有新詩明朝便恐隔千里抱病何由把一巵西蜀文章自家法江南烟雨上䄛時東湖滕閣多佳興落筆端能寄所思留别黄子黙回瞻人在斗南邊目斷湘中萬里天驅馬又過衡嶽寺攜家却上洞庭船江湖足了平生事文字豈徒今世傳不共離亭一罇酒行㸔待我著歸鞭次韻郭偉節段延直見寄二首辰溪古夜郎郡太白嘗謫焉山靈未忍勒銘移空有寒鴉噪竹枝二妙相逢春霧裏老夫將竄夜郎時傳㸔尺素雙魚尾突過黄初數子詩不上沅江探竒絶平生誰肯一來兹邂逅江樓初識面騎驢衝雪聳詩肩談傾坐客人如玉蘋滿汀洲水拍天君欲摩霄登兎窟我方載月上漁船夜郎千古窮愁地竄逐曽留李謫仙渡瀟湘江夜聽瀟湘江上雨今朝雨裏渡瀟湘船衝曉浪漲新碧山似畫圖非故鄉鴻雁來時應好在白鷗飛起忽成行論詩安得杜陵老望嶽令渠賦一章自江上遊龍興至凈因寺曉踏晴沙江上堤堤平沙盡草萋萋牆頭野杏纔先發葉底雛鶯自在啼問道漁舟通膴水只應烟火是桃溪深邨疑有秦人在記取來時路恐迷賀王彦恭新除湖北漕年年新換玉麟符應為高名滿太虚紫塞新分邵陽壘皇華初上使臣車木牛轉粟洞庭野金馬催班待詔廬旗鼓行春真晝錦可能一訪夜郎居寄湖北總領彭子從郎中翼軫星邊貫索疎星文夜動紫宸居追鋒急召歸郎省持槖猶稽侍玉除六路藩臣供餽餉五溪蠻子樂耕鋤連營十萬無饑色却入承明奉直廬春晩同石子文遊歐陽參軍園問其主人已物故獨一老婦開門亭檻幽雅酴醿方盛開因歎二年卜居隣巷相去數十步而未嘗一到作詩記之百花狼藉草如茵誰與東皇殿後塵故放酴醿教獨步更無凡木敢爭春杖藜亦偶逢幽徑扣户何須問主人坐久忽思歸路晩舉頭香雪落烏巾居隣曲巷有朱扉未許牆東宋玉窺春草滿池驚晝夢酴醿萬朶壓繁枝湘西江上叅軍宅黄四娘家子美詩他日沅陵尋故事為余收入楚人詞送黄彦謨通判岳州時冦盗未平竒功已奏紫宸居新上南州别駕車木葉寒飛洞庭野樓船光照赤沙湖猶聞豺虎縱横在已覺江山氣象舒萬一潢池羣盜息回戈請為掃穹廬朱致一來守辰州先致啟書余以病未及荅而致一壓境以詩迎之麗譙高壘武陵西西望雙紅捲使旗玉帳靜驅千騎弩銅符遥鎮五溪夷我遭白簡為遷客君擁朱輪把一麾諸洞帶刀迎馬首略無征鼓動邊陲閏十二月自城東泛舟遷居城西安福寺舟中微雪朔風吹雪江上來急槳迎風蕩不開渡口雲藏伏波廟山腰霧失楚妃臺移居自作泛舟樂抱甕還如載酒回歳晩浮家寄何處兩溪春水緑如醅李郎中生日三槐堂下清隂滿太華峯頭綠葉圓天上正開炎帝厯人間初識嵗星年名郎早合歸華省藏室行當綴列仙雉堞新崇邊壘壯長城不獨有前賢報恩寺避暑風枝不動午雲蒸古寺嵯峨倚石層百丈虛廊䕃華桷半簾疎雨斷飛蠅病餘已怯金罇酒捧立仍無玉盌冰奈此人間諸熱惱一杯清茗屬高僧乙亥立春夜雨平旦大雪青帝重扄夜半開先驅雷雨下天來千門萬户春風入小院高樓樂事回但喜新年逢瑞雪不知平地有瑶臺杜陵逺客多愁思忽憶兩京初發梅和馬德儉韻兩蘇共賦靈芝句知是君家矍鑠翁門巷偶隣三徑竹功名當柱五溪銅似聞四海塵初靜猶恐扁舟興未窮螺子江邊無久滯亦宜摶翮上晴空劉時舉主簿相别三十年忽相遇于沅湘之間古夜郎郡也郡素窘俸饋不繼埀槖而歸相聚月餘賦詩為别謫仙適竄夜郎道主簿歸從飛鳥邊但喜騎驢得佳句忽忘揮麈是何年且將肚束三條篾敢望腰纒十萬錢剩斬湘南幾竿竹他時分我釣魚船早春懷葉觀察門前江水有春聲鷺浴沙汀照眼明詩律未堪傳樂府酒兵聊且下愁城無窮澗草爭青出自在巖花絶壁生忽憶江南䕶戎老晴牕磨墨聽新鶯送頔子還廬陵頔子逺來夜郎省余聞其婦方卧蓐不欲久留而戀戀不忍去乃令上沅湘至昔人窺九疑處復下武陵溪入荆州由巴陵武昌洞庭黄帝張樂之野觀開闢以來造化擘出瓌雄怪譎之處却由瀟湘以歸敝廬作數語示之明日乃行東歸未辦武陵舟送汝翻成一段愁雪㸃敝裘騎瘦馬春寒幾日到荆州湖山天濶洞庭野呉楚月明黄鶴樓莫苦回瞻白雲嶺是行聊學子長遊次韻葉起商楊茂之池塘春草年年綠筆力千鈞挽莫回南國遺騷拾蘭芷西湖體雪禁梨梅窮途言詠頗寒窘治世音聲無怨哀一覽巨編真雅唱秀苗竒特出荒萊次韻酬祝彦直矍鑠猶能一據鞍將軍雖老未甘閒謬攜魚目投龍頷正類蒹葭倚玉山詞力倒傾江漢底光芒今射斗牛間珠璣贈我應難久却恐風雷夜掣還李守拉登譙門觀修城忽見金湯峙塞垣麗譙雄冠楚山川門開下瞰雙溪水壁立新磨萬丈甎招撫番夷應有術折衝罇爼正臨邊邊頭卧鼔休戈甲坐對春風理管弦次韻李宜仲見懷朱崖夜郎二逐客不因貴賤識交情此段當令後輩傾三友一龍吾作尾同時四海孰為兄殊方少客通南北厚祿無書訪死生萬里歸期應可指九衢先聽賣釵聲辰州僻逺乙亥十二月方聞秦太師病忽䝉恩自便始知其死作詩悲之辰州更在武陵西每望長安信息希二十年興縉紳禍一朝終失相公威外人初說哥奴病逺道俄聞逐客歸當日弄權誰敢指如今憶得姓依稀次韻段季裕惠詩二首久戰詞場力未衰毫端珠璧粲離離氣如八尺九花馬人似千年五聚龜國士無雙君自有癡兒不了我先知七年留滯沅湘道忽詠青山獨徃詩謫墮西南海角邊是中樂事亦天全漸聞長樂鐘聲近正遇巫陽敕放年客過茅蓬非率爾詩如錦繡益飄然一罇豈盡平生話咫尺高樓起暮烟次韻葉起商少年攜藝試東都一鼓無成怒奮鬚便把龍韜取官職欲隨鵬海混程途清言自可容平子文筆誰堪荅摯虞要使貂蟬出金鍪腐儒寧不愧操觚和向令製錦軒大邑大官身所安欲將何術撫創殘久懷利器聊堪試正見操刀不作難百里光華風俗美一天清澹水雲寛剸裁大巧元無迹血指從旁袖手觀次韻酬劉遂卿夜郎逐客東歸日傾蓋江邊側帽時霧豹隱山宜自養弓蛇落盞莫生疑古今得失碁千局湖海飄零酒一巵期子嶄然出頭角名場何患少人知盧溪文集卷十六
