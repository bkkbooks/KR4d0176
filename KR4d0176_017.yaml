body:
  text: 盧溪文集卷十七宋王庭珪撰律詩七言初至行在望中樓閣入青冥疑是長安舊帝城千里荷花開世界幾年羇旅望神京老隨丹詔身猶徤夢入華胥眼尚生行盡沙河塘上路夜深燈火識昇平上殿退朝口號銀臺南畔曉雲飛路入丹霄上紫薇共㸔客星朝帝座敢將汗脚踏天扉遥瞻鳳翼差池佀近對龍顔咫尺威自愧衣袍正藍縷晩來忽帶御香歸送王舍人赴眀州過闕二首紫泥初出大眀宫端為朝廷知弱翁平地便開丞相府烏臺先跨玉花驄一時治行無前輩共喜君王記自公暫假雙旌臨近輔聊觀海日正曈曨當年玉殿校羣材名占樞垣北斗魁曽入翰林批鳳尾每瞻雲氣想蓬萊前驅候吏千軍肅遥望天門九扇開咫尺龍顔應入奏紫霄東畔曉班催次韻楊廷秀求近詩聞説學詩如學仙怪來詩思𣺌無邊自憐猶裹癡人骨豈意妄得麻姑鞭曽似千軍初入陣清於三峽夜流泉只今老鈍無新語楓落呉江恐誤傳胡邦衡移衡州用坐客段廷直韻朱崖萬里海為鄉百鍊不屈剛作腸復出光芒動星斗定隨雷雨起江湘歸期正待春回雁賀客爭持酒滿觴笑說開元丞相宅凄凉偃月上標堂次韻張子家見訪惠詩僕嘗為逐客故以台州自况老去無才可致君強從詩社立竒勲忽逢天上張公子應念台州鄭廣文風月何嘗千里隔江山不用一錢分能來鼔譟助餘勇氣壓淮淝百萬軍用前韻贈别子家西掖舍人彦實之子西掖篇章自一門君能祖襲有殊勲風流前代黄花句夢想當年紫鳳文月下長吟成獨唱壁間強韻共誰分江頭惜别多新詠秃筆猶堪殿後軍送黄子黙湖南機宜潢池赤子弄鋤耰天子擇日除元侯今君去為幕下士多材應與幄中籌官弩近圍臨桂峒捷書飛入未央樓想當磨盾作露布何異裴公取蔡州送同年趙季成知武岡軍收科同日上蓬瀛獨我胡為顦顇生晩節見君乘五馬前驅夾道擁千兵行聞峒窟烟霞静卧聽邊城鼔角聲入境旌旗應動色更㸔蠻户帶刀迎歐陽彦文晩始得官為邊郡獄掾乃州里宿儒於其行也詩以餞之往日高名動場屋青衫未足稱平生一官曹掾當蠻徼萬里山河列漢營顧我老無投筆志羡君今去走邊城邊頭已卧將軍鼓早晩書來說太平送趙文卿之湖南霜餘新雁㸃汀蘋愁絶送君湖水濱自歎老夫如病驥早知公子是天麟渡湘懷逺烟横渚望嶽題詩雨墊巾想見騎驢得佳句賸將收拾錦囊春次韻張子家新除浙西撫幹見寄幕府官清比縣僚升沈何啻九牛毛蓬蒿仲蔚今多病湖海元龍氣尚豪麗句早知何水部舊交誰記栁儀曹相如屬思寧遲久不欲詼俳恐類臯次韻路節推瑞香幽蘭君家蘭玉盈階砌傍有薰籠錦一端雅似高人來席上幽如靚女出林間芳叢欲吐新芽長深谷知誰著眼觀謝氏風流元自有更留佳客奉清歡謝安石欲子弟如芝蘭玉樹故自有一種風味瑞香古未有獨見重於近世遂得佳客之稱一名錦薰籠楊文發自長沙相别忽來權邑惠詩次其韻公來權邑官妓逃亡略盡湘水東邊喚渡舟湘天欲暮使人愁豈期陶令來為縣應念龎公不入州索我題詩今老矣㸔君下筆幾時休論文把酒誠堪樂莫歎罇前欠杜秋次韻楊文黼烏啼鵲噪竹生風誰過柴門訪病翁清論逼人來亹亹夕陽歸馬恨怱怱遥瞻紫極黄雲裏却望長安醉眼中南北車書將混一莫嗟吾道隔西東次韻黄伯思求其祖夢升墓銘跋妙句高文滿錦囊坐驚蓬甕忽生光君家人物代不乏文彩風流想未忘千載運中逢太史諸王殿下識黄香江西多士傳心印又出宗支一𣲖長胡邦衡北歸先寄詩二首次韻迎之無何真是本來鄉莫遣閒愁犯肺腸㑹見棟梁扶大厦不將文字弔沈湘揮毫未辦銀為管沽酒奚須玉作觴雙竹端能作竒瑞衡人宜䕶竹間堂當年大册撼天扉聖主今呼逐客歸應是風雲乘此㑹便令鵷鷺著行飛久埋劍氣衝星氣暫裂荷衣換錦衣穩上丹墀踏龍尾九霞光裏望晨暉和呉思道韻寄郭德耘思道詩有校讐瓊殿之語德耘寄示呉思道詩某聞思道之名而未識也輒和其韻以寄德耘亂後交遊半不聞天涯淪落始逢君黔南可怪無驢養冀北遂當空馬羣尚使高才淹管庫忽傳佳句吐烟雲十年讐校金鑾殿依舊無氈似廣文左世勣妙年登第而飄泊遐荒十年不得調蓋嘗以事忤權貴今公道方開始欲仕進索余賦詩射策楓庭最妙年九衢爭㸔若登仙乘鸞豈慕天邊貴失馬方知塞上賢華轂朱輪多覆轍高門大屋尚修椽如今相國開公道此語他時亦盛傳次韻酬周孟覺㸔鑄銅人能幾何相逢重得復摩挲江山如畫風流在城郭空驚歲月多豈謂今朝聞正始更翻新律似元和思君夜久猶竚立月上松梢映綠蘿聞梁養源歸卧病未出作詩問之試訪伯鸞強徤不但傳烟渚有歸舟欲聞大士一轉語為洗南榮十日愁青壁萬尋人似玉碧雲千里月垂鈎我如堪問維摩病獅子坐中無此流送頔子歸廬陵西風吹我夢魂驚送子東歸無限情好往沅湘探竒絶逺㸔衡嶽正崢嶸黄昏渡口呼船急後夜江頭望月明能把愁心寄明月雲開時到夜郎城送黄介可漳川螺浦共家鄉醉墨題詩尚掛牆天末異時懷李白風流誰復數真長那知此日長江簿即是昔時江夏黄鵬背知橫幾千里棘間何地可回翔謝同年趙季成通判見訪一夢驚回四十年昇平樓下聽臚傳共攀玉兎月中桂認得銅駝陌上仙忽遇旗旄行縣邑先驅貔虎訪林泉王孫自是經綸手容我滄江卧釣船送劉克強再赴殿試聞道田西劉克強年來猶自讀書忙生平萬卷非無用歲晩一官聊足償曽捲笏袍還聖主重攜筆札試明光漢庭射策推諸老更㸔公孫獨擅場頥軒門外紅塵走客車閉門風月下簷隅南山霧雨宜藏豹東海龍芻試秣駒竹几蒲團消永日銅爐紙帳夢清都靈龜隱處無人識似置寒冰在玉壺題青桂亭天上犀枝玉蘂秋何年桂子落巖幽庭前忽生兩好樹簷外突出雙青虬九里香飄吹夢斷十分圓影暮雲收他時合抱重來㸔不是𤣥都觀裏遊和劉喬卿雪詩紫極真人吹簫雪降則止柴門忽啓玉為關疑是新移海上山野寺僧居銀窟裏廣寒宫在月明間老農擊鼓迎豐歳紫極吹簫近帝寰臘後東風將解凍已㸔峯頂露孱顔盧溪文集卷十七
