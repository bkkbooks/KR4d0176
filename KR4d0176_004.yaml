body:
  text: 盧溪文集卷四宋王庭圭撰古詩次韻方性夫同年見寄禮經久顚龎不絶僅如帶諸儒共補葺紛然莫酬對先生隱桐廬議論有根蒂劔胸剔廢滯電眼亦作電光燭幽晦虀鹽二十年時節忽已届聲名塞天宇筆舌翻清瀨子美蓬萊宫輝赫輒自怪文彩動人主英風特飄灑清芬掩幽蘭四海共紉佩平生慕忠義爛漫意常在坐閲諸公間誰與論梗槩著書逢休運一洗窮愁債駸駸度驊騮過都如歷塊嗟豫强追躡常負跛鱉態雖登龍虎科異調愧當代才高自激烈無為逐時輩和施倅重陽日謝豫送酒東坡異時談醉鄊怒罵嬉笑成文章其中廣莫幾萬里脫略禮法侔鴻荒初無愛憎與喜怒豈有寒暑與炎凉後世乃與醉鄊隔糟粕始變鵝兒黃三杯危坐亦拱手儼如冠劔侍君王淵明不飲時節改霜風九月籬菊芳舉頭忽見南山翠便覺逸氣登羲皇揮毫落紙得佳句流涎露頂庸何傷甕下被縳烏足取定無奚童攜錦囊安用船頭置百斛又令口不離杯觴醉翁飲少輒已醉胸中了了初不忘八仙脫醉尤可笑騎馬落井何其強題禾山蕭秀才卧雲菴江南山盡頭氣狀頗英淑禾山倚天開蒼翠滿林麓扶輿磅礴起橫斷湘江曲中有隱君子結屋在深谷未放雲出山蟠雲卧幽獨暮簷青潑眼逺靄寒山竹景色嘉有餘幽人夢初熟起看柱礎潤山前雨應足題劉端禮步芳橋橋上畫欄低壓水青龍影落芙蕖底欲渡芙蕖望翠微波面紅雲映屐齒洛浦清流古有神羅襪凌波生暗塵東昏戲作錦地茵金蓮襯步如花人而今此事墮渺漭但有荷花開蕩漾試穿芒屩踏風煙安用紫絲連步障余棄官纍年劉元弼作詩見勉次韻奉謝我生寡結交論議誰與質憤氣不可蟠龍蛇走鬱律少年學竒字費力弄紙筆不讀五千卷亦慕入此室腰間插櫑具談兵尤縱逸時方用巨人顧我何品秩往年承平久出師無紀律群盜尚縱橫豈但開邊失皇威振海岱戈甲耀霜日自可掃欃槍掩耳驚雷疾故人起閭巷宿昔登近密聲熖動四方風雲生咤叱犬羊猶爛漫氛氣何時畢感公贈以言欲往非儔匹此事恐不免高卧安敢必送駱仲武淵明不喜折腰趨寧作缺笏何易于勸農使者鄙丈夫少年新進安識渠下馬怒頰虬奮鬚指揮星火飛文符詈辭愧語每不無諸公止欲求薦書椎斫肌骨尋高腴公為一笑憐其愚熙朝成法字已孚堅如金石莫可渝鞭且勿施安用蒲三年竟亦無逃逋吏民遮道相歡呼生立叢祠傍佛區想當逸氣吞江湖與人恢疏無怨吁臨卭小子傲鄊閭方乘朱輪呵道衢公歸西山結茅廬丹崖絶壁巉空虛誰能負弩當道隅終日與爾為前驅送周覺民兼簡湘西故人蒼山凍雲埀欲雪風吹客衣冷如鐡忽乘狂醉夜敲門不畏苦寒來訪别時朝騎馬雪中歸何處皺眉吟雪詩若見湘西舊同舍為余傾廩說相思段居士粟菴若人胸臆著萬卷始信此菴藏大千維摩室中坐獅子蓮花鬚上集人天十方國士從坐起聚此一粒空中圓爾時寶剎現毫端跳出雲門向上關癡兒正抱古公案對面不納須彌山便向粟中尋世界含元殿裡覔長安題周忘機畫軸舊聞周忘機隱於浮屠如洪覺範之流然未見其盡也紹興乙丑清明日觀於任子嚴書室王某題羅浮飛瀑落九天尺素倒流三峽泉怪底晴忩起風雨洞庭野色瀟湘煙平生江山入吾手况有對坐南昌仙不須作此無聲畫妙畫自以無聲傳次韻李教授閔雨赤帷使者朱斑車重簷飛蓋遮日烏佛前下馬來跪爐草木焦卷苗欲枯我亦本是耕田夫僅能識字勤須臾吟詩閔雨作時無空勞皺眉捋髭鬚安得年豐鼓不桴便足飽飯甘樵蘇觀徐明叔畫湘西磨崖圖崖在湘西白鶴峯紀官軍破賊衡山高出北斗邊九疑蒼梧相屬聨羣峯環走如却立山腳插入瀟湘川朱陵渺邈迷處所白鶴噴薄飛流泉坐看徐郎拂絹素盡驅山嶽置眼前徐郎豈是真畫手酒酣逰戲乃其天巴陵洞庭連浦溆鯨鯢蟠穴為賊淵詔謂將軍出旗鼓樓船蹴踏驚浪喧欃槍夜落照湖水雕弓十萬猶控弦湘西古寺最竒絶丹崖翠壁開何年况公文章善叙事大字怪偉冝鑱鐫中書異時觀落筆因煩吮墨圖凌煙孟公韓公毛髮動腰靫大羽冠進賢他年中興事可考公名亦與兹山傳和介甫少狂喜文章少狂喜文章頂戴千佛名年大意轉拙腸饑猶舌耕筆扛百斛鼎詩當五言城儻無封侯骨止是識字氓長安公卿中閲人如踐更扁舟茍能辦自足了一生贈劉允升并序紹興三年嵗在癸丑暮春三月允升自湖南李相公幕府歸致相公之意因留數日洽甚作詩以贈之我家神螺峰與子鄰井閈聞名初識面逸氣起天半坐久語翻瀾詩文星斗爛刺口論世事極能原治亂洗我氷雪懷韻出眉宇燦遂于交逰內得此一好漢自言長沙來幕府天下冠相公秉旄鉞英僚照藩翰辟書欲交飛置我在門館事繫國輕重忽逐雲雨散請君企踵待勢若馬脫絆他年恐未免成此竒一段劉端行自建溪歸數來鬭茶大小數十戰豫懼其堅壁不出為作鬭茶詩一首且挑之使戰也亂雲碾破蒼龍璧自言鏖戰無勍敵一朝倒壘空壁來似覺人馬俱辟易我家文開如此兒客欲造門憂水厄酒兵先已下愁城破睡論功如破賊惟君盛氣敢爭衡重看鳴鼉鬭春色次韻酬向縣丞平昔君家瀛閣老少日結交名譽早眼中忽失如此人尚喜諸郎美風調前年寄書識英妙經歲初酬君勿誚後㑹相逢應可期顧我形容未枯槁送叙浦令宋元老總幹軺車昔參使者騶萬里粟帛咸括搜荆蠻小縣天一陬却來執板拜督郵督郵偃蹇聊復爾鶴書夜逐秋風起峩冠端恐立螭頭汗腳行當踏龍尾公家有兒才毁齒背誦六經如瀉水九重天子念勤勞令試禮部收英髦願作文章驚四海他年一釣連六鰲但知工部好驥子勿怪將軍尋鳯毛題惠崇畫秋江鳬鴈老崇學畫如學禪中年悟入理或然長江未落鳬鴈下舒卷忽若無丹鉛定自維摩三昧裏半幅生絹開萬里不用並州快剪刀斷取鐡圍山下水往年見趙德麟說惠崇嘗自言我畫中年後有悟入處豈非慧力中所得圓熟故耶今觀此短軸定非少年時筆也故詩中云爾次韻傅彥本三首介子齎金持漢節欲斬樓蘭言剴切建康家譜不傳人萬口謳謠同一舌仍聞載書盈幾車指甲生花掌卧蛇祖風凛凛世不乏笑我窮山採蕨芽友琴安用胡公節簾捲鳴弦自清切忽聞飛語衝駭機亦慮過時聽反舌仁風西來隨傳車揮毫落紙蟠蛟蛇正逢久旱得霖雨一洗槎枿皆萌芽國步未寧誰仗節慷慨談兵多感切當時日厭五侯鯖子雲筆札君卿舌爭如不識金銀車亦無字畫能驚蛇且吟老杜江頭句細栁新蒲又吐芽用前韻贈歐陽公制埀髫與君相折節初學吟詩開又切君仍抵掌能劇談至今濤瀾翻頰舌人生讀書須五車要當赤手捕長蛇不然是事且略置時過松忩煮雪芽盧溪文集卷四
