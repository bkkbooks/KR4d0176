body:
  text: 盧溪文集卷二十四宋王庭珪撰絶句癸未春被召東山益老來賀曰趙州八十猶行脚以詩荅之云八十心猶未悄然横擔拄杖布行纒都城遊徧歸來日却使誰還湯水錢寄張正伯求木樨九里飛香隔岸聞繡簾朱户閟清芬千林落蕋掃不盡分我幽牕一炷雲送黄秀才歸臨川傾蓋江頭酒一罇高樓驚坐去如雲别君無語獨長嘯尚想清音半嶺聞夜郎東歸黄去非自雙井來惠以新詩妙畫次韻三絶句贈别竄逐三危山盡頭出門入門誰與遊歸來頗復見此客下筆論詩不肯休𣲖後江西出一枝傳家句法自新竒諸方知子善哮吼恐是窟中獅子兒細㸔君詩如㸔畫無聲詩裏畫何如蟠胷秀句吐不盡落筆因成赤鯉魚贈别僧紹存老存以相法隱于叢林為拈司馬頭陀話作二偈贈之住山骨相無人識何處頭陀忽扣關第一座中聞謦欬已知輸却大溈山踢倒凈瓶呼木𣔻華林已坐一生窮却教一座為山主都在頭陀相法中和趙伯達二絶句王孫疑是李長吉詩句兼如孟浩然亂後相逢初識面便當傾廩與談天邂逅聞弦即賞音况逢清境夜攜琴一罇相遇烟霞外不廢江湖萬里心次韻彭青老詠雪三絶句雪牕未怕筆頭乾能寫春江三峽寒笑指漁翁卧蓬裏不知流下釣魚竿天公剪水散花林試比江梅色淺深梁苑詞人能賦詠終篇不作苦寒吟莫倚雪車詩句好池臺草木待春風稍晴更上高樓望要㸔餘霞散晩紅贈曦上人二絶句學詩真似學叅禪水在瓶中月在天夜半鳴鐘驚大衆斬新得句忽成篇寺倚邨南澗水開終年行脚㸔山回盧仝欲洗塵埃渇入寺却愁曦未來次韻劉惠直梅花二絶句雪壓寒梢玉作容嶺頭相見又東風人間欲問春消息半在竹橋溪影中呉姬玉面如相識寒立山隈欲下來先與江南作春色一枝傾倒向人開夜郎歸日荅葛令惠詩七載投荒萬里餘交遊半作曉星疎門前梅栁換新葉忽得故人相問書南嶽張道人見訪言論亹亹若有所自非鹿鹿然者也摭其語作詩贈之三十年相見為汝掀髯一笑考其所自也喚起赤龍耕玉池池邊龍虎自交馳周天一轂三十輻十二樓前㸔雪飛次韻李宜仲以詩寄龍涎愁眉此日為君開誰道嶺南無雁回邂逅江南逢驛使龍涎風味敵官梅鵲噪柴門曉未開香風撩我夢驚回恨無好句酬高詠喚起謫仙蘇與梅謗投三篋書猶在力挽九關天可回胡不北歸陳苦語莫貪南海戀甜梅戲向文剛生子平生只欠掌中珠天與此兒聊慰渠郎罷新來著綵服要令啼戲覔銀魚和曽英伯江東渭北關心事罇酒論文更不疑馬上皺眉應得句詩筒聊復寄微之雷秀才嘗學詩於吕居仁能談江西宗𣲖中事輒次居仁韻二絶贈行逐客歸尋溪上居釣竿猶掛洞庭湖忽逢雷子談詩𣲖傳法傳衣共一途聞有牙籖萬卷藏槐花應笑舉人忙向來閲士知多少他日昻霄見此郎周秀才取古物作十絶句見惠如豐城臨平鼓之類作一絶句題其後衆寳沈埋萬古悲斬新拈出更題詩臨平石鼔無人識誰把銅魚作鼔椎贈寫真胡生二絶句欲貌盧溪真面目非儒非佛亦非仙莫將踏碓盧行者喚作騎驢孟浩然誤著儒衣到骨窮兒童拍手笑衰翁釣魚艇子今無恙置我五湖烟雨中八月十四夜彦和置酒待月遇雨君方置酒待月明便有微雲薄太清雨罷隂雲當解駁且教霖雨慰蒼生玉宇初凉江練靜夜深風雨更凄清從教洗出峯頭路雲破星翻月自生坐待凉蟾雨欲傾一罇相對晩風清甲兵正要天河洗秉燭無妨對麴生觀兢渡次壁間絶句共坐南牕待月明雲間忽見大江横釣魚船上誰家笛吹出騷人萬古情紅旗畫皷照江明兩岸爭㸔萬目横奪得錦標誰助喜呼聲動地見真情昔年買酒論文地回雁峯前雁陣横白首相逢夜郎道不因生死見交情心如止水貯空明還似虚舟盡日横妙語忽然穿月脇筆端那有俗間情謝子發惠茶打門誰送雙圓璧驚覺茅簷晝日眠便覺清風生兩腋夢魂飛到月輪邊謁僧惠端不遇僧扉深倚碧巖隈何處㸔雲久未回日暮鳴鐘應不語嗔人馬跡涴蒼苔和劉端禮時端禮失解槐花又是一番黄天馬飄飄不可韁但得頃田耕負郭肯將斗酒博西凉白面書生鐵作肝風雨未動劍長閒何時去斬匈奴首直取西凉盡處山才如天馬豈能羈爭㸔雲霓筆下飛齷齪不須談細務徤毫留對冕旒揮國材姪送林檎嫩紅輕拂女兒臉淺緑深堆瑪瑙盤草木若能成好字來年早寄一枝㸔贈清首座上堂何事更論量還我珠來本自光未識飛猿嶺頭峻兩回掀倒夾山牀和裴主簿桃花近水淺桃不忍㸔似臨清鏡惜紅顔騎驢主簿吟詩瘦應秃千毫筆管斑秋蘭寄知縣陳邦直昨夜西風茁紫芽不應獨著野人家安仁未倦栽桃李添此清香一種花和荅邦直二首惠愛如蘭正吐芽芳風吹落幾千家明年催直金鑾殿龍口飄香㸔百花系出拾遺揚馬後清詞麗句復名家豈惟草木遭題品大筆行當判五花美胡烈臣晩年生子老蚌生珠喜可涯窮閻得寳亦堪誇如今七歳誦千字他日端能讀五車和彭養正陳令尹氣壓秋園百草芽風流宜在令君家但傾綠蟻伴清客莫羡黄金刻蘚花和劉元弼見招玉壺沽酒挈青絲及取春風花發時便把一罇留客醉莫教紅雨洗殘枝贈相士富貴本非吾輩事老來寧復問窮通餘齡幾許君知否願作昇平一老翁問訊王道之病居士病從何處起我今往問與誰俱室中三萬二千座更許盧溪下語無贈宜春筆工宜城一變宣城様入手便如錐畫沙但喜中書頭未秃不妨詩老夢生花步芳園宻栽桃李礙車輪栁下風微不動塵已辦尋春蠟雙屐飛花滿地草如茵湖頭觀桃李四絶句路轉烟邨萬木春邨深疑有避秦人山農出谷驚相問不信邊頭有戰塵朝騎一馬暮還歸盡日花間覔句遲黄四娘家誰敢道古來惟有少陵詩城裏池臺俗儉窮却來城外探東風曲欄幽檻趣不逺春在郊原浩蕩中春入千林烟雨中桃花李花能白紅一時草木披錦繡十里吹香墜晚風茉莉花三絶句纎雲捲盡日西流人在瑶池宴未休王母欲歸香滿路曉風吹下玉搔頭火雲燒野葉聲乾厯眼誰知玉蕋寒疑是羣仙來下降夜深時聽珮珊珊逆鼻清香小不分氷肌一洗瘴江昏嶺頭未負春消息恐是梅花欲返魂盧溪文集卷二十四
