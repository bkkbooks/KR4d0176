  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0176_WYG_048-1a, image: WYG1134/WYG1134-0330a.png}
body:
  text: 盧溪文集卷四十八宋王庭圭撰題跋跋黃嗣深所藏宣和御筆徽宗皇帝宸翰宣和以前京師貴人皆得寶而藏之靖康中清都九關虎豹失呵護當時御槖往往自禁中墜落人間斷紙竄墨粲然猶新名卿大臣識而祕之以遺子孫為無窮之榮耀紹興丙寅三月望日臣王某謹書跋蕭嶽英家黃魯直書山谷至黔字書一變嘗自言元祐以前字後字中無筆東坡亦云山谷老人亦僰道舟中觀長年撥棹乃覺稍進蓋是時經巫峽上瞿塘驚湍急流岸上羣峰壁立銀濤雪浪出髙灘數百仞從空而下奇險萬變故此老暮年筆力有三峽倒流之勢隆興元年九月五日盧溪王某書書漢武帝故事後漢武帝故事班周撰劉偉明跋以周為成哀間人又以故事中言迎神君説鬼神事疑後人託為之余觀漢書武帝初即位尤敬鬼神之事長陵女子神君之説及李少君文成五利相綴以鬼神方見上能使物却老夜致王夫人及竇鬼之貌其事異甚既久言方者亦衰天子始怠厭方士之怪迂語然猶羈縻弗絶冀遇其真則武帝之庸陋溺於怪物始終不移二史可以槩見偉明何為而疑之且其文雄深簡古類西漢書非班固不能作也固父彪在西京時已好述作採前史遺事其間指成帝元延年號謂之今上者亦當時所記之語如此意班固纘其父書踵而成之後人流傳誤寫固作周爾設或成哀間别有班周能為此書其人必暴耀於當時而決不泯絶於世曷為姓名不少見於他書而古今學者未嘗道哉跋錢勝夫蘭亭序後世所傳蘭亭修褉序本多不同其真本世既莫見而士大夫所有皆唐供奉官數人所摸雖字畫肥瘦各異而皆有竒處或作斷石文以為斸地得之然未易以此論優劣也錢勝夫此本刻畫未甚訛蓋其先文僖公時所藏數十百年前物也序尾有題唐貞觀中石本字者實文僖之筆猶可想其風采明珠大貝不蓄於蓬葭之家考其所藏其來甚遠非近世轉相摸者盧溪王某書跋向文剛蘭亭序後蘭亭真本一入昭陵世不復見太宗嘗賜諸王近臣已非其真皆當時供奉韓道政數人所臨故其摸傳於世者本多不同山谷老人獨取定武本謂髣佛古人筆意山谷書法妙一世其論必精前一本向文剛得之故相吕申公家未經大盜兵火時尚有前賢題跋則知其為定武本不謬今數刻並存而此本偉然絶出覽者可以自得之跋圓覺經後佛與凡夫皆具圓覺而凡夫未嘗圓覺以語言文字求圓覺則三藏十二部説不能了况裴相公圭峯老序注其言已繁我若更下一語則屋下架屋牀上安牀愈無益矣若一心虛明不假修證圓覺自現入於神通大光明藏至是言語道斷佛亦不能説也吾姪孫昌朝印施此經其發心必有所願汝唯不忘是念其報必豐圓覺不圓覺吾亦不能知也跋李及甫帖軍興東南窘甚二千石惟足餽餉飾厨傳則不乏吾事而愛民之政一切不敢為以故鮮有良吏見稱于時者舊聞龍閣李及甫在信州鯁亮廉介不為豐侈以攫賔客之譽賦無橫斂而漕粟亦魚貫于中都能以是獨立於今世士大夫之間其聲藹然行于四方豈不難哉因觀趙逢源所收信州帖亦可以槩見輒用所聞於人者書于後書傳道集後世傳吕先生受道於鍾離先生有傳道集其書祕世或罕見近歲轉相傳寫往往人皆有之而不甚寶惜字多駁謬烏焉成馬者俗莫能辨因借此本於清真道士楊應存愛其字小楷可觀為竄定百餘處尚有闕誤可疑者不敢私意改之以俟後人是正余特哀夫蓬心蒿目者之遠於道也蓋道不遠人讀此書則知道之在我而已紹興癸亥中元日盧溪真逸書題華嚴寺壁建炎庚戌之亂避地東村尋西泉故基迹樵徑步飛岑立巖嶂十數重至華嚴寺松風滿天泉鳴屋下使人襟袂飄飄如遊衡嶽廬阜之間寺僧挈泉煮茗延客終日談出世間事蓋不知海內之亂也然我輩因海內之亂乃能窮極幽峻得此塵外奇絶之遊同遊者某人正月日王某書書鴿湖寺壁時十二月五日也建炎三年寇犯安成王某劉英臣挈家避亂于鴿湖山中層巒疊巘上干青霄晝夜水聲潺湲不絶如在秦人洞中不知有鉦鼓之聲乃覺此身真風塵物表也跋大年畫大年貴公子也而喜作江湖山林人物窠窟畫平林遠水鳬雁晚景使人一見如行江南斷岸水落石出沙鳥容與波上若欲驚起此豈規規積水墨所能至邪世言大年得王摩詰李思訓江都王之典刑故無畫工氣信哉跋劉伯山詩劉伯山詩調清美不減其父升卿其源流皆出於江西近時學詩者悉棄去唐五代以來詩人繩尺謂之江西社往往失故步者有之魯直之詩雖間出險絶句而法度森嚴卒造平淡學者罕能到傳法者必於心地法門有見乃可參焉伯山方少年如駿馬駒日欲度驊騮前異時於江西社中橫出一枝為魯直拈一瓣香可乎跋梁養源心經解義經凡有呪皆諸天隱韻之音欲護清淨呵不祥則持之而其句讀則非世間言語及有思惟心所能測存而勿論可也昔人注心經至揭諦等字皆鑿出己意為之解釋嘗竊疑之及觀梁居士解義鉤深索隱如下巨海取驪龍之珠破頑石出良玉示人而人人各獲其所寶至於説處則歸諸祕密而不説惟不説乃真解佛所説者耶年月日盧溪王某書跋程子山詩後時己卯四月望日寓廬陵郡齋書余與程子山侍講俱為夜郎逐客紹興丙子春同歸自酉陽下壺頭經桃源出鬼門關暫寓于武陵出此數詩已而子山還蜀余歸江南不復相聞不知胡彥卿何以得此詩軸皆子山真迹也覽之驚惋想見其人不可復得盧溪文集卷四十八
